<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Data Import Tool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .drop-zone{border:2px dashed #333;border-radius:16px;padding:2rem;text-align:center;margin-bottom:1rem;cursor:pointer;}
        select{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;width:100%;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-upload"></i> Data Import Tool</h1>
        
        <div class="card">
            <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size:3rem;"></i>
                <p>Click to upload JSON/CSV file</p>
                <input type="file" id="fileInput" accept=".json,.csv" style="display:none;">
            </div>
            <select id="importType">
                <option value="news">Import to News</option>
                <option value="users">Import to Users</option>
            </select>
            <button onclick="importData()">Import Data</button>
            <div id="importResult" style="margin-top:1rem;"></div>
        </div>
    </div>
    <script>
        let importFileContent = null;
        
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => { importFileContent = e.target.result; alert('File loaded!'); };
                reader.readAsText(file);
            }
        });
        
        function importData() {
            if(!importFileContent) { alert('Select a file first'); return; }
            const type = document.getElementById('importType').value;
            let data;
            try { data = JSON.parse(importFileContent); }
            catch(e) { alert('Invalid JSON format'); return; }
            
            let existing = JSON.parse(localStorage.getItem(`${type}Data`) || '[]');
            existing = [...data, ...existing];
            localStorage.setItem(`${type}Data`, JSON.stringify(existing));
            document.getElementById('importResult').innerHTML = `<div style="background:#28a745;padding:0.5rem;border-radius:8px;">✅ ${data.length} records imported to ${type}!</div>`;
            setTimeout(() => document.getElementById('importResult').innerHTML = '', 3000);
            importFileContent = null;
            document.getElementById('fileInput').value = '';
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
