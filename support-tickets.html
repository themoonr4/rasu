<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Support Tickets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .ticket-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        .status-open{color:#ffc107;}
        .status-closed{color:#28a745;}
        .priority-high{color:#dc3545;}
        input,textarea,select{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-ticket-alt"></i> Support Ticket System</h1>
        
        <div class="card">
            <h3>Create New Ticket</h3>
            <input type="text" id="ticketTitle" placeholder="Subject">
            <select id="ticketPriority">
                <option value="low">Low Priority</option>
                <option value="medium">Medium Priority</option>
                <option value="high">High Priority</option>
            </select>
            <textarea id="ticketMsg" rows="3" placeholder="Describe your issue..."></textarea>
            <button onclick="createTicket()">Create Ticket</button>
        </div>
        
        <div class="card">
            <h3>Active Tickets</h3>
            <div id="ticketList"></div>
        </div>
    </div>
    <script>
        let tickets = JSON.parse(localStorage.getItem('supportTickets') || '[{"id":1,"title":"Login Issue","priority":"high","status":"open","created":"2024-04-01","messages":["I cant login to my account"]},{"id":2,"title":"Payment Failed","priority":"medium","status":"open","created":"2024-04-02","messages":["My payment was declined"]}]');
        
        function loadTickets() {
            const listDiv = document.getElementById('ticketList');
            if(tickets.length === 0) { listDiv.innerHTML = '<p>No tickets</p>'; return; }
            listDiv.innerHTML = tickets.map(t => `
                <div class="ticket-item">
                    <div>
                        <strong>#${t.id} - ${t.title}</strong><br>
                        <span class="priority-${t.priority}">${t.priority.toUpperCase()} Priority</span><br>
                        <small>Created: ${t.created}</small>
                    </div>
                    <div>
                        <span class="status-${t.status}">${t.status === 'open' ? '🟡 Open' : '✅ Closed'}</span><br>
                        <button onclick="viewTicket(${t.id})">View</button>
                        <button onclick="closeTicket(${t.id})" style="background:#28a745;">Close</button>
                    </div>
                </div>
            `).join('');
        }
        
        function createTicket() {
            const title = document.getElementById('ticketTitle').value;
            const priority = document.getElementById('ticketPriority').value;
            const message = document.getElementById('ticketMsg').value;
            if(!title || !message) { alert('Enter title and message'); return; }
            const newId = Math.max(...tickets.map(t => t.id), 0) + 1;
            tickets.unshift({ id: newId, title, priority, status: 'open', created: new Date().toLocaleDateString(), messages: [message] });
            localStorage.setItem('supportTickets', JSON.stringify(tickets));
            document.getElementById('ticketTitle').value = '';
            document.getElementById('ticketMsg').value = '';
            loadTickets();
        }
        
        function viewTicket(id) { alert(`Viewing ticket #${id}\nMessages: ${tickets.find(t => t.id === id).messages.join('\n')}`); }
        function closeTicket(id) { const t = tickets.find(t => t.id === id); if(t) { t.status = 'closed'; localStorage.setItem('supportTickets', JSON.stringify(tickets)); loadTickets(); } }
        
        loadTickets();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
