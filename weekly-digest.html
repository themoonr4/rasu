<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Weekly Digest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#1a1a1a;padding:2rem;}
        .container{max-width:600px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
        .header{background:#dc2626;padding:2rem;text-align:center;color:#fff;}
        .logo{font-size:1.5rem;font-weight:800;}
        .content{padding:2rem;}
        .news-item{border-bottom:1px solid #eee;padding:1rem 0;}
        .news-title{font-weight:600;margin-bottom:0.25rem;}
        .footer{background:#f0f0f0;padding:1rem;text-align:center;font-size:0.7rem;color:#666;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;text-decoration:none;}
    </style>
</head>
<body>
    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <div class="container">
        <div class="header"><div class="logo">🌙 THE MOON</div><div style="margin-top:0.5rem;">Your Weekly Digest</div></div>
        <div class="content">
            <h2>Top Stories This Week</h2>
            <div id="newsList"></div>
        </div>
        <div class="footer">© 2024 THE MOON. All rights reserved.<br>You received this email because you subscribed to our newsletter.</div>
    </div>
    <script>
        const news = [
            { title: "India Wins World Cup 2024", summary: "Historic victory in final match" },
            { title: "New AI Model Released", summary: "Breakthrough in artificial intelligence" },
            { title: "Budget 2024 Highlights", summary: "Key announcements from finance minister" }
        ];
        const newsDiv = document.getElementById('newsList');
        newsDiv.innerHTML = news.map(n => `<div class="news-item"><div class="news-title">📰 ${n.title}</div><div>${n.summary}</div></div>`).join('');
    </script>
</body>
</html>
