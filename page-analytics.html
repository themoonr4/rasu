<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Page Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .page-item{display:flex;justify-content:space-between;align-items:center;padding:0.5rem;border-bottom:1px solid #222;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-chart-line"></i> Page Analytics Tracker</h1>
        
        <div class="stats-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;">
            <div class="stat-card" style="background:#1a1a1a;padding:1rem;border-radius:12px;text-align:center;"><div>Total Views</div><div class="stat-value" id="totalViews">0</div></div>
            <div class="stat-card" style="background:#1a1a1a;padding:1rem;border-radius:12px;text-align:center;"><div>Unique Visitors</div><div class="stat-value" id="uniqueVisitors">0</div></div>
            <div class="stat-card" style="background:#1a1a1a;padding:1rem;border-radius:12px;text-align:center;"><div>Avg Time</div><div class="stat-value" id="avgTime">0</div></div>
        </div>
        
        <div class="card">
            <h3>Top Pages</h3>
            <div id="pageList"></div>
        </div>
        
        <div class="card">
            <h3>Real-time Visitors</h3>
            <div id="realtimeVisitors">Current: <span id="currentVisitors">0</span> online</div>
        </div>
    </div>
    <script>
        let pageViews = JSON.parse(localStorage.getItem('pageViews') || '{"pages":[{"url":"/","views":1250},{"url":"/news","views":890},{"url":"/tech","views":567},{"url":"/sports","views":432},{"url":"/business","views":321}],"total":3460}');
        
        function loadAnalytics() {
            document.getElementById('totalViews').innerHTML = pageViews.total;
            document.getElementById('uniqueVisitors').innerHTML = Math.floor(pageViews.total / 2.5);
            document.getElementById('avgTime').innerHTML = '2:45';
            document.getElementById('currentVisitors').innerHTML = Math.floor(Math.random() * 50) + 10;
            
            const listDiv = document.getElementById('pageList');
            listDiv.innerHTML = pageViews.pages.map(p => `<div class="page-item"><span>${p.url}</span><span>${p.views} views</span></div>`).join('');
        }
        
        loadAnalytics();
        setInterval(() => {
            document.getElementById('currentVisitors').innerHTML = Math.floor(Math.random() * 50) + 10;
        }, 5000);
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
