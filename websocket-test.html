<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - WebSocket Tester</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input,textarea{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .message-log{background:#1a1a1a;padding:0.5rem;border-radius:8px;margin-top:0.5rem;font-family:monospace;font-size:0.7rem;max-height:200px;overflow-y:auto;}
        .status-connected{color:#28a745;}
        .status-disconnected{color:#dc3545;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-plug"></i> WebSocket Connection Tester</h1>
        
        <div class="card">
            <h3>WebSocket URL</h3>
            <input type="text" id="wsUrl" placeholder="wss://echo.websocket.org">
            <div id="wsStatus" class="status-disconnected">Disconnected</div>
            <div style="margin:0.5rem 0;">
                <button onclick="connectWebSocket()">Connect</button>
                <button onclick="disconnectWebSocket()">Disconnect</button>
            </div>
        </div>
        
        <div class="card">
            <h3>Send Message</h3>
            <input type="text" id="sendMsg" placeholder="Type message...">
            <button onclick="sendMessage()">Send</button>
        </div>
        
        <div class="card">
            <h3>Messages</h3>
            <div id="messageLog" class="message-log">No messages yet</div>
        </div>
    </div>
    <script>
        let ws = null;
        
        function connectWebSocket() {
            const url = document.getElementById('wsUrl').value;
            if(!url) { alert('Enter WebSocket URL'); return; }
            ws = new WebSocket(url);
            ws.onopen = () => {
                document.getElementById('wsStatus').innerHTML = 'Connected ✅';
                document.getElementById('wsStatus').className = 'status-connected';
                addMessage('Connected to ' + url);
            };
            ws.onmessage = (e) => { addMessage('Received: ' + e.data); };
            ws.onerror = (e) => { addMessage('Error: ' + e); };
            ws.onclose = () => {
                document.getElementById('wsStatus').innerHTML = 'Disconnected ❌';
                document.getElementById('wsStatus').className = 'status-disconnected';
                addMessage('Disconnected');
            };
        }
        
        function disconnectWebSocket() {
            if(ws) ws.close();
        }
        
        function sendMessage() {
            const msg = document.getElementById('sendMsg').value;
            if(!ws || ws.readyState !== WebSocket.OPEN) { alert('WebSocket not connected'); return; }
            ws.send(msg);
            addMessage('Sent: ' + msg);
            document.getElementById('sendMsg').value = '';
        }
        
        function addMessage(msg) {
            const logDiv = document.getElementById('messageLog');
            if(logDiv.innerHTML === 'No messages yet') logDiv.innerHTML = '';
            logDiv.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
