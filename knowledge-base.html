<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Knowledge Base</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .search-bar{background:#111;border:1px solid #222;border-radius:16px;padding:1rem;margin-bottom:2rem;}
        .search-bar input{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        .category-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem;}
        .category-card{background:#111;border:1px solid #222;border-radius:16px;padding:1rem;text-align:center;cursor:pointer;}
        .category-card i{font-size:2rem;color:#dc2626;margin-bottom:0.5rem;}
        .article-list{background:#111;border:1px solid #222;border-radius:16px;padding:1rem;}
        .article-item{padding:0.75rem;border-bottom:1px solid #222;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-book"></i> Knowledge Base</h1>
        
        <div class="search-bar">
            <input type="text" id="searchKB" placeholder="Search help articles...">
        </div>
        
        <div class="category-grid">
            <div class="category-card" onclick="showCategory('getting-started')"><i class="fas fa-rocket"></i><h3>Getting Started</h3><small>5 articles</small></div>
            <div class="category-card" onclick="showCategory('account')"><i class="fas fa-user"></i><h3>Account</h3><small>4 articles</small></div>
            <div class="category-card" onclick="showCategory('billing')"><i class="fas fa-credit-card"></i><h3>Billing</h3><small>3 articles</small></div>
            <div class="category-card" onclick="showCategory('troubleshooting')"><i class="fas fa-bug"></i><h3>Troubleshooting</h3><small>6 articles</small></div>
        </div>
        
        <div class="article-list" id="articleList">
            <h3>Popular Articles</h3>
            <div id="articles"></div>
        </div>
    </div>
    <script>
        const articles = {
            'getting-started': ['How to create an account', 'Setting up your profile', 'Navigating the dashboard', 'Mobile app setup', 'First steps guide'],
            'account': ['Changing password', 'Email verification', 'Deleting account', 'Privacy settings'],
            'billing': ['Subscription plans', 'Payment methods', 'Invoice download'],
            'troubleshooting': ['Login issues', 'Loading problems', 'Payment failed', 'App crashing', 'Notification not working', 'Contact support']
        };
        
        function showCategory(category) {
            const articleDiv = document.getElementById('articles');
            articleDiv.innerHTML = articles[category].map(a => `<div class="article-item" onclick="openArticle('${a}')">📄 ${a}</div>`).join('');
        }
        
        function openArticle(title) { alert(`Opening article: ${title}\n\nFull content would appear here.`); }
        
        document.getElementById('searchKB').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const allArticles = [...articles['getting-started'], ...articles['account'], ...articles['billing'], ...articles['troubleshooting']];
            const filtered = allArticles.filter(a => a.toLowerCase().includes(query));
            const articleDiv = document.getElementById('articles');
            articleDiv.innerHTML = filtered.map(a => `<div class="article-item" onclick="openArticle('${a}')">📄 ${a}</div>`).join('');
        });
        
        showCategory('getting-started');
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
