<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Color Palette</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;margin:1rem 0;}
        .color-box{height:100px;border-radius:12px;cursor:pointer;transition:transform 0.2s;}
        .color-box:hover{transform:scale(1.05);}
        input{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-palette"></i> Color Palette Generator</h1>
        
        <div class="card">
            <h3>Generate from Color</h3>
            <input type="color" id="baseColor" value="#dc2626">
            <button onclick="generatePalette()">Generate Palette</button>
            <div id="paletteResult"></div>
        </div>
        
        <div class="card">
            <h3>Random Palette</h3>
            <button onclick="randomPalette()">Generate Random</button>
            <div id="randomPalette"></div>
        </div>
    </div>
    <script>
        function generatePalette() {
            const base = document.getElementById('baseColor').value;
            const colors = [base];
            for(let i = 1; i <= 4; i++) {
                const r = parseInt(base.slice(1,3), 16);
                const g = parseInt(base.slice(3,5), 16);
                const b = parseInt(base.slice(5,7), 16);
                const factor = 1 - (i * 0.15);
                const newR = Math.min(255, Math.floor(r * factor));
                const newG = Math.min(255, Math.floor(g * factor));
                const newB = Math.min(255, Math.floor(b * factor));
                colors.push(`#${newR.toString(16).padStart(2,'0')}${newG.toString(16).padStart(2,'0')}${newB.toString(16).padStart(2,'0')}`);
            }
            displayPalette(colors);
        }
        
        function randomPalette() {
            const colors = [];
            for(let i = 0; i < 5; i++) {
                const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
                colors.push(randomColor);
            }
            displayPalette(colors);
        }
        
        function displayPalette(colors) {
            const container = document.getElementById('paletteResult');
            container.innerHTML = `<div class="color-grid">${colors.map(c => `<div class="color-box" style="background:${c};" onclick="copyColor('${c}')" title="Click to copy"></div>`).join('')}</div><div>${colors.map(c => `<span style="margin-right:1rem;">${c}</span>`).join('')}</div>`;
        }
        
        function copyColor(color) { navigator.clipboard.writeText(color); alert(`Copied ${color}`); }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
