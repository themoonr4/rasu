<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - CSS Gradient Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:700px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .gradient-preview{height:150px;border-radius:12px;margin-bottom:1rem;}
        .color-inputs{display:flex;gap:1rem;margin-bottom:1rem;}
        input[type="color"]{width:60px;height:60px;border:1px solid #333;border-radius:8px;cursor:pointer;}
        select,input[type="range"]{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;margin-right:0.5rem;}
        .code-block{background:#1a1a1a;padding:0.75rem;border-radius:8px;font-family:monospace;font-size:0.7rem;word-break:break-all;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-palette"></i> CSS Gradient Generator</h1>
        
        <div class="card">
            <div class="gradient-preview" id="gradientPreview"></div>
            
            <div class="color-inputs">
                <input type="color" id="color1" value="#dc2626">
                <input type="color" id="color2" value="#4f46e5">
                <input type="color" id="color3" value="#000000" style="opacity:0.5;">
            </div>
            
            <select id="gradientType">
                <option value="linear">Linear Gradient</option>
                <option value="radial">Radial Gradient</option>
                <option value="conic">Conic Gradient</option>
            </select>
            
            <input type="range" id="angle" min="0" max="360" value="135">
            <label>Angle: <span id="angleValue">135</span>°</label>
            
            <button onclick="updateGradient()">Update</button>
            <button onclick="copyGradientCode()">Copy CSS</button>
            
            <div id="gradientCode" class="code-block"></div>
        </div>
        
        <div class="card">
            <h3>Presets</h3>
            <button onclick="setPreset('sunset')">Sunset</button>
            <button onclick="setPreset('ocean')">Ocean</button>
            <button onclick="setPreset('forest')">Forest</button>
            <button onclick="setPreset('midnight')">Midnight</button>
        </div>
    </div>
    <script>
        function updateGradient() {
            const color1 = document.getElementById('color1').value;
            const color2 = document.getElementById('color2').value;
            const color3 = document.getElementById('color3').value;
            const type = document.getElementById('gradientType').value;
            const angle = document.getElementById('angle').value;
            document.getElementById('angleValue').innerText = angle;
            
            let gradient = '';
            if(type === 'linear') {
                gradient = `linear-gradient(${angle}deg, ${color1}, ${color2})`;
            } else if(type === 'radial') {
                gradient = `radial-gradient(circle at center, ${color1}, ${color2})`;
            } else {
                gradient = `conic-gradient(from ${angle}deg, ${color1}, ${color2}, ${color3})`;
            }
            
            document.getElementById('gradientPreview').style.background = gradient;
            document.getElementById('gradientCode').innerHTML = `background: ${gradient};`;
        }
        
        function copyGradientCode() {
            const code = document.getElementById('gradientCode').innerText;
            navigator.clipboard.writeText(code);
            alert('CSS copied!');
        }
        
        function setPreset(preset) {
            const presets = {
                sunset: ['#f59e0b', '#dc2626', '#7c2d12'],
                ocean: ['#06b6d4', '#3b82f6', '#1e3a8a'],
                forest: ['#10b981', '#047857', '#064e3b'],
                midnight: ['#4f46e5', '#7c3aed', '#2e1065']
            };
            const colors = presets[preset];
            document.getElementById('color1').value = colors[0];
            document.getElementById('color2').value = colors[1];
            document.getElementById('color3').value = colors[2];
            updateGradient();
        }
        
        document.getElementById('color1').addEventListener('input', updateGradient);
        document.getElementById('color2').addEventListener('input', updateGradient);
        document.getElementById('color3').addEventListener('input', updateGradient);
        document.getElementById('gradientType').addEventListener('change', updateGradient);
        document.getElementById('angle').addEventListener('input', updateGradient);
        
        updateGradient();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
