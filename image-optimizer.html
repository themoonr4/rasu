<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Image Optimizer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .drop-zone{border:2px dashed #333;border-radius:16px;padding:2rem;text-align:center;margin-bottom:1rem;cursor:pointer;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
        img{max-width:100%;border-radius:8px;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-image"></i> Image Optimizer</h1>
        
        <div class="card">
            <div class="drop-zone" onclick="document.getElementById('imageInput').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size:3rem;"></i>
                <p>Click or drag image to optimize</p>
                <input type="file" id="imageInput" accept="image/*" style="display:none;">
            </div>
            <div style="display:flex;gap:1rem;margin:1rem 0;">
                <select id="qualitySelect">
                    <option value="80">Quality: 80%</option>
                    <option value="60">Quality: 60%</option>
                    <option value="40">Quality: 40%</option>
                </select>
                <select id="widthSelect">
                    <option value="1200">Width: 1200px</option>
                    <option value="800">Width: 800px</option>
                    <option value="400">Width: 400px</option>
                </select>
            </div>
            <button onclick="optimizeImage()">Optimize Image</button>
            <div id="imagePreview" style="margin-top:1rem;"></div>
            <div id="optimizeResult"></div>
        </div>
    </div>
    <script>
        let originalFile = null;
        
        document.getElementById('imageInput').addEventListener('change', (e) => {
            if(e.target.files[0]) {
                originalFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imagePreview').innerHTML = `<h4>Original Image</h4><img src="${e.target.result}"><div>Size: ${(originalFile.size/1024).toFixed(2)} KB</div>`;
                };
                reader.readAsDataURL(originalFile);
            }
        });
        
        function optimizeImage() {
            if(!originalFile) { alert('Select an image first'); return; }
            const quality = parseInt(document.getElementById('qualitySelect').value) / 100;
            const maxWidth = parseInt(document.getElementById('widthSelect').value);
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    if(width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        const optimizedUrl = URL.createObjectURL(blob);
                        document.getElementById('optimizeResult').innerHTML = `<h4>Optimized Image</h4><img src="${optimizedUrl}"><div>New Size: ${(blob.size/1024).toFixed(2)} KB</div><div>Saved: ${((originalFile.size - blob.size)/originalFile.size * 100).toFixed(1)}%</div><a href="${optimizedUrl}" download="optimized_image.jpg"><button>Download Optimized</button></a>`;
                    }, 'image/jpeg', quality);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(originalFile);
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
