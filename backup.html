<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Backup Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;margin-right:0.5rem;}
        .backup-list{background:#1a1a1a;border-radius:12px;padding:1rem;}
        .backup-item{display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-bottom:1px solid #222;}
        .backup-btn{background:#28a745;}
        .danger-btn{background:#dc3545;}
        .back-btn{background:transparent;border:1px solid #333;margin-bottom:1rem;display:inline-flex;align-items:center;gap:0.5rem;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-database"></i> Backup Manager</h1>
        
        <div class="card">
            <h3>Create New Backup</h3>
            <p style="color:#aaa;margin:0.5rem 0;">Export all news, categories, and settings</p>
            <button id="createBackupBtn"><i class="fas fa-download"></i> Create Backup</button>
            <div id="backupMsg"></div>
        </div>
        
        <div class="card">
            <h3>Restore Backup</h3>
            <input type="file" id="restoreFile" accept=".json">
            <button id="restoreBtn"><i class="fas fa-upload"></i> Restore</button>
        </div>
        
        <div class="card">
            <h3>Available Backups</h3>
            <div class="backup-list" id="backupList"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cjyfmhsodmbudjbxjbek.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_RPIMDVsM_8kpbqSlTUmnVw_m7k7K4Cv';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function loadBackups() {
            const backups = JSON.parse(localStorage.getItem('backups') || '[]');
            const listDiv = document.getElementById('backupList');
            if(backups.length === 0) {
                listDiv.innerHTML = '<p style="color:#aaa;">No backups found</p>';
                return;
            }
            listDiv.innerHTML = backups.map(b => `
                <div class="backup-item">
                    <span><i class="fas fa-archive"></i> ${b.name} (${new Date(b.date).toLocaleString()})</span>
                    <button class="danger-btn" onclick="deleteBackup('${b.name}')">Delete</button>
                </div>
            `).join('');
        }
        
        document.getElementById('createBackupBtn').addEventListener('click', async () => {
            const { data: news } = await supabase.from('news').select('*');
            const { data: categories } = await supabase.from('categories').select('*');
            const backup = { news, categories, date: new Date().toISOString() };
            const backupName = `backup_${Date.now()}.json`;
            localStorage.setItem(backupName, JSON.stringify(backup));
            const backups = JSON.parse(localStorage.getItem('backups') || '[]');
            backups.push({ name: backupName, date: new Date().toISOString() });
            localStorage.setItem('backups', JSON.stringify(backups));
            document.getElementById('backupMsg').innerHTML = '<div style="background:#28a745;padding:0.5rem;border-radius:8px;margin-top:0.5rem;">✅ Backup created!</div>';
            loadBackups();
            setTimeout(() => document.getElementById('backupMsg').innerHTML = '', 3000);
        });
        
        document.getElementById('restoreBtn').addEventListener('click', async () => {
            const file = document.getElementById('restoreFile').files[0];
            if(!file) { alert('Select a backup file'); return; }
            const reader = new FileReader();
            reader.onload = async (e) => {
                const backup = JSON.parse(e.target.result);
                for(let article of backup.news) {
                    await supabase.from('news').upsert(article);
                }
                alert('Restore complete!');
                location.reload();
            };
            reader.readAsText(file);
        });
        
        function deleteBackup(name) {
            localStorage.removeItem(name);
            let backups = JSON.parse(localStorage.getItem('backups') || '[]');
            backups = backups.filter(b => b.name !== name);
            localStorage.setItem('backups', JSON.stringify(backups));
            loadBackups();
        }
        
        loadBackups();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
