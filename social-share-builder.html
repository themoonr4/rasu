<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Social Share Builder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input,textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .share-buttons{display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap;}
        .share-btn{padding:0.5rem 1rem;background:#1a1a1a;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:0.5rem;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-share-alt"></i> Social Share Builder</h1>
        
        <div class="card">
            <h3>Share Content</h3>
            <input type="text" id="shareTitle" placeholder="Title">
            <textarea id="shareDesc" rows="3" placeholder="Description"></textarea>
            <input type="text" id="shareUrl" placeholder="URL" value="https://themoonr4.github.io/the-moon-supreme/">
            <div class="share-buttons">
                <div class="share-btn" onclick="shareOn('whatsapp')"><i class="fab fa-whatsapp"></i> WhatsApp</div>
                <div class="share-btn" onclick="shareOn('twitter')"><i class="fab fa-twitter"></i> Twitter</div>
                <div class="share-btn" onclick="shareOn('facebook')"><i class="fab fa-facebook"></i> Facebook</div>
                <div class="share-btn" onclick="shareOn('telegram')"><i class="fab fa-telegram"></i> Telegram</div>
                <div class="share-btn" onclick="shareOn('linkedin')"><i class="fab fa-linkedin"></i> LinkedIn</div>
            </div>
            <div id="shareResult" style="margin-top:1rem;"></div>
        </div>
    </div>
    <script>
        function shareOn(platform) {
            const title = encodeURIComponent(document.getElementById('shareTitle').value || 'THE MOON');
            const desc = encodeURIComponent(document.getElementById('shareDesc').value || 'World class news platform');
            const url = encodeURIComponent(document.getElementById('shareUrl').value);
            let shareUrl = '';
            if(platform === 'whatsapp') shareUrl = `https://wa.me/?text=${title}%20-${url}`;
            else if(platform === 'twitter') shareUrl = `https://twitter.com/intent/tweet?text=${title}&url=${url}`;
            else if(platform === 'facebook') shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
            else if(platform === 'telegram') shareUrl = `https://t.me/share/url?url=${url}&text=${title}`;
            else if(platform === 'linkedin') shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;
            window.open(shareUrl, '_blank');
        }
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
