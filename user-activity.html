<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - User Activity</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:1200px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem;}
        .stat-card{background:#111;border:1px solid #222;border-radius:16px;padding:1rem;text-align:center;}
        .stat-value{font-size:1.8rem;font-weight:700;color:#dc2626;}
        .activity-table{width:100%;border-collapse:collapse;background:#111;border-radius:16px;overflow:hidden;}
        th,td{padding:0.75rem;text-align:left;border-bottom:1px solid #222;}
        th{background:#1a1a1a;color:#aaa;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;margin-right:0.5rem;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-users"></i> User Activity Monitoring</h1>
        
        <div class="stats-grid">
            <div class="stat-card"><div>Active Today</div><div class="stat-value" id="activeToday">0</div></div>
            <div class="stat-card"><div>Active This Week</div><div class="stat-value" id="activeWeek">0</div></div>
            <div class="stat-card"><div>Total Users</div><div class="stat-value" id="totalUsers">0</div></div>
            <div class="stat-card"><div>Avg Session</div><div class="stat-value" id="avgSession">0</div><div>min</div></div>
        </div>
        
        <div style="margin-bottom:1rem;">
            <button onclick="filterActivity('all')">All Activity</button>
            <button onclick="filterActivity('login')">Logins</button>
            <button onclick="filterActivity('read')">Reads</button>
            <button onclick="filterActivity('comment')">Comments</button>
            <button onclick="exportActivity()">Export CSV</button>
        </div>
        
        <table class="activity-table">
            <thead><tr><th>User</th><th>Action</th><th>Page</th><th>Time</th><th>IP Address</th></tr></thead>
            <tbody id="activityBody"></tbody>
        </table>
    </div>
    <script>
        let activities = JSON.parse(localStorage.getItem('userActivities') || '[]');
        
        function addSampleActivities() {
            if(activities.length === 0) {
                activities = [
                    { user: 'user@themoon.news', action: 'login', page: '/', time: new Date().toLocaleString(), ip: '192.168.1.1' },
                    { user: 'guest_123', action: 'read', page: '/article.html?id=1', time: new Date().toLocaleString(), ip: '192.168.1.2' },
                    { user: 'admin@themoon.news', action: 'comment', page: '/article.html?id=1', time: new Date().toLocaleString(), ip: '192.168.1.3' }
                ];
                localStorage.setItem('userActivities', JSON.stringify(activities));
            }
        }
        
        function loadStats() {
            const today = new Date().toDateString();
            const todayCount = activities.filter(a => new Date(a.time).toDateString() === today).length;
            const weekCount = activities.filter(a => new Date(a.time) > new Date(Date.now() - 7*86400000)).length;
            const uniqueUsers = [...new Set(activities.map(a => a.user))].length;
            document.getElementById('activeToday').innerHTML = todayCount;
            document.getElementById('activeWeek').innerHTML = weekCount;
            document.getElementById('totalUsers').innerHTML = uniqueUsers;
            document.getElementById('avgSession').innerHTML = Math.floor(Math.random() * 10) + 2;
        }
        
        function filterActivity(type) {
            const filtered = type === 'all' ? activities : activities.filter(a => a.action === type);
            const tbody = document.getElementById('activityBody');
            tbody.innerHTML = filtered.map(a => `
                <tr>
                    <td>${a.user}</td>
                    <td><i class="fas ${a.action === 'login' ? 'fa-sign-in-alt' : a.action === 'read' ? 'fa-book' : 'fa-comment'}"></i> ${a.action}</td>
                    <td>${a.page}</td>
                    <td>${a.time}</td>
                    <td>${a.ip}</td>
                </tr>
            `).join('');
        }
        
        function exportActivity() {
            const csv = ['User,Action,Page,Time,IP', ...activities.map(a => `${a.user},${a.action},${a.page},${a.time},${a.ip}`)].join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `user_activity_${Date.now()}.csv`; a.click();
            URL.revokeObjectURL(url);
        }
        
        addSampleActivities();
        loadStats();
        filterActivity('all');
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
