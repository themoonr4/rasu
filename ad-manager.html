<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Ad Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .ad-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        input,select,textarea{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-ad"></i> Ad Manager</h1>
        
        <div class="card">
            <h3>Add Ad Code</h3>
            <input type="text" id="adName" placeholder="Ad Name">
            <select id="adPosition">
                <option value="header">Header</option>
                <option value="sidebar">Sidebar</option>
                <option value="between_articles">Between Articles</option>
                <option value="footer">Footer</option>
            </select>
            <textarea id="adCode" rows="4" placeholder="Ad code (HTML/JS)"></textarea>
            <button onclick="addAd()">Add Ad</button>
        </div>
        
        <div class="card">
            <h3>Active Ads</h3>
            <div id="adList"></div>
        </div>
    </div>
    <script>
        let ads = JSON.parse(localStorage.getItem('siteAds') || '[]');
        
        function loadAds() {
            const listDiv = document.getElementById('adList');
            if(ads.length === 0) { listDiv.innerHTML = '<p>No ads configured</p>'; return; }
            listDiv.innerHTML = ads.map((ad, i) => `
                <div class="ad-item">
                    <div><strong>${ad.name}</strong><br><small>Position: ${ad.position}</small></div>
                    <div><button onclick="toggleAd(${i})">${ad.active ? 'Disable' : 'Enable'}</button><button onclick="deleteAd(${i})" style="background:#dc3545;">Delete</button></div>
                </div>
            `).join('');
        }
        
        function addAd() {
            const name = document.getElementById('adName').value;
            const position = document.getElementById('adPosition').value;
            const code = document.getElementById('adCode').value;
            if(!name || !code) { alert('Enter ad name and code'); return; }
            ads.push({ name, position, code, active: true, createdAt: new Date().toISOString() });
            localStorage.setItem('siteAds', JSON.stringify(ads));
            document.getElementById('adName').value = '';
            document.getElementById('adCode').value = '';
            loadAds();
        }
        
        function toggleAd(index) {
            ads[index].active = !ads[index].active;
            localStorage.setItem('siteAds', JSON.stringify(ads));
            loadAds();
        }
        
        function deleteAd(index) {
            ads.splice(index, 1);
            localStorage.setItem('siteAds', JSON.stringify(ads));
            loadAds();
        }
        
        loadAds();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
