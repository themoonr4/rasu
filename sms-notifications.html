<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - SMS Notifications</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:700px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input,textarea{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .recipient-list{background:#1a1a1a;padding:0.5rem;border-radius:8px;margin-top:0.5rem;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-sms"></i> SMS Notification System</h1>
        
        <div class="card">
            <h3>Send SMS</h3>
            <input type="text" id="smsNumber" placeholder="Phone number (with country code)">
            <textarea id="smsMessage" rows="3" placeholder="SMS message (160 chars max)"></textarea>
            <button onclick="sendSMS()">Send SMS</button>
            <div id="smsResult"></div>
        </div>
        
        <div class="card">
            <h3>Bulk SMS</h3>
            <textarea id="bulkNumbers" rows="3" placeholder="Phone numbers (one per line)"></textarea>
            <input type="text" id="bulkMessage" placeholder="Message (160 chars max)">
            <button onclick="sendBulkSMS()">Send Bulk SMS</button>
        </div>
        
        <div class="card">
            <h3>SMS Templates</h3>
            <div class="recipient-list" onclick="setTemplate('breaking')">🔴 Breaking News Alert</div>
            <div class="recipient-list" onclick="setTemplate('otp')">🔐 Your OTP is: XXXXX</div>
            <div class="recipient-list" onclick="setTemplate('welcome')">👋 Welcome to THE MOON!</div>
        </div>
    </div>
    <script>
        function sendSMS() {
            const number = document.getElementById('smsNumber').value;
            const message = document.getElementById('smsMessage').value;
            if(!number || !message) { alert('Enter number and message'); return; }
            if(message.length > 160) { alert('Message exceeds 160 characters'); return; }
            document.getElementById('smsResult').innerHTML = `<div style="color:#28a745;">✅ SMS sent to ${number}</div>`;
            setTimeout(() => document.getElementById('smsResult').innerHTML = '', 3000);
        }
        
        function sendBulkSMS() {
            const numbers = document.getElementById('bulkNumbers').value.split('\n').filter(n => n.trim());
            const message = document.getElementById('bulkMessage').value;
            if(!message) { alert('Enter message'); return; }
            alert(`SMS sent to ${numbers.length} recipients!`);
        }
        
        function setTemplate(type) {
            const templates = { breaking: 'Breaking News: Major event unfolding. Stay tuned!', otp: 'Your OTP is 123456', welcome: 'Welcome to THE MOON! Start exploring news.' };
            document.getElementById('bulkMessage').value = templates[type] || '';
            document.getElementById('smsMessage').value = templates[type] || '';
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
