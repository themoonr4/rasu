<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Media Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .drop-zone{border:2px dashed #333;border-radius:16px;padding:2rem;text-align:center;margin-bottom:1rem;cursor:pointer;}
        .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;margin-top:1rem;}
        .media-item{background:#1a1a1a;border-radius:12px;padding:0.5rem;text-align:center;position:relative;}
        .media-item img{width:100%;height:100px;object-fit:cover;border-radius:8px;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-photo-video"></i> Media Library Manager</h1>
        
        <div class="card">
            <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size:3rem;"></i>
                <p>Click or drag to upload images</p>
                <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
            </div>
            <button onclick="uploadFiles()">Upload Selected</button>
        </div>
        
        <div class="card">
            <h3>Media Library</h3>
            <div id="mediaGrid" class="media-grid"></div>
        </div>
    </div>
    <script>
        let mediaItems = JSON.parse(localStorage.getItem('mediaLibrary') || '[]');
        let selectedFiles = [];
        
        document.getElementById('fileInput').addEventListener('change', (e) => { selectedFiles = Array.from(e.target.files); });
        
        function uploadFiles() {
            if(selectedFiles.length === 0) { alert('Select files first'); return; }
            selectedFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    mediaItems.push({ id: Date.now() + Math.random(), url: e.target.result, name: file.name, size: (file.size/1024).toFixed(2), date: new Date().toLocaleString() });
                    localStorage.setItem('mediaLibrary', JSON.stringify(mediaItems));
                    loadMedia();
                };
                reader.readAsDataURL(file);
            });
            selectedFiles = [];
        }
        
        function loadMedia() {
            const grid = document.getElementById('mediaGrid');
            if(mediaItems.length === 0) { grid.innerHTML = '<p>No media files</p>'; return; }
            grid.innerHTML = mediaItems.map(m => `
                <div class="media-item">
                    <img src="${m.url}" alt="${m.name}">
                    <div style="font-size:0.6rem;margin:0.25rem;">${m.name}</div>
                    <button onclick="copyMediaUrl('${m.url}')">Copy URL</button>
                    <button onclick="deleteMedia('${m.id}')" style="background:#dc3545;">Delete</button>
                </div>
            `).join('');
        }
        
        function copyMediaUrl(url) { navigator.clipboard.writeText(url); alert('URL copied!'); }
        function deleteMedia(id) { mediaItems = mediaItems.filter(m => m.id != id); localStorage.setItem('mediaLibrary', JSON.stringify(mediaItems)); loadMedia(); }
        
        loadMedia();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
