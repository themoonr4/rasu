<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Code Minifier</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .editor-container{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
        textarea{width:100%;height:300px;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-family:monospace;font-size:0.7rem;}
        select{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;margin-right:0.5rem;}
        .stats{background:#1a1a1a;padding:0.5rem;border-radius:8px;margin-top:0.5rem;font-size:0.7rem;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-compress-alt"></i> HTML/CSS/JS Minifier</h1>
        
        <div class="card">
            <select id="codeType">
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="js">JavaScript</option>
            </select>
            <div class="editor-container">
                <div><h3>Input</h3><textarea id="inputCode" placeholder="Paste your code here..."></textarea></div>
                <div><h3>Minified Output</h3><textarea id="outputCode" readonly></textarea></div>
            </div>
            <div style="margin-top:1rem;">
                <button onclick="minifyCode()">Minify</button>
                <button onclick="copyOutput()">Copy Output</button>
                <button onclick="clearAll()">Clear</button>
            </div>
            <div id="stats" class="stats"></div>
        </div>
        
        <div class="card">
            <h3>Examples</h3>
            <button onclick="loadExample('html')">HTML Example</button>
            <button onclick="loadExample('css')">CSS Example</button>
            <button onclick="loadExample('js')">JS Example</button>
        </div>
    </div>
    <script>
        function minifyCode() {
            const type = document.getElementById('codeType').value;
            let input = document.getElementById('inputCode').value;
            let output = '';
            
            if(type === 'html') {
                output = input.replace(/<!--[\s\S]*?-->/g, '')
                    .replace(/\s+/g, ' ')
                    .replace(/>\s+</g, '><')
                    .trim();
            } else if(type === 'css') {
                output = input.replace(/\/\*[\s\S]*?\*\//g, '')
                    .replace(/\s*([{}:;,])\s*/g, '$1')
                    .replace(/;\}/g, '}')
                    .trim();
            } else {
                output = input.replace(/\/\/.*$/gm, '')
                    .replace(/\/\*[\s\S]*?\*\//g, '')
                    .replace(/\s+/g, ' ')
                    .trim();
            }
            
            document.getElementById('outputCode').value = output;
            const originalSize = input.length;
            const minifiedSize = output.length;
            const saved = ((originalSize - minifiedSize) / originalSize * 100).toFixed(1);
            document.getElementById('stats').innerHTML = `Original: ${originalSize} bytes | Minified: ${minifiedSize} bytes | Saved: ${saved}%`;
        }
        
        function copyOutput() {
            const output = document.getElementById('outputCode').value;
            navigator.clipboard.writeText(output);
            alert('Copied to clipboard!');
        }
        
        function clearAll() {
            document.getElementById('inputCode').value = '';
            document.getElementById('outputCode').value = '';
            document.getElementById('stats').innerHTML = '';
        }
        
        function loadExample(type) {
            const examples = {
                html: '<!DOCTYPE html>\n<html>\n<head>\n    <title>THE MOON</title>\n</head>\n<body>\n    <h1>Welcome</h1>\n</body>\n</html>',
                css: 'body {\n    background: #0a0a0a;\n    color: #fff;\n    font-family: sans-serif;\n}\n\nh1 {\n    font-size: 2rem;\n    color: #dc2626;\n}',
                js: '// This is a comment\nfunction greet(name) {\n    console.log("Hello, " + name);\n    return name;\n}\n\ngreet("THE MOON");'
            };
            document.getElementById('inputCode').value = examples[type];
            document.getElementById('codeType').value = type;
            minifyCode();
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
