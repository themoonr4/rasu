<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Headline Analyzer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:700px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        .score-circle{width:100px;height:100px;border-radius:50%;background:#1a1a1a;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-heading"></i> Headline Analyzer Tool</h1>
        
        <div class="card">
            <h3>Enter Headline</h3>
            <input type="text" id="headline" placeholder="Enter your news headline here...">
            <button onclick="analyzeHeadline()">Analyze Headline</button>
            <div id="analysisResult"></div>
        </div>
        
        <div class="card">
            <h3>Tips for Better Headlines</h3>
            <div id="tips"></div>
        </div>
    </div>
    <script>
        function analyzeHeadline() {
            const headline = document.getElementById('headline').value;
            if(!headline) { alert('Enter a headline'); return; }
            const resultDiv = document.getElementById('analysisResult');
            
            let score = 50;
            let feedback = [];
            
            if(headline.length >= 50 && headline.length <= 70) { score += 20; feedback.push('✅ Good length (50-70 characters)'); }
            else if(headline.length > 70) { score -= 10; feedback.push('⚠️ Headline too long, keep under 70 characters'); }
            else { score += 10; feedback.push('📏 Good length'); }
            
            const powerWords = ['breaking', 'exclusive', 'alert', 'update', 'revealed', 'announces', 'launches'];
            const hasPowerWord = powerWords.some(w => headline.toLowerCase().includes(w));
            if(hasPowerWord) { score += 15; feedback.push('💪 Includes power words'); }
            else { feedback.push('📝 Consider adding power words for impact'); }
            
            if(headline.includes('?') || headline.includes('!')) { score += 10; feedback.push('🎯 Good use of punctuation'); }
            
            score = Math.min(100, Math.max(0, score));
            let color = score >= 80 ? '#28a745' : score >= 60 ? '#ffc107' : '#dc3545';
            
            resultDiv.innerHTML = `
                <div class="score-circle" style="background:${color}20; border:2px solid ${color};">${score}</div>
                <div><strong>SEO Score:</strong> ${score}/100</div>
                <div style="margin-top:1rem;">${feedback.map(f => `<div>${f}</div>`).join('')}</div>
            `;
        }
        
        document.getElementById('tips').innerHTML = `
            <div>📌 Keep headlines under 70 characters</div>
            <div>📌 Use numbers (Top 10, 5 Ways)</div>
            <div>📌 Include power words (Breaking, Exclusive, Alert)</div>
            <div>📌 Create urgency (Now, Today, Limited)</div>
        `;
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
