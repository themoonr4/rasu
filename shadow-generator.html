<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Shadow Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:700px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .preview-box{width:200px;height:200px;background:#1a1a1a;margin:0 auto 1rem;border-radius:12px;display:flex;align-items:center;justify-content:center;}
        .control-group{margin-bottom:0.5rem;}
        label{display:inline-block;width:80px;}
        input{width:100px;padding:0.25rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        input[type="color"]{width:60px;height:40px;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;margin-right:0.5rem;}
        .code-block{background:#1a1a1a;padding:0.75rem;border-radius:8px;font-family:monospace;font-size:0.7rem;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-crop-alt"></i> Box Shadow Generator</h1>
        
        <div class="card">
            <div class="preview-box" id="previewBox">
                <span id="previewText">THE MOON</span>
            </div>
            
            <div class="control-group"><label>X Offset:</label><input type="range" id="shadowX" min="-50" max="50" value="10"><span id="xVal">10px</span></div>
            <div class="control-group"><label>Y Offset:</label><input type="range" id="shadowY" min="-50" max="50" value="10"><span id="yVal">10px</span></div>
            <div class="control-group"><label>Blur:</label><input type="range" id="shadowBlur" min="0" max="50" value="20"><span id="blurVal">20px</span></div>
            <div class="control-group"><label>Spread:</label><input type="range" id="shadowSpread" min="0" max="30" value="0"><span id="spreadVal">0px</span></div>
            <div class="control-group"><label>Color:</label><input type="color" id="shadowColor" value="#000000"></div>
            <div class="control-group"><label><input type="checkbox" id="shadowInset"> Inset Shadow</label></div>
            
            <div style="text-align:center;">
                <button onclick="updateShadow()">Update</button>
                <button onclick="copyShadowCode()">Copy CSS</button>
                <button onclick="resetShadow()">Reset</button>
            </div>
            
            <div id="shadowCode" class="code-block" style="margin-top:1rem;"></div>
        </div>
        
        <div class="card">
            <h3>Presets</h3>
            <button onclick="setPreset('subtle')">Subtle</button>
            <button onclick="setPreset('medium')">Medium</button>
            <button onclick="setPreset('large')">Large</button>
            <button onclick="setPreset('inner')">Inner Glow</button>
        </div>
    </div>
    <script>
        function updateShadow() {
            const x = document.getElementById('shadowX').value;
            const y = document.getElementById('shadowY').value;
            const blur = document.getElementById('shadowBlur').value;
            const spread = document.getElementById('shadowSpread').value;
            const color = document.getElementById('shadowColor').value;
            const inset = document.getElementById('shadowInset').checked;
            
            document.getElementById('xVal').innerText = x + 'px';
            document.getElementById('yVal').innerText = y + 'px';
            document.getElementById('blurVal').innerText = blur + 'px';
            document.getElementById('spreadVal').innerText = spread + 'px';
            
            let shadow = '';
            if(inset) shadow += 'inset ';
            shadow += `${x}px ${y}px ${blur}px ${spread}px ${color}`;
            
            document.getElementById('previewBox').style.boxShadow = shadow;
            document.getElementById('shadowCode').innerHTML = `box-shadow: ${shadow};`;
        }
        
        function copyShadowCode() {
            const code = document.getElementById('shadowCode').innerText;
            navigator.clipboard.writeText(code);
            alert('CSS copied!');
        }
        
        function resetShadow() {
            document.getElementById('shadowX').value = 10;
            document.getElementById('shadowY').value = 10;
            document.getElementById('shadowBlur').value = 20;
            document.getElementById('shadowSpread').value = 0;
            document.getElementById('shadowColor').value = '#000000';
            document.getElementById('shadowInset').checked = false;
            updateShadow();
        }
        
        function setPreset(type) {
            const presets = {
                subtle: { x: 0, y: 2, blur: 4, spread: 0, color: '#000000', inset: false },
                medium: { x: 0, y: 10, blur: 15, spread: -3, color: '#000000', inset: false },
                large: { x: 0, y: 20, blur: 25, spread: -5, color: '#000000', inset: false },
                inner: { x: 0, y: 0, blur: 10, spread: 0, color: '#ffffff', inset: true }
            };
            const p = presets[type];
            document.getElementById('shadowX').value = p.x;
            document.getElementById('shadowY').value = p.y;
            document.getElementById('shadowBlur').value = p.blur;
            document.getElementById('shadowSpread').value = p.spread;
            document.getElementById('shadowColor').value = p.color;
            document.getElementById('shadowInset').checked = p.inset;
            updateShadow();
        }
        
        document.getElementById('shadowX').addEventListener('input', updateShadow);
        document.getElementById('shadowY').addEventListener('input', updateShadow);
        document.getElementById('shadowBlur').addEventListener('input', updateShadow);
        document.getElementById('shadowSpread').addEventListener('input', updateShadow);
        document.getElementById('shadowColor').addEventListener('input', updateShadow);
        document.getElementById('shadowInset').addEventListener('change', updateShadow);
        
        updateShadow();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
