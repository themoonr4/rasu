<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Error Logs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:1000px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
        .stat-card{background:#111;border:1px solid #222;border-radius:12px;padding:1rem;text-align:center;}
        .stat-number{font-size:1.8rem;font-weight:700;color:#dc2626;}
        .error-table{width:100%;border-collapse:collapse;background:#111;border-radius:12px;overflow:hidden;}
        th,td{padding:0.75rem;text-align:left;border-bottom:1px solid #222;}
        th{background:#1a1a1a;color:#aaa;}
        .error-critical{color:#dc3545;}
        .error-warning{color:#ffc107;}
        .error-info{color:#17a2b8;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
        @media(max-width:768px){body{padding:1rem;}.stats-grid{grid-template-columns:repeat(2,1fr);}}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back to Admin</div>
        <h1><i class="fas fa-bug"></i> Error Monitoring Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card"><div>🔴 Critical</div><div class="stat-number" id="criticalCount">0</div></div>
            <div class="stat-card"><div>🟡 Warnings</div><div class="stat-number" id="warningCount">0</div></div>
            <div class="stat-card"><div>🔵 Info</div><div class="stat-number" id="infoCount">0</div></div>
            <div class="stat-card"><div>✅ Fixed</div><div class="stat-number" id="fixedCount">0</div></div>
        </div>
        
        <table class="error-table">
            <thead>
                <tr><th>Time</th><th>Level</th><th>Message</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody id="errorList"></tbody>
        </table>
    </div>

    <script>
        let errors = JSON.parse(localStorage.getItem('errorLogs') || '[]');
        
        function addSampleErrors() {
            if(errors.length === 0) {
                errors = [
                    { id: 1, time: new Date().toLocaleString(), level: 'critical', message: 'Database connection failed', status: 'pending' },
                    { id: 2, time: new Date().toLocaleString(), level: 'warning', message: 'API rate limit nearing', status: 'pending' },
                    { id: 3, time: new Date().toLocaleString(), level: 'info', message: 'News cache updated', status: 'resolved' }
                ];
                localStorage.setItem('errorLogs', JSON.stringify(errors));
            }
        }
        
        function loadErrors() {
            const critical = errors.filter(e => e.level === 'critical' && e.status === 'pending').length;
            const warning = errors.filter(e => e.level === 'warning' && e.status === 'pending').length;
            const info = errors.filter(e => e.level === 'info' && e.status === 'pending').length;
            const fixed = errors.filter(e => e.status === 'resolved').length;
            
            document.getElementById('criticalCount').innerHTML = critical;
            document.getElementById('warningCount').innerHTML = warning;
            document.getElementById('infoCount').innerHTML = info;
            document.getElementById('fixedCount').innerHTML = fixed;
            
            const tbody = document.getElementById('errorList');
            tbody.innerHTML = errors.map(e => `
                <tr>
                    <td>${e.time}</td>
                    <td class="error-${e.level}">${e.level.toUpperCase()}</td>
                    <td>${e.message}</td>
                    <td>${e.status === 'resolved' ? '✅ Resolved' : '⏳ Pending'}</td>
                    <td><button onclick="resolveError(${e.id})" ${e.status === 'resolved' ? 'disabled' : ''}>Mark Resolved</button></td>
                </tr>
            `).join('');
        }
        
        function resolveError(id) {
            const index = errors.findIndex(e => e.id === id);
            if(index !== -1) {
                errors[index].status = 'resolved';
                localStorage.setItem('errorLogs', JSON.stringify(errors));
                loadErrors();
            }
        }
        
        addSampleErrors();
        loadErrors();
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
