<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Social Media Auto-Poster</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .platform-toggle{display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
        .platform-btn{padding:0.5rem 1rem;background:#1a1a1a;border-radius:8px;cursor:pointer;}
        .platform-btn.active{background:#dc2626;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-share-alt"></i> Social Media Auto-Poster</h1>
        
        <div class="card">
            <h3>Select Platforms</h3>
            <div class="platform-toggle">
                <div class="platform-btn" data-platform="facebook">📘 Facebook</div>
                <div class="platform-btn" data-platform="twitter">🐦 Twitter</div>
                <div class="platform-btn" data-platform="instagram">📷 Instagram</div>
                <div class="platform-btn" data-platform="telegram">📨 Telegram</div>
                <div class="platform-btn" data-platform="whatsapp">💬 WhatsApp</div>
            </div>
        </div>
        
        <div class="card">
            <h3>Post Content</h3>
            <input type="text" id="postTitle" placeholder="Post Title">
            <textarea id="postContent" rows="5" placeholder="Post content..."></textarea>
            <input type="text" id="postImage" placeholder="Image URL (optional)">
            <button onclick="postToSocial()">Post Now</button>
            <div id="postResult"></div>
        </div>
    </div>
    <script>
        let selectedPlatforms = [];
        
        document.querySelectorAll('.platform-btn').forEach(btn => {
            btn.onclick = () => {
                const platform = btn.getAttribute('data-platform');
                if(selectedPlatforms.includes(platform)) {
                    selectedPlatforms = selectedPlatforms.filter(p => p !== platform);
                    btn.classList.remove('active');
                } else {
                    selectedPlatforms.push(platform);
                    btn.classList.add('active');
                }
            };
        });
        
        function postToSocial() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const image = document.getElementById('postImage').value;
            if(selectedPlatforms.length === 0) { alert('Select at least one platform'); return; }
            if(!content) { alert('Enter post content'); return; }
            const resultDiv = document.getElementById('postResult');
            resultDiv.innerHTML = `<div style="background:#28a745;padding:0.5rem;border-radius:8px;">✅ Posted to ${selectedPlatforms.join(', ')}</div>`;
            setTimeout(() => resultDiv.innerHTML = '', 3000);
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            document.getElementById('postImage').value = '';
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
