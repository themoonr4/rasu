<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Feedback Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
        .stat-card{background:#1a1a1a;padding:1rem;border-radius:12px;text-align:center;}
        .stat-value{font-size:1.5rem;font-weight:700;color:#dc2626;}
        .feedback-item{padding:0.75rem;border-bottom:1px solid #222;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-chart-pie"></i> Feedback Analytics Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card"><div>Total Feedback</div><div class="stat-value" id="totalFeedback">0</div></div>
            <div class="stat-card"><div>Avg Rating</div><div class="stat-value" id="avgRating">0</div></div>
            <div class="stat-card"><div>Response Rate</div><div class="stat-value" id="responseRate">0%</div></div>
            <div class="stat-card"><div>Satisfaction</div><div class="stat-value" id="satisfaction">0%</div></div>
        </div>
        
        <div class="card">
            <h3>Recent Feedback</h3>
            <div id="feedbackList"></div>
            <button onclick="exportFeedback()">Export CSV</button>
        </div>
        
        <div class="card">
            <h3>Feedback Trends</h3>
            <div id="trendChart"></div>
        </div>
    </div>
    <script>
        let feedback = JSON.parse(localStorage.getItem('userFeedbacks') || '[{"rating":5,"comment":"Great site!","date":"2024-04-01"},{"rating":4,"comment":"Good content","date":"2024-04-02"},{"rating":5,"comment":"Excellent","date":"2024-04-03"}]');
        
        function loadStats() {
            const total = feedback.length;
            const avgRating = (feedback.reduce((a,b) => a + b.rating, 0) / total).toFixed(1);
            document.getElementById('totalFeedback').innerHTML = total;
            document.getElementById('avgRating').innerHTML = avgRating;
            document.getElementById('responseRate').innerHTML = '85%';
            document.getElementById('satisfaction').innerHTML = '92%';
            
            const listDiv = document.getElementById('feedbackList');
            listDiv.innerHTML = feedback.map(f => `<div class="feedback-item">⭐ ${f.rating}/5 - ${f.comment}<br><small>${f.date}</small></div>`).join('');
            
            document.getElementById('trendChart').innerHTML = `<div>📈 Positive: 85% | Neutral: 10% | Negative: 5%</div>`;
        }
        
        function exportFeedback() {
            const csv = ['Rating,Comment,Date', ...feedback.map(f => `${f.rating},${f.comment},${f.date}`)].join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'feedback.csv'; a.click();
            URL.revokeObjectURL(url);
        }
        
        loadStats();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
