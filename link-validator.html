<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Link Validator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;min-height:200px;}
        .link-item{display:flex;justify-content:space-between;padding:0.5rem;border-bottom:1px solid #222;}
        .valid{color:#28a745;}
        .broken{color:#dc3545;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-link"></i> Internal Link Validator</h1>
        
        <div class="card">
            <h3>Enter HTML or URL List</h3>
            <textarea id="linkHtml" placeholder="<a href='/about'>About</a> <a href='/contact'>Contact</a>"></textarea>
            <button onclick="validateLinks()">Validate Links</button>
            <div id="linkResult"></div>
        </div>
        
        <div class="card">
            <h3>SEO Recommendations</h3>
            <div id="seoRecommendations"></div>
        </div>
    </div>
    <script>
        function validateLinks() {
            const html = document.getElementById('linkHtml').value;
            if(!html) { alert('Enter HTML with links'); return; }
            const resultDiv = document.getElementById('linkResult');
            
            const links = html.match(/href=["']([^"']*)["']/gi) || [];
            const processed = links.map(link => {
                const url = link.match(/href=["']([^"']*)["']/)[1];
                const isValid = !url.includes('javascript:') && !url.includes('#') && url.length > 0;
                return { url, isValid };
            });
            
            const validCount = processed.filter(l => l.isValid).length;
            const invalidCount = processed.filter(l => !l.isValid).length;
            
            resultDiv.innerHTML = `
                <div>Total Links: ${processed.length}</div>
                <div><span class="valid">✅ Valid: ${validCount}</span> | <span class="broken">❌ Invalid: ${invalidCount}</span></div>
                <div style="margin-top:1rem;">${processed.map(l => `<div class="link-item"><span>${l.url}</span><span class="${l.isValid ? 'valid' : 'broken'}">${l.isValid ? '✅ Valid' : '❌ Invalid'}</span></div>`).join('')}</div>
            `;
        }
        
        document.getElementById('seoRecommendations').innerHTML = `
            <div>🔗 Use descriptive anchor text</div>
            <div>🔗 Avoid "click here" links</div>
            <div>🔗 Ensure internal links use relative paths</div>
            <div>🔗 Check for broken links regularly</div>
        `;
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
