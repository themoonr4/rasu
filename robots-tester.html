<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Robots.txt Tester</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;font-family:monospace;}
        input{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .result{background:#1a1a1a;padding:1rem;border-radius:8px;margin-top:1rem;font-family:monospace;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
        .allowed{color:#28a745;}
        .blocked{color:#dc3545;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-robot"></i> Robots.txt Tester</h1>
        
        <div class="card">
            <h3>Robots.txt Content</h3>
            <textarea id="robotsContent" rows="8" placeholder="User-agent: *&#10;Allow: /&#10;Disallow: /admin/"></textarea>
            <h3>Test URL</h3>
            <input type="text" id="testUrl" placeholder="/article.html">
            <button onclick="testRobots()">Test URL</button>
            <div id="testResult" class="result" style="display:none;"></div>
        </div>
        
        <div class="card">
            <h3>Sample Robots.txt</h3>
            <button onclick="loadSample()">Load Sample</button>
        </div>
    </div>
    <script>
        function testRobots() {
            const robots = document.getElementById('robotsContent').value;
            const testUrl = document.getElementById('testUrl').value;
            const resultDiv = document.getElementById('testResult');
            
            if(!testUrl) { alert('Enter URL to test'); return; }
            
            let allowed = true;
            const lines = robots.split('\n');
            let currentUserAgent = '*';
            
            for(let line of lines) {
                if(line.startsWith('User-agent:')) {
                    currentUserAgent = line.split(':')[1].trim();
                }
                if(currentUserAgent === '*' && line.startsWith('Disallow:')) {
                    const disallow = line.split(':')[1].trim();
                    if(disallow && testUrl.startsWith(disallow)) {
                        allowed = false;
                        break;
                    }
                }
            }
            
            resultDiv.innerHTML = `<strong>URL: ${testUrl}</strong><br>Status: ${allowed ? '<span class="allowed">✅ ALLOWED</span>' : '<span class="blocked">❌ BLOCKED</span>'}`;
            resultDiv.style.display = 'block';
        }
        
        function loadSample() {
            const sample = `User-agent: *
Allow: /
Disallow: /admin/
Disallow: /dashboard/
Disallow: /api/

Sitemap: https://themoonr4.github.io/the-moon-supreme/sitemap.xml`;
            document.getElementById('robotsContent').value = sample;
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
