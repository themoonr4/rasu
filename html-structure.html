<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - HTML Structure Validator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-family:monospace;margin-bottom:0.5rem;min-height:200px;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .error-item{background:#1a1a1a;padding:0.5rem;margin:0.25rem 0;border-radius:8px;border-left:3px solid #dc3545;}
        .warning-item{background:#1a1a1a;padding:0.5rem;margin:0.25rem 0;border-radius:8px;border-left:3px solid #ffc107;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-code"></i> HTML Structure Validator</h1>
        
        <div class="card">
            <h3>Paste HTML Code</h3>
            <textarea id="htmlCode" placeholder="<html><head><title>Test</title></head><body><h1>Hello</h1></body></html>"></textarea>
            <button onclick="validateHTML()">Validate HTML</button>
            <div id="htmlValidationResult"></div>
        </div>
        
        <div class="card">
            <h3>SEO Meta Tags Check</h3>
            <button onclick="checkMetaTags()">Check Meta Tags</button>
            <div id="metaResult"></div>
        </div>
    </div>
    <script>
        function validateHTML() {
            const html = document.getElementById('htmlCode').value;
            const resultDiv = document.getElementById('htmlValidationResult');
            let errors = [];
            let warnings = [];
            
            if(!html) { resultDiv.innerHTML = '<p>Enter HTML to validate</p>'; return; }
            
            if(!html.includes('<html')) warnings.push('Missing <html> tag');
            if(!html.includes('<head')) warnings.push('Missing <head> section');
            if(!html.includes('<body')) warnings.push('Missing <body> tag');
            if((html.match(/<h1/g) || []).length > 1) errors.push('Multiple <h1> tags found. Use only one H1 per page.');
            if(!html.includes('<title')) errors.push('Missing <title> tag (important for SEO)');
            if(html.includes('<img') && !html.includes('alt=')) errors.push('Images missing alt attribute');
            if(html.includes('<a') && !html.includes('href=')) errors.push('Links missing href attribute');
            
            if(errors.length === 0 && warnings.length === 0) {
                resultDiv.innerHTML = '<div style="background:#28a74520;padding:0.5rem;border-radius:8px;">✅ HTML structure looks good!</div>';
            } else {
                resultDiv.innerHTML = errors.map(e => `<div class="error-item">❌ ${e}</div>`).join('') + warnings.map(w => `<div class="warning-item">⚠️ ${w}</div>`).join('');
            }
        }
        
        function checkMetaTags() {
            const html = document.getElementById('htmlCode').value;
            const resultDiv = document.getElementById('metaResult');
            
            if(!html) { resultDiv.innerHTML = '<p>Enter HTML first</p>'; return; }
            
            const hasDescription = html.includes('name="description"');
            const hasKeywords = html.includes('name="keywords"');
            const hasViewport = html.includes('name="viewport"');
            const hasOG = html.includes('property="og:');
            
            resultDiv.innerHTML = `
                <div class="warning-item">📝 Meta Description: ${hasDescription ? '✅ Present' : '❌ Missing - Add for SEO'}</div>
                <div class="warning-item">🔑 Meta Keywords: ${hasKeywords ? '✅ Present' : '⚠️ Optional but recommended'}</div>
                <div class="warning-item">📱 Viewport: ${hasViewport ? '✅ Present' : '❌ Missing - Required for mobile'}</div>
                <div class="warning-item">📘 Open Graph: ${hasOG ? '✅ Present' : '⚠️ Add for social sharing'}</div>
            `;
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
