<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Backup Scheduler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        select,input{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .schedule-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-clock"></i> Backup Scheduler</h1>
        
        <div class="card">
            <h3>Schedule Automatic Backup</h3>
            <select id="backupFrequency">
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
            </select>
            <input type="time" id="backupTime" value="02:00">
            <button onclick="scheduleBackup()">Save Schedule</button>
        </div>
        
        <div class="card">
            <h3>Scheduled Backups</h3>
            <div id="scheduleList"></div>
        </div>
    </div>
    <script>
        let schedules = JSON.parse(localStorage.getItem('backupSchedules') || '[]');
        
        function loadSchedules() {
            const listDiv = document.getElementById('scheduleList');
            if(schedules.length === 0) { listDiv.innerHTML = '<p>No scheduled backups</p>'; return; }
            listDiv.innerHTML = schedules.map((s, i) => `
                <div class="schedule-item">
                    <div><strong>${s.frequency}</strong><br><small>Next: ${s.nextRun || 'Not scheduled'}</small></div>
                    <button onclick="deleteSchedule(${i})">Delete</button>
                </div>
            `).join('');
        }
        
        function scheduleBackup() {
            const frequency = document.getElementById('backupFrequency').value;
            const time = document.getElementById('backupTime').value;
            const nextRun = new Date();
            if(frequency === 'daily') nextRun.setDate(nextRun.getDate() + 1);
            else if(frequency === 'weekly') nextRun.setDate(nextRun.getDate() + 7);
            else nextRun.setMonth(nextRun.getMonth() + 1);
            schedules.push({ frequency, time, nextRun: nextRun.toLocaleString(), createdAt: new Date().toISOString() });
            localStorage.setItem('backupSchedules', JSON.stringify(schedules));
            loadSchedules();
            alert('Backup scheduled!');
        }
        
        function deleteSchedule(index) {
            schedules.splice(index, 1);
            localStorage.setItem('backupSchedules', JSON.stringify(schedules));
            loadSchedules();
        }
        
        loadSchedules();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
