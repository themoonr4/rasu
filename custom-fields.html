<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Custom Fields</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input,select{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .field-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-plus-square"></i> Custom Fields Manager</h1>
        
        <div class="card">
            <h3>Add Custom Field</h3>
            <input type="text" id="fieldName" placeholder="Field Name (e.g., author_bio)">
            <select id="fieldType">
                <option value="text">Text</option>
                <option value="number">Number</option>
                <option value="date">Date</option>
                <option value="url">URL</option>
            </select>
            <button onclick="addField()">Add Field</button>
        </div>
        
        <div class="card">
            <h3>Existing Custom Fields</h3>
            <div id="fieldsList"></div>
        </div>
    </div>
    <script>
        let fields = JSON.parse(localStorage.getItem('customFields') || '[]');
        
        function loadFields() {
            const listDiv = document.getElementById('fieldsList');
            if(fields.length === 0) { listDiv.innerHTML = '<p>No custom fields</p>'; return; }
            listDiv.innerHTML = fields.map((f, i) => `
                <div class="field-item">
                    <div><strong>${f.name}</strong><br><small>Type: ${f.type}</small></div>
                    <button onclick="deleteField(${i})">Delete</button>
                </div>
            `).join('');
        }
        
        function addField() {
            const name = document.getElementById('fieldName').value;
            const type = document.getElementById('fieldType').value;
            if(!name) { alert('Enter field name'); return; }
            fields.push({ name, type, createdAt: new Date().toISOString() });
            localStorage.setItem('customFields', JSON.stringify(fields));
            document.getElementById('fieldName').value = '';
            loadFields();
            alert('Field added!');
        }
        
        function deleteField(index) {
            fields.splice(index, 1);
            localStorage.setItem('customFields', JSON.stringify(fields));
            loadFields();
        }
        
        loadFields();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
