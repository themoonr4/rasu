<header class="header">
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">

        </div>
    </div>
</header>

<div class="container">
    <div class="hero">
        <h1>Freelance Marketplace</h1>
        <p>First 5 orders: 0% Commission | After 5 orders: 5% Commission</p>
        <div style="margin-top: 1rem;">

    </div>

        ✨ Lowest Commission in India! Fiverr takes 20%, Upwork takes 10% ✨
    </div>
    
    <div id="servicesGrid" class="services-grid">
        <div class="loader">Loading services...</div>
    </div>
</div>

<div style="text-align: center; padding: 2rem; color: #64748b;">
    <p>© 2026 THE MOON Freelance Marketplace | 0% commission on first 5 orders</p>
</div>

<!-- Post Service Modal -->
<div id="serviceModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:#1a1a1a; padding:1.5rem; border-radius:1rem; max-width:500px; width:90%; color:white; max-height:90vh; overflow-y:auto;">
        <h3>Post a Service</h3>
        <form id="serviceForm">
            <input type="text" id="serviceTitle" placeholder="Service Title" style="width:100%; padding:0.5rem; margin:0.5rem 0; background:#0f0f0f; border:1px solid #333; color:white; border-radius:0.5rem;">
            <select id="serviceCategory" style="width:100%; padding:0.5rem; margin:0.5rem 0; background:#0f0f0f; border:1px solid #333; color:white; border-radius:0.5rem;">
                <option value="Web Development">Web Development</option>
                <option value="Graphic Design">Graphic Design</option>
                <option value="Content Writing">Content Writing</option>
                <option value="SEO & Marketing">SEO & Marketing</option>
                <option value="Video Editing">Video Editing</option>
            </select>
            <textarea id="serviceDesc" rows="3" placeholder="Description" style="width:100%; padding:0.5rem; margin:0.5rem 0; background:#0f0f0f; border:1px solid #333; color:white; border-radius:0.5rem;"></textarea>
            <input type="number" id="servicePrice" placeholder="Price (₹)" style="width:100%; padding:0.5rem; margin:0.5rem 0; background:#0f0f0f; border:1px solid #333; color:white; border-radius:0.5rem;">
            <input type="text" id="serviceDelivery" placeholder="Delivery Time" style="width:100%; padding:0.5rem; margin:0.5rem 0; background:#0f0f0f; border:1px solid #333; color:white; border-radius:0.5rem;">
            <input type="text" id="sellerName" placeholder="Your Name" style="width:100%; padding:0.5rem; margin:0.5rem 0; background:#0f0f0f; border:1px solid #333; color:white; border-radius:0.5rem;">
            <input type="text" id="sellerWhatsapp" placeholder="WhatsApp Number" style="width:100%; padding:0.5rem; margin:0.5rem 0; background:#0f0f0f; border:1px solid #333; color:white; border-radius:0.5rem;">
            <button type="submit" style="background:#dc2626; color:white; padding:0.5rem; border:none; border-radius:0.5rem; width:100%; margin-top:0.5rem; cursor:pointer;">Post Service</button>
        </form>
        <button onclick="closeModal()" style="margin-top:0.5rem; background:#333; width:100%; padding:0.5rem; border:none; border-radius:0.5rem; color:white; cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://zpubhlbdqwzyseditrls.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_4YiRI2c1Tij-2KvyNtJ9Sg_8-l0OFuP';
    
    let currentServices = [];
    
    async function loadServices() {
        const grid = document.getElementById('servicesGrid');
        grid.innerHTML = '<div class="loader">Loading services...</div>';
        
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/freelance_services?select=*`, {
                method: 'GET',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const data = await response.json();
            
            if (!data || data.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:2rem;">No services yet. Click "Become Seller" to post your first service!</div>';
                return;
            }
            
            const approvedServices = data.filter(s => s.status === 'approved');
            
            if (approvedServices.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:2rem;">No approved services yet. Your service will appear after admin approval.</div>';
                return;
            }
            
            currentServices = approvedServices;
            
            grid.innerHTML = approvedServices.map(service => `
                <div class="service-card" onclick="orderService(${service.id})">
                    <div class="service-image">
                        <i class="fas fa-briefcase"></i>
                    </div>
                    <div class="service-content">
                        <h3 class="service-title">${escapeHtml(service.title)}</h3>
                        <div class="service-seller">👤 ${escapeHtml(service.seller_name)}</div>
                        <div class="service-price">₹${service.price}</div>
                        <div class="service-desc">${escapeHtml(service.description.substring(0, 100))}...</div>
                        <div class="service-seller">⏱️ Delivery: ${service.delivery_time}</div>
                        <button class="order-btn" onclick="event.stopPropagation(); orderService(${service.id})">📞 Order Now</button>
                    </div>
                </div>
            `).join('');
            
        } catch(err) {
            console.error('Error:', err);
            grid.innerHTML = `<div class="error-box">❌ Error: ${err.message}<br><br>Please refresh the page or try again later.</div>`;
        }
    }
    
    function orderService(serviceId) {
        const service = currentServices.find(s => s.id === serviceId);
        if (!service) return;
        
        const message = `*New Order from THE MOON Marketplace*%0A%0A` +
            `Service: ${service.title}%0A` +
            `Price: ₹${service.price}%0A%0A` +
            `Please contact me to discuss requirements.`;
        
        window.open(`https://wa.me/${service.seller_whatsapp}?text=${message}`, '_blank');
    }
    
    async function publishService(event) {
        event.preventDefault();
        const title = document.getElementById('serviceTitle').value;
        const category = document.getElementById('serviceCategory').value;
        const description = document.getElementById('serviceDesc').value;
        const price = parseInt(document.getElementById('servicePrice').value);
        const deliveryTime = document.getElementById('serviceDelivery').value;
        const sellerName = document.getElementById('sellerName').value;
        const sellerWhatsapp = document.getElementById('sellerWhatsapp').value;
        
        if (!title || !category || !description || !price || !deliveryTime || !sellerName || !sellerWhatsapp) {
            alert('Please fill all fields');
            return;
        }
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { error } = await supabase.from('freelance_services').insert([{
            title, category, description, price, delivery_time: deliveryTime,
            seller_name: sellerName, seller_whatsapp: sellerWhatsapp,
            status: 'pending', created_at: new Date()
        }]);
        
        if (error) {
            alert('Error: ' + error.message);
        } else {
            alert('✅ Service posted! Will be visible after admin approval.');
            closeModal();
            document.getElementById('serviceForm').reset();
            loadServices();
        }
    }
    
    function escapeHtml(str) { 
        if (!str) return ''; 
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); 
    }
    
    function openSellerModal() { 
        document.getElementById('serviceModal').style.display = 'flex'; 
    }
    function closeModal() { 
        document.getElementById('serviceModal').style.display = 'none'; 
    }
    
    document.getElementById('becomeSellerBtn').onclick = openSellerModal;
    document.getElementById('sellerBtn').onclick = openSellerModal;
    document.getElementById('buyerBtn').onclick = () => document.getElementById('servicesGrid').scrollIntoView({ behavior: 'smooth' });
    document.getElementById('serviceForm').addEventListener('submit', publishService);
    
    loadServices();
</script>
</body>
