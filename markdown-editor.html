<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Markdown Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:1000px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .editor-container{display:grid;grid-template-columns:1fr 1fr;gap:1rem;min-height:500px;}
        .editor-pane, .preview-pane{background:#111;border:1px solid #222;border-radius:16px;padding:1rem;}
        textarea{width:100%;height:100%;background:#1a1a1a;border:none;color:#fff;font-family:monospace;resize:none;outline:none;}
        .preview-pane{overflow-y:auto;}
        .toolbar{display:flex;gap:0.5rem;margin-bottom:0.5rem;flex-wrap:wrap;}
        button{background:#1a1a1a;color:white;border:1px solid #333;padding:0.25rem 0.5rem;border-radius:4px;cursor:pointer;}
        button:hover{background:#dc2626;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-markdown"></i> Markdown Editor</h1>
        
        <div class="editor-container">
            <div class="editor-pane">
                <div class="toolbar">
                    <button onclick="insertMarkdown('**', '**')"><b>B</b></button>
                    <button onclick="insertMarkdown('*', '*')"><i>I</i></button>
                    <button onclick="insertMarkdown('# ', '')">H1</button>
                    <button onclick="insertMarkdown('## ', '')">H2</button>
                    <button onclick="insertMarkdown('- ', '')">List</button>
                    <button onclick="insertMarkdown('[', '](url)')">Link</button>
                    <button onclick="insertMarkdown('![alt](', ')')">Image</button>
                </div>
                <textarea id="markdownInput" placeholder="# Write your content here&#10;&#10;## Subheading&#10;&#10;- List item 1&#10;- List item 2"></textarea>
            </div>
            <div class="preview-pane" id="markdownPreview"></div>
        </div>
    </div>
    <script>
        function renderMarkdown() {
            const input = document.getElementById('markdownInput').value;
            let html = input
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^- (.*$)/gm, '<li>$1</li>')
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>')
                .replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1">')
                .replace(/\n/g, '<br>');
            
            if(html.includes('<li>')) html = html.replace(/<li>.*?<\/li>/gs, '<ul>$&</ul>');
            document.getElementById('markdownPreview').innerHTML = html;
        }
        
        function insertMarkdown(prefix, suffix) {
            const textarea = document.getElementById('markdownInput');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const selected = text.substring(start, end);
            const replacement = prefix + selected + suffix;
            textarea.value = text.substring(0, start) + replacement + text.substring(end);
            textarea.focus();
            renderMarkdown();
        }
        
        document.getElementById('markdownInput').addEventListener('input', renderMarkdown);
        renderMarkdown();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
