<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Data Export Tool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        select{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;width:100%;margin-bottom:0.5rem;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-download"></i> Data Export Tool</h1>
        
        <div class="card">
            <h3>Export Data</h3>
            <select id="exportType">
                <option value="news">News Articles</option>
                <option value="users">Users Data</option>
                <option value="feedback">User Feedback</option>
                <option value="logs">System Logs</option>
            </select>
            <select id="exportFormat">
                <option value="json">JSON Format</option>
                <option value="csv">CSV Format</option>
            </select>
            <button onclick="exportData()">Export Now</button>
        </div>
    </div>
    <script>
        function exportData() {
            const type = document.getElementById('exportType').value;
            const format = document.getElementById('exportFormat').value;
            let data = [];
            
            if(type === 'news') {
                data = JSON.parse(localStorage.getItem('newsData') || '[]');
                if(data.length === 0) data = [{ id: 1, title: "Sample News", content: "This is sample content", date: new Date().toISOString() }];
            } else if(type === 'users') {
                data = JSON.parse(localStorage.getItem('users') || '[]');
                if(data.length === 0) data = [{ name: "Admin", email: "admin@themoon.news", joined: new Date().toISOString() }];
            } else if(type === 'feedback') {
                data = JSON.parse(localStorage.getItem('userFeedbacks') || '[]');
                if(data.length === 0) data = [{ title: "Sample Feedback", message: "Great website!", date: new Date().toISOString() }];
            } else {
                data = JSON.parse(localStorage.getItem('systemLogs') || '[]');
                if(data.length === 0) data = [{ level: "info", message: "System started", time: new Date().toISOString() }];
            }
            
            let content = '';
            if(format === 'json') {
                content = JSON.stringify(data, null, 2);
            } else {
                const headers = Object.keys(data[0] || {});
                content = headers.join(',') + '\n';
                data.forEach(row => { content += headers.map(h => JSON.stringify(row[h] || '')).join(',') + '\n'; });
            }
            
            const blob = new Blob([content], { type: format === 'json' ? 'application/json' : 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${type}_export_${Date.now()}.${format}`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
