<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Image Alt Checker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;min-height:200px;}
        .image-item{display:flex;justify-content:space-between;padding:0.5rem;border-bottom:1px solid #222;}
        .missing{color:#dc3545;}
        .present{color:#28a745;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-image"></i> Image Alt Text Checker</h1>
        
        <div class="card">
            <h3>Enter HTML Code</h3>
            <textarea id="htmlCode" placeholder='<img src="image1.jpg"><img src="image2.jpg" alt="Description">'></textarea>
            <button onclick="checkAltText()">Check Alt Text</button>
            <div id="altResult"></div>
        </div>
        
        <div class="card">
            <h3>Best Practices</h3>
            <div id="bestPractices"></div>
        </div>
    </div>
    <script>
        function checkAltText() {
            const html = document.getElementById('htmlCode').value;
            if(!html) { alert('Enter HTML code'); return; }
            const resultDiv = document.getElementById('altResult');
            
            const imgTags = html.match(/<img[^>]*>/gi) || [];
            const results = [];
            let missingCount = 0;
            
            imgTags.forEach(img => {
                const hasAlt = img.includes('alt=');
                const altValue = img.match(/alt=["']([^"']*)["']/);
                const altText = altValue ? altValue[1] : 'missing';
                const isMissing = !hasAlt || altText === '';
                if(isMissing) missingCount++;
                results.push({ tag: img.substring(0, 50) + '...', hasAlt: !isMissing, altText: altText });
            });
            
            resultDiv.innerHTML = `
                <div>Total Images: ${imgTags.length}</div>
                <div>Missing Alt Text: ${missingCount}</div>
                <div>Compliance: ${((imgTags.length - missingCount) / imgTags.length * 100).toFixed(0)}%</div>
                <div style="margin-top:1rem;">${results.map(r => `<div class="image-item"><span>${r.tag}</span><span class="${r.hasAlt ? 'present' : 'missing'}">${r.hasAlt ? '✅ Alt: ' + r.altText : '❌ Missing Alt'}</span></div>`).join('')}</div>
            `;
        }
        
        document.getElementById('bestPractices').innerHTML = `
            <div>📌 Always add descriptive alt text to images</div>
            <div>📌 Keep alt text under 125 characters</div>
            <div>📌 Describe the image content, not just "image"</div>
            <div>📌 Use empty alt="" for decorative images</div>
        `;
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
