<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Database Query</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:1000px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-family:monospace;margin-bottom:1rem;}
        .result-table{width:100%;border-collapse:collapse;margin-top:1rem;}
        .result-table th,.result-table td{padding:0.5rem;text-align:left;border-bottom:1px solid #222;}
        .result-table th{background:#1a1a1a;}
        button{background:#dc2626;color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
        .query-time{color:#aaa;font-size:0.7rem;margin-top:0.5rem;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-database"></i> Database Query Browser</h1>
        
        <div class="card">
            <h3>SQL Query</h3>
            <textarea id="sqlQuery" rows="6" placeholder="SELECT * FROM news LIMIT 10;"></textarea>
            <button onclick="executeQuery()">Execute Query</button>
            <div id="queryResult"></div>
        </div>
        
        <div class="card">
            <h3>Quick Queries</h3>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                <button onclick="setQuery('SELECT * FROM news ORDER BY created_at DESC LIMIT 10;')">Latest News</button>
                <button onclick="setQuery('SELECT categories.name, COUNT(news.id) as count FROM categories LEFT JOIN news ON categories.id = news.category_id GROUP BY categories.id;')">News by Category</button>
                <button onclick="setQuery('SELECT title, views, published_at FROM news ORDER BY views DESC LIMIT 5;')">Top Viewed</button>
            </div>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://cjyfmhsodmbudjbxjbek.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_RPIMDVsM_8kpbqSlTUmnVw_m7k7K4Cv';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function executeQuery() {
            const query = document.getElementById('sqlQuery').value;
            const resultDiv = document.getElementById('queryResult');
            if(!query) { alert('Enter SQL query'); return; }
            resultDiv.innerHTML = '<div>Executing query...</div>';
            const start = performance.now();
            try {
                const { data, error } = await supabase.rpc('exec_sql', { query_string: query });
                const end = performance.now();
                if(error) throw error;
                if(data && data.length > 0) {
                    const columns = Object.keys(data[0]);
                    resultDiv.innerHTML = `<table class="result-table"><thead><tr>${columns.map(c => `<th>${c}</th>`).join('')}</tr></thead><tbody>${data.map(row => `<tr>${columns.map(c => `<td>${row[c]}</td>`).join('')}</tr>`).join('')}</tbody></table><div class="query-time">Query executed in ${(end-start).toFixed(0)}ms | ${data.length} rows returned</div>`;
                } else { resultDiv.innerHTML = `<div>Query executed successfully. No rows returned.</div><div class="query-time">Query executed in ${(end-start).toFixed(0)}ms</div>`; }
            } catch(e) { resultDiv.innerHTML = `<div style="color:#dc3545;">Error: ${e.message}</div>`; }
        }
        
        function setQuery(query) { document.getElementById('sqlQuery').value = query; }
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
