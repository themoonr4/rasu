<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Content Idea Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .idea-card{background:#1a1a1a;padding:1rem;border-radius:12px;margin-bottom:0.5rem;cursor:pointer;}
        .idea-card:hover{background:#dc2626;}
        select{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-lightbulb"></i> Content Idea Generator</h1>
        
        <div class="card">
            <select id="ideaCategory">
                <option value="tech">Technology</option>
                <option value="sports">Sports</option>
                <option value="business">Business</option>
                <option value="politics">Politics</option>
                <option value="lifestyle">Lifestyle</option>
            </select>
            <button onclick="generateIdeas()">Generate Ideas</button>
        </div>
        
        <div class="card">
            <h3>Generated Ideas</h3>
            <div id="ideasList"></div>
        </div>
        
        <div class="card">
            <h3>Trending Topics</h3>
            <div id="trendingTopics"></div>
        </div>
    </div>
    <script>
        const ideas = {
            tech: ['The Future of AI in News Media', 'Top 10 Gadgets of 2026', 'How Blockchain is Changing Journalism', 'Cybersecurity Threats and Solutions', '5G Revolution: What to Expect'],
            sports: ['IPL 2026: Team Analysis', 'Rising Stars in Indian Cricket', 'The Psychology of Winning', 'Sports Tech Innovations', 'Upcoming Tournaments to Watch'],
            business: ['Startup Funding Trends', 'Digital Transformation Strategies', 'Stock Market Outlook 2026', 'E-commerce Growth Hacks', 'Sustainable Business Practices'],
            politics: ['Election Analysis 2026', 'Policy Changes to Watch', 'International Relations Updates', 'Local Governance Innovations', 'Political Campaign Strategies'],
            lifestyle: ['Health and Wellness Trends', 'Sustainable Living Tips', 'Travel Destinations 2026', 'Career Growth Strategies', 'Personal Finance Management']
        };
        
        function generateIdeas() {
            const category = document.getElementById('ideaCategory').value;
            const categoryIdeas = ideas[category];
            const ideasDiv = document.getElementById('ideasList');
            ideasDiv.innerHTML = categoryIdeas.map(idea => `<div class="idea-card" onclick="selectIdea('${idea}')">💡 ${idea}</div>`).join('');
        }
        
        function selectIdea(idea) {
            alert(`Selected: ${idea}\n\nYou can now write content about this topic.`);
        }
        
        document.getElementById('trendingTopics').innerHTML = `
            <div class="idea-card">🔥 AI Revolution in News</div>
            <div class="idea-card">🔥 IPL 2026 Updates</div>
            <div class="idea-card">🔥 Budget 2026 Analysis</div>
        `;
        
        generateIdeas();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
