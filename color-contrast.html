<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Color Contrast Checker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:700px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .color-preview{display:flex;gap:1rem;margin:1rem 0;}
        .color-box{width:100px;height:100px;border-radius:12px;border:1px solid #333;}
        input[type="color"]{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;margin-bottom:0.5rem;}
        .result{background:#1a1a1a;padding:1rem;border-radius:8px;margin-top:1rem;}
        .pass{color:#28a745;}
        .fail{color:#dc3545;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-adjust"></i> Color Contrast Checker</h1>
        
        <div class="card">
            <h3>Foreground Color</h3>
            <input type="color" id="fgColor" value="#ffffff">
            <div class="color-box" id="fgPreview" style="background:#ffffff;"></div>
            
            <h3>Background Color</h3>
            <input type="color" id="bgColor" value="#dc2626">
            <div class="color-box" id="bgPreview" style="background:#dc2626;"></div>
            
            <button onclick="checkContrast()">Check Contrast</button>
            <div id="contrastResult" class="result"></div>
        </div>
        
        <div class="card">
            <h3>Accessibility Standards</h3>
            <div id="standards"></div>
        </div>
    </div>
    <script>
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            return { r, g, b };
        }
        
        function getLuminance(r, g, b) {
            const [rs, gs, bs] = [r, g, b].map(c => {
                c = c / 255;
                return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
            });
            return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
        }
        
        function getContrastRatio(l1, l2) {
            const lighter = Math.max(l1, l2);
            const darker = Math.min(l1, l2);
            return (lighter + 0.05) / (darker + 0.05);
        }
        
        function checkContrast() {
            const fg = document.getElementById('fgColor').value;
            const bg = document.getElementById('bgColor').value;
            
            document.getElementById('fgPreview').style.background = fg;
            document.getElementById('bgPreview').style.background = bg;
            
            const fgRgb = hexToRgb(fg);
            const bgRgb = hexToRgb(bg);
            
            const fgLum = getLuminance(fgRgb.r, fgRgb.g, fgRgb.b);
            const bgLum = getLuminance(bgRgb.r, bgRgb.g, bgRgb.b);
            
            const ratio = getContrastRatio(fgLum, bgLum);
            const ratioValue = ratio.toFixed(2);
            
            const aaNormal = ratio >= 4.5;
            const aaLarge = ratio >= 3;
            const aaaNormal = ratio >= 7;
            const aaaLarge = ratio >= 4.5;
            
            document.getElementById('contrastResult').innerHTML = `
                <div>Contrast Ratio: <strong>${ratioValue}:1</strong></div>
                <div>WCAG AA (Normal text): ${aaNormal ? '<span class="pass">✅ Pass</span>' : '<span class="fail">❌ Fail</span>'}</div>
                <div>WCAG AA (Large text): ${aaLarge ? '<span class="pass">✅ Pass</span>' : '<span class="fail">❌ Fail</span>'}</div>
                <div>WCAG AAA (Normal text): ${aaaNormal ? '<span class="pass">✅ Pass</span>' : '<span class="fail">❌ Fail</span>'}</div>
                <div>WCAG AAA (Large text): ${aaaLarge ? '<span class="pass">✅ Pass</span>' : '<span class="fail">❌ Fail</span>'}</div>
            `;
            
            document.getElementById('standards').innerHTML = `
                <div>📏 AA Standard: Contrast ratio of 4.5:1 for normal text, 3:1 for large text</div>
                <div>🏆 AAA Standard: Contrast ratio of 7:1 for normal text, 4.5:1 for large text</div>
            `;
        }
        
        document.getElementById('fgColor').addEventListener('input', () => document.getElementById('fgPreview').style.background = document.getElementById('fgColor').value);
        document.getElementById('bgColor').addEventListener('input', () => document.getElementById('bgPreview').style.background = document.getElementById('bgColor').value);
        
        checkContrast();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
