<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Maintenance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .maintenance-card{text-align:center;background:#111;border:1px solid #222;border-radius:24px;padding:3rem;margin:2rem;max-width:450px;}
        .icon{font-size:5rem;color:#ffc107;margin-bottom:1rem;}
        h1{margin-bottom:0.5rem;color:#ffc107;}
        .progress-bar{width:100%;height:8px;background:#222;border-radius:4px;margin:2rem 0;overflow:hidden;}
        .progress-fill{width:65%;height:100%;background:#ffc107;border-radius:4px;animation:pulse 1s infinite;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        .check-btn{background:#ffc107;color:#000;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;margin-top:1rem;font-weight:bold;}
    </style>
</head>
<body>
    <div class="maintenance-card">
        <div class="icon"><i class="fas fa-tools"></i></div>
        <h1>Under Maintenance</h1>
        <p>We're currently updating THE MOON to serve you better.</p>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <p>Estimated completion: <span id="eta">15 minutes</span></p>
        <button class="check-btn" onclick="location.reload()">Check Status</button>
        <div style="margin-top:1rem;font-size:0.8rem;color:#aaa;">Follow us on social media for updates</div>
    </div>
    <script>
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
