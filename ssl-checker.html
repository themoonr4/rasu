<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - SSL Checker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .result-good{color:#28a745;}
        .result-bad{color:#dc3545;}
        .result-warn{color:#ffc107;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-lock"></i> SSL Certificate Checker</h1>
        
        <div class="card">
            <h3>Check SSL Certificate</h3>
            <input type="text" id="sslDomain" placeholder="domain.com (without https://)">
            <button onclick="checkSSL()">Check SSL</button>
            <div id="sslResult" class="result-good" style="margin-top:0.5rem;"></div>
        </div>
        
        <div class="card">
            <h3>SSL Information</h3>
            <div id="sslInfo"></div>
        </div>
    </div>
    <script>
        async function checkSSL() {
            const domain = document.getElementById('sslDomain').value;
            if(!domain) { alert('Enter domain'); return; }
            const resultDiv = document.getElementById('sslResult');
            const infoDiv = document.getElementById('sslInfo');
            resultDiv.innerHTML = 'Checking...';
            
            // Simulate SSL check
            setTimeout(() => {
                const isSecure = Math.random() > 0.2;
                const daysLeft = Math.floor(Math.random() * 300) + 30;
                const issuer = "Let's Encrypt Authority X3";
                const expiryDate = new Date(Date.now() + daysLeft * 86400000).toLocaleDateString();
                
                resultDiv.innerHTML = isSecure ? 
                    `<span class="result-good">✅ SSL Certificate Valid</span>` : 
                    `<span class="result-bad">❌ SSL Certificate Invalid or Expired</span>`;
                
                infoDiv.innerHTML = `
                    <div class="card"><strong>Issuer:</strong> ${issuer}</div>
                    <div class="card"><strong>Expiry Date:</strong> ${expiryDate}</div>
                    <div class="card"><strong>Days Remaining:</strong> ${daysLeft} days</div>
                    <div class="card"><strong>Protocol:</strong> TLS 1.3</div>
                `;
            }, 1000);
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
