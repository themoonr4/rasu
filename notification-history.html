<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Notification History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .notif-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        .notif-item:last-child{border-bottom:none;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .badge{background:#28a745;padding:0.2rem 0.5rem;border-radius:20px;font-size:0.7rem;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-bell"></i> Notification History</h1>
        
        <div class="card">
            <div style="display:flex;justify-content:space-between;margin-bottom:1rem;">
                <h3>All Notifications</h3>
                <button onclick="clearHistory()">Clear All</button>
            </div>
            <div id="notificationList"></div>
        </div>
    </div>
    <script>
        let notifications = JSON.parse(localStorage.getItem('notificationHistory') || '[]');
        
        function addSampleNotifications() {
            if(notifications.length === 0) {
                notifications = [
                    { id: 1, title: "Welcome to THE MOON", message: "Thanks for joining!", time: new Date().toLocaleString(), read: false },
                    { id: 2, title: "Breaking News", message: "India wins World Cup!", time: new Date().toLocaleString(), read: false },
                    { id: 3, title: "Daily Digest", message: "Top 5 stories today", time: new Date().toLocaleString(), read: true }
                ];
                localStorage.setItem('notificationHistory', JSON.stringify(notifications));
            }
        }
        
        function loadNotifications() {
            const listDiv = document.getElementById('notificationList');
            if(notifications.length === 0) { listDiv.innerHTML = '<p>No notifications</p>'; return; }
            listDiv.innerHTML = notifications.map(n => `
                <div class="notif-item">
                    <div><strong>${n.title}</strong><br><small>${n.message}</small><br><span style="font-size:0.6rem;color:#aaa;">${n.time}</span></div>
                    <div>${!n.read ? '<span class="badge">NEW</span>' : ''}</div>
                </div>
            `).join('');
        }
        
        function clearHistory() {
            if(confirm('Clear all notifications?')) {
                notifications = [];
                localStorage.setItem('notificationHistory', JSON.stringify(notifications));
                loadNotifications();
            }
        }
        
        addSampleNotifications();
        loadNotifications();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
