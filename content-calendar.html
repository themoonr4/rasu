<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Content Calendar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0.5rem;}
        .calendar-day{background:#1a1a1a;padding:0.5rem;border-radius:8px;min-height:80px;}
        .day-number{font-weight:bold;margin-bottom:0.25rem;}
        .event{background:#dc2626;padding:0.25rem;border-radius:4px;font-size:0.6rem;margin-top:0.25rem;cursor:pointer;}
        input,textarea,select{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-calendar-alt"></i> Content Calendar Manager</h1>
        
        <div class="card">
            <div class="calendar-header">
                <button onclick="prevMonth()">←</button>
                <h3 id="monthYear"></h3>
                <button onclick="nextMonth()">→</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        
        <div class="card">
            <h3>Add New Event</h3>
            <input type="text" id="eventTitle" placeholder="Event Title">
            <input type="date" id="eventDate">
            <select id="eventType">
                <option value="publish">Publish</option>
                <option value="deadline">Deadline</option>
                <option value="meeting">Meeting</option>
            </select>
            <button onclick="addEvent()">Add Event</button>
        </div>
        
        <div class="card">
            <h3>Upcoming Events</h3>
            <div id="upcomingEvents"></div>
        </div>
    </div>
    <script>
        let events = JSON.parse(localStorage.getItem('calendarEvents') || '[]');
        let currentDate = new Date();
        
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            document.getElementById('monthYear').innerHTML = `${currentDate.toLocaleString('default', { month: 'long' })} ${year}`;
            
            let grid = '';
            for(let i = 0; i < firstDay; i++) grid += '<div class="calendar-day"></div>';
            for(let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayEvents = events.filter(e => e.date === dateStr);
                grid += `<div class="calendar-day"><div class="day-number">${d}</div>${dayEvents.map(e => `<div class="event" onclick="alert('${e.title}')">${e.title.substring(0,10)}</div>`).join('')}</div>`;
            }
            document.getElementById('calendarGrid').innerHTML = grid;
            
            const upcoming = events.filter(e => new Date(e.date) >= new Date()).sort((a,b) => new Date(a.date) - new Date(b.date)).slice(0,5);
            document.getElementById('upcomingEvents').innerHTML = upcoming.map(e => `<div class="event" style="margin-bottom:0.25rem;">📅 ${e.date}: ${e.title}</div>`).join('');
        }
        
        function addEvent() {
            const title = document.getElementById('eventTitle').value;
            const date = document.getElementById('eventDate').value;
            const type = document.getElementById('eventType').value;
            if(!title || !date) { alert('Enter title and date'); return; }
            events.push({ title, date, type });
            localStorage.setItem('calendarEvents', JSON.stringify(events));
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDate').value = '';
            renderCalendar();
        }
        
        function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); }
        function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }
        
        renderCalendar();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
