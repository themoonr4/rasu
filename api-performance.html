<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - API Performance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .api-metric{display:flex;justify-content:space-between;padding:0.5rem;border-bottom:1px solid #222;}
        .good{color:#28a745;}
        .slow{color:#ffc107;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .chart-bar{height:20px;background:#dc2626;border-radius:4px;margin-top:0.25rem;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-chart-line"></i> API Performance Monitor</h1>
        
        <div class="card">
            <h3>Real-time Metrics</h3>
            <div id="apiMetrics"></div>
        </div>
        
        <div class="card">
            <h3>Test Endpoints</h3>
            <select id="endpointSelect">
                <option value="/api/news">GET /api/news</option>
                <option value="/api/categories">GET /api/categories</option>
                <option value="/api/search">GET /api/search</option>
            </select>
            <button onclick="testEndpoint()">Test Endpoint</button>
            <div id="testResult"></div>
        </div>
        
        <div class="card">
            <h3>Usage Statistics</h3>
            <div id="apiStats"></div>
        </div>
    </div>
    <script>
        function updateMetrics() {
            const metrics = [
                { name: "Avg Response Time", value: `${Math.floor(Math.random() * 200) + 50}ms`, status: "good" },
                { name: "Success Rate", value: `${Math.floor(Math.random() * 5) + 95}%`, status: "good" },
                { name: "Requests/min", value: Math.floor(Math.random() * 500) + 100, status: "good" },
                { name: "Error Rate", value: `${(Math.random() * 2).toFixed(1)}%`, status: "good" }
            ];
            document.getElementById('apiMetrics').innerHTML = metrics.map(m => `
                <div class="api-metric"><span>${m.name}</span><span class="${m.status}">${m.value}</span></div>
            `).join('');
        }
        
        async function testEndpoint() {
            const endpoint = document.getElementById('endpointSelect').value;
            const resultDiv = document.getElementById('testResult');
            resultDiv.innerHTML = '<div>Testing...</div>';
            const start = performance.now();
            try {
                await fetch(endpoint);
                const end = performance.now();
                resultDiv.innerHTML = `<div style="background:#28a745;padding:0.5rem;border-radius:8px;">✅ ${endpoint} responded in ${(end-start).toFixed(0)}ms</div>`;
            } catch(e) {
                resultDiv.innerHTML = `<div style="background:#dc3545;padding:0.5rem;border-radius:8px;">❌ ${endpoint} failed</div>`;
            }
        }
        
        function updateStats() {
            const todayCalls = Math.floor(Math.random() * 10000) + 1000;
            const totalCalls = Math.floor(Math.random() * 100000) + 10000;
            document.getElementById('apiStats').innerHTML = `
                <div class="api-metric"><span>Today's API Calls</span><span>${todayCalls.toLocaleString()}</span></div>
                <div class="api-metric"><span>Total API Calls</span><span>${totalCalls.toLocaleString()}</span></div>
                <div class="api-metric"><span>Rate Limit Remaining</span><span>${Math.floor(Math.random() * 50000) + 5000}</span></div>
            `;
        }
        
        updateMetrics();
        updateStats();
        setInterval(updateMetrics, 10000);
        setInterval(updateStats, 30000);
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
