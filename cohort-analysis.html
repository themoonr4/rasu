<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Cohort Analysis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .cohort-table{width:100%;border-collapse:collapse;}
        .cohort-table th,.cohort-table td{padding:0.5rem;text-align:center;border:1px solid #222;}
        .high-retention{background:#28a74520;color:#28a745;}
        .med-retention{background:#ffc10720;color:#ffc107;}
        .low-retention{background:#dc354520;color:#dc3545;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-chart-line"></i> Cohort Retention Analysis</h1>
        
        <div class="card">
            <h3>Retention Matrix</h3>
            <table class="cohort-table" id="cohortTable">
                <thead id="cohortHeader"></thead>
                <tbody id="cohortBody"></tbody>
            </table>
            <button onclick="refreshCohort()">Refresh Data</button>
        </div>
    </div>
    <script>
        function refreshCohort() {
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
            const headerRow = document.getElementById('cohortHeader');
            headerRow.innerHTML = '<th>Cohort</th>' + months.map(m => `<th>${m}</th>`).join('');
            
            const body = document.getElementById('cohortBody');
            let rows = '';
            for(let i = 0; i < 6; i++) {
                let retentionRates = [];
                for(let j = 0; j < 6; j++) {
                    if(j < i) retentionRates.push('-');
                    else {
                        const rate = j === i ? 100 : Math.floor(Math.random() * 60) + 20;
                        retentionRates.push(rate);
                    }
                }
                const rowClass = (rate) => {
                    if(rate >= 70) return 'high-retention';
                    if(rate >= 40) return 'med-retention';
                    return 'low-retention';
                };
                rows += `<tr><td>${months[i]} 2024</td>${retentionRates.map(r => r === '-' ? '<td>-</td>' : `<td class="${rowClass(r)}">${r}%</td>`).join('')}</tr>`;
            }
            body.innerHTML = rows;
        }
        
        refreshCohort();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
