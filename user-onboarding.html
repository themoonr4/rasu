<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - User Onboarding</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .step{display:none;}
        .step.active{display:block;}
        .step-indicator{display:flex;justify-content:center;gap:1rem;margin-bottom:1rem;}
        .step-dot{width:10px;height:10px;border-radius:50%;background:#333;}
        .step-dot.active{background:#dc2626;}
        input,select{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-user-check"></i> User Onboarding Wizard</h1>
        
        <div class="card">
            <div class="step-indicator">
                <div class="step-dot active" id="step1Dot"></div>
                <div class="step-dot" id="step2Dot"></div>
                <div class="step-dot" id="step3Dot"></div>
            </div>
            
            <div id="step1" class="step active">
                <h3>Welcome to THE MOON!</h3>
                <p>Let's get you started with your personalized news experience.</p>
                <button onclick="nextStep(2)">Get Started</button>
            </div>
            
            <div id="step2" class="step">
                <h3>Select Your Interests</h3>
                <label><input type="checkbox" id="interestTech"> 📱 Technology</label>
                <label><input type="checkbox" id="interestSports"> 🏏 Sports</label>
                <label><input type="checkbox" id="interestBusiness"> 📊 Business</label>
                <label><input type="checkbox" id="interestPolitics"> 🏛️ Politics</label>
                <div style="margin-top:1rem;"><button onclick="nextStep(3)">Continue</button></div>
            </div>
            
            <div id="step3" class="step">
                <h3>Almost Done!</h3>
                <p>Choose your preferred news frequency</p>
                <select id="newsFrequency">
                    <option>Daily Digest</option>
                    <option>Weekly Digest</option>
                    <option>Breaking News Only</option>
                </select>
                <div style="margin-top:1rem;"><button onclick="completeOnboarding()">Complete Setup</button></div>
            </div>
        </div>
    </div>
    <script>
        function nextStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');
            for(let i=1; i<=3; i++) {
                document.getElementById(`step${i}Dot`).classList.toggle('active', i === step);
            }
        }
        
        function completeOnboarding() {
            const interests = [];
            if(document.getElementById('interestTech').checked) interests.push('Tech');
            if(document.getElementById('interestSports').checked) interests.push('Sports');
            if(document.getElementById('interestBusiness').checked) interests.push('Business');
            if(document.getElementById('interestPolitics').checked) interests.push('Politics');
            localStorage.setItem('userInterests', JSON.stringify(interests));
            localStorage.setItem('newsFrequency', document.getElementById('newsFrequency').value);
            localStorage.setItem('onboardingComplete', 'true');
            alert('Setup complete! Welcome to THE MOON!');
            window.location.href = '/';
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
