<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .reset-card{background:#111;border:1px solid #222;border-radius:24px;padding:2rem;width:350px;}
        h1{color:#dc2626;margin-bottom:0.5rem;font-size:1.5rem;}
        input{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin:0.5rem 0;}
        button{background:#dc2626;color:white;border:none;padding:0.75rem;border-radius:8px;cursor:pointer;width:100%;}
        .back-link{text-align:center;margin-top:1rem;}
        .back-link a{color:#aaa;text-decoration:none;}
    </style>
</head>
<body>
    <div class="reset-card">
        <h1>Reset Password</h1>
        <p>Enter your email to receive reset link</p>
        <input type="email" id="resetEmail" placeholder="Email address">
        <button onclick="sendResetLink()">Send Reset Link</button>
        <div class="back-link"><a href="/">← Back to Home</a></div>
        <div id="msg" style="margin-top:0.5rem;font-size:0.8rem;"></div>
    </div>
    <script>
        function sendResetLink() {
            const email = document.getElementById('resetEmail').value;
            const msgDiv = document.getElementById('msg');
            if(!email) { msgDiv.innerHTML = '<div style="color:#dc3545;">Enter email</div>'; return; }
            msgDiv.innerHTML = '<div style="color:#28a745;">✅ Reset link sent to your email</div>';
            setTimeout(() => msgDiv.innerHTML = '', 3000);
        }
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
