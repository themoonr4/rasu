<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - JWT Decoder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-family:monospace;margin-bottom:0.5rem;min-height:120px;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;margin-right:0.5rem;}
        .result{background:#1a1a1a;padding:1rem;border-radius:8px;margin-top:1rem;font-family:monospace;font-size:0.7rem;word-break:break-all;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-key"></i> JWT Token Decoder</h1>
        
        <div class="card">
            <h3>JWT Token</h3>
            <textarea id="jwtInput" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"></textarea>
            <div>
                <button onclick="decodeJWT()">Decode Token</button>
                <button onclick="clearJWT()">Clear</button>
            </div>
            <div id="jwtResult" class="result"></div>
        </div>
        
        <div class="card">
            <h3>JWT Information</h3>
            <div id="jwtInfo"></div>
        </div>
    </div>
    <script>
        function decodeJWT() {
            const token = document.getElementById('jwtInput').value;
            const resultDiv = document.getElementById('jwtResult');
            const infoDiv = document.getElementById('jwtInfo');
            
            if(!token) { resultDiv.innerHTML = '<span style="color:#ffc107;">⚠️ Enter a JWT token</span>'; return; }
            
            const parts = token.split('.');
            if(parts.length !== 3) {
                resultDiv.innerHTML = '<span style="color:#dc3545;">❌ Invalid JWT format. Expected 3 parts separated by dots.</span>';
                return;
            }
            
            try {
                const header = JSON.parse(atob(parts[0]));
                const payload = JSON.parse(atob(parts[1]));
                
                resultDiv.innerHTML = `
                    <strong>Header:</strong><br>${JSON.stringify(header, null, 2)}<br><br>
                    <strong>Payload:</strong><br>${JSON.stringify(payload, null, 2)}
                `;
                
                const exp = payload.exp ? new Date(payload.exp * 1000).toLocaleString() : 'Not set';
                const iat = payload.iat ? new Date(payload.iat * 1000).toLocaleString() : 'Not set';
                
                infoDiv.innerHTML = `
                    <div><strong>Algorithm:</strong> ${header.alg}</div>
                    <div><strong>Type:</strong> ${header.typ}</div>
                    <div><strong>Issued At:</strong> ${iat}</div>
                    <div><strong>Expires:</strong> ${exp}</div>
                    <div><strong>Subject:</strong> ${payload.sub || 'Not set'}</div>
                `;
            } catch(e) {
                resultDiv.innerHTML = `<span style="color:#dc3545;">❌ Failed to decode: ${e.message}</span>`;
            }
        }
        
        function clearJWT() {
            document.getElementById('jwtInput').value = '';
            document.getElementById('jwtResult').innerHTML = '';
            document.getElementById('jwtInfo').innerHTML = '';
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
