<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Live Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:700px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .chat-container{background:#111;border:1px solid #222;border-radius:16px;height:500px;display:flex;flex-direction:column;}
        .chat-messages{flex:1;overflow-y:auto;padding:1rem;}
        .message{display:flex;margin-bottom:1rem;}
        .message-user{justify-content:flex-end;}
        .message-bubble{max-width:70%;padding:0.5rem 1rem;border-radius:18px;}
        .user-bubble{background:#dc2626;color:white;}
        .support-bubble{background:#1a1a1a;color:#fff;}
        .chat-input{display:flex;padding:1rem;border-top:1px solid #222;}
        input{flex:1;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;margin-left:0.5rem;}
        .online-status{color:#28a745;font-size:0.7rem;margin-left:0.5rem;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-comment-dots"></i> Live Chat Support</h1>
        
        <div class="chat-container">
            <div style="padding:0.5rem 1rem;border-bottom:1px solid #222;">
                Support Agent <span class="online-status">● Online</span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message"><div class="message-bubble support-bubble">Hello! How can I help you today?</div></div>
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type your message...">
                <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </div>
    </div>
    <script>
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if(!msg) return;
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML += `<div class="message message-user"><div class="message-bubble user-bubble">${msg}</div></div>`;
            input.value = '';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            setTimeout(() => {
                messagesDiv.innerHTML += `<div class="message"><div class="message-bubble support-bubble">Thanks for your message! We'll get back to you shortly.</div></div>`;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }, 1000);
        }
        
        document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
