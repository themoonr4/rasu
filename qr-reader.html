<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - QR Code Reader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;text-align:center;}
        .drop-zone{border:2px dashed #333;border-radius:16px;padding:2rem;margin-bottom:1rem;cursor:pointer;}
        #video{width:100%;max-width:400px;margin:0 auto;border-radius:12px;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .result{background:#1a1a1a;padding:1rem;border-radius:8px;margin-top:1rem;word-break:break-all;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-qrcode"></i> QR Code Reader</h1>
        
        <div class="card">
            <div class="drop-zone" onclick="document.getElementById('qrFile').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size:3rem;"></i>
                <p>Click to upload QR code image</p>
                <input type="file" id="qrFile" accept="image/*" style="display:none;">
            </div>
            <button onclick="startCamera()">Start Camera</button>
            <button onclick="stopCamera()">Stop Camera</button>
            <video id="video" autoplay playsinline style="display:none;"></video>
            <canvas id="canvas" style="display:none;"></canvas>
            <div id="qrResult" class="result"></div>
        </div>
    </div>
    <script>
        let stream = null;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        document.getElementById('qrFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    const imageData = canvas.toDataURL();
                    document.getElementById('qrResult').innerHTML = `<strong>QR Code Detected (Simulated):</strong><br>https://themoon.news/article/123`;
                };
                img.src = URL.createObjectURL(file);
            }
        });
        
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                video.style.display = 'block';
                document.getElementById('qrResult').innerHTML = 'Camera active. Point at QR code...';
                scanQR();
            } catch(e) {
                document.getElementById('qrResult').innerHTML = `<span style="color:#dc3545;">Camera error: ${e.message}</span>`;
            }
        }
        
        function scanQR() {
            if(video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                setTimeout(scanQR, 500);
            } else {
                setTimeout(scanQR, 100);
            }
        }
        
        function stopCamera() {
            if(stream) {
                stream.getTracks().forEach(track => track.stop());
                video.style.display = 'none';
                document.getElementById('qrResult').innerHTML = 'Camera stopped';
            }
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
