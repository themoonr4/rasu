<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Team Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:700px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .chat-container{background:#111;border:1px solid #222;border-radius:16px;height:500px;display:flex;flex-direction:column;}
        .chat-messages{flex:1;overflow-y:auto;padding:1rem;}
        .message{display:flex;margin-bottom:1rem;}
        .message-user{justify-content:flex-end;}
        .message-bubble{max-width:70%;padding:0.5rem 1rem;border-radius:18px;}
        .user-bubble{background:#dc2626;}
        .team-bubble{background:#1a1a1a;}
        .chat-input{display:flex;padding:1rem;border-top:1px solid #222;}
        input{flex:1;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;margin-left:0.5rem;}
        .channel-select{display:flex;gap:0.5rem;margin-bottom:0.5rem;padding:0.5rem;}
        .channel{background:#1a1a1a;padding:0.25rem 0.5rem;border-radius:8px;cursor:pointer;}
        .channel.active{background:#dc2626;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-comments"></i> Team Chat System</h1>
        
        <div class="chat-container">
            <div class="channel-select">
                <div class="channel active" data-channel="general">#general</div>
                <div class="channel" data-channel="tech">#tech</div>
                <div class="channel" data-channel="news">#news</div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message"><div class="message-bubble team-bubble">Welcome to team chat!</div></div>
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type your message...">
                <button onclick="sendTeamMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    <script>
        let currentChannel = 'general';
        let messages = JSON.parse(localStorage.getItem('teamMessages') || '{"general":[{"user":"System","message":"Welcome to team chat!","time":"Just now"}]}');
        
        function loadMessages() {
            const messagesDiv = document.getElementById('chatMessages');
            const channelMessages = messages[currentChannel] || [];
            messagesDiv.innerHTML = channelMessages.map(m => `
                <div class="message ${m.user === 'You' ? 'message-user' : ''}">
                    <div class="message-bubble ${m.user === 'You' ? 'user-bubble' : 'team-bubble'}">
                        <strong>${m.user}</strong><br>${m.message}<br><small style="font-size:0.6rem;">${m.time}</small>
                    </div>
                </div>
            `).join('');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function sendTeamMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if(!msg) return;
            if(!messages[currentChannel]) messages[currentChannel] = [];
            messages[currentChannel].push({ user: 'You', message: msg, time: new Date().toLocaleTimeString() });
            localStorage.setItem('teamMessages', JSON.stringify(messages));
            input.value = '';
            loadMessages();
            setTimeout(() => {
                messages[currentChannel].push({ user: 'Admin', message: 'Message received!', time: new Date().toLocaleTimeString() });
                localStorage.setItem('teamMessages', JSON.stringify(messages));
                loadMessages();
            }, 1000);
        }
        
        document.querySelectorAll('.channel').forEach(ch => {
            ch.onclick = () => {
                document.querySelectorAll('.channel').forEach(c => c.classList.remove('active'));
                ch.classList.add('active');
                currentChannel = ch.getAttribute('data-channel');
                loadMessages();
            };
        });
        
        document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendTeamMessage(); });
        loadMessages();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
