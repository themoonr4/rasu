<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - JSON Validator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-family:monospace;margin-bottom:0.5rem;min-height:200px;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;margin-right:0.5rem;}
        .result{background:#1a1a1a;padding:0.75rem;border-radius:8px;margin-top:0.5rem;font-family:monospace;font-size:0.7rem;}
        .error{color:#dc3545;}
        .success{color:#28a745;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-code"></i> JSON Validator & Formatter</h1>
        
        <div class="card">
            <h3>JSON Input</h3>
            <textarea id="jsonInput" placeholder='{"name":"THE MOON","version":"2.0","features":["news","books","analytics"]}'></textarea>
            <div>
                <button onclick="validateJSON()">Validate</button>
                <button onclick="formatJSON()">Format</button>
                <button onclick="minifyJSON()">Minify</button>
                <button onclick="clearJSON()">Clear</button>
            </div>
            <div id="jsonResult" class="result"></div>
        </div>
        
        <div class="card">
            <h3>JSON to XML</h3>
            <button onclick="convertToXML()">Convert to XML</button>
            <div id="xmlResult" class="result"></div>
        </div>
    </div>
    <script>
        function validateJSON() {
            const input = document.getElementById('jsonInput').value;
            const resultDiv = document.getElementById('jsonResult');
            try {
                const parsed = JSON.parse(input);
                resultDiv.innerHTML = `<span class="success">✅ Valid JSON</span><br>Type: ${Array.isArray(parsed) ? 'Array' : 'Object'}<br>Keys: ${Object.keys(parsed).length}`;
            } catch(e) {
                resultDiv.innerHTML = `<span class="error">❌ Invalid JSON: ${e.message}</span>`;
            }
        }
        
        function formatJSON() {
            const input = document.getElementById('jsonInput').value;
            try {
                const parsed = JSON.parse(input);
                document.getElementById('jsonInput').value = JSON.stringify(parsed, null, 2);
                document.getElementById('jsonResult').innerHTML = '<span class="success">✅ Formatted successfully</span>';
            } catch(e) {
                document.getElementById('jsonResult').innerHTML = `<span class="error">❌ Cannot format: ${e.message}</span>`;
            }
        }
        
        function minifyJSON() {
            const input = document.getElementById('jsonInput').value;
            try {
                const parsed = JSON.parse(input);
                document.getElementById('jsonInput').value = JSON.stringify(parsed);
                document.getElementById('jsonResult').innerHTML = '<span class="success">✅ Minified successfully</span>';
            } catch(e) {
                document.getElementById('jsonResult').innerHTML = `<span class="error">❌ Cannot minify: ${e.message}</span>`;
            }
        }
        
        function clearJSON() {
            document.getElementById('jsonInput').value = '';
            document.getElementById('jsonResult').innerHTML = '';
            document.getElementById('xmlResult').innerHTML = '';
        }
        
        function convertToXML() {
            const input = document.getElementById('jsonInput').value;
            try {
                const obj = JSON.parse(input);
                function jsonToXml(obj, rootName = 'root') {
                    let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<${rootName}>`;
                    for(let key in obj) {
                        if(typeof obj[key] === 'object') xml += jsonToXml(obj[key], key);
                        else xml += `<${key}>${obj[key]}</${key}>`;
                    }
                    xml += `</${rootName}>`;
                    return xml;
                }
                document.getElementById('xmlResult').innerHTML = `<span class="success">✅ XML Generated:</span><br>${jsonToXml(obj)}`;
            } catch(e) {
                document.getElementById('xmlResult').innerHTML = `<span class="error">❌ Error: ${e.message}</span>`;
            }
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
