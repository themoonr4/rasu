<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Offline</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .offline-card{text-align:center;background:#111;border:1px solid #222;border-radius:24px;padding:3rem;margin:2rem;max-width:400px;}
        .offline-icon{font-size:5rem;color:#dc2626;margin-bottom:1rem;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .retry-btn{background:#dc2626;color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;margin-top:1rem;}
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon"><i class="fas fa-wifi"></i></div>
        <h1>You're Offline</h1>
        <p>No internet connection detected.<br>Please check your connection and try again.</p>
        <button class="retry-btn" onclick="location.reload()">Retry Connection</button>
        <div style="margin-top:1rem;color:#aaa;">Previously read content is available in bookmarks</div>
    </div>
    <script>
        if (navigator.onLine) { location.href = '/'; }
        window.addEventListener('online', () => { location.href = '/'; });
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
