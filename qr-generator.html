<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - QR Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;text-align:center;}
        input,select{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .qr-container{background:#fff;padding:1rem;border-radius:16px;display:inline-block;margin-top:1rem;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-qrcode"></i> QR Code Generator</h1>
        
        <div class="card">
            <h3>Generate QR Code</h3>
            <input type="text" id="qrData" placeholder="Enter URL or text">
            <select id="qrSize">
                <option value="150">Small (150px)</option>
                <option value="200" selected>Medium (200px)</option>
                <option value="300">Large (300px)</option>
            </select>
            <button onclick="generateQR()">Generate QR Code</button>
            <div id="qrResult" style="margin-top:1rem;"></div>
        </div>
    </div>
    <script>
        function generateQR() {
            const data = document.getElementById('qrData').value;
            const size = document.getElementById('qrSize').value;
            if(!data) { alert('Enter URL or text'); return; }
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(data)}`;
            document.getElementById('qrResult').innerHTML = `<div class="qr-container"><img src="${qrUrl}" alt="QR Code"></div><div><a href="${qrUrl}" download="qrcode.png"><button>Download QR Code</button></a></div>`;
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
