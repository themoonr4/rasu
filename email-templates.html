<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Email Templates</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input,textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:1rem;}
        button{background:#dc2626;color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;}
        .template-selector{display:flex;gap:0.5rem;margin-bottom:1rem;}
        .template-btn{background:#1a1a1a;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-envelope-open-text"></i> Email Templates</h1>
        
        <div class="card">
            <div class="template-selector">
                <div class="template-btn" onclick="loadTemplate('welcome')">Welcome Email</div>
                <div class="template-btn" onclick="loadTemplate('newsletter')">Newsletter</div>
                <div class="template-btn" onclick="loadTemplate('breaking')">Breaking News Alert</div>
            </div>
            <input type="text" id="templateSubject" placeholder="Subject">
            <textarea id="templateBody" rows="8" placeholder="Email body (HTML supported)"></textarea>
            <button onclick="saveTemplate()">Save Template</button>
            <button onclick="sendTest()" style="background:#28a745;">Send Test Email</button>
            <div id="templateMsg"></div>
        </div>
    </div>
    <script>
        let templates = JSON.parse(localStorage.getItem('emailTemplates') || '{}');
        
        function loadTemplate(type) {
            const template = templates[type] || { subject: '', body: '' };
            document.getElementById('templateSubject').value = template.subject || getDefaultSubject(type);
            document.getElementById('templateBody').value = template.body || getDefaultBody(type);
        }
        
        function getDefaultSubject(type) {
            const subjects = { welcome: 'Welcome to THE MOON!', newsletter: 'THE MOON Weekly Digest', breaking: 'Breaking News Alert' };
            return subjects[type] || 'THE MOON Update';
        }
        
        function getDefaultBody(type) {
            if(type === 'welcome') return '<h1>Welcome to THE MOON!</h1><p>Thank you for joining. Stay updated with world-class news.</p>';
            if(type === 'newsletter') return '<h1>Weekly Digest</h1><p>Here are the top stories this week...</p>';
            return '<h1>Breaking News</h1><p>Stay tuned for latest updates.</p>';
        }
        
        function saveTemplate() {
            const type = document.querySelector('.template-btn.active')?.innerText.toLowerCase() || 'welcome';
            templates[type] = { subject: document.getElementById('templateSubject').value, body: document.getElementById('templateBody').value };
            localStorage.setItem('emailTemplates', JSON.stringify(templates));
            document.getElementById('templateMsg').innerHTML = '<div style="color:#28a745;">Template saved!</div>';
            setTimeout(() => document.getElementById('templateMsg').innerHTML = '', 3000);
        }
        
        function sendTest() { alert('Test email sent to admin@themoon.news'); }
        
        loadTemplate('welcome');
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
