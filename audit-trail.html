<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Audit Trail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:1000px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .audit-table{width:100%;border-collapse:collapse;}
        .audit-table th,.audit-table td{padding:0.75rem;text-align:left;border-bottom:1px solid #222;}
        .audit-table th{color:#aaa;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-history"></i> Audit Trail Log</h1>
        
        <div class="card">
            <div style="display:flex;justify-content:space-between;margin-bottom:1rem;">
                <h3>All Activities</h3>
                <button onclick="clearAudit()">Clear Log</button>
            </div>
            <table class="audit-table">
                <thead><tr><th>Time</th><th>User</th><th>Action</th><th>IP Address</th><th>Details</th></tr></thead>
                <tbody id="auditBody"></tbody>
            </table>
        </div>
    </div>
    <script>
        let auditLogs = JSON.parse(localStorage.getItem('auditLogs') || '[]');
        
        function addSampleAudit() {
            if(auditLogs.length === 0) {
                auditLogs = [
                    { id: 1, time: new Date().toLocaleString(), user: 'admin@themoon.news', action: 'Login', ip: '192.168.1.1', details: 'Successful login' },
                    { id: 2, time: new Date().toLocaleString(), user: 'admin@themoon.news', action: 'Create News', ip: '192.168.1.1', details: 'Added new article' },
                    { id: 3, time: new Date().toLocaleString(), user: 'editor@themoon.news', action: 'Update Settings', ip: '192.168.1.2', details: 'Changed site title' }
                ];
                localStorage.setItem('auditLogs', JSON.stringify(auditLogs));
            }
        }
        
        function loadAudit() {
            const tbody = document.getElementById('auditBody');
            tbody.innerHTML = auditLogs.map(log => `
                <tr><td>${log.time}</td><td>${log.user}</td><td>${log.action}</td><td>${log.ip}</td><td>${log.details}</td></tr>
            `).join('');
        }
        
        function clearAudit() {
            if(confirm('Clear all audit logs?')) { auditLogs = []; localStorage.setItem('auditLogs', JSON.stringify(auditLogs)); loadAudit(); }
        }
        
        addSampleAudit();
        loadAudit();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
