<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Timestamp Converter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;font-family:monospace;}
        .result{background:#1a1a1a;padding:1rem;border-radius:8px;margin-top:1rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-clock"></i> Timestamp Converter</h1>
        
        <div class="card">
            <h3>Unix Timestamp</h3>
            <input type="text" id="timestampInput" placeholder="e.g., 1714567890">
            <button onclick="timestampToDate()">Convert to Date</button>
            <div id="dateResult" class="result"></div>
        </div>
        
        <div class="card">
            <h3>Date & Time</h3>
            <input type="datetime-local" id="dateInput">
            <button onclick="dateToTimestamp()">Convert to Timestamp</button>
            <div id="timestampResult" class="result"></div>
        </div>
        
        <div class="card">
            <h3>Current Time</h3>
            <button onclick="showCurrent()">Get Current Timestamp</button>
            <div id="currentResult" class="result"></div>
        </div>
    </div>
    <script>
        function timestampToDate() {
            const timestamp = document.getElementById('timestampInput').value;
            if(!timestamp) { alert('Enter timestamp'); return; }
            const date = new Date(parseInt(timestamp) * 1000);
            if(isNaN(date.getTime())) { document.getElementById('dateResult').innerHTML = '<span style="color:#dc3545;">❌ Invalid timestamp</span>'; return; }
            document.getElementById('dateResult').innerHTML = `
                <strong>📅 Date:</strong> ${date.toLocaleDateString()}<br>
                <strong>⏰ Time:</strong> ${date.toLocaleTimeString()}<br>
                <strong>📆 Full:</strong> ${date.toLocaleString()}<br>
                <strong>🌍 UTC:</strong> ${date.toUTCString()}
            `;
        }
        
        function dateToTimestamp() {
            const dateInput = document.getElementById('dateInput').value;
            if(!dateInput) { alert('Select date and time'); return; }
            const timestamp = Math.floor(new Date(dateInput).getTime() / 1000);
            document.getElementById('timestampResult').innerHTML = `<strong>Unix Timestamp:</strong> ${timestamp}<br><strong>Milliseconds:</strong> ${timestamp * 1000}`;
        }
        
        function showCurrent() {
            const now = new Date();
            const timestamp = Math.floor(now.getTime() / 1000);
            document.getElementById('currentResult').innerHTML = `
                <strong>Current Timestamp:</strong> ${timestamp}<br>
                <strong>Date:</strong> ${now.toLocaleString()}
            `;
            document.getElementById('timestampInput').value = timestamp;
        }
        
        showCurrent();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
