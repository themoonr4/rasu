<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Video Embed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input,textarea{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .video-preview{background:#1a1a1a;padding:1rem;border-radius:12px;margin-top:1rem;}
        .video-item{display:flex;justify-content:space-between;align-items:center;padding:0.5rem;border-bottom:1px solid #222;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-video"></i> Video Embed Manager</h1>
        
        <div class="card">
            <h3>Add Video</h3>
            <input type="text" id="videoTitle" placeholder="Video Title">
            <input type="text" id="videoUrl" placeholder="YouTube/Vimeo URL">
            <select id="videoPlatform">
                <option value="youtube">YouTube</option>
                <option value="vimeo">Vimeo</option>
            </select>
            <button onclick="addVideo()">Add Video</button>
        </div>
        
        <div class="card">
            <h3>Video Library</h3>
            <div id="videoList"></div>
        </div>
        
        <div class="card">
            <h3>Embed Code Generator</h3>
            <input type="text" id="embedUrl" placeholder="Video URL">
            <button onclick="generateEmbed()">Generate Embed Code</button>
            <div id="embedCode" class="video-preview" style="display:none;"></div>
        </div>
    </div>
    <script>
        let videos = JSON.parse(localStorage.getItem('videoLibrary') || '[]');
        
        function loadVideos() {
            const listDiv = document.getElementById('videoList');
            if(videos.length === 0) { listDiv.innerHTML = '<p>No videos</p>'; return; }
            listDiv.innerHTML = videos.map((v, i) => `
                <div class="video-item">
                    <div><strong>${v.title}</strong><br><small>${v.platform}</small></div>
                    <div><button onclick="copyVideoCode(${i})">Get Code</button><button onclick="deleteVideo(${i})" style="background:#dc3545;">Delete</button></div>
                </div>
            `).join('');
        }
        
        function addVideo() {
            const title = document.getElementById('videoTitle').value;
            const url = document.getElementById('videoUrl').value;
            const platform = document.getElementById('videoPlatform').value;
            if(!title || !url) { alert('Enter title and URL'); return; }
            videos.push({ title, url, platform, date: new Date().toLocaleString() });
            localStorage.setItem('videoLibrary', JSON.stringify(videos));
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoUrl').value = '';
            loadVideos();
        }
        
        function copyVideoCode(index) {
            const video = videos[index];
            const embedCode = video.platform === 'youtube' ? 
                `<iframe width="560" height="315" src="https://www.youtube.com/embed/${video.url.split('v=')[1]}" frameborder="0" allowfullscreen></iframe>` :
                `<iframe src="${video.url}" width="560" height="315" frameborder="0" allowfullscreen></iframe>`;
            navigator.clipboard.writeText(embedCode);
            alert('Embed code copied!');
        }
        
        function generateEmbed() {
            const url = document.getElementById('embedUrl').value;
            const embedDiv = document.getElementById('embedCode');
            if(url.includes('youtube')) {
                const videoId = url.split('v=')[1]?.split('&')[0];
                embedDiv.innerHTML = `<strong>Embed Code:</strong><br><code>&lt;iframe width="560" height="315" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen&gt;&lt;/iframe&gt;</code>`;
            } else {
                embedDiv.innerHTML = `<strong>Embed Code:</strong><br><code>&lt;iframe src="${url}" width="560" height="315" frameborder="0" allowfullscreen&gt;&lt;/iframe&gt;</code>`;
            }
            embedDiv.style.display = 'block';
        }
        
        function deleteVideo(index) { videos.splice(index, 1); localStorage.setItem('videoLibrary', JSON.stringify(videos)); loadVideos(); }
        
        loadVideos();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
