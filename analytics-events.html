<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Event Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:1000px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem;}
        .stat-card{background:#111;border:1px solid #222;border-radius:16px;padding:1rem;text-align:center;}
        .stat-value{font-size:2rem;font-weight:700;color:#dc2626;}
        .event-table{width:100%;border-collapse:collapse;background:#111;border-radius:16px;overflow:hidden;}
        th,td{padding:0.75rem;text-align:left;border-bottom:1px solid #222;}
        th{background:#1a1a1a;color:#aaa;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;margin-right:0.5rem;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-chart-pie"></i> Event Analytics</h1>
        
        <div class="stats-grid" id="statsGrid"></div>
        
        <div style="margin-bottom:1rem;">
            <button onclick="filterEvents('all')">All Events</button>
            <button onclick="filterEvents('page_view')">Page Views</button>
            <button onclick="filterEvents('click')">Clicks</button>
            <button onclick="filterEvents('share')">Shares</button>
            <button onclick="exportEvents()">Export CSV</button>
        </div>
        
        <table class="event-table">
            <thead><tr><th>Event</th><th>Count</th><th>Last 24h</th><th>Last 7d</th><th>Trend</th></tr></thead>
            <tbody id="eventBody"></tbody>
        </table>
    </div>
    <script>
        let events = JSON.parse(localStorage.getItem('analyticsEvents') || '[]');
        
        function addSampleEvents() {
            if(events.length === 0) {
                events = [
                    { type: 'page_view', count: 1542, last24h: 89, last7d: 542, trend: '+12%' },
                    { type: 'click', count: 892, last24h: 45, last7d: 298, trend: '+8%' },
                    { type: 'share', count: 234, last24h: 12, last7d: 78, trend: '+5%' },
                    { type: 'bookmark', count: 567, last24h: 34, last7d: 189, trend: '+15%' },
                    { type: 'comment', count: 123, last24h: 8, last7d: 42, trend: '+3%' }
                ];
                localStorage.setItem('analyticsEvents', JSON.stringify(events));
            }
        }
        
        function loadStats() {
            const total = events.reduce((a,b) => a + b.count, 0);
            const last24h = events.reduce((a,b) => a + b.last24h, 0);
            const last7d = events.reduce((a,b) => a + b.last7d, 0);
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div>Total Events</div><div class="stat-value">${total.toLocaleString()}</div></div>
                <div class="stat-card"><div>Last 24 Hours</div><div class="stat-value">${last24h.toLocaleString()}</div></div>
                <div class="stat-card"><div>Last 7 Days</div><div class="stat-value">${last7d.toLocaleString()}</div></div>
            `;
        }
        
        function filterEvents(type) {
            const filtered = type === 'all' ? events : events.filter(e => e.type === type);
            const tbody = document.getElementById('eventBody');
            tbody.innerHTML = filtered.map(e => `
                <tr>
                    <td><i class="fas ${e.type === 'page_view' ? 'fa-eye' : e.type === 'click' ? 'fa-mouse-pointer' : e.type === 'share' ? 'fa-share' : e.type === 'bookmark' ? 'fa-bookmark' : 'fa-comment'}"></i> ${e.type.replace('_',' ').toUpperCase()}</td>
                    <td>${e.count.toLocaleString()}</td>
                    <td>${e.last24h.toLocaleString()}</td>
                    <td>${e.last7d.toLocaleString()}</td>
                    <td style="color:#28a745;">${e.trend}</td>
                </tr>
            `).join('');
        }
        
        function exportEvents() {
            const csv = ['Type,Count,Last24h,Last7d,Trend', ...events.map(e => `${e.type},${e.count},${e.last24h},${e.last7d},${e.trend}`)].join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `events_${Date.now()}.csv`; a.click();
            URL.revokeObjectURL(url);
        }
        
        addSampleEvents();
        loadStats();
        filterEvents('all');
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
