<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Favicon Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .favicon-preview{width:64px;height:64px;background:#dc2626;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1rem;}
        .code-block{background:#1a1a1a;padding:0.5rem;border-radius:8px;font-family:monospace;font-size:0.7rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-image"></i> Favicon Generator Guide</h1>
        
        <div class="card">
            <div class="favicon-preview">🌙</div>
            <h3>Favicon Preview</h3>
            <div class="code-block" id="faviconCode">&lt;link rel="icon" type="image/svg+xml" href="/favicon.svg"&gt;</div>
            <button onclick="copyFaviconCode()">Copy Code</button>
        </div>
        
        <div class="card">
            <h3>Favicon Sizes Required</h3>
            <div id="sizeList"></div>
        </div>
        
        <div class="card">
            <h3>Online Tools</h3>
            <button onclick="openTool('realfavicongenerator')">RealFaviconGenerator</button>
            <button onclick="openTool('faviconio')">Favicon.io</button>
        </div>
    </div>
    <script>
        function copyFaviconCode() {
            const code = document.getElementById('faviconCode').innerText;
            navigator.clipboard.writeText(code);
            alert('Code copied!');
        }
        
        function openTool(tool) {
            const urls = {
                realfavicongenerator: 'https://realfavicongenerator.net/',
                faviconio: 'https://favicon.io/'
            };
            window.open(urls[tool], '_blank');
        }
        
        document.getElementById('sizeList').innerHTML = `
            <div>🖼️ favicon.ico - 16x16, 32x32, 48x48</div>
            <div>🖼️ favicon.svg - Vector format</div>
            <div>🖼️ apple-touch-icon.png - 180x180</div>
            <div>🖼️ android-chrome-192x192.png</div>
            <div>🖼️ android-chrome-512x512.png</div>
        `;
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
