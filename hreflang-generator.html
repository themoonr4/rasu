<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - hreflang Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .lang-item{display:flex;gap:0.5rem;margin-bottom:0.5rem;}
        input,select{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .code-block{background:#1a1a1a;padding:0.5rem;border-radius:8px;font-family:monospace;font-size:0.7rem;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-language"></i> hreflang Tag Generator</h1>
        
        <div class="card">
            <h3>Add Language Versions</h3>
            <div id="langList"></div>
            <div class="lang-item">
                <select id="langCode">
                    <option value="en">English (en)</option>
                    <option value="hi">Hindi (hi)</option>
                    <option value="es">Spanish (es)</option>
                    <option value="fr">French (fr)</option>
                    <option value="de">German (de)</option>
                </select>
                <input type="text" id="langUrl" placeholder="URL for this language">
                <button onclick="addLanguage()">Add</button>
            </div>
            <button onclick="generateHreflang()">Generate hreflang Tags</button>
            <div id="hreflangOutput" class="code-block" style="margin-top:1rem;"></div>
            <button onclick="copyHreflang()">Copy Tags</button>
        </div>
        
        <div class="card">
            <h3>What is hreflang?</h3>
            <div>Tells search engines which language version of a page to serve to users.</div>
        </div>
    </div>
    <script>
        let languages = [{code:'en',url:'https://themoon.news/'}];
        
        function loadLanguages() {
            const listDiv = document.getElementById('langList');
            listDiv.innerHTML = languages.map((l,i) => `<div class="lang-item"><span>${l.code}: ${l.url}</span><button onclick="removeLanguage(${i})">Remove</button></div>`).join('');
        }
        
        function addLanguage() {
            const code = document.getElementById('langCode').value;
            const url = document.getElementById('langUrl').value;
            if(!url) { alert('Enter URL'); return; }
            languages.push({code,url});
            document.getElementById('langUrl').value = '';
            loadLanguages();
        }
        
        function removeLanguage(index) {
            languages.splice(index,1);
            loadLanguages();
        }
        
        function generateHreflang() {
            let tags = languages.map(l => `<link rel="alternate" hreflang="${l.code}" href="${l.url}" />`).join('\n');
            tags += `\n<link rel="alternate" hreflang="x-default" href="${languages[0]?.url || ''}" />`;
            document.getElementById('hreflangOutput').innerHTML = tags;
        }
        
        function copyHreflang() {
            const code = document.getElementById('hreflangOutput').innerText;
            navigator.clipboard.writeText(code);
            alert('hreflang tags copied!');
        }
        
        loadLanguages();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
