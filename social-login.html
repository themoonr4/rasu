<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Social Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .provider-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        input{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .toggle-switch{position:relative;display:inline-block;width:50px;height:24px;}
        .toggle-switch input{opacity:0;width:0;height:0;}
        .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#333;transition:0.3s;border-radius:24px;}
        .slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background-color:white;transition:0.3s;border-radius:50%;}
        input:checked+.slider{background-color:#dc2626;}
        input:checked+.slider:before{transform:translateX(26px);}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-share-alt"></i> Social Login Configuration</h1>
        
        <div class="card">
            <h3>Google Login</h3>
            <input type="text" id="googleClientId" placeholder="Google Client ID">
            <label class="toggle-switch"><input type="checkbox" id="googleEnable"><span class="slider"></span></label>
        </div>
        
        <div class="card">
            <h3>Facebook Login</h3>
            <input type="text" id="facebookAppId" placeholder="Facebook App ID">
            <label class="toggle-switch"><input type="checkbox" id="facebookEnable"><span class="slider"></span></label>
        </div>
        
        <div class="card">
            <h3>Twitter Login</h3>
            <input type="text" id="twitterApiKey" placeholder="Twitter API Key">
            <label class="toggle-switch"><input type="checkbox" id="twitterEnable"><span class="slider"></span></label>
        </div>
        
        <div class="card">
            <h3>GitHub Login</h3>
            <input type="text" id="githubClientId" placeholder="GitHub Client ID">
            <label class="toggle-switch"><input type="checkbox" id="githubEnable"><span class="slider"></span></label>
        </div>
        
        <button onclick="saveSocialConfig()">Save Configuration</button>
        <div id="configMsg"></div>
    </div>
    <script>
        function loadConfig() {
            document.getElementById('googleClientId').value = localStorage.getItem('googleClientId') || '';
            document.getElementById('facebookAppId').value = localStorage.getItem('facebookAppId') || '';
            document.getElementById('twitterApiKey').value = localStorage.getItem('twitterApiKey') || '';
            document.getElementById('githubClientId').value = localStorage.getItem('githubClientId') || '';
            document.getElementById('googleEnable').checked = localStorage.getItem('googleEnable') === 'true';
            document.getElementById('facebookEnable').checked = localStorage.getItem('facebookEnable') === 'true';
            document.getElementById('twitterEnable').checked = localStorage.getItem('twitterEnable') === 'true';
            document.getElementById('githubEnable').checked = localStorage.getItem('githubEnable') === 'true';
        }
        
        function saveSocialConfig() {
            localStorage.setItem('googleClientId', document.getElementById('googleClientId').value);
            localStorage.setItem('facebookAppId', document.getElementById('facebookAppId').value);
            localStorage.setItem('twitterApiKey', document.getElementById('twitterApiKey').value);
            localStorage.setItem('githubClientId', document.getElementById('githubClientId').value);
            localStorage.setItem('googleEnable', document.getElementById('googleEnable').checked);
            localStorage.setItem('facebookEnable', document.getElementById('facebookEnable').checked);
            localStorage.setItem('twitterEnable', document.getElementById('twitterEnable').checked);
            localStorage.setItem('githubEnable', document.getElementById('githubEnable').checked);
            document.getElementById('configMsg').innerHTML = '<div style="background:#28a745;padding:0.5rem;border-radius:8px;">✅ Configuration saved!</div>';
            setTimeout(() => document.getElementById('configMsg').innerHTML = '', 3000);
        }
        
        loadConfig();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
