<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Translation Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .translation-item{display:flex;flex-direction:column;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #222;}
        .translation-key{font-weight:bold;margin-bottom:0.25rem;}
        input,textarea{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.25rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-language"></i> Translation Editor</h1>
        
        <div class="card">
            <h3>Select Language</h3>
            <select id="editLang" onchange="loadTranslations()"></select>
        </div>
        
        <div class="card">
            <h3>Edit Translations</h3>
            <div id="translationsList"></div>
            <button onclick="saveTranslations()">Save All Translations</button>
            <div id="saveMsg"></div>
        </div>
    </div>
    <script>
        let translations = JSON.parse(localStorage.getItem('translations') || '{"en":{"welcome":"Welcome","home":"Home","news":"News","settings":"Settings"},"hi":{"welcome":"स्वागत है","home":"होम","news":"समाचार","settings":"सेटिंग्स"}}');
        
        function loadLanguages() {
            const select = document.getElementById('editLang');
            const langs = Object.keys(translations);
            select.innerHTML = langs.map(l => `<option value="${l}" ${localStorage.getItem('currentEditLang') === l ? 'selected' : ''}>${l.toUpperCase()}</option>`).join('');
        }
        
        function loadTranslations() {
            const lang = document.getElementById('editLang').value;
            localStorage.setItem('currentEditLang', lang);
            const t = translations[lang] || {};
            const keys = Object.keys(translations.en || {});
            const listDiv = document.getElementById('translationsList');
            listDiv.innerHTML = keys.map(key => `
                <div class="translation-item">
                    <div class="translation-key">${key}</div>
                    <input type="text" id="trans_${key}" value="${t[key] || ''}" placeholder="Translation for ${key}">
                </div>
            `).join('');
        }
        
        function saveTranslations() {
            const lang = document.getElementById('editLang').value;
            if(!translations[lang]) translations[lang] = {};
            const keys = Object.keys(translations.en || {});
            keys.forEach(key => {
                const val = document.getElementById(`trans_${key}`).value;
                if(val) translations[lang][key] = val;
            });
            localStorage.setItem('translations', JSON.stringify(translations));
            document.getElementById('saveMsg').innerHTML = '<div style="color:#28a745;">✅ Translations saved!</div>';
            setTimeout(() => document.getElementById('saveMsg').innerHTML = '', 3000);
        }
        
        loadLanguages();
        loadTranslations();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
