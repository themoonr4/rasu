<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Analytics Reports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .report-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        select,button{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;cursor:pointer;}
        button{background:#dc2626;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-chart-bar"></i> Analytics Reports</h1>
        
        <div class="card">
            <h3>Generate Report</h3>
            <select id="reportType">
                <option value="traffic">Traffic Report</option>
                <option value="content">Content Performance</option>
                <option value="users">User Activity</option>
                <option value="revenue">Revenue Report</option>
            </select>
            <select id="reportPeriod">
                <option value="today">Today</option>
                <option value="week">Last 7 Days</option>
                <option value="month">Last 30 Days</option>
                <option value="year">Last Year</option>
            </select>
            <button onclick="generateReport()">Generate Report</button>
            <div id="reportResult" style="margin-top:1rem;"></div>
        </div>
        
        <div class="card">
            <h3>Saved Reports</h3>
            <div id="savedReports"></div>
        </div>
    </div>
    <script>
        let savedReports = JSON.parse(localStorage.getItem('savedReports') || '[]');
        
        function generateReport() {
            const type = document.getElementById('reportType').value;
            const period = document.getElementById('reportPeriod').value;
            const resultDiv = document.getElementById('reportResult');
            let content = '';
            if(type === 'traffic') {
                content = `<div style="background:#1a1a1a;padding:1rem;border-radius:8px;"><h4>Traffic Report (${period})</h4><div>Total Visitors: ${Math.floor(Math.random() * 10000) + 1000}</div><div>Page Views: ${Math.floor(Math.random() * 50000) + 5000}</div><div>Bounce Rate: ${Math.floor(Math.random() * 40) + 30}%</div><div>Avg Session: ${Math.floor(Math.random() * 5) + 1} min</div><button onclick="saveReport('${type}', '${period}')">Save Report</button></div>`;
            } else if(type === 'content') {
                content = `<div style="background:#1a1a1a;padding:1rem;border-radius:8px;"><h4>Content Performance (${period})</h4><div>Most Viewed: Breaking News (1,234 views)</div><div>Most Shared: Tech Update (456 shares)</div><div>Comments: 89 total</div><button onclick="saveReport('${type}', '${period}')">Save Report</button></div>`;
            } else if(type === 'users') {
                content = `<div style="background:#1a1a1a;padding:1rem;border-radius:8px;"><h4>User Activity (${period})</h4><div>New Users: ${Math.floor(Math.random() * 500) + 50}</div><div>Active Users: ${Math.floor(Math.random() * 1000) + 200}</div><div>Returning: ${Math.floor(Math.random() * 60) + 20}%</div><button onclick="saveReport('${type}', '${period}')">Save Report</button></div>`;
            } else {
                content = `<div style="background:#1a1a1a;padding:1rem;border-radius:8px;"><h4>Revenue Report (${period})</h4><div>Ad Revenue: ₹${Math.floor(Math.random() * 5000) + 500}</div><div>Subscriptions: ₹${Math.floor(Math.random() * 10000) + 1000}</div><div>Affiliate: ₹${Math.floor(Math.random() * 2000) + 200}</div><button onclick="saveReport('${type}', '${period}')">Save Report</button></div>`;
            }
            resultDiv.innerHTML = content;
        }
        
        function saveReport(type, period) {
            const report = { type, period, date: new Date().toLocaleString(), id: Date.now() };
            savedReports.push(report);
            localStorage.setItem('savedReports', JSON.stringify(savedReports));
            loadSavedReports();
            alert('Report saved!');
        }
        
        function loadSavedReports() {
            const listDiv = document.getElementById('savedReports');
            if(savedReports.length === 0) { listDiv.innerHTML = '<p>No saved reports</p>'; return; }
            listDiv.innerHTML = savedReports.map(r => `<div class="report-item"><span>${r.type} (${r.period}) - ${r.date}</span><button onclick="deleteReport(${r.id})" style="background:#dc3545;">Delete</button></div>`).join('');
        }
        
        function deleteReport(id) {
            savedReports = savedReports.filter(r => r.id !== id);
            localStorage.setItem('savedReports', JSON.stringify(savedReports));
            loadSavedReports();
        }
        
        loadSavedReports();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
