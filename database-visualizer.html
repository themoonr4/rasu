<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Database Visualizer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;}
        .table-card{background:#1a1a1a;border-radius:12px;padding:1rem;}
        .table-name{font-weight:bold;color:#dc2626;margin-bottom:0.5rem;}
        .field{padding:0.25rem;border-bottom:1px solid #333;font-size:0.7rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-database"></i> Database Visualizer</h1>
        
        <div class="card">
            <h3>Database Schema</h3>
            <div class="table-grid" id="schemaGrid"></div>
        </div>
        
        <div class="card">
            <h3>Table Statistics</h3>
            <div id="tableStats"></div>
            <button onclick="refreshStats()">Refresh Stats</button>
        </div>
    </div>
    <script>
        const schema = {
            'news': ['id', 'title', 'content', 'category_id', 'status', 'views', 'created_at', 'updated_at'],
            'categories': ['id', 'name', 'slug', 'description', 'icon'],
            'subcategories': ['id', 'name', 'slug', 'parent_id', 'parent_slug'],
            'users': ['id', 'email', 'role', 'created_at'],
            'comments': ['id', 'news_id', 'user_name', 'content', 'status', 'created_at']
        };
        
        function loadSchema() {
            const grid = document.getElementById('schemaGrid');
            grid.innerHTML = Object.entries(schema).map(([table, fields]) => `
                <div class="table-card">
                    <div class="table-name">📊 ${table}</div>
                    ${fields.map(f => `<div class="field">• ${f}</div>`).join('')}
                </div>
            `).join('');
        }
        
        function refreshStats() {
            const statsDiv = document.getElementById('tableStats');
            statsDiv.innerHTML = Object.keys(schema).map(table => {
                const count = Math.floor(Math.random() * 1000) + 50;
                return `<div class="table-card" style="margin-bottom:0.5rem;">📈 ${table}: ${count} records</div>`;
            }).join('');
        }
        
        loadSchema();
        refreshStats();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
