<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/rasu/'"><i class="fas fa-arrow-left"></i> Back to Home</div>
        <h1><i class="fas fa-envelope"></i> Contact Us</h1>
        
        <div class="contact-form">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="contactName" placeholder="Your Name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="contactEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="contactSubject" placeholder="Subject">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="contactMessage" rows="5" placeholder="Write your message here..."></textarea>
            </div>
            <button onclick="sendMessage()">Send Message <i class="fas fa-paper-plane"></i></button>
            <div id="contactMsg"></div>
        </div>
        
        <div class="info-card">
            <h3><i class="fas fa-map-marker-alt"></i> Address</h3>
            <p>THE MOON News, New Delhi, India</p>
            
            <h3 style="margin-top:1rem;"><i class="fas fa-phone"></i> Phone</h3>
            <p>+91 98765 43210</p>
            
            <h3 style="margin-top:1rem;"><i class="fas fa-envelope"></i> Email</h3>
            <p>support@themoon.news</p>
            
            <h3 style="margin-top:1rem;"><i class="fas fa-clock"></i> Working Hours</h3>
            <p>Mon-Sat: 9:00 AM - 9:00 PM (IST)</p>
        </div>
    </div>
    
    <script>
        function sendMessage() {
            const name = document.getElementById('contactName').value.trim();
            const email = document.getElementById('contactEmail').value.trim();
            const subject = document.getElementById('contactSubject').value.trim();
            const message = document.getElementById('contactMessage').value.trim();
            const msgDiv = document.getElementById('contactMsg');
            
            if(!name || !email || !message) {
                msgDiv.innerHTML = '<div class="error">❌ Please fill all required fields</div>';
                setTimeout(() => msgDiv.innerHTML = '', 4000);
                return;
            }
            
            if(!email.includes('@') || !email.includes('.')) {
                msgDiv.innerHTML = '<div class="error">❌ Please enter a valid email address</div>';
                setTimeout(() => msgDiv.innerHTML = '', 4000);
                return;
            }
            
            const contact = { 
                name, 
                email, 
                subject: subject || 'General Query', 
                message, 
                date: new Date().toISOString() 
            };
            
            let contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
            contacts.push(contact);
            localStorage.setItem('contacts', JSON.stringify(contacts));
            
            msgDiv.innerHTML = '<div class="success">✅ Message sent! We will reply within 24-48 hours.</div>';
            
            document.getElementById('contactName').value = '';
            document.getElementById('contactEmail').value = '';
            document.getElementById('contactSubject').value = '';
            document.getElementById('contactMessage').value = '';
            
            setTimeout(() => msgDiv.innerHTML = '', 5000);
        }
        
        // Enter key support for form
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextInput = [...document.querySelectorAll('input, textarea')]
                        .find(el => el.id === input.id)?.nextElementSibling;
                    if (nextInput) nextInput.focus();
                    else sendMessage();
                }
            });
        });
        
        // Theme detection for light/dark mode
        if (localStorage.getItem('theme') === 'light') {
            document.body.setAttribute('data-theme', 'light');
        }
    </script>
</body>
