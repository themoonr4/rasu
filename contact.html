<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Contact Us</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;padding:2rem;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .contact-form{background:#111;border:1px solid #222;border-radius:16px;padding:2rem;margin-bottom:1.5rem;}
        .form-group{margin-bottom:1rem;}
        label{display:block;margin-bottom:0.5rem;}
        input,textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        button{background:#dc2626;color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;}
        .info-card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;text-align:center;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
        .success{background:#28a745;padding:0.75rem;border-radius:8px;margin-top:1rem;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/'"><i class="fas fa-arrow-left"></i> Back to Home</div>
        <h1><i class="fas fa-envelope"></i> Contact Us</h1>
        
        <div class="contact-form">
            <div class="form-group"><label>Name</label><input type="text" id="contactName" placeholder="RAKESH KUMAR"></div>
            <div class="form-group"><label>Email</label><input type="email" id="contactEmail" placeholder="themoonr4@gmail.com"></div>
            <div class="form-group"><label>Subject</label><input type="text" id="contactSubject" placeholder="For Any Queries"></div>
            <div class="form-group"><label>Message</label><textarea id="contactMessage" rows="5" placeholder="For Any Work"></textarea></div>
            <button onclick="sendMessage()">Send Message <i class="fas fa-paper-plane"></i></button>
            <div id="contactMsg"></div>
        </div>
        
        <div class="info-card">
            <h3><i class="fas fa-map-marker-alt"></i> Address</h3>
            <p>THE MOON News, New Delhi, India</p>
            <h3 style="margin-top:1rem;"><i class="fas fa-phone"></i> Phone</h3>
            <p>+91 98765 43210</p>
            <h3 style="margin-top:1rem;"><i class="fas fa-envelope"></i> Email</h3>
            <p>support@themoon.news</p>
        </div>
    </div>
    <script>
        function sendMessage() {
            const name = document.getElementById('contactName').value;
            const email = document.getElementById('contactEmail').value;
            const subject = document.getElementById('contactSubject').value;
            const message = document.getElementById('contactMessage').value;
            const msgDiv = document.getElementById('contactMsg');
            
            if(!name || !email || !message) {
                msgDiv.innerHTML = '<div class="success" style="background:#dc3545;">Please fill all fields</div>';
                setTimeout(() => msgDiv.innerHTML = '', 3000);
                return;
            }
            
            const contact = { name, email, subject, message, date: new Date().toISOString() };
            let contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
            contacts.push(contact);
            localStorage.setItem('contacts', JSON.stringify(contacts));
            
            msgDiv.innerHTML = '<div class="success">✅ Message sent! We will reply soon.</div>';
            document.getElementById('contactName').value = '';
            document.getElementById('contactEmail').value = '';
            document.getElementById('contactSubject').value = '';
            document.getElementById('contactMessage').value = '';
            setTimeout(() => msgDiv.innerHTML = '', 3000);
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
