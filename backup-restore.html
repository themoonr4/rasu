<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - System Backup & Restore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .backup-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .progress-bar{height:4px;background:#333;border-radius:2px;margin-top:0.5rem;}
        .progress-fill{width:0%;height:100%;background:#dc2626;transition:width 0.3s;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-database"></i> System Backup & Restore</h1>
        
        <div class="card">
            <h3>Create Full Backup</h3>
            <button onclick="createFullBackup()">Create Backup</button>
            <div class="progress-bar"><div class="progress-fill" id="backupProgress"></div></div>
        </div>
        
        <div class="card">
            <h3>Restore from Backup</h3>
            <input type="file" id="restoreFile" accept=".json">
            <button onclick="restoreBackup()">Restore</button>
            <div id="restoreMsg"></div>
        </div>
        
        <div class="card">
            <h3>Available Backups</h3>
            <div id="backupList"></div>
        </div>
        
        <div class="card">
            <h3>Storage Usage</h3>
            <div id="storageInfo"></div>
        </div>
    </div>
    <script>
        let backups = JSON.parse(localStorage.getItem('systemBackups') || '[]');
        
        function loadBackups() {
            const listDiv = document.getElementById('backupList');
            if(backups.length === 0) { listDiv.innerHTML = '<p>No backups found</p>'; return; }
            listDiv.innerHTML = backups.map((b, i) => `
                <div class="backup-item">
                    <div><strong>${b.name}</strong><br><small>${b.date} | ${b.size} KB</small></div>
                    <div><button onclick="downloadBackup(${i})">Download</button><button onclick="deleteBackup(${i})" style="background:#dc3545;">Delete</button></div>
                </div>
            `).join('');
            
            let totalSize = backups.reduce((sum, b) => sum + (b.size || 0), 0);
            document.getElementById('storageInfo').innerHTML = `<div>Total Backups: ${backups.length}</div><div>Total Size: ${totalSize} KB</div><div>Available Space: ${(5000 - totalSize) > 0 ? (5000 - totalSize) : 0} KB (of 5MB limit)</div>`;
        }
        
        function createFullBackup() {
            const progress = document.getElementById('backupProgress');
            progress.style.width = '30%';
            const backup = {};
            for(let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                backup[key] = localStorage.getItem(key);
            }
            progress.style.width = '70%';
            const backupData = JSON.stringify(backup);
            const size = Math.round(backupData.length / 1024);
            const backupName = `full_backup_${Date.now()}`;
            localStorage.setItem(backupName, backupData);
            backups.unshift({ name: backupName, date: new Date().toLocaleString(), size: size });
            localStorage.setItem('systemBackups', JSON.stringify(backups));
            progress.style.width = '100%';
            setTimeout(() => progress.style.width = '0%', 1000);
            loadBackups();
            alert('Backup created successfully!');
        }
        
        function restoreBackup() {
            const file = document.getElementById('restoreFile').files[0];
            if(!file) { alert('Select backup file'); return; }
            const reader = new FileReader();
            reader.onload = (e) => {
                const backup = JSON.parse(e.target.result);
                for(let key in backup) {
                    localStorage.setItem(key, backup[key]);
                }
                document.getElementById('restoreMsg').innerHTML = '<div style="background:#28a745;padding:0.5rem;border-radius:8px;">✅ Restore complete! Page will reload.</div>';
                setTimeout(() => location.reload(), 2000);
            };
            reader.readAsText(file);
        }
        
        function downloadBackup(index) {
            const backupName = backups[index].name;
            const data = localStorage.getItem(backupName);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${backupName}.json`; a.click();
            URL.revokeObjectURL(url);
        }
        
        function deleteBackup(index) {
            const backupName = backups[index].name;
            localStorage.removeItem(backupName);
            backups.splice(index, 1);
            localStorage.setItem('systemBackups', JSON.stringify(backups));
            loadBackups();
        }
        
        loadBackups();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
