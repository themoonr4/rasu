<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Sentiment Analysis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        .sentiment-result{background:#1a1a1a;padding:1rem;border-radius:12px;text-align:center;}
        .positive{color:#28a745;}
        .negative{color:#dc3545;}
        .neutral{color:#ffc107;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-chart-line"></i> Sentiment Analysis Tool</h1>
        
        <div class="card">
            <h3>Enter Text for Analysis</h3>
            <textarea id="sentimentText" rows="5" placeholder="Enter news article or comment for sentiment analysis..."></textarea>
            <button onclick="analyzeSentiment()">Analyze Sentiment</button>
            <div id="sentimentResult" class="sentiment-result" style="margin-top:1rem;"></div>
        </div>
        
        <div class="card">
            <h3>Recent Analyses</h3>
            <div id="recentAnalysis"></div>
        </div>
    </div>
    <script>
        let analyses = JSON.parse(localStorage.getItem('sentimentAnalyses') || '[]');
        
        function analyzeSentiment() {
            const text = document.getElementById('sentimentText').value;
            if(!text) { alert('Enter text to analyze'); return; }
            
            const positiveWords = ['good', 'great', 'excellent', 'amazing', 'wonderful', 'best', 'love', 'happy', 'positive'];
            const negativeWords = ['bad', 'terrible', 'awful', 'worst', 'hate', 'sad', 'negative', 'poor', 'disappointing'];
            
            const words = text.toLowerCase().split(/\s+/);
            let positiveScore = words.filter(w => positiveWords.includes(w)).length;
            let negativeScore = words.filter(w => negativeWords.includes(w)).length;
            
            let sentiment = 'neutral';
            let sentimentClass = 'neutral';
            if(positiveScore > negativeScore) { sentiment = 'Positive'; sentimentClass = 'positive'; }
            else if(negativeScore > positiveScore) { sentiment = 'Negative'; sentimentClass = 'negative'; }
            
            const confidence = Math.floor(Math.random() * 30) + 70;
            
            analyses.unshift({ text: text.substring(0, 100), sentiment, confidence, date: new Date().toLocaleString() });
            if(analyses.length > 5) analyses.pop();
            localStorage.setItem('sentimentAnalyses', JSON.stringify(analyses));
            
            document.getElementById('sentimentResult').innerHTML = `
                <div>Sentiment: <span class="${sentimentClass}"><strong>${sentiment}</strong></span></div>
                <div>Confidence: ${confidence}%</div>
                <div>Positive Score: ${positiveScore} | Negative Score: ${negativeScore}</div>
            `;
            
            const recentDiv = document.getElementById('recentAnalysis');
            recentDiv.innerHTML = analyses.map(a => `<div class="sentiment-result" style="margin-bottom:0.5rem;">${a.date}: "${a.text}..." - <span class="${a.sentiment.toLowerCase()}">${a.sentiment}</span></div>`).join('');
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
