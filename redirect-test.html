<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Redirect Tester</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:1rem;}
        button{background:#dc2626;color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;margin-right:0.5rem;}
        .result{background:#1a1a1a;padding:1rem;border-radius:8px;margin-top:1rem;font-family:monospace;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-arrow-right"></i> Redirect Tester</h1>
        
        <div class="card">
            <h3>Test URL Redirect</h3>
            <input type="text" id="testUrl" placeholder="Enter URL to test (e.g., /old-page)">
            <div>
                <button onclick="testRedirect()">Test Redirect</button>
                <button onclick="createRedirect()">Create Redirect Rule</button>
            </div>
            <div id="redirectResult" class="result" style="display:none;"></div>
        </div>
        
        <div class="card">
            <h3>Existing Redirect Rules</h3>
            <div id="redirectList"></div>
        </div>
    </div>
    <script>
        let redirects = JSON.parse(localStorage.getItem('redirects') || '[]');
        
        function loadRedirects() {
            const listDiv = document.getElementById('redirectList');
            if(redirects.length === 0) { listDiv.innerHTML = '<p>No redirect rules</p>'; return; }
            listDiv.innerHTML = redirects.map(r => `<div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid #222;"><span>${r.from} → ${r.to}</span><button onclick="deleteRedirect('${r.from}')" style="padding:0.2rem 0.5rem;">Delete</button></div>`).join('');
        }
        
        async function testRedirect() {
            const url = document.getElementById('testUrl').value;
            const resultDiv = document.getElementById('redirectResult');
            if(!url) { alert('Enter URL'); return; }
            try {
                const response = await fetch(url, { method: 'HEAD', redirect: 'manual' });
                resultDiv.innerHTML = `<strong>URL:</strong> ${url}<br><strong>Status:</strong> ${response.status}<br><strong>Redirected:</strong> ${response.redirected ? 'Yes' : 'No'}`;
                resultDiv.style.display = 'block';
            } catch(e) { resultDiv.innerHTML = `<strong>Error:</strong> ${e.message}`; resultDiv.style.display = 'block'; }
        }
        
        function createRedirect() {
            const from = document.getElementById('testUrl').value;
            if(!from) { alert('Enter source URL'); return; }
            const to = prompt('Enter destination URL:', '/');
            if(to) { redirects.push({ from, to }); localStorage.setItem('redirects', JSON.stringify(redirects)); loadRedirects(); alert('Redirect created!'); }
        }
        
        function deleteRedirect(from) { redirects = redirects.filter(r => r.from !== from); localStorage.setItem('redirects', JSON.stringify(redirects)); loadRedirects(); }
        
        loadRedirects();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
