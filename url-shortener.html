<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - URL Shortener</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .short-url{background:#1a1a1a;padding:1rem;border-radius:8px;margin-top:1rem;word-break:break-all;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-link"></i> URL Shortener</h1>
        
        <div class="card">
            <h3>Shorten URL</h3>
            <input type="text" id="longUrl" placeholder="Enter long URL">
            <button onclick="shortenUrl()">Shorten URL</button>
            <div id="shortResult" class="short-url" style="display:none;"></div>
        </div>
        
        <div class="card">
            <h3>My Shortened URLs</h3>
            <div id="urlList"></div>
        </div>
    </div>
    <script>
        let urls = JSON.parse(localStorage.getItem('shortUrls') || '[]');
        
        function loadUrls() {
            const listDiv = document.getElementById('urlList');
            if(urls.length === 0) { listDiv.innerHTML = '<p>No shortened URLs yet</p>'; return; }
            listDiv.innerHTML = urls.map(u => `<div style="padding:0.5rem;border-bottom:1px solid #222;"><a href="${u.short}" target="_blank">${u.short}</a><br><small>${u.long}</small><div>Clicks: ${u.clicks || 0}</div></div>`).join('');
        }
        
        function shortenUrl() {
            const longUrl = document.getElementById('longUrl').value;
            if(!longUrl) { alert('Enter URL'); return; }
            const shortCode = Math.random().toString(36).substring(2, 8);
            const shortUrl = `${window.location.origin}/s/${shortCode}`;
            urls.unshift({ long: longUrl, short: shortUrl, code: shortCode, clicks: 0, date: new Date().toISOString() });
            localStorage.setItem('shortUrls', JSON.stringify(urls));
            document.getElementById('shortResult').innerHTML = `<strong>Short URL:</strong><br><a href="${shortUrl}" target="_blank">${shortUrl}</a><br><button onclick="copyToClipboard('${shortUrl}')">Copy</button>`;
            document.getElementById('shortResult').style.display = 'block';
            document.getElementById('longUrl').value = '';
            loadUrls();
        }
        
        function copyToClipboard(text) { navigator.clipboard.writeText(text); alert('Copied!'); }
        
        loadUrls();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
