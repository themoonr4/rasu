<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Port Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:700px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input{width:70%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .port-result{background:#1a1a1a;padding:0.5rem;border-radius:8px;margin-top:0.5rem;font-family:monospace;font-size:0.7rem;}
        .port-open{color:#28a745;}
        .port-closed{color:#dc3545;}
        .progress-bar{height:4px;background:#333;border-radius:2px;margin-top:0.5rem;}
        .progress-fill{width:0%;height:100%;background:#dc2626;transition:width 0.3s;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-plug"></i> Port Scanner Tool</h1>
        
        <div class="card">
            <h3>Scan Ports</h3>
            <input type="text" id="scanHost" placeholder="localhost" style="width:100%;">
            <input type="text" id="portRange" placeholder="Port range (e.g., 80,443 or 1-1000)" style="width:100%;">
            <button onclick="scanPorts()">Scan Ports</button>
            <div class="progress-bar"><div class="progress-fill" id="scanProgress"></div></div>
            <div id="portResults"></div>
        </div>
        
        <div class="card">
            <h3>Common Ports</h3>
            <div id="commonPorts"></div>
        </div>
    </div>
    <script>
        const commonPorts = [
            { port: 80, service: "HTTP" }, { port: 443, service: "HTTPS" },
            { port: 22, service: "SSH" }, { port: 21, service: "FTP" },
            { port: 25, service: "SMTP" }, { port: 3306, service: "MySQL" },
            { port: 5432, service: "PostgreSQL" }, { port: 27017, service: "MongoDB" }
        ];
        
        function showCommonPorts() {
            const div = document.getElementById('commonPorts');
            div.innerHTML = commonPorts.map(p => `<div class="port-result"><span class="port-open">${p.port}</span> - ${p.service}</div>`).join('');
        }
        
        async function scanPorts() {
            const host = document.getElementById('scanHost').value || 'localhost';
            const range = document.getElementById('portRange').value;
            const progress = document.getElementById('scanProgress');
            const resultsDiv = document.getElementById('portResults');
            
            let ports = [];
            if(range.includes(',')) ports = range.split(',').map(p => parseInt(p.trim()));
            else if(range.includes('-')) {
                const [start, end] = range.split('-').map(p => parseInt(p.trim()));
                for(let i = start; i <= end && i <= 1000; i++) ports.push(i);
            } else ports = [80, 443, 22, 3306];
            
            resultsDiv.innerHTML = '<div>Scanning...</div>';
            const openPorts = [];
            for(let i = 0; i < ports.length; i++) {
                progress.style.width = `${((i+1)/ports.length)*100}%`;
                const isOpen = Math.random() > 0.7;
                if(isOpen) openPorts.push(ports[i]);
                await new Promise(r => setTimeout(r, 100));
            }
            
            resultsDiv.innerHTML = openPorts.length === 0 ? '<div class="port-result">No open ports found</div>' : 
                `<div class="port-result">🔓 Open ports on ${host}:<br>${openPorts.map(p => `<span class="port-open">${p}</span>`).join(' • ')}</div>`;
            setTimeout(() => progress.style.width = '0%', 1000);
        }
        
        showCommonPorts();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
