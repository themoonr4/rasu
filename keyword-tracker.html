<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Keyword Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input{width:70%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .keyword-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        .rank-up{color:#28a745;}
        .rank-down{color:#dc3545;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-chart-simple"></i> Keyword Rank Tracker</h1>
        
        <div class="card">
            <h3>Track New Keyword</h3>
            <input type="text" id="keywordName" placeholder="Enter keyword">
            <button onclick="addKeyword()">Track Keyword</button>
        </div>
        
        <div class="card">
            <h3>Tracked Keywords</h3>
            <div id="keywordList"></div>
        </div>
    </div>
    <script>
        let keywords = JSON.parse(localStorage.getItem('trackedKeywords') || '[]');
        
        function loadKeywords() {
            const listDiv = document.getElementById('keywordList');
            if(keywords.length === 0) { listDiv.innerHTML = '<p>No keywords tracked</p>'; return; }
            listDiv.innerHTML = keywords.map((k, i) => {
                const rankChange = k.oldRank ? (k.oldRank - k.rank) : 0;
                return `
                    <div class="keyword-item">
                        <div><strong>${k.keyword}</strong><br><small>Current Rank: #${k.rank} | Search Volume: ${k.volume}</small></div>
                        <div><span class="${rankChange > 0 ? 'rank-up' : rankChange < 0 ? 'rank-down' : ''}">${rankChange !== 0 ? (rankChange > 0 ? '↑' : '↓') + Math.abs(rankChange) : '→'}</span><button onclick="updateRank(${i})" style="margin-left:0.5rem;">Update</button><button onclick="deleteKeyword(${i})" style="background:#dc3545;">Delete</button></div>
                    </div>
                `;
            }).join('');
        }
        
        function addKeyword() {
            const keyword = document.getElementById('keywordName').value;
            if(!keyword) { alert('Enter keyword'); return; }
            const rank = Math.floor(Math.random() * 30) + 1;
            const volume = Math.floor(Math.random() * 5000) + 100;
            keywords.push({ keyword, rank, volume, oldRank: rank, date: new Date().toLocaleString() });
            localStorage.setItem('trackedKeywords', JSON.stringify(keywords));
            document.getElementById('keywordName').value = '';
            loadKeywords();
        }
        
        function updateRank(index) {
            const newRank = Math.floor(Math.random() * 30) + 1;
            keywords[index].oldRank = keywords[index].rank;
            keywords[index].rank = newRank;
            keywords[index].lastUpdate = new Date().toLocaleString();
            localStorage.setItem('trackedKeywords', JSON.stringify(keywords));
            loadKeywords();
        }
        
        function deleteKeyword(index) {
            keywords.splice(index, 1);
            localStorage.setItem('trackedKeywords', JSON.stringify(keywords));
            loadKeywords();
        }
        
        loadKeywords();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
