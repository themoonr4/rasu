<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Web Push</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .subscriber-count{font-size:2rem;font-weight:700;display:inline-block;margin-left:1rem;}
        input,textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-bell"></i> Web Push Notifications</h1>
        
        <div class="card">
            <h3>Total Subscribers <span class="subscriber-count" id="subCount">0</span></h3>
            <button onclick="requestPermission()">Request Permission</button>
            <button onclick="testNotification()">Send Test</button>
        </div>
        
        <div class="card">
            <h3>Send Push Notification</h3>
            <input type="text" id="pushTitle" placeholder="Notification Title (e.g., Breaking News)">
            <textarea id="pushBody" rows="3" placeholder="Notification message..."></textarea>
            <input type="text" id="pushUrl" placeholder="Click URL (optional)">
            <button onclick="sendPush()">Send to All Subscribers</button>
            <div id="pushMsg"></div>
        </div>
    </div>
    <script>
        let subscribers = JSON.parse(localStorage.getItem('pushSubscribers') || '[]');
        document.getElementById('subCount').innerHTML = subscribers.length;
        
        function requestPermission() {
            if('Notification' in window) {
                Notification.requestPermission().then(perm => {
                    if(perm === 'granted') {
                        const subId = `sub_${Date.now()}`;
                        subscribers.push({ id: subId, date: new Date().toLocaleString() });
                        localStorage.setItem('pushSubscribers', JSON.stringify(subscribers));
                        document.getElementById('subCount').innerHTML = subscribers.length;
                        alert('Subscribed to notifications!');
                    }
                });
            } else { alert('Notifications not supported'); }
        }
        
        function testNotification() {
            if(Notification.permission === 'granted') {
                new Notification('THE MOON Test', { body: 'This is a test notification from THE MOON', icon: '/assets/logo.svg' });
            } else { alert('Enable notifications first'); }
        }
        
        function sendPush() {
            const title = document.getElementById('pushTitle').value || 'THE MOON News';
            const body = document.getElementById('pushBody').value;
            const url = document.getElementById('pushUrl').value;
            if(!body) { alert('Enter message'); return; }
            if(Notification.permission === 'granted') {
                new Notification(title, { body: body, icon: '/assets/logo.svg', data: { url: url } });
                document.getElementById('pushMsg').innerHTML = '<div style="color:#28a745;margin-top:0.5rem;">✅ Notification sent to current tab</div>';
                setTimeout(() => document.getElementById('pushMsg').innerHTML = '', 3000);
            } else { alert('No subscribers. Request permission first.'); }
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
