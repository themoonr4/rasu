<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Custom CSS Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .editor-container{display:flex;flex-direction:column;gap:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-family:monospace;font-size:0.8rem;min-height:300px;}
        .preview-area{background:#1a1a1a;padding:1rem;border-radius:8px;margin-top:1rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-code"></i> Custom CSS Editor</h1>
        
        <div class="card">
            <h3>Custom CSS</h3>
            <textarea id="customCss" placeholder="/* Add your custom CSS here */&#10;&#10;.news-title {&#10;    font-size: 1.2rem;&#10;    color: #c00000;&#10;}"></textarea>
            <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
                <button onclick="saveCSS()">Save CSS</button>
                <button onclick="previewCSS()">Preview</button>
                <button onclick="resetCSS()">Reset</button>
            </div>
        </div>
        
        <div class="card">
            <h3>Live Preview</h3>
            <div class="preview-area" id="previewArea">
                <div class="news-title">Sample News Title</div>
                <div class="news-content">This is how your custom CSS will look</div>
            </div>
        </div>
        
        <div class="card">
            <h3>CSS Examples</h3>
            <button onclick="loadExample('dark')">Dark Theme CSS</button>
            <button onclick="loadExample('typography')">Typography CSS</button>
            <button onclick="loadExample('cards')">Card Styles</button>
        </div>
    </div>
    <script>
        function loadCSS() {
            const saved = localStorage.getItem('customCSS');
            if(saved) document.getElementById('customCss').value = saved;
        }
        
        function saveCSS() {
            const css = document.getElementById('customCss').value;
            localStorage.setItem('customCSS', css);
            applyCSS(css);
            alert('CSS saved!');
        }
        
        function previewCSS() {
            const css = document.getElementById('customCss').value;
            applyCSS(css);
        }
        
        function applyCSS(css) {
            let styleTag = document.getElementById('livePreviewStyle');
            if(!styleTag) {
                styleTag = document.createElement('style');
                styleTag.id = 'livePreviewStyle';
                document.head.appendChild(styleTag);
            }
            styleTag.innerHTML = css;
        }
        
        function resetCSS() {
            document.getElementById('customCss').value = '';
            localStorage.removeItem('customCSS');
            const styleTag = document.getElementById('livePreviewStyle');
            if(styleTag) styleTag.innerHTML = '';
            alert('CSS reset to default');
        }
        
        function loadExample(type) {
            const examples = {
                dark: 'body { background: #0a0a0a; color: #fff; } .news-title { color: #dc2626; }',
                typography: '.news-title { font-family: "Georgia", serif; font-size: 1.5rem; } .news-content { line-height: 1.6; }',
                cards: '.news-card { background: linear-gradient(135deg, #1a1a1a, #0a0a0a); border-radius: 16px; padding: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }'
            };
            document.getElementById('customCss').value = examples[type];
            previewCSS();
        }
        
        loadCSS();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
