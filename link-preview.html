<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Link Preview Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:700px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input,textarea{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .preview-card{background:#1a1a1a;border-radius:12px;overflow:hidden;margin-top:1rem;}
        .preview-image{height:150px;background:linear-gradient(135deg,#dc2626,#4f46e5);display:flex;align-items:center;justify-content:center;color:#fff;}
        .preview-title{padding:0.75rem;font-weight:bold;font-size:1rem;}
        .preview-desc{padding:0 0.75rem 0.75rem;font-size:0.7rem;color:#aaa;}
        .preview-url{padding:0 0.75rem 0.75rem;font-size:0.6rem;color:#666;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-link"></i> Social Link Preview Generator</h1>
        
        <div class="card">
            <h3>Link Details</h3>
            <input type="text" id="previewTitle" placeholder="Page Title (60-70 chars)">
            <textarea id="previewDesc" rows="3" placeholder="Meta Description (150-160 chars)"></textarea>
            <input type="text" id="previewUrl" placeholder="Page URL">
            <input type="text" id="previewImage" placeholder="Image URL (1200x630px recommended)">
            <button onclick="generatePreview()">Generate Preview</button>
            <div id="previewResult"></div>
        </div>
        
        <div class="card">
            <h3>Meta Tags Code</h3>
            <div id="metaCode" class="result" style="background:#1a1a1a;padding:0.5rem;border-radius:8px;font-family:monospace;font-size:0.6rem;"></div>
            <button onclick="copyMetaCode()">Copy Meta Tags</button>
        </div>
    </div>
    <script>
        function generatePreview() {
            const title = document.getElementById('previewTitle').value;
            const desc = document.getElementById('previewDesc').value;
            const url = document.getElementById('previewUrl').value;
            const image = document.getElementById('previewImage').value;
            
            const previewDiv = document.getElementById('previewResult');
            previewDiv.innerHTML = `
                <div class="preview-card">
                    <div class="preview-image" style="background-image:url(${image});background-size:cover;">${!image ? 'THE MOON' : ''}</div>
                    <div class="preview-title">${title || 'THE MOON - World Class News'}</div>
                    <div class="preview-desc">${desc || 'Latest news and updates from around the world'}</div>
                    <div class="preview-url">${url || 'themoon.news'}</div>
                </div>
            `;
            
            const metaTags = `<!-- Primary Meta Tags -->\n<title>${title || 'THE MOON - World Class News'}</title>\n<meta name="title" content="${title || 'THE MOON'}">\n<meta name="description" content="${desc || 'Latest news and updates'}">\n\n<!-- Open Graph / Facebook -->\n<meta property="og:type" content="website">\n<meta property="og:url" content="${url || window.location.href}">\n<meta property="og:title" content="${title || 'THE MOON'}">\n<meta property="og:description" content="${desc || 'Latest news'}">\n<meta property="og:image" content="${image || '/assets/logo.svg'}">\n\n<!-- Twitter -->\n<meta property="twitter:card" content="summary_large_image">\n<meta property="twitter:url" content="${url || window.location.href}">\n<meta property="twitter:title" content="${title || 'THE MOON'}">\n<meta property="twitter:description" content="${desc || 'Latest news'}">\n<meta property="twitter:image" content="${image || '/assets/logo.svg'}">`;
            
            document.getElementById('metaCode').innerHTML = metaTags;
        }
        
        function copyMetaCode() {
            const code = document.getElementById('metaCode').innerText;
            navigator.clipboard.writeText(code);
            alert('Meta tags copied!');
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
