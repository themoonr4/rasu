<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Search Results</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
        }

        [data-theme="light"] {
            background: #f5f5f5;
            color: #1a1a1a;
        }

        .header {
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            z-index: 100;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .search-box input {
            flex: 1;
            padding: 0.75rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }

        .search-box button {
            background: #dc2626;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .result-item {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-item:hover {
            background: #1a1a1a;
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .result-excerpt {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 0.5rem;
        }

        .result-meta {
            font-size: 0.7rem;
            color: #666;
        }

        .loader {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #222;
            border-top-color: #dc2626;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            border: 1px solid #333;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <a href="/" class="logo">🌙 THE MOON</a>
            <button id="themeToggle" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">🌙</button>
        </div>
    </div>

    <div class="container">
        <div class="back-btn" onclick="location.href='/'"><i class="fas fa-arrow-left"></i> Back to Home</div>
        
        <h1><i class="fas fa-search"></i> Search News</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search for news...">
            <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cjyfmhsodmbudjbxjbek.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_RPIMDVsM_8kpbqSlTUmnVw_m7k7K4Cv';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function searchNews(query) {
            const resultsDiv = document.getElementById('results');
            if (!query || query.length < 2) {
                resultsDiv.innerHTML = '<div class="loader">Enter at least 2 characters to search</div>';
                return;
            }

            resultsDiv.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

            const { data, error } = await supabase
                .from('news')
                .select('*, categories(*)')
                .eq('status', 'published')
                .ilike('title', `%${query}%`)
                .order('published_at', { ascending: false })
                .limit(30);

            if (error || !data || data.length === 0) {
                resultsDiv.innerHTML = '<div style="text-align: center; padding: 2rem; color: #aaa;">No results found for "' + query + '"</div>';
                return;
            }

            resultsDiv.innerHTML = data.map(article => `
                <div class="result-item" onclick="location.href='/article.html?id=${article.id}'">
                    <div class="result-title">${article.title}</div>
                    <div class="result-excerpt">${article.excerpt || article.content?.substring(0, 120)}...</div>
                    <div class="result-meta">
                        ${article.categories?.name} | ${new Date(article.published_at).toLocaleDateString()} | 👁️ ${article.views || 0} views
                    </div>
                </div>
            `).join('');
        }

        // Get query from URL
        const urlParams = new URLSearchParams(window.location.search);
        const queryParam = urlParams.get('q');
        if (queryParam) {
            document.getElementById('searchInput').value = queryParam;
            searchNews(queryParam);
        }

        document.getElementById('searchBtn').addEventListener('click', () => {
            const query = document.getElementById('searchInput').value;
            if (query) {
                window.history.pushState({}, '', `?q=${encodeURIComponent(query)}`);
                searchNews(query);
            }
        });

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('searchBtn').click();
            }
        });

        // Theme toggle
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeToggle');
            if (body.hasAttribute('data-theme')) {
                body.removeAttribute('data-theme');
                btn.innerHTML = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                btn.innerHTML = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        if (localStorage.getItem('theme') === 'light') {
            document.body.setAttribute('data-theme', 'light');
            document.getElementById('themeToggle').innerHTML = '☀️';
        }
    </script>
</body>
</html>
