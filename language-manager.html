<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Language Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .lang-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        select,button{padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;cursor:pointer;}
        button{background:#dc2626;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-language"></i> Language Manager</h1>
        
        <div class="card">
            <h3>Add Language</h3>
            <select id="newLangCode">
                <option value="en">English</option>
                <option value="hi">हिंदी</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="zh">中文</option>
            </select>
            <button onclick="addLanguage()">Add Language</button>
        </div>
        
        <div class="card">
            <h3>Active Languages</h3>
            <div id="langList"></div>
        </div>
        
        <div class="card">
            <h3>Default Language</h3>
            <select id="defaultLang" onchange="setDefaultLang()"></select>
        </div>
    </div>
    <script>
        let languages = JSON.parse(localStorage.getItem('siteLanguages') || '[{"code":"en","name":"English","active":true},{"code":"hi","name":"हिंदी","active":true}]');
        
        function loadLanguages() {
            const listDiv = document.getElementById('langList');
            const defaultSelect = document.getElementById('defaultLang');
            listDiv.innerHTML = languages.map((lang, i) => `
                <div class="lang-item">
                    <div><strong>${lang.name}</strong><br><small>${lang.code}</small></div>
                    <div>
                        <button onclick="toggleLanguage(${i})">${lang.active ? 'Disable' : 'Enable'}</button>
                        <button onclick="deleteLanguage(${i})" style="background:#dc3545;">Delete</button>
                    </div>
                </div>
            `).join('');
            
            defaultSelect.innerHTML = languages.filter(l => l.active).map(l => `<option value="${l.code}" ${localStorage.getItem('defaultLanguage') === l.code ? 'selected' : ''}>${l.name}</option>`).join('');
        }
        
        function addLanguage() {
            const code = document.getElementById('newLangCode').value;
            const names = { en:'English', hi:'हिंदी', es:'Español', fr:'Français', de:'Deutsch', zh:'中文' };
            if(languages.find(l => l.code === code)) { alert('Language already exists'); return; }
            languages.push({ code, name: names[code], active: true });
            localStorage.setItem('siteLanguages', JSON.stringify(languages));
            loadLanguages();
        }
        
        function toggleLanguage(index) {
            languages[index].active = !languages[index].active;
            localStorage.setItem('siteLanguages', JSON.stringify(languages));
            loadLanguages();
        }
        
        function deleteLanguage(index) {
            languages.splice(index, 1);
            localStorage.setItem('siteLanguages', JSON.stringify(languages));
            loadLanguages();
        }
        
        function setDefaultLang() {
            const lang = document.getElementById('defaultLang').value;
            localStorage.setItem('defaultLanguage', lang);
            alert('Default language updated');
        }
        
        loadLanguages();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
