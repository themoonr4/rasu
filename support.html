<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Support Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:1000px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .support-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.5rem;margin:2rem 0;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;text-align:center;}
        .card i{font-size:2rem;color:#dc2626;margin-bottom:1rem;}
        .card h3{margin-bottom:0.5rem;}
        .ticket-form{background:#111;border:1px solid #222;border-radius:16px;padding:2rem;margin-top:2rem;}
        input,textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:1rem;}
        button{background:#dc2626;color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
        .ticket-list{background:#111;border-radius:12px;margin-top:1rem;}
        .ticket-item{padding:1rem;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-headset"></i> Support Center</h1>
        
        <div class="support-grid">
            <div class="card"><i class="fas fa-book"></i><h3>Knowledge Base</h3><p>Guides & tutorials</p><button onclick="location.href='/faq.html'">Browse</button></div>
            <div class="card"><i class="fas fa-ticket-alt"></i><h3>Submit Ticket</h3><p>Get personalized help</p><button onclick="document.getElementById('ticketForm').scrollIntoView({behavior:'smooth'})">Create Ticket</button></div>
            <div class="card"><i class="fas fa-comments"></i><h3>Live Chat</h3><p>Chat with support</p><button onclick="alert('Chat available 9AM-6PM')">Start Chat</button></div>
        </div>
        
        <div class="ticket-form" id="ticketForm">
            <h2>Submit a Ticket</h2>
            <input type="text" id="ticketName" placeholder="RAKESH KUMAR">
            <input type="email" id="ticketEmail" placeholder="themoonr4@gmail.com">
            <input type="text" id="ticketSubject" placeholder="For Any Issues">
            <textarea id="ticketMessage" rows="4" placeholder="Describe your issue"></textarea>
            <button onclick="submitTicket()">Submit Ticket</button>
            <div id="ticketMsg"></div>
        </div>
        
        <h2 style="margin-top:2rem;">My Tickets</h2>
        <div class="ticket-list" id="ticketList"></div>
    </div>
    <script>
        let tickets = JSON.parse(localStorage.getItem('supportTickets') || '[]');
        
        function loadTickets() {
            const listDiv = document.getElementById('ticketList');
            if(tickets.length === 0) { listDiv.innerHTML = '<div style="padding:1rem;text-align:center;">No tickets yet</div>'; return; }
            listDiv.innerHTML = tickets.map(t => `<div class="ticket-item"><div><strong>${t.subject}</strong><br><small>${t.date}</small></div><div style="color:${t.status === 'open' ? '#ffc107' : '#28a745'}">${t.status}</div></div>`).join('');
        }
        
        function submitTicket() {
            const name = document.getElementById('ticketName').value;
            const email = document.getElementById('ticketEmail').value;
            const subject = document.getElementById('ticketSubject').value;
            const message = document.getElementById('ticketMessage').value;
            const msgDiv = document.getElementById('ticketMsg');
            if(!name || !email || !subject || !message) { msgDiv.innerHTML = '<div style="color:#dc3545;">All fields required</div>'; setTimeout(()=>msgDiv.innerHTML='',3000); return; }
            tickets.unshift({ name, email, subject, message, date: new Date().toLocaleString(), status: 'open' });
            localStorage.setItem('supportTickets', JSON.stringify(tickets));
            msgDiv.innerHTML = '<div style="color:#28a745;">✅ Ticket submitted! We\'ll reply soon.</div>';
            document.getElementById('ticketName').value = ''; document.getElementById('ticketEmail').value = ''; document.getElementById('ticketSubject').value = ''; document.getElementById('ticketMessage').value = '';
            loadTickets();
            setTimeout(()=>msgDiv.innerHTML='',3000);
        }
        
        loadTickets();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
