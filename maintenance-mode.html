<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Maintenance Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .toggle-switch{position:relative;display:inline-block;width:60px;height:30px;}
        .toggle-switch input{opacity:0;width:0;height:0;}
        .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#333;transition:0.3s;border-radius:30px;}
        .slider:before{position:absolute;content:"";height:22px;width:22px;left:4px;bottom:4px;background-color:white;transition:0.3s;border-radius:50%;}
        input:checked+.slider{background-color:#dc2626;}
        input:checked+.slider:before{transform:translateX(30px);}
        .status-badge{display:inline-block;padding:0.25rem 0.75rem;border-radius:20px;font-size:0.8rem;}
        .active{background:#28a745;}
        .inactive{background:#dc3545;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-wrench"></i> Maintenance Mode Control</h1>
        
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div><h3>Maintenance Mode</h3><p>When enabled, visitors see maintenance page</p></div>
                <label class="toggle-switch"><input type="checkbox" id="maintenanceToggle" onchange="toggleMaintenance()"><span class="slider"></span></label>
            </div>
            <div id="statusMsg" style="margin-top:1rem;"></div>
        </div>
        
        <div class="card">
            <h3>Maintenance Message</h3>
            <textarea id="maintenanceMessage" rows="4" style="width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;"></textarea>
            <button onclick="saveMessage()">Save Message</button>
        </div>
        
        <div class="card">
            <h3>Schedule Maintenance</h3>
            <input type="datetime-local" id="scheduleTime" style="width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;">
            <button onclick="scheduleMaintenance()">Schedule</button>
        </div>
    </div>
    <script>
        function toggleMaintenance() {
            const isEnabled = document.getElementById('maintenanceToggle').checked;
            localStorage.setItem('maintenanceMode', isEnabled);
            const msgDiv = document.getElementById('statusMsg');
            msgDiv.innerHTML = `<div style="background:${isEnabled ? '#dc3545' : '#28a745'};padding:0.5rem;border-radius:8px;">Maintenance mode ${isEnabled ? 'ENABLED' : 'DISABLED'}</div>`;
            setTimeout(() => msgDiv.innerHTML = '', 3000);
        }
        
        function saveMessage() {
            const msg = document.getElementById('maintenanceMessage').value;
            localStorage.setItem('maintenanceMessage', msg);
            alert('Message saved!');
        }
        
        function scheduleMaintenance() {
            const time = document.getElementById('scheduleTime').value;
            if(!time) { alert('Select time'); return; }
            localStorage.setItem('scheduledMaintenance', time);
            alert(`Maintenance scheduled for ${new Date(time).toLocaleString()}`);
        }
        
        document.getElementById('maintenanceToggle').checked = localStorage.getItem('maintenanceMode') === 'true';
        document.getElementById('maintenanceMessage').value = localStorage.getItem('maintenanceMessage') || 'We are currently performing scheduled maintenance. Please check back soon.';
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
