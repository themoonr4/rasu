<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE MOON - Read Article</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body{background:#0a0a0a;font-family:Arial;color:#fff;padding:20px;}
        .container{max-width:700px;margin:0 auto;}
        .card{background:#111;padding:20px;border-radius:12px;}
        h1{color:#dc2626;}
        .loader{text-align:center;padding:40px;color:#ffc107;}
        .back-btn{background:#dc2626;padding:10px 20px;border-radius:8px;text-decoration:none;color:#fff;display:inline-block;margin-bottom:20px;}
        .error{color:#dc3545;text-align:center;padding:40px;}
        img{max-width:100%;border-radius:8px;margin:15px 0;}
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Back to Home</a>
        <div id="articleCard" class="card">
            <div class="loader">📡 Loading article...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qrtiapjrslubbbuucpen.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Um_UlotzRIAPivm1GErr-A_S_-gJyz9';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        async function loadArticle() {
            const cardDiv = document.getElementById('articleCard');
            
            if (!articleId) {
                cardDiv.innerHTML = '<div class="error">❌ No article ID found in URL</div>';
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('news')
                    .select('*')
                    .eq('id', parseInt(articleId))
                    .single();

                if (error) {
                    cardDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
                    return;
                }

                if (!data) {
                    cardDiv.innerHTML = '<div class="error">❌ Article not found</div>';
                    return;
                }

                const categoryNames = {1:'💻 Technology',2:'🏏 Sports',3:'📊 Business',4:'🏛️ Politics',5:'📚 Study'};
                const category = categoryNames[data.category_id] || '📰 News';
                const formattedDate = new Date(data.created_at).toLocaleDateString();

                cardDiv.innerHTML = `
                    <h1>📰 ${data.title}</h1>
                    <div style="color:#aaa; margin-bottom:15px;">📅 ${formattedDate} | 👁️ ${data.views || 0} views | 🏷️ ${category}</div>
                    ${data.featured_image ? `<img src="${data.featured_image}" alt="News image" onerror="this.style.display='none'">` : ''}
                    <div style="line-height:1.6;">${data.content || data.excerpt}</div>
                `;
            } catch (err) {
                cardDiv.innerHTML = `<div class="error">❌ Connection error: ${err.message}</div>`;
            }
        }

        loadArticle();
    </script>
</body>
</html>
