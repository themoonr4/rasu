    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --primary: #dc2626;
            --primary-dark: #b91c1c;
            --secondary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius: 0.75rem;
        }
        
        [data-theme="dark"] {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --border: #2a2a2a;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: all 0.3s ease;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
        
        /* Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--purple));
            z-index: 1001;
            transition: width 0.1s;
        }
        
        /* Reading Progress Circle */
        .reading-progress-circle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99;
            cursor: pointer;
            box-shadow: var(--shadow-md);
        }
        
        .reading-progress-circle span {
            font-size: 12px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Header */
        .header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .icon-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 40px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        
        .icon-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .bookmarked {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }
        
        /* Layout */
        .article-wrapper {
            display: flex;
            gap: 30px;
            margin: 30px 0;
        }
        
        .main-content {
            flex: 1;
            min-width: 0;
        }
        
        .sidebar {
            width: 300px;
            flex-shrink: 0;
        }
        
        @media (max-width: 768px) {
            .article-wrapper {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
            .floating-actions {
                position: fixed;
                bottom: 20px;
                right: 20px;
                flex-direction: column;
                background: var(--bg-card);
                border-radius: 40px;
                padding: 10px;
                box-shadow: var(--shadow-lg);
                z-index: 98;
            }
        }
        
        /* Article Card */
        .article-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }
        
        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-secondary);
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: var(--text-primary);
            margin-bottom: 20px;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        
        .back-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateX(-5px);
        }
        
        /* Article Title */
        .article-title {
            font-size: 2.2rem;
            line-height: 1.3;
            margin-bottom: 20px;
            color: var(--text-primary);
        }
        
        @media (max-width: 768px) {
            .article-title { font-size: 1.5rem; }
        }
        
        /* Meta Info */

            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.85rem;

        .article-meta span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        /* AI Summary */

            padding: 20px;

            border-radius: 20px;

            position: relative;
        }
        
        .featured-image img {

            padding: 5px 10px;
            border-radius: 20px;

            font-size: 11px;

        /* Article Content */

        }

        .article-content h3 { font-size: 1.3rem; margin: 1.2rem 0 0.8rem; }
        .article-content img { max-width: 100%; border-radius: 12px; margin: 1rem 0; }
        .article-content iframe { width: 100%; border-radius: 12px; margin: 1rem 0; }
        .article-content blockquote {
            border-left: 4px solid var(--primary);
            padding-left: 1rem;
            margin: 1rem 0;
            font-style: italic;
        }
        
        /* Selection Share */
        ::selection {

            color: white;
        }
        
        .selection-tooltip {
            position: fixed;
            background: var(--bg-card);

        .selection-tooltip button {

            padding: 5px;
        }

        .reading-time {

            align-items: center;

            padding: 5px 12px;
            border-radius: 20px;

            margin-left: 10px;
        }
        
        /* Floating Actions */
        .floating-actions {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 99;
        }
        
        .floating-actions .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;

        .floating-actions .action-btn:hover {

            color: white;
            transform: scale(1.1);
        }
        
        .floating-actions .action-btn.liked {

        }
        
        /* Social Proof */
        .social-proof {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--bg-secondary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;

        /* Author Box */
        .author-box {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid var(--border);
        }
        
        /* Related Articles */
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        
        .related-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .related-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }
        
        /* Comments */
        .comments-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }
        
        .comment {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        /* Print Styles */
        @media print {
            .header, .sidebar, .floating-actions, .back-btn, .comments-section, .footer, .reading-progress-circle, .progress-bar {
                display: none !important;
            }
            .article-card {
                padding: 0;
                box-shadow: none;
            }
            body {
                background: white;
                color: black;
            }
        }
        
        /* Keyboard Shortcuts Hint */
        .shortcuts-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 10px;
            font-size: 10px;
            color: var(--text-muted);
            z-index: 98;
        }
        
        @media (max-width: 768px) {
            .floating-actions {
                position: fixed;
                bottom: 80px;
                right: 20px;
                left: auto;
                top: auto;
                flex-direction: row;
                background: var(--bg-card);
                padding: 8px;
                border-radius: 40px;
                box-shadow: var(--shadow-lg);
            }
            .shortcuts-hint {
                display: none;
            }
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            margin-top: 30px;
        }
        
        /* Loader */
        .loader { text-align: center; padding: 50px; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error { color: var(--danger); background: rgba(239,68,68,0.1); padding: 20px; border-radius: 12px; text-align: center; }
        
        /* Font size */
        body.font-small .article-content { font-size: 0.9rem; }
        body.font-medium .article-content { font-size: 1.05rem; }
        body.font-large .article-content { font-size: 1.2rem; }
    </style>
</head>

<script>
const SUPABASE_URL = 'https://zpubhlbdqwzyseditrls.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4YiRI2c1Tij-2KvyNtJ9Sg_8-l0OFuP';
const GEMINI_API_KEY = 'AIzaSyCVxua06c7WNESeIq79f44sD-LSUznPVpA';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const urlParams = new URLSearchParams(window.location.search);
const articleId = urlParams.get('id');
let currentArticle = null;
let isBookmarked = false;
let isLiked = false;
let speechSynth = null;
let isSpeaking = false;
let allNews = [];

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
}

function formatDate(dateString) {
    if (!dateString) return 'Unknown';
    return new Date(dateString).toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' });
}

function cleanContent(content) {
    if (!content) return '<p>No content available</p>';
    return content.replace(/<\/p><p><p>/g, '</p><p>').replace(/<p><p>/g, '<p>').replace(/<\/p><\/p>/g, '</p>');
}

// Process embeds
function processEmbeds(content) {
    content = content.replace(/https?:\/\/(www\.)?youtube\.com\/watch\?v=([a-zA-Z0-9_-]+)/g, 
        '<iframe width="100%" height="400" src="https://www.youtube.com/embed/$2" frameborder="0" allowfullscreen></iframe>');
    content = content.replace(/https?:\/\/youtu\.be\/([a-zA-Z0-9_-]+)/g, 
        '<iframe width="100%" height="400" src="https://www.youtube.com/embed/$1" frameborder="0" allowfullscreen></iframe>');
    content = content.replace(/https?:\/\/www\.instagram\.com\/p\/([a-zA-Z0-9_-]+)/g,
        '<iframe src="https://www.instagram.com/p/$1/embed" width="100%" height="450" frameborder="0"></iframe>');
    return content;
}

// AI Summary Generator
async function generateAISummary(content) {
    const text = content.replace(/<[^>]*>/g, '').substring(0, 500);
    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: `Summarize this news in 2 short sentences (max 50 words): ${text}` }] }] })
        });
        const data = await response.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || 'Read the full article for complete details.';
    } catch(e) { return 'AI summary temporarily unavailable.'; }
}

// Key Takeaways
async function generateKeyTakeaways(content) {
    const text = content.replace(/<[^>]*>/g, '').substring(0, 800);
    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: `Extract 3 key points from this news in bullet format: ${text}` }] }] })
        });
        const data = await response.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || '• ' + text.substring(0, 200);
    } catch(e) { return '• Read the article for key insights.'; }
}

// Text-to-Speech
function toggleAudio() {
    if (!speechSynth) speechSynth = new SpeechSynthesisUtterance();
    if (isSpeaking) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
        document.getElementById('audioBtn').innerHTML = '<i class="fas fa-headphones"></i>';
    } else {
        const articleText = document.querySelector('.article-content')?.innerText || '';
        speechSynth.text = articleText;
        speechSynth.lang = 'hi-IN';
        speechSynth.rate = 0.9;
        window.speechSynthesis.speak(speechSynth);
        isSpeaking = true;
        document.getElementById('audioBtn').innerHTML = '<i class="fas fa-stop"></i>';
        speechSynth.onend = () => {
            isSpeaking = false;
            document.getElementById('audioBtn').innerHTML = '<i class="fas fa-headphones"></i>';
        };
    }
}

// Bookmark
function toggleBookmark() {
    let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
    if (bookmarks.includes(articleId)) {
        bookmarks = bookmarks.filter(id => id !== articleId);
        isBookmarked = false;
        document.getElementById('bookmarkBtn').innerHTML = '<i class="far fa-bookmark"></i>';
        alert('Removed from bookmarks');
    } else {
        bookmarks.push(articleId);
        isBookmarked = true;
        document.getElementById('bookmarkBtn').innerHTML = '<i class="fas fa-bookmark"></i>';
        alert('Saved to bookmarks');
    }
    localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
}

// Like
function likeArticle() {
    let likes = JSON.parse(localStorage.getItem('likes') || '[]');
    if (likes.includes(articleId)) {
        likes = likes.filter(id => id !== articleId);
        isLiked = false;
        document.getElementById('likeBtn').innerHTML = '<i class="far fa-heart"></i>';
        document.getElementById('likeBtn').classList.remove('liked');
    } else {
        likes.push(articleId);
        isLiked = true;
        document.getElementById('likeBtn').innerHTML = '<i class="fas fa-heart"></i>';
        document.getElementById('likeBtn').classList.add('liked');
    }
    localStorage.setItem('likes', JSON.stringify(likes));
}

// Share
function shareArticle() {
    if (navigator.share) {
        navigator.share({ title: currentArticle?.title, url: window.location.href });
    } else {
        navigator.clipboard.writeText(window.location.href);
        alert('Link copied to clipboard!');
    }
}

// Update share links
function updateShareLinks(title, url) {
    const encodedTitle = encodeURIComponent(title);
    const encodedUrl = encodeURIComponent(url);
    document.getElementById('shareWhatsapp').href = `https://wa.me/?text=${encodedTitle}%20${encodedUrl}`;
    document.getElementById('shareTwitter').href = `https://twitter.com/intent/tweet?text=${encodedTitle}&url=${encodedUrl}`;
    document.getElementById('shareTelegram').href = `https://t.me/share/url?url=${encodedUrl}&text=${encodedTitle}`;
    document.getElementById('shareFacebook').href = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`;
}

// Font size
function changeFontSize(size) {
    document.body.classList.remove('font-small', 'font-medium', 'font-large');
    document.body.classList.add(`font-${size}`);
    localStorage.setItem('fontSize', size);
}

// Theme
function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>';
    }
    const savedFont = localStorage.getItem('fontSize');
    if (savedFont) changeFontSize(savedFont);
    const bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
    if (bookmarks.includes(articleId)) {
        isBookmarked = true;
        document.getElementById('bookmarkBtn').innerHTML = '<i class="fas fa-bookmark"></i>';
    }
    const likes = JSON.parse(localStorage.getItem('likes') || '[]');
    if (likes.includes(articleId)) {
        isLiked = true;
        document.getElementById('likeBtn').innerHTML = '<i class="fas fa-heart"></i>';
        document.getElementById('likeBtn').classList.add('liked');
    }
}
function toggleTheme() {
    if (document.body.hasAttribute('data-theme')) {
        document.body.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
        document.getElementById('themeToggle').innerHTML = '<i class="fas fa-moon"></i>';
    } else {
        document.body.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>';
    }
}
document.getElementById('themeToggle').addEventListener('click', toggleTheme);

// Progress bar and reading circle
window.addEventListener('scroll', () => {
    const winScroll = document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const scrolled = (winScroll / height) * 100;
    document.getElementById('progressBar').style.width = scrolled + '%';
    const circle = document.getElementById('readingCircle');
    if (scrolled > 10) circle.style.display = 'flex';
    else circle.style.display = 'none';
    document.getElementById('readingPercent').innerText = Math.round(scrolled) + '%';
});

// Selection share tooltip
document.addEventListener('mouseup', (e) => {
    const selection = window.getSelection().toString().trim();
    if (selection.length > 10) {
        let tooltip = document.querySelector('.selection-tooltip');
        if (!tooltip) {
            tooltip = document.createElement('div');
            tooltip.className = 'selection-tooltip';
            tooltip.innerHTML = `
                <button onclick="shareSelection()"><i class="fab fa-twitter"></i></button>
                <button onclick="copySelection()"><i class="fas fa-copy"></i></button>
                <button onclick="searchSelection()"><i class="fab fa-google"></i></button>
            `;
            document.body.appendChild(tooltip);
        }
        tooltip.style.display = 'flex';
        tooltip.style.left = e.pageX - 80 + 'px';
        tooltip.style.top = e.pageY - 50 + 'px';
        setTimeout(() => tooltip.style.display = 'none', 3000);
    }
});
function shareSelection() {
    const selection = window.getSelection().toString();
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(selection)}`, '_blank');
}
function copySelection() {
    navigator.clipboard.writeText(window.getSelection().toString());
    alert('Copied!');
}
function searchSelection() {
    window.open(`https://www.google.com/search?q=${encodeURIComponent(window.getSelection().toString())}`, '_blank');
}

// Subscribe newsletter
async function subscribeNewsletter() {
    const email = document.getElementById('newsletterEmail').value;
    if (!email || !email.includes('@')) { alert('Enter valid email'); return; }
    const { error } = await supabase.from('subscribers').insert([{ email, created_at: new Date() }]);
    if (error && error.code === '23505') alert('Already subscribed!');
    else if (error) alert('Error: ' + error.message);
    else { alert('✅ Subscribed!'); document.getElementById('newsletterEmail').value = ''; }
}

// Load trending
async function loadTrending() {
    const { data } = await supabase.from('news').select('title,id,views').order('views', { ascending: false }).limit(5);
    const container = document.getElementById('trendingList');
    if (data?.length) {
        container.innerHTML = data.map((item, i) => `
            <div style="padding:10px 0; border-bottom:1px solid var(--border); cursor:pointer;" onclick="location.href='/rasu/article.html?id=${item.id}'">
                <span style="color:var(--primary); font-weight:bold;">#${i+1}</span> ${escapeHtml(item.title)} (${item.views || 0} views)
            </div>
        `).join('');
    } else container.innerHTML = '<div>No trending articles</div>';
}

// Load related articles
async function loadRelatedArticles(category, currentId) {
    const { data } = await supabase.from('news').select('title,id,image_url').eq('category', category).limit(4);
    if (data?.length) {
        const filtered = data.filter(item => item.id !== currentId);
        if (filtered.length) {
            document.getElementById('relatedArticles').innerHTML = `
                <div style="background:var(--bg-card); border-radius:12px; padding:20px; margin:30px 0; border:1px solid var(--border);">
                    <h3><i class="fas fa-link" style="color:var(--primary);"></i> Related Articles</h3>
                    <div class="related-grid">
                        ${filtered.map(item => `
                            <div class="related-card" onclick="location.href='/rasu/article.html?id=${item.id}'">
                                <img src="${item.image_url || 'https://picsum.photos/400/200?random='+item.id}" onerror="this.src='https://picsum.photos/400/200'" style="width:100%; height:120px; object-fit:cover;">
                                <div style="padding:12px;">
                                    <div style="font-size:0.9rem; font-weight:600;">${escapeHtml(item.title)}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
    }
}

// Load article
async function loadArticle() {
    if (!articleId) {
        document.getElementById('articleContent').innerHTML = '<div class="error">❌ No article ID found</div>';
        return;
    }
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/news?id=eq.${articleId}&select=*`, {
            headers: { 'apikey': SUPABASE_KEY }
        });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        if (!data || data.length === 0) {
            document.getElementById('articleContent').innerHTML = '<div class="error">❌ Article not found</div>';
            return;
        }
        currentArticle = data[0];
        const article = currentArticle;
        
        // Update view count
        await supabase.from('news').update({ views: (article.views || 0) + 1 }).eq('id', article.id);
        
        // Generate AI summary and takeaways
        const contentText = article.content || article.summary || '';
        const [aiSummary, keyTakeaways] = await Promise.all([
            generateAISummary(contentText),
            generateKeyTakeaways(contentText)
        ]);
        
        // Process content
        let contentHtml = article.content || article.summary || '<p>No content available</p>';
        contentHtml = cleanContent(contentHtml);
        contentHtml = processEmbeds(contentHtml);
        
        const readingTime = Math.ceil(contentText.replace(/<[^>]*>/g, '').length / 1000) || 1;
        
        let badgeHtml = '';
        if (article.badge) {
            const badges = article.badge.split(',');
            badgeHtml = `<div class="badge-container">${badges.map(b => `<span class="badge">🔴 ${escapeHtml(b.trim())}</span>`).join('')}</div>`;
        }
        
        let imageHtml = '';
        if (article.image_url) {
            imageHtml = `
                <div class="featured-image">
                    <img src="${article.image_url}" alt="${escapeHtml(article.title)}" onerror="this.src='https://picsum.photos/800/400?random=${article.id}'">
                    <div class="image-caption">📷 ${escapeHtml(article.title)}</div>
                    <button class="share-image-btn" onclick="shareImage()"><i class="fas fa-share-alt"></i> Share Image</button>
                </div>
            `;
        }
        
        document.getElementById('articleContent').innerHTML = `
            <div class="article-card">
                <h1 class="article-title">${escapeHtml(article.title)}</h1>
                <div class="article-meta">
                    <span><i class="fas fa-calendar"></i> ${formatDate(article.published_at)}</span>
                    <span><i class="fas fa-eye"></i> ${(article.views || 0) + 1} views</span>
                    <span><i class="fas fa-tag"></i> ${article.category || 'News'}</span>
                    <span class="reading-time"><i class="fas fa-clock"></i> ${readingTime} min read</span>
                    <span class="social-proof"><i class="fas fa-users"></i> ${Math.floor(Math.random() * 50) + 10} people reading now</span>
                </div>
                ${badgeHtml}
                
                <div class="ai-summary">
                    <h4><i class="fas fa-robot" style="color:var(--primary);"></i> 🤖 AI Summary</h4>
                    <p>${escapeHtml(aiSummary)}</p>
                </div>
                
                <div class="key-takeaways">
                    <h4><i class="fas fa-key"></i> Key Takeaways</h4>
                    ${keyTakeaways.replace(/\n/g, '<br>')}
                </div>
                
                ${imageHtml}
                <div class="article-content">${contentHtml}</div>
                
                <div class="author-box">
                    <div style="width:60px;height:60px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:white;">
                        <i class="fas fa-user-astronaut"></i>
                    </div>
                    <div>
                        <h4>${escapeHtml(article.author || 'THE MOON Team')}</h4>
                        <p style="font-size:0.85rem; color:var(--text-muted);">Senior Journalist | Covering breaking news and in-depth analysis</p>
                        <div style="margin-top:8px; display:flex; gap:10px;">
                            <a href="https://twitter.com/TheMoonZ60" style="color:var(--text-muted);"><i class="fab fa-twitter"></i></a>
                            <a href="https://www.linkedin.com/" style="color:var(--text-muted);"><i class="fab fa-linkedin"></i></a>
                            <a href="mailto:themoonr4@gmail.com" style="color:var(--text-muted);"><i class="fas fa-envelope"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        document.title = `${article.title} | THE MOON`;
        updateShareLinks(article.title, window.location.href);
        loadRelatedArticles(article.category, article.id);
        
        // Load saved position
        const savedPosition = localStorage.getItem(`article_pos_${articleId}`);
        if (savedPosition) window.scrollTo(0, parseInt(savedPosition));
        
        window.addEventListener('beforeunload', () => {
            localStorage.setItem(`article_pos_${articleId}`, window.scrollY);
        });
        
    } catch(err) {
        document.getElementById('articleContent').innerHTML = `<div class="error">❌ Error: ${err.message}</div>`;
    }
}

function shareImage() {
    alert('Share this image on social media!');
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.key === 'j') window.scrollBy(0, 300);
    if (e.key === 'k') window.scrollBy(0, -300);
    if (e.key === 's') shareArticle();
    if (e.key === 'b') toggleBookmark();
    if (e.key === 'l') likeArticle();
    if (e.key === 'p') window.print();
});

loadTrending();
loadArticle();
initTheme();
</script>
</body>
