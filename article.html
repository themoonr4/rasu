<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Read Article</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0a0a;color:#fff;font-family:'Segoe UI',Arial,sans-serif;padding:20px;}
        .container{max-width:800px;margin:0 auto;}
        .back-btn{background:#dc2626;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;display:inline-block;margin-bottom:20px;}
        .article-card{background:#111;padding:30px;border-radius:16px;}
        .cat{background:#dc2626;display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;margin-bottom:15px;}
        h1{font-size:28px;margin-bottom:15px;}
        .meta{color:#aaa;font-size:13px;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid #222;}
        .content{line-height:1.7;margin-top:20px;}
        .content p{margin-bottom:15px;}
        .loader{text-align:center;padding:50px;}
        .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#dc2626;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .error{text-align:center;padding:50px;color:#dc3545;}
        .action-buttons{display:flex;gap:15px;margin:20px 0;flex-wrap:wrap;}
        .btn{background:#1a1a1a;border:none;color:#fff;padding:10px 20px;border-radius:30px;cursor:pointer;font-size:14px;}
        .btn.bookmarked{background:#dc2626;}
        .share-dropdown{position:relative;display:inline-block;}
        .share-content{display:none;position:absolute;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:10px;min-width:180px;z-index:10;}
        .share-content a{display:flex;align-items:center;gap:10px;padding:8px 12px;text-decoration:none;color:#fff;border-radius:8px;}
        .share-content a:hover{background:#333;}
        .comments-section{margin-top:30px;border-top:1px solid #222;padding-top:20px;}
        .comment-item{background:#1a1a1a;padding:15px;margin-bottom:15px;border-radius:8px;}
        .comment-name{font-weight:bold;color:#dc2626;margin-bottom:5px;}
        .comment-text{margin:10px 0;line-height:1.5;}
        .comment-date{font-size:11px;color:#666;}
        .add-comment textarea{width:100%;padding:10px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:10px;resize:vertical;}
        .add-comment button{background:#dc2626;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;}
    </style>
</head>
<body>
<div class="container">
    <a href="/rasu/" class="back-btn">← Back to Home</a>
    <div id="articleCard"><div class="loader"><div class="spinner"></div></div></div>
</div>

<script>
const SUPABASE_URL = 'https://crmbbmwekdlfjgekjnll.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kiBIIC7EYdIOuMUe4ss1Eg_DWDuK2kG';

const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY, {
    global: { headers: { 'apikey': SUPABASE_KEY } }
});

const urlParams = new URLSearchParams(window.location.search);
const articleId = urlParams.get('id');
let currentUser = null;
let isBookmarked = false;

async function checkLogin() {
    const { data } = await supabase.auth.getSession();
    if(data.session) currentUser = data.session.user;
}

async function checkBookmark() {
    if(!currentUser || !articleId) return false;
    const { data } = await supabase.from('user_bookmarks').select('id').eq('user_id', currentUser.id).eq('news_id', articleId).single();
    return !!data;
}

async function toggleBookmark() {
    if(!currentUser) {
        alert('Please login to bookmark');
        window.location.href = '/rasu/profile.html';
        return;
    }
    if(isBookmarked) {
        await supabase.from('user_bookmarks').delete().eq('user_id', currentUser.id).eq('news_id', articleId);
        isBookmarked = false;
        showToast('Removed from bookmarks');
    } else {
        await supabase.from('user_bookmarks').insert({ user_id: currentUser.id, news_id: articleId, created_at: new Date() });
        isBookmarked = true;
        showToast('Bookmarked!');
    }
    updateBookmarkBtn();
}

function updateBookmarkBtn() {
    const btn = document.getElementById('bookmarkBtn');
    if(btn) {
        if(isBookmarked) {
            btn.innerHTML = '✅ Bookmarked';
            btn.classList.add('bookmarked');
        } else {
            btn.innerHTML = '🔖 Bookmark';
            btn.classList.remove('bookmarked');
        }
    }
}

function showToast(msg) {
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#28a745;color:#fff;padding:10px 20px;border-radius:8px;z-index:9999;';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function shareArticle(platform) {
    const url = encodeURIComponent(window.location.href);
    const title = encodeURIComponent(document.querySelector('h1')?.innerText || 'THE MOON News');
    let shareUrl = '';
    if(platform === 'whatsapp') shareUrl = `https://wa.me/?text=${title}%20${url}`;
    else if(platform === 'telegram') shareUrl = `https://t.me/share/url?url=${url}&text=${title}`;
    else if(platform === 'twitter') shareUrl = `https://twitter.com/intent/tweet?text=${title}&url=${url}`;
    else if(platform === 'facebook') shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
    if(shareUrl) window.open(shareUrl, '_blank');
}

function toggleShareDropdown() {
    const dropdown = document.getElementById('shareDropdown');
    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
}

async function loadComments() {
    const { data } = await supabase.from('comments').select('*').eq('news_id', articleId).order('created_at', { ascending: false });
    const commentList = document.getElementById('commentList');
    if(!commentList) return;
    if(!data || data.length === 0) {
        commentList.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;">No comments yet. Be the first to comment!</div>';
        return;
    }
    commentList.innerHTML = data.map(c => `
        <div class="comment-item">
            <div class="comment-name">${escapeHtml(c.user_name || 'Anonymous')}</div>
            <div class="comment-text">${escapeHtml(c.content)}</div>
            <div class="comment-date">${new Date(c.created_at).toLocaleDateString()}</div>
        </div>
    `).join('');
}

async function postComment() {
    const { data: session } = await supabase.auth.getSession();
    const content = document.getElementById('commentContent').value;
    if(!content.trim()) { alert('Please write a comment'); return; }
    const userName = session?.session?.user?.email?.split('@')[0] || 'Guest';
    await supabase.from('comments').insert({
        news_id: articleId,
        user_id: session?.session?.user?.id || null,
        user_name: userName,
        content: content,
        created_at: new Date()
    });
    document.getElementById('commentContent').value = '';
    loadComments();
}

function escapeHtml(text) {
    if(!text) return '';
    return text.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

async function loadArticle() {
    if(!articleId) {
        document.getElementById('articleCard').innerHTML = '<div class="error">❌ No article ID found</div>';
        return;
    }
    
    await checkLogin();
    
    const { data: article, error } = await supabase
        .from('news')
        .select('*, categories(*)')
        .eq('id', articleId)
        .single();
    
    if(error || !article) {
        document.getElementById('articleCard').innerHTML = '<div class="error">❌ Article not found</div>';
        return;
    }
    
    // Update view count
    await supabase.from('news').update({ views: (article.views || 0) + 1 }).eq('id', articleId);
    
    // Save reading history
    if(currentUser) {
        await supabase.from('reading_history').upsert({ user_id: currentUser.id, news_id: articleId, read_at: new Date() });
        
        // Reading streak
        const today = new Date().toDateString();
        const lastRead = localStorage.getItem('lastReadDate');
        let streak = parseInt(localStorage.getItem('readingStreak') || 0);
        if(lastRead !== today) {
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            streak = lastRead === yesterday.toDateString() ? streak + 1 : 1;
            localStorage.setItem('readingStreak', streak);
            localStorage.setItem('lastReadDate', today);
            await supabase.from('profiles').upsert({ id: currentUser.id, reading_streak: streak });
        }
    }
    
    isBookmarked = await checkBookmark();
    
    document.getElementById('articleCard').innerHTML = `
        <div class="article-card">
            <span class="cat">${article.categories?.name || 'News'}</span>
            <h1>${escapeHtml(article.title)}</h1>
            <div class="meta">📅 ${new Date(article.published_at || article.created_at).toLocaleDateString()} | 👁️ ${(article.views || 0) + 1} views</div>
            <div class="content">${(article.content || article.excerpt || '').split('\n').map(p => `<p>${escapeHtml(p)}</p>`).join('')}</div>
            <div class="action-buttons">
                <button id="bookmarkBtn" class="btn" onclick="toggleBookmark()">${isBookmarked ? '✅ Bookmarked' : '🔖 Bookmark'}</button>
                <div class="share-dropdown">
                    <button class="btn" onclick="toggleShareDropdown()"><i class="fas fa-share-alt"></i> Share</button>
                    <div id="shareDropdown" class="share-content">
                        <a href="#" onclick="shareArticle('whatsapp');return false;"><i class="fab fa-whatsapp" style="color:#25D366;"></i> WhatsApp</a>
                        <a href="#" onclick="shareArticle('telegram');return false;"><i class="fab fa-telegram" style="color:#0088cc;"></i> Telegram</a>
                        <a href="#" onclick="shareArticle('twitter');return false;"><i class="fab fa-twitter" style="color:#1DA1F2;"></i> Twitter</a>
                        <a href="#" onclick="shareArticle('facebook');return false;"><i class="fab fa-facebook" style="color:#1877F2;"></i> Facebook</a>
                    </div>
                </div>
            </div>
            <div class="comments-section">
                <h3>💬 Comments</h3>
                <div id="commentList"></div>
                <div class="add-comment">
                    <textarea id="commentContent" rows="3" placeholder="Write a comment..."></textarea>
                    <button onclick="postComment()">Post Comment</button>
                </div>
            </div>
        </div>
    `;
    updateBookmarkBtn();
    loadComments();
    
    document.addEventListener('click', function(e){
        if(!e.target.closest('.share-dropdown')){
            const dropdown = document.getElementById('shareDropdown');
            if(dropdown) dropdown.style.display = 'none';
        }
    });
}

loadArticle();
</script>
</body>
</html>
