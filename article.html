<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Read Article</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .article-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .back-btn {
            display: inline-block;
            background: var(--red);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 20px;
        }
        .article-card {
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
        }
        .article-cat {
            background: var(--red);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .article-title {
            font-size: 32px;
            margin-bottom: 15px;
            line-height: 1.3;
        }
        .article-meta {
            color: var(--text-sec);
            font-size: 14px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .article-image {
            width: 100%;
            border-radius: 16px;
            margin: 20px 0;
        }
        .article-content {
            line-height: 1.8;
            font-size: 16px;
        }
        .article-content p {
            margin-bottom: 20px;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .action-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
        }
        .action-btn.bookmarked {
            background: var(--red);
            border-color: var(--red);
        }
        .share-dropdown {
            position: relative;
            display: inline-block;
        }
        .share-content {
            display: none;
            position: absolute;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            min-width: 180px;
            z-index: 10;
        }
        .share-content a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            text-decoration: none;
            color: var(--text);
            border-radius: 8px;
        }
        .share-content a:hover {
            background: var(--red);
        }
        .comments-section {
            margin-top: 30px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
        .comment-item {
            background: var(--bg);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
        }
        .comment-name {
            font-weight: bold;
            color: var(--red);
            margin-bottom: 5px;
        }
        .comment-text {
            margin: 10px 0;
            line-height: 1.5;
        }
        .comment-date {
            font-size: 11px;
            color: var(--text-sec);
        }
        .add-comment textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            margin-bottom: 10px;
            resize: vertical;
        }
        .add-comment button {
            background: var(--red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <a href="/rasu/" class="logo">🌙 THE MOON</a>
    <button id="themeToggle" style="background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;">🌙</button>
</div>

<div class="article-container">
    <a href="/rasu/" class="back-btn">← Back to Home</a>
    <div id="articleCard"><div class="loader"><div class="spinner"></div></div></div>
</div>

<script src="article.js"></script>
</body>
</html>
