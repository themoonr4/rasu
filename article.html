<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>THE MOON - Article Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body{font-family: monospace; padding: 20px; max-width: 800px; margin: 0 auto; background: #0a0a0a; color: #fff;}
        .error{background: #7f1a1a; padding: 15px; border-radius: 8px; margin: 20px 0;}
        .success{background: #14532d; padding: 15px; border-radius: 8px;}
        .info{background: #1e293b; padding: 10px; margin: 10px 0; border-radius: 8px;}
        .loader{text-align: center; padding: 50px;}
    </style>
</head>
<body>
    <h1>🔍 THE MOON - Article Debug</h1>
    <div id="output" class="info">Loading debug info...</div>

    <script>
        (async function() {
            const output = document.getElementById('output');
            
            // Config
            const SUPABASE_URL = 'https://zpubhlbdqwzyseditrls.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_4YiRI2c1Tij-2KvyNtJ9Sg_8-l0OFuP';
            
            // Get article ID
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');
            
            let html = '';
            
            // 1. URL Info
            html += `<div class="info">📍 Current URL: ${window.location.href}</div>`;
            html += `<div class="info">📌 Article ID: ${articleId || 'NOT FOUND!'}</div>`;
            
            if (!articleId) {
                html += `<div class="error">❌ No article ID found! Use ?id=1 in URL</div>`;
                output.innerHTML = html;
                return;
            }
            
            html += `<div class="info">🔄 Connecting to Supabase...</div>`;
            output.innerHTML = html;
            
            try {
                // Create client
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                html += `<div class="info">✅ Supabase client created</div>`;
                
                // Try to fetch
                html += `<div class="info">🔍 Fetching article ID: ${articleId}...</div>`;
                output.innerHTML = html;
                
                const { data, error } = await supabase
                    .from('news')
                    .select('*')
                    .eq('id', parseInt(articleId))
                    .single();
                
                if (error) {
                    html += `<div class="error">❌ Supabase Error: ${error.message}</div>`;
                    html += `<div class="info">Error Code: ${error.code}</div>`;
                    html += `<div class="info">Hint: ${error.hint || 'None'}</div>`;
                    output.innerHTML = html;
                    return;
                }
                
                if (!data) {
                    html += `<div class="error">❌ No article found with ID: ${articleId}</div>`;
                    output.innerHTML = html;
                    return;
                }
                
                // Success!
                html += `<div class="success">✅ ARTICLE FOUND!</div>`;
                html += `<div class="info"><strong>Title:</strong> ${data.title}</div>`;
                html += `<div class="info"><strong>Category:</strong> ${data.category}</div>`;
                html += `<div class="info"><strong>Published:</strong> ${new Date(data.published_at).toLocaleDateString()}</div>`;
                html += `<div class="info"><strong>Content Preview:</strong> ${(data.content || '').substring(0, 200)}...</div>`;
                
                // Also show full content in a styled box
                html += `<div class="success" style="margin-top:20px;"><strong>📄 Full Article View:</strong></div>`;
                html += `<div style="background:#1a1a1a; padding:15px; border-radius:8px; margin-top:10px;">
                    <h2>${data.title}</h2>
                    <p><em>${new Date(data.published_at).toLocaleDateString()} | ${data.category || 'News'}</em></p>
                    <hr style="border-color:#333;">
                    <div>${data.content || data.summary || 'No content available'}</div>
                </div>`;
                
                output.innerHTML = html;
                
            } catch(err) {
                html += `<div class="error">💥 Exception: ${err.message}</div>`;
                output.innerHTML = html;
            }
        })();
    </script>
</body>
</html>
