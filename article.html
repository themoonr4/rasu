<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Read Article</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial,sans-serif;background:#0a0a0a;color:#fff;padding:20px;}
        .container{max-width:800px;margin:0 auto;}
        .back-btn{display:inline-block;background:#dc2626;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;margin-bottom:20px;}
        .article-card{background:#1a1a1a;padding:30px;border-radius:16px;}
        .category{display:inline-block;background:#dc2626;padding:4px 12px;border-radius:20px;font-size:12px;margin-bottom:15px;}
        h1{font-size:28px;margin-bottom:15px;}
        .meta{color:#aaa;font-size:13px;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid #333;}
        .content{line-height:1.6;color:#ddd;}
        .loader{text-align:center;padding:50px;}
        .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#dc2626;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .error{text-align:center;padding:50px;color:#dc3545;}
    </style>
</head>
<body>
<div class="container">
    <a href="/rasu/" class="back-btn">← Back to Home</a>
    <div id="articleCard"><div class="loader"><div class="spinner"></div></div></div>
</div>
<script>
// 🔥 NAYA SUPABASE URL AUR KEY (TUNE DIYA)
const SUPABASE_URL = 'https://crmbbmwekdlfjgekjnll.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kiBIIC7EYdIOuMUe4ss1Eg_DWDuK2kG';

const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY, {
    global: { headers: { 'apikey': SUPABASE_KEY } }
});

const urlParams = new URLSearchParams(window.location.search);
const articleId = urlParams.get('id');

async function loadArticle() {
    if(!articleId){ document.getElementById('articleCard').innerHTML='<div class="error">No article ID</div>'; return; }
    
    const {data:article, error} = await supabase.from('news').select('*, categories(*)').eq('id',articleId).single();
    
    if(error || !article){ document.getElementById('articleCard').innerHTML='<div class="error">Article not found</div>'; return; }
    
    document.getElementById('articleCard').innerHTML = `
        <div class="article-card">
            <span class="category">${article.categories?.name || 'News'}</span>
            <h1>${escapeHtml(article.title)}</h1>
            <div class="meta">📅 ${new Date(article.published_at || article.created_at).toLocaleDateString()} | 👁️ ${article.views || 0} views</div>
            <div class="content">${(article.content || article.excerpt || '').split('\n').map(p => `<p>${escapeHtml(p)}</p>`).join('')}</div>
        </div>
    `;
}

function escapeHtml(text) {
    if(!text) return '';
    return text.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

loadArticle();
</script>
</body>
</html>
