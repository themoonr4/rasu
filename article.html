<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Read Article</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body{background:#0a0a0a;font-family:Arial;color:#fff;padding:20px;}
        .container{max-width:800px;margin:0 auto;}
        .back-btn{display:inline-block;background:#dc2626;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;margin-bottom:20px;}
        .article-card{background:#111;border:1px solid #222;border-radius:16px;padding:25px;}
        .category{display:inline-block;background:#dc2626;color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;margin-bottom:15px;}
        h1{font-size:28px;margin-bottom:10px;}
        .meta{color:#aaa;font-size:13px;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid #222;}
        .article-image{width:100%;border-radius:12px;margin:15px 0;}
        .content{line-height:1.6;color:#ddd;}
        .loader{text-align:center;padding:50px;color:#ffc107;}
        .error{text-align:center;padding:50px;color:#dc3545;}
        .bookmark-btn{background:#1a1a1a;border:none;color:#fff;padding:8px 15px;border-radius:20px;cursor:pointer;margin-top:15px;}
        .bookmark-btn.bookmarked{background:#dc2626;}
        @media(max-width:600px){body{padding:15px;}h1{font-size:22px;}}
    </style>
</head>
<body>
<div class="container">
    <a href="/rasu/" class="back-btn">← Back to Home</a>
    <div id="articleCard" class="article-card">
        <div class="loader">⏳ Loading article...</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://qrtiapjrslubbbuucpen.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Um_UlotzRIAPivm1GErr-A_S_-gJyz9';
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const urlParams = new URLSearchParams(window.location.search);
    const articleId = urlParams.get('id');
    const categories = {1:'Technology',2:'Sports',3:'Business',4:'Politics',5:'Study'};
    let currentUserId = null;
    let isBookmarked = false;

    // Check login status
    async function checkLogin() {
        const { data } = await supabase.auth.getSession();
        if (data.session) {
            currentUserId = data.session.user.id;
        }
    }

    // Save reading history
    async function saveReadingHistory(newsId) {
        if (!currentUserId) return;
        try {
            await supabase.from('reading_history').insert({
                user_id: currentUserId,
                news_id: parseInt(newsId),
                read_at: new Date()
            });
        } catch(e) { console.log('History error:', e); }
    }

    // Check if bookmarked
    async function checkBookmark(newsId) {
        if (!currentUserId) return false;
        const { data } = await supabase
            .from('user_bookmarks')
            .select('id')
            .eq('user_id', currentUserId)
            .eq('news_id', parseInt(newsId))
            .single();
        return !!data;
    }

    // Toggle bookmark
    async function toggleBookmark(newsId) {
        if (!currentUserId) {
            alert('Please login to bookmark');
            window.location.href = '/rasu/profile.html';
            return;
        }
        
        if (isBookmarked) {
            await supabase.from('user_bookmarks').delete().eq('user_id', currentUserId).eq('news_id', parseInt(newsId));
            isBookmarked = false;
            showToast('Removed from bookmarks', 'info');
        } else {
            await supabase.from('user_bookmarks').insert({ user_id: currentUserId, news_id: parseInt(newsId) });
            isBookmarked = true;
            showToast('Bookmarked!', 'success');
        }
        updateBookmarkButton();
    }

    function updateBookmarkButton() {
        const btn = document.getElementById('bookmarkBtn');
        if (btn) {
            if (isBookmarked) {
                btn.innerHTML = '<i class="fas fa-bookmark"></i> Bookmarked';
                btn.classList.add('bookmarked');
            } else {
                btn.innerHTML = '<i class="far fa-bookmark"></i> Save Bookmark';
                btn.classList.remove('bookmarked');
            }
        }
    }

    function showToast(msg, type) {
        const toast = document.createElement('div');
        toast.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${type === 'success' ? '#28a745' : '#17a2b8'};color:#fff;padding:10px 20px;border-radius:8px;z-index:9999;`;
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function loadArticle() {
        const card = document.getElementById('articleCard');
        if (!articleId) {
            card.innerHTML = '<div class="error">❌ No article ID found</div>';
            return;
        }
        
        await checkLogin();
        
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/news?id=eq.${articleId}&select=*`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const data = await response.json();
            if (!data || data.length === 0) {
                card.innerHTML = '<div class="error">❌ Article not found</div>';
                return;
            }
            
            const article = data[0];
            const category = categories[article.category_id] || 'News';
            const formattedDate = new Date(article.created_at).toLocaleDateString();
            
            // Save reading history
            await saveReadingHistory(articleId);
            
            // Check bookmark status
            isBookmarked = await checkBookmark(articleId);
            
            card.innerHTML = `
                <span class="category">${category}</span>
                <h1>${escapeHtml(article.title)}</h1>
                <div class="meta">📅 ${formattedDate} | 👁️ ${article.views || 0} views</div>
                ${article.featured_image ? `<img class="article-image" src="${article.featured_image}" onerror="this.style.display='none'">` : ''}
                <div class="content">${formatContent(article.content || article.excerpt || '')}</div>
                <button id="bookmarkBtn" class="bookmark-btn" onclick="toggleBookmark(${article.id})">
                    <i class="${isBookmarked ? 'fas fa-bookmark' : 'far fa-bookmark'}"></i> ${isBookmarked ? 'Bookmarked' : 'Save Bookmark'}
                </button>
            `;
            updateBookmarkButton();
            
        } catch(err) {
            card.innerHTML = `<div class="error">❌ Error: ${err.message}</div>`;
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }
    
    function formatContent(content) {
        if (!content) return 'No content available';
        return content.split('\n').filter(p => p.trim()).map(p => `<p>${escapeHtml(p)}</p>`).join('');
    }
    
    loadArticle();
</script>
</body>
</html>
