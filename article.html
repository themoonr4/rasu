<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Article</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;background:#fff;color:#0f172a;line-height:1.6;}
        .container{max-width:800px;margin:0 auto;padding:20px;}
        .header{background:#fff;border-bottom:1px solid #e2e8f0;padding:15px 0;position:sticky;top:0;}
        .logo{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#dc2626,#b91c1c);-webkit-background-clip:text;background-clip:text;color:transparent;text-decoration:none;}
        .article-card{background:#f8fafc;border-radius:16px;padding:25px;margin-top:20px;}
        .article-title{font-size:1.8rem;margin-bottom:15px;}
        .article-meta{display:flex;gap:15px;color:#64748b;font-size:0.8rem;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid #e2e8f0;}
        .article-image{width:100%;border-radius:12px;margin:20px 0;}
        .article-content{font-size:1rem;line-height:1.7;color:#475569;}
        .article-content p{margin-bottom:15px;}
        .back-btn{display:inline-flex;align-items:center;gap:8px;background:#f1f5f9;border:1px solid #e2e8f0;padding:8px 16px;border-radius:30px;text-decoration:none;color:#0f172a;margin-bottom:20px;}
        .share-buttons{display:flex;gap:10px;margin-top:30px;padding-top:20px;border-top:1px solid #e2e8f0;}
        .share-btn{padding:8px 16px;border-radius:30px;text-decoration:none;color:white;font-size:0.8rem;}
        .whatsapp{background:#25D366;}.twitter{background:#1DA1F2;}.telegram{background:#0088CC;}.facebook{background:#1877f2;}
        .footer{text-align:center;padding:30px;color:#94a3b8;font-size:0.7rem;margin-top:40px;}
        .loader{text-align:center;padding:50px;}
        .spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#dc2626;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .error-box{background:#fee2e2;border:1px solid #fecaca;color:#991b1b;padding:15px;border-radius:12px;margin-top:20px;}
        .debug-info{background:#f1f5f9;padding:10px;border-radius:8px;font-family:monospace;font-size:12px;margin-top:15px;word-break:break-all;}
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <a href="/rasu/" class="logo">🌙 THE MOON</a>
    </div>
</header>

<div class="container">
    <a href="/rasu/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    
    <div id="articleContent">
        <div class="loader"><div class="spinner"></div><p>Loading article...</p></div>
    </div>
    
    <div class="footer">
        <p>© 2026 THE MOON. All rights reserved.</p>
    </div>
</div>

<script>
// ============================================
// SUPABASE CONFIGURATION
// ============================================
const SUPABASE_URL = 'https://zpubhlbdqwzyseditrls.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_4YiRI2c1Tij-2KvyNtJ9Sg_8-l0OFuP';

// Debug: Show connection status
const debugDiv = document.createElement('div');
debugDiv.className = 'debug-info';
debugDiv.style.display = 'none';
document.getElementById('articleContent').parentNode.insertBefore(debugDiv, document.getElementById('articleContent'));

function showDebug(message, isError = false) {
    debugDiv.style.display = 'block';
    debugDiv.style.background = isError ? '#fee2e2' : '#f1f5f9';
    debugDiv.style.color = isError ? '#991b1b' : '#0f172a';
    debugDiv.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${message}</div>`;
    console.log(message);
}

showDebug('🚀 Article page loaded');
showDebug(`📍 Current URL: ${window.location.href}`);

// Get article ID
const urlParams = new URLSearchParams(window.location.search);
const articleId = urlParams.get('id');

showDebug(`📌 Article ID from URL: ${articleId}`);

if (!articleId) {
    document.getElementById('articleContent').innerHTML = `
        <div class="error-box">
            <h3>❌ No Article ID Found</h3>
            <p>URL should contain ?id=1 at the end.</p>
            <p>Example: <code>/rasu/article.html?id=1</code></p>
        </div>
    `;
    showDebug('❌ No article ID found in URL', true);
}

// Initialize Supabase
showDebug('🔌 Initializing Supabase...');
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
showDebug('✅ Supabase client created');

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function formatContent(content) {
    if (!content) return 'No content available';
    if (content.includes('<p>')) return content;
    return content.split('\n\n').map(para => `<p>${escapeHtml(para)}</p>`).join('');
}

async function loadArticle() {
    if (!articleId) return;
    
    showDebug(`🔍 Fetching article with ID: ${articleId}`);
    
    try {
        const { data, error } = await supabase
            .from('news')
            .select('*')
            .eq('id', parseInt(articleId))
            .single();
        
        if (error) {
            showDebug(`❌ Supabase error: ${error.message} (Code: ${error.code})`, true);
            throw error;
        }
        
        if (!data) {
            showDebug('❌ No article found with this ID', true);
            document.getElementById('articleContent').innerHTML = `
                <div class="error-box">
                    <h3>📭 Article Not Found</h3>
                    <p>No article exists with ID: ${articleId}</p>
                    <p>Try going back to homepage and clicking on a news card.</p>
                </div>
            `;
            return;
        }
        
        showDebug(`✅ Article found: "${data.title}"`);
        
        const article = data;
        const shareText = encodeURIComponent(article.title);
        const shareUrl = encodeURIComponent(window.location.href);
        
        let badgeHtml = '';
        if (article.badge) {
            const badges = article.badge.split(',');
            badgeHtml = `<div style="margin-bottom:15px;">${badges.map(b => `<span style="background:#dc2626;color:white;padding:2px 8px;border-radius:20px;font-size:0.7rem;margin-right:5px;">${escapeHtml(b.trim())}</span>`).join('')}</div>`;
        }
        
        document.getElementById('articleContent').innerHTML = `
            <div class="article-card">
                ${article.image_url ? `<img class="article-image" src="${article.image_url}" alt="${escapeHtml(article.title)}" onerror="this.style.display='none'">` : ''}
                <h1 class="article-title">${escapeHtml(article.title)}</h1>
                <div class="article-meta">
                    <span><i class="fas fa-calendar"></i> ${new Date(article.published_at).toLocaleDateString()}</span>
                    <span><i class="fas fa-eye"></i> ${article.views || 0} views</span>
                    <span><i class="fas fa-tag"></i> ${article.category || 'News'}</span>
                    ${article.author ? `<span><i class="fas fa-user"></i> ${escapeHtml(article.author)}</span>` : ''}
                </div>
                ${badgeHtml}
                <div class="article-content">
                    ${formatContent(article.content || article.summary || 'No content available')}
                </div>
                <div class="share-buttons">
                    <a href="https://wa.me/?text=${shareText} ${shareUrl}" target="_blank" class="share-btn whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                    <a href="https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}" target="_blank" class="share-btn twitter"><i class="fab fa-twitter"></i> Twitter</a>
                    <a href="https://t.me/share/url?url=${shareUrl}&text=${shareText}" target="_blank" class="share-btn telegram"><i class="fab fa-telegram"></i> Telegram</a>
                    <a href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}" target="_blank" class="share-btn facebook"><i class="fab fa-facebook"></i> Facebook</a>
                </div>
            </div>
        `;
        
        document.title = `${article.title} | THE MOON`;
        showDebug(`✅ Article displayed successfully`);
        
        // Increment views
        await supabase
            .from('news')
            .update({ views: (article.views || 0) + 1 })
            .eq('id', article.id);
        showDebug(`👁️ View count updated to ${(article.views || 0) + 1}`);
        
    } catch (error) {
        console.error('Full error:', error);
        showDebug(`💥 Catch block error: ${error.message}`, true);
        document.getElementById('articleContent').innerHTML = `
            <div class="error-box">
                <h3>⚠️ Error Loading Article</h3>
                <p>${error.message || 'Unknown error occurred'}</p>
                <p style="margin-top:10px;font-size:12px;">Try refreshing the page or check your internet connection.</p>
            </div>
        `;
    }
}

// Execute
loadArticle();
</script>
</body>
</html>
