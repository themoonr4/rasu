<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Read Article</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--bg-primary:#0a0a0a;--bg-secondary:#111;--border:#222;--text-primary:#fff;--text-secondary:#aaa;--brand-red:#dc2626;}
        [data-theme="light"]{--bg-primary:#f5f5f5;--bg-secondary:#fff;--border:#ddd;--text-primary:#1a1a1a;--text-secondary:#666;}
        body{font-family:'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);padding:20px;transition:all 0.3s;}
        .container{max-width:800px;margin:0 auto;}
        .header{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:1rem;margin-bottom:20px;border-radius:12px;}
        .header-content{display:flex;justify-content:space-between;align-items:center;max-width:800px;margin:0 auto;}
        .logo{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#dc2626,#b91c1c);-webkit-background-clip:text;background-clip:text;color:transparent;text-decoration:none;}
        .theme-toggle{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-primary);padding:8px;}
        .back-btn{display:inline-block;background:var(--brand-red);color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;margin-bottom:20px;}
        .article-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;padding:25px;}
        .category{display:inline-block;background:var(--brand-red);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;margin-bottom:15px;}
        h1{font-size:28px;margin-bottom:10px;}
        .meta{color:var(--text-secondary);font-size:13px;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid var(--border);}
        .article-image{width:100%;border-radius:12px;margin:15px 0;}
        .content{line-height:1.6;color:var(--text-primary);}
        .content p{margin-bottom:15px;}
        .action-buttons{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap;}
        .bookmark-btn{background:#1a1a1a;border:none;color:#fff;padding:10px 20px;border-radius:30px;cursor:pointer;font-size:14px;}
        .share-btn{background:#1a1a1a;border:none;color:#fff;padding:10px 20px;border-radius:30px;cursor:pointer;font-size:14px;}
        .bookmark-btn.bookmarked{background:var(--brand-red);}
        .share-dropdown{position:relative;display:inline-block;}
        .share-content{display:none;position:absolute;background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:10px;min-width:180px;z-index:10;}
        .share-content a{display:flex;align-items:center;gap:10px;padding:8px 12px;text-decoration:none;color:var(--text-primary);border-radius:8px;}
        .share-content a:hover{background:var(--bg-primary);}
        .loader{text-align:center;padding:50px;color:#ffc107;}
        .error{text-align:center;padding:50px;color:#dc3545;}
        
        /* Comments Section */
        .comments-section{margin-top:30px;border-top:1px solid var(--border);padding-top:20px;}
        .comment-item{background:var(--bg-primary);padding:15px;margin-bottom:15px;border-radius:8px;border:1px solid var(--border);}
        .comment-header{display:flex;justify-content:space-between;margin-bottom:5px;}
        .comment-name{font-weight:bold;color:var(--brand-red);}
        .comment-date{color:var(--text-secondary);font-size:12px;}
        .comment-text{margin:10px 0;line-height:1.5;}
        .comment-like{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;}
        .comment-like:hover{color:var(--brand-red);}
        .add-comment{margin-top:20px;}
        .add-comment textarea{width:100%;padding:10px;background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);margin-bottom:10px;resize:vertical;}
        .add-comment button{background:var(--brand-red);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;}
        
        @media(max-width:600px){body{padding:15px;}h1{font-size:22px;}}
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <a href="./" class="logo">🌙 THE MOON</a>
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
    </div>
</div>

<div class="container">
    <a href="./" class="back-btn">← Back to Home</a>
    <div id="articleCard" class="article-card">
        <div class="loader">⏳ Loading article...</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://cjyfmhsodmbudjbxjbek.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_RPIMDVsM_8kpbqSlTUmnVw_m7k7K4Cv';
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const urlParams = new URLSearchParams(window.location.search);
    const articleId = urlParams.get('id');
    let currentUserId = null;
    let isBookmarked = false;
    let categoriesData = [];

    // ========== THEME ==========
    function initTheme(){
        const savedTheme = localStorage.getItem('theme');
        if(savedTheme === 'light') document.body.setAttribute('data-theme', 'light');
        const btn = document.getElementById('themeToggle');
        btn.innerHTML = savedTheme === 'light' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }
    function toggleTheme(){
        if(document.body.hasAttribute('data-theme')){
            document.body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'dark');
            document.getElementById('themeToggle').innerHTML = '<i class="fas fa-moon"></i>';
        } else {
            document.body.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
            document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>';
        }
    }
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    initTheme();

    // ========== LOAD CATEGORIES FIRST ==========
    async function loadCategories() {
        const { data } = await supabase.from('categories').select('*');
        if (data && data.length) {
            categoriesData = data;
        }
    }

    // ========== CHECK LOGIN ==========
    async function checkLogin() {
        const { data } = await supabase.auth.getSession();
        if (data.session) {
            currentUserId = data.session.user.id;
        }
        return currentUserId;
    }

    // ========== UPDATE READING STREAK ==========
    async function updateReadingStreak() {
        const today = new Date().toDateString();
        const lastRead = localStorage.getItem('lastReadDate');
        let streak = parseInt(localStorage.getItem('readingStreak') || 0);
        
        if (lastRead !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if (lastRead === yesterday.toDateString()) {
                streak++;
            } else {
                streak = 1;
            }
            localStorage.setItem('readingStreak', streak);
            localStorage.setItem('lastReadDate', today);
            
            if (currentUserId) {
                await supabase.from('profiles').upsert({ 
                    id: currentUserId, 
                    reading_streak: streak,
                    updated_at: new Date()
                });
            }
        }
    }

    // ========== SAVE READING HISTORY ==========
    async function saveReadingHistory(newsId) {
        if (!currentUserId) return;
        try {
            const { data: existing } = await supabase
                .from('reading_history')
                .select('id')
                .eq('user_id', currentUserId)
                .eq('news_id', parseInt(newsId))
                .single();
            
            if (!existing) {
                await supabase.from('reading_history').insert({
                    user_id: currentUserId,
                    news_id: parseInt(newsId),
                    read_at: new Date()
                });
            }
        } catch(e) { console.log('History error:', e); }
    }

    // ========== UPDATE VIEW COUNT ==========
    async function updateViewCount(newsId) {
        try {
            const { data: article } = await supabase
                .from('news')
                .select('views')
                .eq('id', parseInt(newsId))
                .single();
            
            const newViews = (article?.views || 0) + 1;
            await supabase
                .from('news')
                .update({ views: newViews })
                .eq('id', parseInt(newsId));
        } catch(e) { console.log('View count error:', e); }
    }

    // ========== CHECK BOOKMARK ==========
    async function checkBookmark(newsId) {
        if (!currentUserId) return false;
        const { data } = await supabase
            .from('user_bookmarks')
            .select('id')
            .eq('user_id', currentUserId)
            .eq('news_id', parseInt(newsId))
            .single();
        return !!data;
    }

    // ========== TOGGLE BOOKMARK ==========
    async function toggleBookmark(newsId) {
        if (!currentUserId) {
            alert('Please login to bookmark');
            window.location.href = 'profile.html';
            return;
        }
        
        if (isBookmarked) {
            await supabase.from('user_bookmarks').delete().eq('user_id', currentUserId).eq('news_id', parseInt(newsId));
            isBookmarked = false;
            showToast('Removed from bookmarks', 'info');
        } else {
            await supabase.from('user_bookmarks').insert({ user_id: currentUserId, news_id: parseInt(newsId), created_at: new Date() });
            isBookmarked = true;
            showToast('Bookmarked!', 'success');
        }
        updateBookmarkButton();
    }

    function updateBookmarkButton() {
        const btn = document.getElementById('bookmarkBtn');
        if (btn) {
            if (isBookmarked) {
                btn.innerHTML = '<i class="fas fa-bookmark"></i> Bookmarked';
                btn.classList.add('bookmarked');
            } else {
                btn.innerHTML = '<i class="far fa-bookmark"></i> Save Bookmark';
                btn.classList.remove('bookmarked');
            }
        }
    }

    // ========== SHARE FUNCTION ==========
    function shareArticle(platform) {
        const url = encodeURIComponent(window.location.href);
        const title = encodeURIComponent(document.querySelector('h1')?.innerText || 'THE MOON News');
        let shareUrl = '';
        if(platform === 'whatsapp') shareUrl = `https://wa.me/?text=${title}%20${url}`;
        else if(platform === 'telegram') shareUrl = `https://t.me/share/url?url=${url}&text=${title}`;
        else if(platform === 'twitter') shareUrl = `https://twitter.com/intent/tweet?text=${title}&url=${url}`;
        else if(platform === 'facebook') shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
        if(shareUrl) window.open(shareUrl, '_blank');
        
        let shares = parseInt(localStorage.getItem('totalShares') || 0);
        shares++;
        localStorage.setItem('totalShares', shares);
    }

    function toggleShareDropdown() {
        const dropdown = document.getElementById('shareDropdown');
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    }

    function showToast(msg, type) {
        const toast = document.createElement('div');
        toast.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${type === 'success' ? '#28a745' : '#17a2b8'};color:#fff;padding:10px 20px;border-radius:8px;z-index:9999;`;
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ========== COMMENTS FUNCTIONS ==========
    async function loadComments() {
        const { data } = await supabase
            .from('comments')
            .select('*')
            .eq('news_id', parseInt(articleId))
            .order('created_at', { ascending: false });
        
        const commentCount = document.getElementById('commentCount');
        if (commentCount) commentCount.innerText = data?.length || 0;
        
        const commentList = document.getElementById('commentList');
        if (!commentList) return;
        
        if (!data || data.length === 0) {
            commentList.innerHTML = '<div style="color:var(--text-secondary); text-align:center; padding:20px;">No comments yet. Be the first to comment!</div>';
            return;
        }
        
        commentList.innerHTML = data.map(c => `
            <div class="comment-item">
                <div class="comment-header">
                    <span class="comment-name">${escapeHtml(c.user_name || 'Anonymous')}</span>
                    <span class="comment-date">${new Date(c.created_at).toLocaleDateString()}</span>
                </div>
                <div class="comment-text">${escapeHtml(c.content)}</div>
                <button class="comment-like" onclick="likeComment(${c.id})">👍 ${c.likes || 0}</button>
            </div>
        `).join('');
    }

    async function postComment() {
        const { data: session } = await supabase.auth.getSession();
        const content = document.getElementById('commentContent').value;
        
        if (!content.trim()) {
            alert('Please write a comment');
            return;
        }
        
        const userName = session?.session?.user?.email?.split('@')[0] || 'Guest';
        
        await supabase.from('comments').insert({
            news_id: parseInt(articleId),
            user_id: session?.session?.user?.id || null,
            user_name: userName,
            content: content,
            status: 'approved',
            created_at: new Date()
        });
        
        document.getElementById('commentContent').value = '';
        loadComments();
    }

    async function likeComment(commentId) {
        const { data } = await supabase.from('comments').select('likes').eq('id', commentId).single();
        await supabase.from('comments').update({ likes: (data.likes || 0) + 1 }).eq('id', commentId);
        loadComments();
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function formatContent(content) {
        if (!content) return '<p>No content available</p>';
        return content.split('\n').filter(p => p.trim()).map(p => `<p>${escapeHtml(p)}</p>`).join('');
    }

    // ========== LOAD ARTICLE (FIXED JOIN) ==========
    async function loadArticle() {
        const card = document.getElementById('articleCard');
        if (!articleId) {
            card.innerHTML = '<div class="error">❌ No article ID found</div>';
            return;
        }
        
        await loadCategories();
        await checkLogin();
        
        try {
            const { data: article, error } = await supabase
                .from('news')
                .select('*')
                .eq('id', parseInt(articleId))
                .single();
            
            if (error || !article) {
                card.innerHTML = '<div class="error">❌ Article not found</div>';
                return;
            }
            
            const category = categoriesData.find(c => c.id === article.category_id);
            const categoryName = category?.name || 'News';
            const formattedDate = new Date(article.published_at || article.created_at).toLocaleDateString();
            
            await updateViewCount(articleId);
            await saveReadingHistory(articleId);
            await updateReadingStreak();
            isBookmarked = await checkBookmark(articleId);
            
            card.innerHTML = `
                <span class="category">${categoryName}</span>
                <h1>${escapeHtml(article.title)}</h1>
                <div class="meta">📅 ${formattedDate} | 👁️ ${(article.views || 0) + 1} views</div>
                ${article.featured_image ? `<img class="article-image" src="${article.featured_image}" onerror="this.style.display='none'">` : ''}
                <div class="content">${formatContent(article.content || article.excerpt || '')}</div>
                <div class="action-buttons">
                    <button id="bookmarkBtn" class="bookmark-btn" onclick="toggleBookmark(${article.id})">
                        <i class="${isBookmarked ? 'fas fa-bookmark' : 'far fa-bookmark'}"></i> ${isBookmarked ? 'Bookmarked' : 'Save Bookmark'}
                    </button>
                    <div class="share-dropdown">
                        <button class="share-btn" onclick="toggleShareDropdown()"><i class="fas fa-share-alt"></i> Share</button>
                        <div id="shareDropdown" class="share-content">
                            <a href="#" onclick="shareArticle('whatsapp');return false;"><i class="fab fa-whatsapp" style="color:#25D366;"></i> WhatsApp</a>
                            <a href="#" onclick="shareArticle('telegram');return false;"><i class="fab fa-telegram" style="color:#0088cc;"></i> Telegram</a>
                            <a href="#" onclick="shareArticle('twitter');return false;"><i class="fab fa-twitter" style="color:#1DA1F2;"></i> Twitter</a>
                            <a href="#" onclick="shareArticle('facebook');return false;"><i class="fab fa-facebook" style="color:#1877F2;"></i> Facebook</a>
                        </div>
                    </div>
                </div>
                
                <div class="comments-section">
                    <h3>💬 Comments (<span id="commentCount">0</span>)</h3>
                    <div id="commentList"></div>
                    <div class="add-comment">
                        <textarea id="commentContent" rows="3" placeholder="Write a comment..."></textarea>
                        <button onclick="postComment()">Post Comment</button>
                    </div>
                </div>
            `;
            updateBookmarkButton();
            loadComments();
            
            document.addEventListener('click', function(e){
                if(!e.target.closest('.share-dropdown')){
                    const dropdown = document.getElementById('shareDropdown');
                    if(dropdown) dropdown.style.display = 'none';
                }
            });
            
        } catch(err) {
            card.innerHTML = `<div class="error">❌ Error: ${err.message}</div>`;
        }
    }
    
    loadArticle();
</script>
</body>
</html>
