        .progress-bar {

            left: 0;
            width: 0%;

            z-index: 1001;
            transition: width 0.1s;

        .container{max-width:1300px;margin:0 auto;padding:20px;}
        
        .header{
            background:var(--bg-primary);
            border-bottom:1px solid var(--border);
            padding:15px 0;
            position:sticky;
            top:0;
            z-index:100;
            backdrop-filter:blur(10px);

        .header-content {
            max-width: 1300px;

            background-clip:text;
            color:transparent;
            text-decoration:none;

        .theme-btn, .font-btn, .action-sm {

            border: 1px solid var(--border);

            border-radius: 30px;
            cursor: pointer;
            color: var(--text-primary);

            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;

            margin-top: 15px;

        .related-card {

        .trending-item:hover { color: var(--primary); padding-left: 5px; }

            position: fixed;
            left: 20px;
            top: 50%;

            flex-direction: column;
            gap: 10px;

        .floating-actions button {
            width: 45px;

            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            cursor: pointer;
            color: var(--text-primary);

        @media (max-width: 768px) {

        .footer{text-align:center;padding:30px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:30px;font-size:0.8rem;}
        .loader{text-align:center;padding:50px;}
        .spinner{width:50px;height:50px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .error{color:var(--primary);padding:20px;background:rgba(220,38,38,0.1);border-radius:12px;text-align:center;}
        
        body.font-small .article-content { font-size: 0.9rem; }
        body.font-medium .article-content { font-size: 1rem; }
        body.font-large .article-content { font-size: 1.2rem; }
    </style>
</head>

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');

// ============================================
// THEME FUNCTIONS
// ============================================
function setTheme(theme) {
    if (theme === 'light') {
        document.body.removeAttribute('data-theme');
        document.body.removeAttribute('data-mode');
        localStorage.setItem('theme', 'light');
    } else if (theme === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        document.body.removeAttribute('data-mode');
        localStorage.setItem('theme', 'dark');
    } else if (theme === 'reading') {
        document.body.setAttribute('data-mode', 'reading');
        localStorage.setItem('theme', 'reading');
    }
}

function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') setTheme('dark');
    else if (savedTheme === 'reading') setTheme('reading');
    else setTheme('light');
    const savedFont = localStorage.getItem('fontSize');
    if (savedFont) changeFontSize(savedFont);
    else changeFontSize('medium');
}

function changeFontSize(size) {
    document.body.classList.remove('font-small', 'font-medium', 'font-large');
    document.body.classList.add(`font-${size}`);
    localStorage.setItem('fontSize', size);
}

// ============================================
function shareOnWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(currentArticle?.title)}%20${encodeURIComponent(window.location.href)}`, '_blank'); }
function shareOnTwitter() { window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(currentArticle?.title)}&url=${encodeURIComponent(window.location.href)}`, '_blank'); }
function shareOnTelegram() { window.open(`https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(currentArticle?.title)}`, '_blank'); }
function shareOnFacebook() { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank'); }
function copyLink() { navigator.clipboard.writeText(window.location.href); alert('✅ Link copied!'); }
function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

window.addEventListener('scroll', () => {
    const winScroll = document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const scrolled = (winScroll / height) * 100;
    document.getElementById('progressBar').style.width = scrolled + '%';
});

// ============================================
// PREMIUM MEMBERSHIP
// ============================================
function checkPremium() {
    isPremium = localStorage.getItem('is_premium') === 'true';
    const btn = document.getElementById('premiumBtn');
    if (btn) {
        if (isPremium) {
            btn.innerHTML = '<i class="fas fa-crown" style="color:var(--gold);"></i>';
            btn.title = 'Premium Member';
        } else {
            btn.innerHTML = '<i class="far fa-crown"></i>';
            btn.title = 'Upgrade to Premium';
        }
    }
}

function togglePremium() {
    if (isPremium) {
        alert('You are already a Premium member! 🎉');
    } else {
        if (confirm('Upgrade to Premium for ₹99/month? Get exclusive content, no ads, and special badges!')) {
            localStorage.setItem('is_premium', 'true');
            isPremium = true;
            checkPremium();
            alert('🎉 Welcome to Premium!');
        }
    }
}

// ============================================
// REFER & EARN
// ============================================
function shareReferral() {
    let referralCode = localStorage.getItem('referral_code');
    if (!referralCode) {
        referralCode = 'THEMOON' + Math.random().toString(36).substring(2, 8).toUpperCase();
        localStorage.setItem('referral_code', referralCode);
    }
    const referralUrl = `${window.location.origin}/rasu/?ref=${referralCode}`;
    navigator.clipboard.writeText(referralUrl);
    alert('✅ Referral link copied! Share with friends to earn rewards.');
    document.getElementById('referralCode').innerHTML = `Your code: <strong>${referralCode}</strong>`;
}

// ============================================
// LEADERBOARD
// ============================================
function loadLeaderboard() {
    let stats = JSON.parse(localStorage.getItem('reader_stats_all') || '{}');
    let leaderboard = Object.entries(stats).map(([name, data]) => ({ name, xp: data.xp || 0 })).sort((a,b) => b.xp - a.xp).slice(0,10);
    const container = document.getElementById('leaderboardList');
    if (leaderboard.length === 0) {
        container.innerHTML = '<div class="trending-item">No data yet. Be the first!</div>';
        return;
    }
    container.innerHTML = leaderboard.map((user, i) => `
        <div class="trending-item">
            <span class="trending-number">#${i+1}</span> ${escapeHtml(user.name)} - ${user.xp} XP
        </div>
    `).join('');
}

// ============================================
// ANALYTICS DASHBOARD
// ============================================
function loadAnalytics() {
    let stats = JSON.parse(localStorage.getItem('reader_stats') || '{"totalRead":0,"streak":0,"xp":0,"level":1}');

        <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:10px; text-align:center;">
            <div><div style="font-size:1.5rem; font-weight:bold; color:var(--primary);">${stats.totalRead || 0}</div><div>Articles Read</div></div>
            <div><div style="font-size:1.5rem; font-weight:bold; color:var(--success);">${stats.streak || 0}</div><div>Day Streak</div></div>
            <div><div style="font-size:1.5rem; font-weight:bold; color:var(--warning);">${stats.xp || 0}</div><div>Total XP</div></div>
            <div><div style="font-size:1.5rem; font-weight:bold; color:var(--purple);">${stats.level || 1}</div><div>Level</div></div>
        </div>
    `;
}

// ============================================
// DAILY CHALLENGE
// ============================================
function loadDailyChallenge() {
    let stats = JSON.parse(localStorage.getItem('reader_stats') || '{"totalRead":0}');
    const container = document.getElementById('dailyChallenge');
    container.innerHTML = `
        <div style="background:var(--bg-primary); border:1px solid var(--border); border-radius:12px; padding:12px;">
            <strong><i class="fas fa-calendar-day"></i> Today's Challenge</strong>
            <div style="margin-top:10px;">
                <div style="margin:8px 0;">${stats.totalRead >= 1 ? '✅' : '⭕'} Read 1 article today (${stats.totalRead || 0}/1)</div>
                ${stats.totalRead >= 1 ? '<div style="color:var(--gold); margin-top:10px;">🎉 Challenge Complete! +10 XP</div>' : ''}
            </div>
        </div>
    `;
}

// ============================================
// ACHIEVEMENT BADGES
// ============================================
function loadAchievements() {
    let stats = JSON.parse(localStorage.getItem('reader_stats') || '{}');
    let badges = [];
    if (stats.streak >= 3) badges.push('🔥 3 Day Streak');
    if (stats.streak >= 7) badges.push('⚡ Week Warrior');
    if (stats.totalRead >= 10) badges.push('📚 Bookworm');
    if (stats.totalRead >= 50) badges.push('🎓 Scholar');
    const container = document.getElementById('achievementBadges');
    if (badges.length === 0) {
        container.innerHTML = '<div style="color:var(--text-muted);">Complete challenges to earn badges!</div>';
    } else {
        container.innerHTML = badges.map(b => `<span style="display:inline-block;background:linear-gradient(135deg,var(--gold),#ffaa00);color:#333;padding:4px 12px;border-radius:20px;font-size:0.7rem;font-weight:bold;margin:3px;"><i class="fas fa-medal"></i> ${b}</span>`).join('');
    }
}

// ============================================
// TRENDING
// ============================================
async function loadTrending() {
    const container = document.getElementById('trendingList');
    if (!supabaseClient) {
        container.innerHTML = '<div class="trending-item">Database connection error</div>';
        return;
    }
    try {
        const { data, error } = await supabaseClient
            .from('news')
            .select('title,id,views')
            .order('views', { ascending: false })
            .limit(5);
            
        if (error) throw error;
        
        if (data && data.length > 0) {
            container.innerHTML = data.map((item, i) => `
                <div class="trending-item" onclick="location.href='/rasu/article.html?id=${item.id}'">
                    <span class="trending-number">${i+1}</span> ${escapeHtml(item.title)}
                </div>
            `).join('');
        } else {
            container.innerHTML = '<div class="trending-item">No trending articles</div>';
        }
    } catch(e) {
        console.error('Trending error:', e);
        container.innerHTML = '<div class="trending-item">Error loading trending</div>';
    }
}

// ============================================
// RELATED ARTICLES
// ============================================
async function loadRelatedArticles(category, currentId) {
    if (!supabaseClient) return;
    try {
        const { data, error } = await supabaseClient
            .from('news')
            .select('title,id,image_url')
            .eq('category', category)
            .limit(5);
            
        if (error) throw error;
        
        if (data && data.length > 0) {
            const filtered = data.filter(item => item.id != currentId).slice(0, 4);
            if (filtered.length > 0) {
                document.getElementById('relatedArticles').innerHTML = `
                    <div style="margin-top:30px;">
                        <h3 style="margin-bottom:15px;"><i class="fas fa-link"></i> Related Articles</h3>
                        <div class="related-grid">
                            ${filtered.map(item => `
                                <div class="related-card" onclick="location.href='/rasu/article.html?id=${item.id}'">
                                    <img src="${item.image_url || 'https://picsum.photos/400/200?random='+item.id}" width="400" height="200" loading="lazy" onerror="this.src='https://picsum.photos/400/200'">
                                    <div class="related-card-content">
                                        <div class="related-card-title">${escapeHtml(item.title)}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }
    } catch(e) {
        console.error('Related articles error:', e);
    }
}

// ============================================
// UPDATE META TAGS
// ============================================
function updateMetaTags(article) {
    if (!article) return;
    const title = article.title + ' | THE MOON ULTIMATE';
    const description = (article.summary || article.content || '').replace(/<[^>]*>/g, '').substring(0, 160);
    const image = article.image_url || 'https://themoonr4.github.io/rasu/og-image.jpg';
    const url = window.location.href;
    
    document.title = title;
    document.getElementById('articleTitle').textContent = title;
    document.getElementById('articleDescription').content = description;
    document.getElementById('ogTitle').content = title;
    document.getElementById('ogDescription').content = description;
    document.getElementById('ogImage').content = image;
    document.getElementById('ogUrl').content = url;
    document.getElementById('twitterTitle').content = title;
    document.getElementById('twitterDescription').content = description;
    document.getElementById('twitterImage').content = image;
    document.getElementById('twitterUrl').content = url;
}

// ============================================
// MAIN LOAD ARTICLE - FIXED
// ============================================
async function loadArticle() {
    const container = document.getElementById('articleContent');
    
    if (!articleId) {
        container.innerHTML = '<div class="error">❌ No article ID found. Use ?id=1</div>';
        return;
    }
    
    if (!supabaseClient) {
        container.innerHTML = '<div class="error">❌ Database connection error. Please refresh.</div>';
        return;
    }
    
    try {
        const { data, error } = await supabaseClient
            .from('news')
            .select('*')
            .eq('id', parseInt(articleId))
            .single();
            
        if (error) throw error;
        
        if (!data) {
            container.innerHTML = '<div class="error">❌ Article not found with ID: ' + articleId + '</div>';
            return;
        }
        
        currentArticle = data;
        const article = data;
        
        // Update views
        try {
            await supabaseClient
                .from('news')
                .update({ views: (article.views || 0) + 1 })
                .eq('id', article.id);
        } catch(e) { console.log('View update error:', e); }
        
        // Update meta tags
        updateMetaTags(article);
        
        const imageUrl = (article.image_url && article.image_url !== '') ? article.image_url : `https://picsum.photos/id/${(article.id % 100) + 1}/800/400`;
        const contentText = (article.content || article.summary || '').replace(/<[^>]*>/g, '');
        const readingTime = Math.ceil(contentText.length / 1000) || 1;
        let contentHtml = article.content || article.summary || 'No content available';
        
        container.innerHTML = `
            <div class="article-card">
                ${imageUrl ? `<img class="article-image" src="${imageUrl}" width="800" height="400" alt="${escapeHtml(article.title)}" loading="lazy" onerror="this.src='https://picsum.photos/800/400?random=1'">` : ''}
                <h1 class="article-title">${escapeHtml(article.title)}</h1>
                <div class="article-meta">
                    <span>📅 ${new Date(article.published_at).toLocaleDateString()}</span>
                    <span>👁️ ${(article.views || 0) + 1} views</span>
                    <span>🏷️ ${article.category || 'News'}</span>
                    <span><i class="fas fa-clock"></i> ${readingTime} min read</span>
                </div>
                <div class="article-content">${contentHtml}</div>
                <div class="share-buttons">
                    <button onclick="shareOnWhatsApp()" class="share-btn whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                    <button onclick="shareOnTwitter()" class="share-btn twitter"><i class="fab fa-twitter"></i> Twitter</button>
                    <button onclick="shareOnTelegram()" class="share-btn telegram"><i class="fab fa-telegram"></i> Telegram</button>
                    <button onclick="shareOnFacebook()" class="share-btn facebook"><i class="fab fa-facebook"></i> Facebook</button>
                    <button onclick="copyLink()" class="share-btn copy-btn"><i class="fas fa-link"></i> Copy Link</button>
                </div>
            </div>
        `;
        
        // Load related articles
        if (article.category) {
            loadRelatedArticles(article.category, article.id);
        }
        
    } catch(err) {
        console.error('Load article error:', err);
        container.innerHTML = `<div class="error">❌ Error loading article: ${err.message}</div>`;
    }
}
