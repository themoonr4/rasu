    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Light Mode (Default) */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-card: #ffffff;
            --bg-sidebar: #f8f9fa;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #6c757d;
            --border: #e9ecef;
            --border-dark: #dee2e6;
            --primary: #dc2626;
            --primary-dark: #b91c1c;
            --primary-light: #fef2f2;
            --secondary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --purple: #8b5cf6;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
            --radius: 0.75rem;
            --radius-lg: 1rem;
        }
        
        /* Dark Mode */
        [data-theme="dark"] {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-card: #1e1e1e;
            --bg-sidebar: #1a1a1a;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --border: #2a2a2a;
            --border-dark: #333333;
            --primary-light: #2a1515;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.4);
        }
        
        /* Reading Mode (Sepia) */
        [data-mode="reading"] {
            --bg-primary: #faf0e6;
            --bg-secondary: #f5e6d3;
            --bg-card: #fdf5e6;
            --bg-sidebar: #f5e6d3;
            --text-primary: #4a3728;
            --text-secondary: #5c4a3a;
            --text-muted: #8b7355;
            --border: #e0d0c0;
            --border-dark: #d0c0b0;
            --primary-light: #f0e0d0;
        }
        
        [data-theme="dark"][data-mode="reading"] {
            --bg-primary: #2a2418;
            --bg-secondary: #352e20;
            --bg-card: #3d3628;
            --bg-sidebar: #352e20;
            --text-primary: #e8dcc8;
            --text-secondary: #d0c4b0;
            --text-muted: #b0a490;
            --border: #4a4030;
        }
        
        body {
            font-family: 'Segoe UI', Georgia, 'Times New Roman', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            transition: all 0.3s ease;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
        
        /* Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--purple));
            z-index: 1001;
            transition: width 0.1s;
        }
        
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Header */
        .header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        
        .logo span {
            font-size: 0.8rem;
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 5px;
            font-size: 0.6rem;
        }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .font-controls {
            display: flex;
            gap: 5px;
            background: var(--bg-secondary);
            padding: 4px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }
        
        .font-btn {
            background: transparent;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            color: var(--text-primary);
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .font-btn:hover, .font-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .theme-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        
        .theme-btn:hover, .theme-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* Layout */
        .article-wrapper {
            display: flex;
            gap: 40px;
            margin: 30px 0;
        }
        
        .main-content {
            flex: 2;
            min-width: 0;
        }
        
        .sidebar {
            flex: 1;
            min-width: 280px;
        }
        
        @media (max-width: 992px) {
            .article-wrapper {
                flex-direction: column;
            }
        }
        
        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .breadcrumb i {
            font-size: 0.7rem;
        }
        
        /* Article Card */
        .article-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 30px;
            border: 1px solid var(--border);
        }
        
        @media (max-width: 768px) {
            .article-card {
                padding: 20px;
            }
        }
        
        /* Category Badge */
        .category-badge {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        /* Article Title */
        .article-title {
            font-size: 2.4rem;
            line-height: 1.3;
            margin-bottom: 20px;
            color: var(--text-primary);
        }
        
        @media (max-width: 768px) {
            .article-title {
                font-size: 1.8rem;
            }
        }
        
        /* Meta Info */
        .article-meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .meta-left {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        .meta-left span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .social-proof {
            background: var(--bg-secondary);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        
        /* Author Box */
        .author-box {
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .author-avatar {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
        }
        
        .author-info h4 {
            margin-bottom: 5px;
        }
        
        .author-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .author-social {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        
        .author-social a {
            color: var(--text-muted);
            transition: color 0.2s;
        }
        
        .author-social a:hover {
            color: var(--primary);
        }
        
        /* Featured Image */
        .featured-image {
            margin: 20px 0;
            position: relative;
        }
        
        .featured-image img {
            width: 100%;
            border-radius: var(--radius);
            object-fit: cover;
        }
        
        .image-caption {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 8px;
        }
        
        /* Key Highlights */
        .key-highlights {
            background: var(--primary-light);
            border-left: 4px solid var(--primary);
            padding: 20px;
            border-radius: var(--radius);
            margin: 20px 0;
        }
        
        .key-highlights h4 {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .key-highlights ul {
            margin-left: 20px;
        }
        
        .key-highlights li {
            margin-bottom: 8px;
        }
        
        /* Article Content */
        .article-content {
            font-size: 1.05rem;
            line-height: 1.8;
        }
        
        .article-content p {
            margin-bottom: 1.2rem;
        }
        
        .article-content h2 {
            font-size: 1.6rem;
            margin: 1.5rem 0 1rem;
        }
        
        .article-content h3 {
            font-size: 1.3rem;
            margin: 1.2rem 0 0.8rem;
        }
        
        .article-content img {
            max-width: 100%;
            border-radius: var(--radius);
            margin: 1rem 0;
        }
        
        .article-content iframe {
            width: 100%;
            border-radius: var(--radius);
            margin: 1rem 0;
        }
        
        .article-content blockquote {
            border-left: 4px solid var(--primary);
            padding-left: 1.2rem;
            margin: 1rem 0;
            font-style: italic;
            color: var(--text-secondary);
        }
        
        /* Share Section */
        .share-section {
            margin: 30px 0;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        
        .share-title {
            margin-bottom: 15px;
            font-size: 1rem;
        }
        
        .share-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .share-btn {
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .share-btn:hover {
            transform: translateY(-2px);
        }
        
        .whatsapp { background: #25D366; }
        .twitter { background: #1DA1F2; }
        .telegram { background: #0088CC; }
        .facebook { background: #1877F2; }
        .linkedin { background: #0077B5; }
        .copy-btn { background: var(--text-muted); cursor: pointer; }
        
        /* Tags */
        .tags-section {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
        }
        
        .tag {
            background: var(--bg-secondary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-decoration: none;
        }
        
        /* Related Articles */
        .related-section {
            margin-top: 40px;
        }
        
        .related-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }
        
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .related-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .related-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }
        
        .related-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }
        
        .related-card-content {
            padding: 15px;
        }
        
        .related-card-title {
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.4;
        }
        
        /* Sidebar Widgets */
        .widget {
            background: var(--bg-sidebar);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }
        
        .widget-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }
        
        /* Trending */
        .trending-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        
        .trending-item:hover .trending-title {
            color: var(--primary);
        }
        
        .trending-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
            min-width: 30px;
        }
        
        .trending-title {
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        /* Newsletter */
        .newsletter-input {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .newsletter-input input {
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
        }
        
        .newsletter-input button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* Ad Space */
        .ad-space {
            text-align: center;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px dashed var(--border);
            color: var(--text-muted);
            font-size: 0.7rem;
        }
        
        /* Comments */
        .comments-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }
        
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }
        
        .comment-form input, .comment-form textarea {
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
        }
        
        .comment-form button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .comment {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: var(--radius);
            margin-bottom: 15px;
        }
        
        .comment-name {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 5px;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            margin-top: 50px;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
        }
        
        .footer-links a:hover {
            color: var(--primary);
        }
        
        /* Loader */
        .loader {
            text-align: center;
            padding: 50px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Error */
        .error {
            color: var(--primary);
            background: var(--primary-light);
            padding: 20px;
            border-radius: var(--radius);
            text-align: center;
        }
        
        /* Font Sizes */
        body.font-small .article-content { font-size: 0.9rem; }
        body.font-medium .article-content { font-size: 1.05rem; }
        body.font-large .article-content { font-size: 1.2rem; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 15px;
            }
            .controls {
                justify-content: flex-end;
            }
        }
    </style>
</head>

const SUPABASE_KEY = 'sb_publishable_4YiRI2c1Tij-2KvyNtJ9Sg_8-l0OFuP';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const urlParams = new URLSearchParams(window.location.search);
const articleId = urlParams.get('id');

let currentArticle = null;

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
}

function formatDate(dateString) {
    if (!dateString) return 'Unknown';
    const date = new Date(dateString);
    return date.toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' });
}

function cleanContent(content) {
    if (!content) return '<p>No content available</p>';
    let cleaned = content.replace(/<\/p><p><p>/g, '</p><p>');
    cleaned = cleaned.replace(/<p><p>/g, '<p>');
    cleaned = cleaned.replace(/<\/p><\/p>/g, '</p>');
    return cleaned;
}

// Theme Functions
function setTheme(theme) {
    if (theme === 'light') {
        document.body.removeAttribute('data-theme');
        document.body.removeAttribute('data-mode');
        localStorage.setItem('theme', 'light');
    } else if (theme === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        document.body.removeAttribute('data-mode');
        localStorage.setItem('theme', 'dark');
    } else if (theme === 'reading') {
        document.body.setAttribute('data-mode', 'reading');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        } else {
            document.body.removeAttribute('data-theme');
        }
        localStorage.setItem('theme', 'reading');
    }
    
    document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
    if (theme === 'light') document.getElementById('lightBtn')?.classList.add('active');
    else if (theme === 'dark') document.getElementById('darkBtn')?.classList.add('active');
    else if (theme === 'reading') document.getElementById('readingBtn')?.classList.add('active');
}

function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') setTheme('dark');
    else if (savedTheme === 'reading') setTheme('reading');
    else setTheme('light');
    
    const savedFont = localStorage.getItem('fontSize');
    if (savedFont) changeFontSize(savedFont);
    else changeFontSize('medium');
}

function changeFontSize(size) {
    document.body.classList.remove('font-small', 'font-medium', 'font-large');
    document.body.classList.add(`font-${size}`);
    localStorage.setItem('fontSize', size);
    document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
    if (size === 'small') document.querySelector('.font-btn:first-child')?.classList.add('active');
    else if (size === 'medium') document.querySelectorAll('.font-btn')[1]?.classList.add('active');
    else if (size === 'large') document.querySelectorAll('.font-btn')[2]?.classList.add('active');
}

// Progress bar
window.addEventListener('scroll', () => {
    const winScroll = document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const scrolled = (winScroll / height) * 100;
    document.getElementById('progressBar').style.width = scrolled + '%';
});

// Share links update
function updateShareLinks(title, url) {
    const encodedTitle = encodeURIComponent(title);
    const encodedUrl = encodeURIComponent(url);
    document.getElementById('shareWhatsapp').href = `https://wa.me/?text=${encodedTitle}%20${encodedUrl}`;
    document.getElementById('shareTwitter').href = `https://twitter.com/intent/tweet?text=${encodedTitle}&url=${encodedUrl}`;
    document.getElementById('shareTelegram').href = `https://t.me/share/url?url=${encodedUrl}&text=${encodedTitle}`;
    document.getElementById('shareFacebook').href = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`;
    document.getElementById('shareLinkedin').href = `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`;
}

// Subscribe newsletter
async function subscribeNewsletter() {
    const email = document.getElementById('newsletterEmail').value;
    if (!email || !email.includes('@')) {
        alert('Please enter valid email');
        return;
    }
    const { error } = await supabase.from('subscribers').insert([{ email, created_at: new Date() }]);
    if (error && error.code === '23505') alert('Already subscribed!');
    else if (error) alert('Error: ' + error.message);
    else {
        alert('✅ Subscribed successfully!');
        document.getElementById('newsletterEmail').value = '';
    }
}

// Load trending
async function loadTrending() {
    const { data } = await supabase.from('news').select('title,id,views').order('views', { ascending: false }).limit(5);
    const container = document.getElementById('trendingList');
    if (data?.length) {
        container.innerHTML = data.map((item, i) => `
            <div class="trending-item" onclick="location.href='/rasu/article.html?id=${item.id}'">
                <div class="trending-number">${i+1}</div>
                <div class="trending-title">${escapeHtml(item.title.substring(0, 60))}${item.title.length > 60 ? '...' : ''}</div>
            </div>
        `).join('');
    } else {
        container.innerHTML = '<div style="padding:10px;">No trending articles</div>';
    }
}

// Load related articles
async function loadRelatedArticles(category, currentId) {
    const { data } = await supabase.from('news').select('title,id,image_url').eq('category', category).limit(4);
    if (data?.length) {
        const filtered = data.filter(item => item.id != currentId);
        if (filtered.length > 0) {
            document.getElementById('relatedArticles').innerHTML = `
                <div class="related-section">
                    <h3 class="related-title"><i class="fas fa-link"></i> Related Articles</h3>
                    <div class="related-grid">
                        ${filtered.map(item => `
                            <div class="related-card" onclick="location.href='/rasu/article.html?id=${item.id}'">
                                <img src="${item.image_url || 'https://picsum.photos/400/200?random='+item.id}" onerror="this.src='https://picsum.photos/400/200'">
                                <div class="related-card-content">
                                    <div class="related-card-title">${escapeHtml(item.title)}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
    }
}

// Load comments
function loadComments() {
    const comments = JSON.parse(localStorage.getItem('article_comments') || '[]');
    const articleComments = comments.filter(c => c.articleId == articleId);
    const container = document.getElementById('commentsList');
    if (articleComments.length > 0) {
        container.innerHTML = articleComments.map(c => `
            <div class="comment">
                <div class="comment-name">${escapeHtml(c.name)}</div>
                <div class="comment-text">${escapeHtml(c.text)}</div>
                <div style="font-size:0.7rem; color:var(--text-muted); margin-top:5px;">${new Date(c.date).toLocaleString()}</div>
            </div>
        `).join('');
    } else {
        container.innerHTML = '<div style="padding:20px; text-align:center;">No comments yet. Be the first to comment!</div>';
    }
}

function postComment() {
    const name = document.getElementById('commentName').value;
    const text = document.getElementById('commentText').value;
    if (!name || !text) {
        alert('Please enter name and comment');
        return;
    }
    let comments = JSON.parse(localStorage.getItem('article_comments') || '[]');
    comments.push({ articleId: articleId, name: name, text: text, date: new Date() });
    localStorage.setItem('article_comments', JSON.stringify(comments));
    document.getElementById('commentName').value = '';
    document.getElementById('commentText').value = '';
    loadComments();
}

// Main load article
async function loadArticle() {
    if (!articleId) {
        document.getElementById('articleContent').innerHTML = '<div class="error">❌ No article ID found. Use ?id=1</div>';
        return;
    }
    
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/news?id=eq.${articleId}&select=*`, {
            headers: { 'apikey': SUPABASE_KEY }
        });
        
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        
        if (!data || data.length === 0) {
            document.getElementById('articleContent').innerHTML = '<div class="error">❌ Article not found</div>';
            return;
        }
        
        currentArticle = data[0];
        const article = currentArticle;
        
        // Update view count
        await supabase.from('news').update({ views: (article.views || 0) + 1 }).eq('id', article.id);
        
        // Process content
        let contentHtml = article.content || article.summary || '<p>No content available</p>';
        contentHtml = cleanContent(contentHtml);
        
        const readingTime = Math.ceil(contentHtml.replace(/<[^>]*>/g, '').length / 1000) || 1;
        const randomReaders = Math.floor(Math.random() * 50) + 10;
        
        // Update breadcrumb
        document.getElementById('breadcrumbCategory').innerText = article.category || 'News';
        
        // Key highlights (extract first few sentences)
        const plainText = contentHtml.replace(/<[^>]*>/g, '');
        const firstSentence = plainText.split('.')[0];
        const secondSentence = plainText.split('.')[1] || '';
        
        document.getElementById('articleContent').innerHTML = `
            <div class="article-card">
                <span class="category-badge"><i class="fas fa-tag"></i> ${article.category || 'News'}</span>
                <h1 class="article-title">${escapeHtml(article.title)}</h1>
                
                <div class="article-meta">
                    <div class="meta-left">
                        <span><i class="fas fa-user-circle"></i> ${escapeHtml(article.author || 'THE MOON Team')}</span>
                        <span><i class="fas fa-calendar"></i> ${formatDate(article.published_at)}</span>
                        <span><i class="fas fa-eye"></i> ${(article.views || 0) + 1} views</span>
                        <span><i class="fas fa-clock"></i> ${readingTime} min read</span>
                    </div>
                    <div class="social-proof">
                        <i class="fas fa-users"></i> ${randomReaders} people reading now
                    </div>
                </div>
                
                <div class="author-box">
                    <div class="author-avatar">
                        <i class="fas fa-user-astronaut"></i>
                    </div>
                    <div class="author-info">
                        <h4>${escapeHtml(article.author || 'THE MOON Team')}</h4>
                        <p>Senior Journalist at THE MOON | Covering breaking news and in-depth analysis</p>
                        <div class="author-social">
                            <a href="https://twitter.com/TheMoonZ60" target="_blank"><i class="fab fa-twitter"></i></a>
                            <a href="https://www.linkedin.com/" target="_blank"><i class="fab fa-linkedin"></i></a>
                            <a href="mailto:themoonr4@gmail.com"><i class="fas fa-envelope"></i></a>
                        </div>
                    </div>
                </div>
                
                ${article.image_url ? `
                <div class="featured-image">
                    <img src="${article.image_url}" alt="${escapeHtml(article.title)}" onerror="this.src='https://picsum.photos/800/400'">
                    <div class="image-caption">📷 ${escapeHtml(article.title)}</div>
                </div>
                ` : ''}
                
                <div class="key-highlights">
                    <h4><i class="fas fa-key"></i> Key Highlights</h4>
                    <ul>
                        <li>${escapeHtml(firstSentence.substring(0, 150))}...</li>
                        <li>${escapeHtml(secondSentence.substring(0, 150))}...</li>
                        <li>Read the full article for complete details</li>
                    </ul>
                </div>
                
                <div class="article-content">
                    ${contentHtml}
                </div>
                
                <div class="share-section">
                    <div class="share-title"><i class="fas fa-share-alt"></i> Share this article</div>
                    <div class="share-buttons">
                        <a href="#" class="share-btn whatsapp share-wa"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                        <a href="#" class="share-btn twitter share-tw"><i class="fab fa-twitter"></i> Twitter</a>
                        <a href="#" class="share-btn telegram share-tg"><i class="fab fa-telegram"></i> Telegram</a>
                        <a href="#" class="share-btn facebook share-fb"><i class="fab fa-facebook"></i> Facebook</a>
                        <a href="#" class="share-btn linkedin share-li"><i class="fab fa-linkedin"></i> LinkedIn</a>
                        <button class="share-btn copy-btn" onclick="copyLink()"><i class="fas fa-link"></i> Copy Link</button>
                    </div>
                </div>
                
                <div class="tags-section">
                    <span class="tag"><i class="fas fa-hashtag"></i> ${article.category || 'News'}</span>
                    <span class="tag"><i class="fas fa-hashtag"></i> Breaking</span>
                    <span class="tag"><i class="fas fa-hashtag"></i> India</span>
                </div>
            </div>
        `;
        
        document.title = `${article.title} | THE MOON`;
        updateShareLinks(article.title, window.location.href);
        loadRelatedArticles(article.category, article.id);
        loadComments();
        
        // Restore scroll position
        const savedPosition = localStorage.getItem(`article_pos_${articleId}`);
        if (savedPosition) window.scrollTo(0, parseInt(savedPosition));
        window.addEventListener('beforeunload', () => {
            localStorage.setItem(`article_pos_${articleId}`, window.scrollY);
        });
        
    } catch(err) {
        document.getElementById('articleContent').innerHTML = `<div class="error">❌ Error: ${err.message}</div>`;
    }
}

function copyLink() {
    navigator.clipboard.writeText(window.location.href);
    alert('✅ Link copied to clipboard!');
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.key === 'j') window.scrollBy(0, 300);
    if (e.key === 'k') window.scrollBy(0, -300);
});

loadTrending();
loadArticle();
initTheme();
</script>
</body>
