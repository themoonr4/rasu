<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Revenue Forecast</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .forecast-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem;}
        .forecast-card{background:#1a1a1a;padding:1rem;border-radius:12px;text-align:center;}
        .amount{font-size:1.5rem;font-weight:700;color:#dc2626;}
        input{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-chart-line"></i> Revenue Forecasting Tool</h1>
        
        <div class="card">
            <h3>Forecast Parameters</h3>
            <input type="number" id="currentRevenue" placeholder="Current Monthly Revenue (₹)" value="50000">
            <input type="number" id="growthRate" placeholder="Expected Growth Rate (%)" value="15">
            <input type="number" id="months" placeholder="Forecast Months" value="12">
            <button onclick="calculateForecast()">Generate Forecast</button>
        </div>
        
        <div class="card">
            <h3>Revenue Forecast</h3>
            <div id="forecastResults"></div>
        </div>
        
        <div class="card">
            <h3>Visual Trend</h3>
            <div id="trendVisualization"></div>
        </div>
    </div>
    <script>
        function calculateForecast() {
            let revenue = parseFloat(document.getElementById('currentRevenue').value);
            const growth = parseFloat(document.getElementById('growthRate').value) / 100;
            const months = parseInt(document.getElementById('months').value);
            
            const results = [];
            let currentRev = revenue;
            for(let i = 1; i <= months; i++) {
                currentRev = currentRev * (1 + growth);
                results.push({ month: i, revenue: currentRev });
            }
            
            const resultsDiv = document.getElementById('forecastResults');
            resultsDiv.innerHTML = `<div class="forecast-grid">${results.map(r => `<div class="forecast-card"><div>Month ${r.month}</div><div class="amount">₹${Math.round(r.revenue).toLocaleString()}</div></div>`).join('')}</div>`;
            
            const total = results.reduce((a,b) => a + b.revenue, 0);
            resultsDiv.innerHTML += `<div class="forecast-card" style="margin-top:1rem;"><strong>Yearly Projection:</strong> ₹${Math.round(total).toLocaleString()}</div>`;
            
            const maxHeight = Math.max(...results.map(r => r.revenue));
            document.getElementById('trendVisualization').innerHTML = `<div style="margin-top:1rem;">${results.map(r => `<div style="height:${(r.revenue/maxHeight)*150}px;background:#dc2626;width:${100/months}%;display:inline-block;margin:0 2px;border-radius:4px;"></div>`).join('')}</div>`;
        }
        
        calculateForecast();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
