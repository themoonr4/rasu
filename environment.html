<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Environment Config</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .env-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem 0;border-bottom:1px solid #222;}
        input{flex:1;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-right:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
        .env-value{font-family:monospace;color:#aaa;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-cogs"></i> Environment Configuration</h1>
        
        <div class="card">
            <h3>Environment Variables</h3>
            <div id="envList"></div>
            <div style="margin-top:1rem;display:flex;gap:0.5rem;">
                <input type="text" id="envKey" placeholder="Variable Name">
                <input type="text" id="envValue" placeholder="Variable Value">
                <button onclick="addEnvVar()">Add</button>
            </div>
        </div>
        
        <div class="card">
            <h3>Current Environment</h3>
            <div class="setting-item"><span>Node Environment</span><span id="nodeEnv">production</span></div>
            <div class="setting-item"><span>App Version</span><span id="appVersion">2.0.0</span></div>
            <div class="setting-item"><span>Build Date</span><span id="buildDate">2024-04-29</span></div>
        </div>
    </div>
    <script>
        let envVars = JSON.parse(localStorage.getItem('envVars') || '[]');
        
        function loadEnvVars() {
            const listDiv = document.getElementById('envList');
            if(envVars.length === 0) { listDiv.innerHTML = '<p>No custom environment variables</p>'; return; }
            listDiv.innerHTML = envVars.map((v, i) => `
                <div class="env-item">
                    <span><strong>${v.key}</strong><br><span class="env-value">${v.value.substring(0,30)}...</span></span>
                    <button onclick="deleteEnvVar(${i})">Delete</button>
                </div>
            `).join('');
        }
        
        function addEnvVar() {
            const key = document.getElementById('envKey').value;
            const value = document.getElementById('envValue').value;
            if(!key) { alert('Enter variable name'); return; }
            envVars.push({ key, value, date: new Date().toLocaleString() });
            localStorage.setItem('envVars', JSON.stringify(envVars));
            document.getElementById('envKey').value = '';
            document.getElementById('envValue').value = '';
            loadEnvVars();
        }
        
        function deleteEnvVar(index) { envVars.splice(index, 1); localStorage.setItem('envVars', JSON.stringify(envVars)); loadEnvVars(); }
        
        loadEnvVars();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
