<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - User Feedback</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        textarea,input{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        select{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .feedback-item{padding:0.75rem;border-bottom:1px solid #222;}
        .rating{color:#ffc107;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-comment-dots"></i> User Feedback System</h1>
        
        <div class="card">
            <h3>Submit Feedback</h3>
            <select id="feedbackType">
                <option value="suggestion">Suggestion</option>
                <option value="bug">Bug Report</option>
                <option value="praise">Praise</option>
            </select>
            <input type="text" id="feedbackTitle" placeholder="Title">
            <textarea id="feedbackMessage" rows="4" placeholder="Your feedback..."></textarea>
            <div class="rating" id="ratingStars">★★★★★</div>
            <button onclick="submitFeedback()">Submit Feedback</button>
            <div id="feedbackMsg"></div>
        </div>
        
        <div class="card">
            <h3>Recent Feedback</h3>
            <div id="feedbackList"></div>
        </div>
    </div>
    <script>
        let feedbacks = JSON.parse(localStorage.getItem('userFeedbacks') || '[]');
        
        function loadFeedbacks() {
            const listDiv = document.getElementById('feedbackList');
            if(feedbacks.length === 0) { listDiv.innerHTML = '<p>No feedback yet</p>'; return; }
            listDiv.innerHTML = feedbacks.map(f => `
                <div class="feedback-item">
                    <strong>${f.title}</strong>
                    <div class="rating">${'★'.repeat(f.rating)}${'☆'.repeat(5-f.rating)}</div>
                    <small>${f.type} | ${f.date}</small>
                    <p>${f.message}</p>
                </div>
            `).join('');
        }
        
        function submitFeedback() {
            const type = document.getElementById('feedbackType').value;
            const title = document.getElementById('feedbackTitle').value;
            const message = document.getElementById('feedbackMessage').value;
            const rating = 5;
            if(!title || !message) { alert('Fill all fields'); return; }
            feedbacks.unshift({ type, title, message, rating, date: new Date().toLocaleString() });
            localStorage.setItem('userFeedbacks', JSON.stringify(feedbacks));
            document.getElementById('feedbackTitle').value = '';
            document.getElementById('feedbackMessage').value = '';
            document.getElementById('feedbackMsg').innerHTML = '<div style="color:#28a745;">✅ Feedback submitted!</div>';
            loadFeedbacks();
            setTimeout(() => document.getElementById('feedbackMsg').innerHTML = '', 3000);
        }
        
        loadFeedbacks();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
