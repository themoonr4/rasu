<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Meta Tag Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input,textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .code-block{background:#1a1a1a;padding:1rem;border-radius:8px;margin-top:1rem;font-family:monospace;font-size:0.7rem;overflow-x:auto;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-tags"></i> Meta Tag Generator</h1>
        
        <div class="card">
            <h3>Page Information</h3>
            <input type="text" id="pageTitle" placeholder="Page Title (60 chars max)">
            <textarea id="pageDesc" rows="3" placeholder="Meta Description (160 chars max)"></textarea>
            <input type="text" id="pageKeywords" placeholder="Keywords (comma separated)">
            <input type="text" id="pageUrl" placeholder="Page URL" value="https://themoonr4.github.io/the-moon-supreme/">
            <input type="text" id="pageImage" placeholder="OG Image URL">
            <button onclick="generateMeta()">Generate Meta Tags</button>
            <div id="metaResult" class="code-block" style="display:none;"></div>
        </div>
    </div>
    <script>
        function generateMeta() {
            const title = document.getElementById('pageTitle').value;
            const desc = document.getElementById('pageDesc').value;
            const keywords = document.getElementById('pageKeywords').value;
            const url = document.getElementById('pageUrl').value;
            const image = document.getElementById('pageImage').value;
            
            let meta = `<!-- Primary Meta Tags -->\n<title>${title || 'THE MOON - World Class News'}</title>\n`;
            meta += `<meta name="title" content="${title || 'THE MOON'}">\n`;
            meta += `<meta name="description" content="${desc || 'Latest news and updates'}">\n`;
            if(keywords) meta += `<meta name="keywords" content="${keywords}">\n`;
            meta += `\n<!-- Open Graph / Facebook -->\n<meta property="og:type" content="website">\n`;
            meta += `<meta property="og:url" content="${url}">\n`;
            meta += `<meta property="og:title" content="${title || 'THE MOON'}">\n`;
            meta += `<meta property="og:description" content="${desc || 'Latest news'}">\n`;
            if(image) meta += `<meta property="og:image" content="${image}">\n`;
            meta += `\n<!-- Twitter -->\n<meta property="twitter:card" content="summary_large_image">\n`;
            meta += `<meta property="twitter:url" content="${url}">\n`;
            meta += `<meta property="twitter:title" content="${title || 'THE MOON'}">\n`;
            meta += `<meta property="twitter:description" content="${desc || 'Latest news'}">\n`;
            if(image) meta += `<meta property="twitter:image" content="${image}">\n`;
            
            document.getElementById('metaResult').innerHTML = `<strong>Copy these tags to your &lt;head&gt; section:</strong><br><br><code>${meta.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code>`;
            document.getElementById('metaResult').style.display = 'block';
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
