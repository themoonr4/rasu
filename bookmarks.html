<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Bookmarks</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
        }

        [data-theme="light"] {
            background: #f5f5f5;
            color: #1a1a1a;
        }

        .header {
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            z-index: 100;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .bookmark-item {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .bookmark-item:hover {
            background: #1a1a1a;
        }

        .bookmark-title {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .bookmark-meta {
            font-size: 0.7rem;
            color: #aaa;
        }

        .remove-btn {
            background: #dc3545;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #aaa;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            border: 1px solid #333;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            .bookmark-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <a href="/" class="logo">🌙 THE MOON</a>
            <button id="themeToggle" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">🌙</button>
        </div>
    </div>

    <div class="container">
        <div class="back-btn" onclick="location.href='/'"><i class="fas fa-arrow-left"></i> Back to Home</div>
        
        <h1><i class="fas fa-bookmark"></i> Your Bookmarks</h1>
        <div id="bookmarksList"></div>
    </div>

    <script>
        function loadBookmarks() {
            const bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
            const container = document.getElementById('bookmarksList');

            if (bookmarks.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-bookmark" style="font-size: 3rem; margin-bottom: 1rem; display: block;"></i>No bookmarks yet.<br>Click the bookmark icon on any news to save it here.</div>';
                return;
            }

            container.innerHTML = bookmarks.map(bookmark => `
                <div class="bookmark-item" onclick="location.href='/article.html?id=${bookmark.id}'">
                    <div>
                        <div class="bookmark-title">${bookmark.title}</div>
                        <div class="bookmark-meta">📅 ${bookmark.date || 'Saved'} | 👁️ ${bookmark.views || 0} views</div>
                    </div>
                    <button class="remove-btn" onclick="removeBookmark(event, ${bookmark.id})">Remove</button>
                </div>
            `).join('');
        }

        function removeBookmark(event, id) {
            event.stopPropagation();
            let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
            bookmarks = bookmarks.filter(b => b.id !== id);
            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
            loadBookmarks();
        }

        // Theme toggle
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeToggle');
            if (body.hasAttribute('data-theme')) {
                body.removeAttribute('data-theme');
                btn.innerHTML = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                btn.innerHTML = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        if (localStorage.getItem('theme') === 'light') {
            document.body.setAttribute('data-theme', 'light');
            document.getElementById('themeToggle').innerHTML = '☀️';
        }

        loadBookmarks();
    </script>
</body>
</html>
