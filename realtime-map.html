<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Visitor Map</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .map-container{background:#1a1a1a;border-radius:12px;padding:1rem;height:400px;position:relative;}
        .visitor-dot{position:absolute;width:10px;height:10px;background:#dc2626;border-radius:50%;animation:pulse 1s infinite;}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
        .visitor-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.5rem;}
        .visitor-item{background:#1a1a1a;padding:0.5rem;border-radius:8px;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-map-marker-alt"></i> Real-time Visitor Map</h1>
        
        <div class="card">
            <div class="map-container" id="mapContainer">
                <div id="visitorDots"></div>
            </div>
            <div style="margin-top:1rem;"><button onclick="refreshMap()">Refresh Data</button></div>
        </div>
        
        <div class="card">
            <h3>Active Visitors</h3>
            <div class="visitor-list" id="visitorList"></div>
        </div>
    </div>
    <script>
        const cities = [
            { name: 'New Delhi', x: 35, y: 45 },
            { name: 'Mumbai', x: 30, y: 55 },
            { name: 'Bangalore', x: 38, y: 70 },
            { name: 'Kolkata', x: 55, y: 50 },
            { name: 'Chennai', x: 45, y: 75 }
        ];
        
        function refreshMap() {
            const dotsDiv = document.getElementById('visitorDots');
            const listDiv = document.getElementById('visitorList');
            
            const activeVisitors = cities.map(city => ({ ...city, count: Math.floor(Math.random() * 50) + 10 }));
            dotsDiv.innerHTML = activeVisitors.map(v => `<div class="visitor-dot" style="left:${v.x}%;top:${v.y}%;" title="${v.name}"></div>`).join('');
            listDiv.innerHTML = activeVisitors.map(v => `<div class="visitor-item">📍 ${v.name}: ${v.count} active visitors</div>`).join('');
        }
        
        refreshMap();
        setInterval(refreshMap, 10000);
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
