<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Announcement Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .announcement-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-history"></i> Announcement Archive</h1>
        
        <div class="card">
            <div id="announcementList"></div>
        </div>
    </div>
    <script>
        let announcements = JSON.parse(localStorage.getItem('announcementHistory') || '[{"title":"Site Launch","message":"Welcome to THE MOON!","date":"2024-01-01"},{"title":"New Feature","message":"Dark mode now available","date":"2024-01-15"},{"title":"Maintenance","message":"Scheduled maintenance on Jan 20","date":"2024-01-18"}]');
        
        function loadAnnouncements() {
            const listDiv = document.getElementById('announcementList');
            if(announcements.length === 0) { listDiv.innerHTML = '<p>No announcements</p>'; return; }
            listDiv.innerHTML = announcements.map(a => `
                <div class="announcement-item">
                    <div><strong>${a.title}</strong><br><small>${a.date}</small><br>${a.message}</div>
                </div>
            `).join('');
        }
        
        loadAnnouncements();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
