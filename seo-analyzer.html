<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - SEO Analyzer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input,textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .score{font-size:2rem;font-weight:700;color:#dc2626;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
        .check-item{margin:0.5rem 0;padding:0.5rem;border-radius:8px;}
        .pass{background:#28a74520;border-left:3px solid #28a745;}
        .fail{background:#dc354520;border-left:3px solid #dc3545;}
        .warn{background:#ffc10720;border-left:3px solid #ffc107;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-chart-line"></i> SEO Analyzer</h1>
        
        <div class="card">
            <h3>Analyze Content</h3>
            <input type="text" id="seoTitle" placeholder="Page Title">
            <input type="text" id="seoUrl" placeholder="Page URL">
            <textarea id="seoContent" rows="6" placeholder="Content to analyze..."></textarea>
            <button onclick="analyzeSEO()">Analyze</button>
            <div id="seoResults" style="margin-top:1rem;"></div>
        </div>
    </div>
    <script>
        function analyzeSEO() {
            const title = document.getElementById('seoTitle').value;
            const url = document.getElementById('seoUrl').value;
            const content = document.getElementById('seoContent').value;
            const resultsDiv = document.getElementById('seoResults');
            
            let score = 0;
            let checks = [];
            
            if(title && title.length >= 30 && title.length <= 60) { score += 20; checks.push({ name: 'Title Length', status: 'pass', message: `Good (${title.length} chars)` }); }
            else if(title) { checks.push({ name: 'Title Length', status: 'warn', message: `Should be 30-60 chars (currently ${title.length})` }); }
            else { checks.push({ name: 'Title Length', status: 'fail', message: 'Missing title' }); }
            
            if(content && content.length > 300) { score += 30; checks.push({ name: 'Content Length', status: 'pass', message: `${content.length} characters` }); }
            else if(content) { checks.push({ name: 'Content Length', status: 'warn', message: 'Content too short (min 300 chars)' }); }
            else { checks.push({ name: 'Content Length', status: 'fail', message: 'No content' }); }
            
            const hasKeywords = content.toLowerCase().includes(title?.toLowerCase().split(' ')[0] || '');
            if(hasKeywords) { score += 20; checks.push({ name: 'Keyword Usage', status: 'pass', message: 'Keywords found in content' }); }
            else { checks.push({ name: 'Keyword Usage', status: 'warn', message: 'Consider using keywords naturally' }); }
            
            resultsDiv.innerHTML = `<div class="score">SEO Score: ${score}/100</div>${checks.map(c => `<div class="check-item ${c.status}"><strong>${c.name}</strong><br>${c.message}</div>`).join('')}`;
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
