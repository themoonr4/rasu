<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Content Approval</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .pending-item{padding:1rem;border-bottom:1px solid #222;}
        .status-pending{color:#ffc107;}
        .status-approved{color:#28a745;}
        .btn-approve{background:#28a745;margin-right:0.5rem;}
        .btn-reject{background:#dc3545;}
        button{padding:0.3rem 0.8rem;border:none;border-radius:8px;cursor:pointer;color:white;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-check-double"></i> Content Approval System</h1>
        
        <div class="card">
            <h3>Pending Approval</h3>
            <div id="pendingList"></div>
        </div>
        
        <div class="card">
            <h3>Approved Content</h3>
            <div id="approvedList"></div>
        </div>
    </div>
    <script>
        let pending = JSON.parse(localStorage.getItem('pendingContent') || '[]');
        let approved = JSON.parse(localStorage.getItem('approvedContent') || '[]');
        
        function addSample() {
            if(pending.length === 0) {
                pending = [
                    { id: 1, title: "Breaking News: Major Event", author: "Editorial Team", date: new Date().toLocaleString(), content: "Full content here..." },
                    { id: 2, title: "Technology Update", author: "Tech Writer", date: new Date().toLocaleString(), content: "Tech content here..." }
                ];
                localStorage.setItem('pendingContent', JSON.stringify(pending));
            }
        }
        
        function loadContent() {
            const pendingDiv = document.getElementById('pendingList');
            const approvedDiv = document.getElementById('approvedList');
            
            if(pending.length === 0) pendingDiv.innerHTML = '<p>No pending content</p>';
            else pendingDiv.innerHTML = pending.map(p => `
                <div class="pending-item">
                    <strong>${p.title}</strong><br>
                    <small>By: ${p.author} | ${p.date}</small>
                    <p style="margin:0.5rem 0;">${p.content.substring(0,100)}...</p>
                    <button class="btn-approve" onclick="approveContent(${p.id})">Approve</button>
                    <button class="btn-reject" onclick="rejectContent(${p.id})">Reject</button>
                </div>
            `).join('');
            
            if(approved.length === 0) approvedDiv.innerHTML = '<p>No approved content</p>';
            else approvedDiv.innerHTML = approved.map(a => `
                <div class="pending-item">
                    <strong>${a.title}</strong><br>
                    <small>By: ${a.author} | Approved on: ${a.approvedDate || a.date}</small>
                </div>
            `).join('');
        }
        
        function approveContent(id) {
            const item = pending.find(p => p.id === id);
            if(item) {
                item.approvedDate = new Date().toLocaleString();
                approved.push(item);
                pending = pending.filter(p => p.id !== id);
                localStorage.setItem('pendingContent', JSON.stringify(pending));
                localStorage.setItem('approvedContent', JSON.stringify(approved));
                loadContent();
            }
        }
        
        function rejectContent(id) {
            pending = pending.filter(p => p.id !== id);
            localStorage.setItem('pendingContent', JSON.stringify(pending));
            loadContent();
        }
        
        addSample();
        loadContent();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
