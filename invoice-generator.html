<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Invoice Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input,textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .invoice-preview{background:#fff;color:#000;padding:1rem;border-radius:8px;margin-top:1rem;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-file-invoice"></i> Invoice Generator</h1>
        
        <div class="card">
            <h3>Invoice Details</h3>
            <input type="text" id="clientName" placeholder="Client Name">
            <input type="text" id="invoiceAmount" placeholder="Amount (₹)">
            <input type="text" id="invoiceDesc" placeholder="Description">
            <button onclick="generateInvoice()">Generate Invoice</button>
            <div id="invoicePreview" class="invoice-preview" style="display:none;"></div>
        </div>
    </div>
    <script>
        function generateInvoice() {
            const client = document.getElementById('clientName').value;
            const amount = document.getElementById('invoiceAmount').value;
            const desc = document.getElementById('invoiceDesc').value;
            const invoiceNo = 'INV-' + Date.now();
            const date = new Date().toLocaleDateString();
            const preview = document.getElementById('invoicePreview');
            preview.innerHTML = `
                <div style="text-align:center;"><strong>THE MOON</strong><br>Invoice</div>
                <hr>
                <div><strong>Invoice No:</strong> ${invoiceNo}</div>
                <div><strong>Date:</strong> ${date}</div>
                <div><strong>Client:</strong> ${client || 'Client Name'}</div>
                <div><strong>Description:</strong> ${desc || 'Services'}</div>
                <div><strong>Amount:</strong> ₹${amount || '0'}</div>
                <hr>
                <div>Thank you for your business!</div>
            `;
            preview.style.display = 'block';
        }
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
