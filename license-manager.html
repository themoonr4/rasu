<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - License Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .license-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;margin-right:0.5rem;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-file-contract"></i> License & Terms Manager</h1>
        
        <div class="card">
            <h3>Copyright Notice</h3>
            <textarea id="copyrightText" rows="3" style="width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;">© 2024 THE MOON. All rights reserved. Content may not be reproduced without permission.</textarea>
            <button onclick="saveCopyright()">Save Copyright</button>
        </div>
        
        <div class="card">
            <h3>Creative Commons License</h3>
            <select id="ccLicense">
                <option value="by">CC BY - Attribution</option>
                <option value="by-sa">CC BY-SA - ShareAlike</option>
                <option value="by-nd">CC BY-ND - NoDerivatives</option>
                <option value="by-nc">CC BY-NC - NonCommercial</option>
                <option value="by-nc-sa">CC BY-NC-SA</option>
                <option value="by-nc-nd">CC BY-NC-ND</option>
            </select>
            <button onclick="applyLicense()">Apply License</button>
            <div id="licenseResult"></div>
        </div>
        
        <div class="card">
            <h3>Legal Documents</h3>
            <div class="license-item"><span>📄 Privacy Policy</span><button onclick="viewPrivacy()">View/Edit</button></div>
            <div class="license-item"><span>📄 Terms of Service</span><button onclick="viewTerms()">View/Edit</button></div>
            <div class="license-item"><span>📄 Cookie Policy</span><button onclick="viewCookies()">View/Edit</button></div>
            <div class="license-item"><span>📄 Disclaimer</span><button onclick="viewDisclaimer()">View/Edit</button></div>
        </div>
    </div>
    <script>
        function saveCopyright() {
            const text = document.getElementById('copyrightText').value;
            localStorage.setItem('copyrightText', text);
            alert('Copyright saved!');
        }
        
        function applyLicense() {
            const license = document.getElementById('ccLicense').value;
            const licenseUrls = {
                'by': 'https://creativecommons.org/licenses/by/4.0/',
                'by-sa': 'https://creativecommons.org/licenses/by-sa/4.0/',
                'by-nd': 'https://creativecommons.org/licenses/by-nd/4.0/',
                'by-nc': 'https://creativecommons.org/licenses/by-nc/4.0/',
                'by-nc-sa': 'https://creativecommons.org/licenses/by-nc-sa/4.0/',
                'by-nc-nd': 'https://creativecommons.org/licenses/by-nc-nd/4.0/'
            };
            document.getElementById('licenseResult').innerHTML = `<div style="background:#28a74520;padding:0.5rem;border-radius:8px;">✅ License applied: <a href="${licenseUrls[license]}" target="_blank" style="color:#dc2626;">${licenseUrls[license]}</a></div>`;
            localStorage.setItem('siteLicense', license);
        }
        
        function viewPrivacy() { alert('Privacy Policy editor - Full content can be edited here'); }
        function viewTerms() { alert('Terms of Service editor'); }
        function viewCookies() { alert('Cookie Policy editor'); }
        function viewDisclaimer() { alert('Disclaimer editor'); }
        
        document.getElementById('copyrightText').value = localStorage.getItem('copyrightText') || '© 2024 THE MOON. All rights reserved.';
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
