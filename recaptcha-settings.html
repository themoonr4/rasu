<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - reCAPTCHA Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input,select{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .toggle-switch{position:relative;display:inline-block;width:50px;height:24px;}
        .toggle-switch input{opacity:0;width:0;height:0;}
        .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#333;transition:0.3s;border-radius:24px;}
        .slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background-color:white;transition:0.3s;border-radius:50%;}
        input:checked+.slider{background-color:#dc2626;}
        input:checked+.slider:before{transform:translateX(26px);}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-shield-alt"></i> reCAPTCHA Settings</h1>
        
        <div class="card">
            <h3>Enable reCAPTCHA</h3>
            <label class="toggle-switch"><input type="checkbox" id="recaptchaEnable"><span class="slider"></span></label>
        </div>
        
        <div class="card">
            <h3>Site Key</h3>
            <input type="text" id="recaptchaSiteKey" placeholder="reCAPTCHA Site Key">
        </div>
        
        <div class="card">
            <h3>Secret Key</h3>
            <input type="password" id="recaptchaSecretKey" placeholder="reCAPTCHA Secret Key">
        </div>
        
        <div class="card">
            <h3>Protected Forms</h3>
            <label><input type="checkbox" id="protectLogin"> Login Form</label>
            <label><input type="checkbox" id="protectRegister"> Registration Form</label>
            <label><input type="checkbox" id="protectComment"> Comment Form</label>
            <label><input type="checkbox" id="protectContact"> Contact Form</label>
        </div>
        
        <button onclick="saveRecaptchaConfig()">Save Settings</button>
        <div id="configMsg"></div>
    </div>
    <script>
        function loadConfig() {
            document.getElementById('recaptchaEnable').checked = localStorage.getItem('recaptchaEnable') === 'true';
            document.getElementById('recaptchaSiteKey').value = localStorage.getItem('recaptchaSiteKey') || '';
            document.getElementById('recaptchaSecretKey').value = localStorage.getItem('recaptchaSecretKey') || '';
            document.getElementById('protectLogin').checked = localStorage.getItem('protectLogin') === 'true';
            document.getElementById('protectRegister').checked = localStorage.getItem('protectRegister') === 'true';
            document.getElementById('protectComment').checked = localStorage.getItem('protectComment') === 'true';
            document.getElementById('protectContact').checked = localStorage.getItem('protectContact') === 'true';
        }
        
        function saveRecaptchaConfig() {
            localStorage.setItem('recaptchaEnable', document.getElementById('recaptchaEnable').checked);
            localStorage.setItem('recaptchaSiteKey', document.getElementById('recaptchaSiteKey').value);
            localStorage.setItem('recaptchaSecretKey', document.getElementById('recaptchaSecretKey').value);
            localStorage.setItem('protectLogin', document.getElementById('protectLogin').checked);
            localStorage.setItem('protectRegister', document.getElementById('protectRegister').checked);
            localStorage.setItem('protectComment', document.getElementById('protectComment').checked);
            localStorage.setItem('protectContact', document.getElementById('protectContact').checked);
            document.getElementById('configMsg').innerHTML = '<div style="background:#28a745;padding:0.5rem;border-radius:8px;">✅ reCAPTCHA settings saved!</div>';
            setTimeout(() => document.getElementById('configMsg').innerHTML = '', 3000);
        }
        
        loadConfig();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
