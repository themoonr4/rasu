<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Schema Validator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;min-height:200px;font-family:monospace;}
        .valid{color:#28a745;}
        .invalid{color:#dc3545;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-code"></i> Schema Markup Validator</h1>
        
        <div class="card">
            <h3>Enter Schema Markup (JSON-LD)</h3>
            <textarea id="schemaCode" placeholder='{"@context":"https://schema.org","@type":"NewsArticle","headline":"Breaking News","datePublished":"2024-01-01"}'></textarea>
            <button onclick="validateSchema()">Validate Schema</button>
            <div id="schemaResult"></div>
        </div>
        
        <div class="card">
            <h3>Common Schema Types</h3>
            <div id="schemaTypes"></div>
        </div>
    </div>
    <script>
        function validateSchema() {
            const schema = document.getElementById('schemaCode').value;
            if(!schema) { alert('Enter schema markup'); return; }
            const resultDiv = document.getElementById('schemaResult');
            
            try {
                const parsed = JSON.parse(schema);
                const schemaType = parsed['@type'];
                const hasContext = parsed['@context'] === 'https://schema.org';
                
                resultDiv.innerHTML = `
                    <div class="valid">✅ Valid JSON-LD Schema</div>
                    <div>Type: ${schemaType}</div>
                    <div>@context: ${hasContext ? '✅ Valid' : '❌ Should be https://schema.org'}</div>
                    <div>Properties: ${Object.keys(parsed).join(', ')}</div>
                `;
            } catch(e) {
                resultDiv.innerHTML = `<div class="invalid">❌ Invalid JSON: ${e.message}</div>`;
            }
        }
        
        document.getElementById('schemaTypes').innerHTML = `
            <div>📰 NewsArticle - For news articles</div>
            <div>📝 BlogPosting - For blog posts</div>
            <div>👤 Person - For author profiles</div>
            <div>🏢 Organization - For company info</div>
            <div>⭐ Review - For ratings and reviews</div>
        `;
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
