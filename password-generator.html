<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Password Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:500px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;text-align:center;}
        .password-display{background:#1a1a1a;padding:1rem;border-radius:8px;font-size:1.2rem;font-family:monospace;margin:1rem 0;word-break:break-all;}
        input[type="range"]{width:100%;margin:0.5rem 0;}
        .checkbox-group{display:flex;gap:1rem;justify-content:center;margin:1rem 0;flex-wrap:wrap;}
        label{margin-left:0.25rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-key"></i> Password Generator</h1>
        
        <div class="card">
            <h3>Generate Strong Password</h3>
            <div class="password-display" id="passwordDisplay">Click Generate</div>
            <div>Length: <span id="lengthValue">16</span></div>
            <input type="range" id="passwordLength" min="6" max="32" value="16" oninput="document.getElementById('lengthValue').innerText=this.value">
            <div class="checkbox-group">
                <label><input type="checkbox" id="includeUpper" checked> A-Z</label>
                <label><input type="checkbox" id="includeLower" checked> a-z</label>
                <label><input type="checkbox" id="includeNumbers" checked> 0-9</label>
                <label><input type="checkbox" id="includeSymbols" checked> !@#$</label>
            </div>
            <button onclick="generatePassword()">Generate Password</button>
            <button onclick="copyPassword()" style="margin-top:0.5rem;">Copy to Clipboard</button>
        </div>
    </div>
    <script>
        function generatePassword() {
            const length = document.getElementById('passwordLength').value;
            const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lower = 'abcdefghijklmnopqrstuvwxyz';
            const numbers = '0123456789';
            const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
            let chars = '';
            if(document.getElementById('includeUpper').checked) chars += upper;
            if(document.getElementById('includeLower').checked) chars += lower;
            if(document.getElementById('includeNumbers').checked) chars += numbers;
            if(document.getElementById('includeSymbols').checked) chars += symbols;
            if(chars === '') { alert('Select at least one option'); return; }
            let password = '';
            for(let i = 0; i < length; i++) password += chars[Math.floor(Math.random() * chars.length)];
            document.getElementById('passwordDisplay').innerText = password;
        }
        
        function copyPassword() {
            const password = document.getElementById('passwordDisplay').innerText;
            if(password && password !== 'Click Generate') { navigator.clipboard.writeText(password); alert('Password copied!'); }
            else alert('Generate a password first');
        }
        
        generatePassword();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
