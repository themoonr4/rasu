<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - My Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:20px;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        .header{background:#111;border-bottom:1px solid #222;padding:1rem 2rem;margin-bottom:20px;}
        [data-theme="light"] .header{background:#fff;border-bottom:1px solid #ddd;}
        .header-content{display:flex;justify-content:space-between;align-items:center;}
        .logo{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#dc2626,#b91c1c);-webkit-background-clip:text;background-clip:text;color:transparent;text-decoration:none;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:25px;margin-bottom:20px;}
        [data-theme="light"] .card{background:#fff;border:1px solid #ddd;}
        .card h2{color:#dc2626;margin-bottom:15px;}
        input,select{width:100%;padding:12px;margin-bottom:15px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        [data-theme="light"] input,[data-theme="light"] select{background:#f0f0f0;border:1px solid #ddd;color:#1a1a1a;}
        button{background:#dc2626;color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;width:100%;font-weight:bold;}
        button:hover{background:#b91c1c;}
        .success{background:#28a745;padding:10px;border-radius:8px;margin-top:10px;text-align:center;}
        .error{background:#dc3545;padding:10px;border-radius:8px;margin-top:10px;text-align:center;}
        .info{background:#17a2b8;padding:10px;border-radius:8px;margin-top:10px;text-align:center;}
        .nav-links{display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap;}
        .nav-btn{background:#1a1a1a;padding:10px 20px;border-radius:8px;cursor:pointer;}
        [data-theme="light"] .nav-btn{background:#e0e0e0;color:#1a1a1a;}
        .nav-btn.active{background:#dc2626;color:#fff;}
        .hide{display:none;}
        .back-btn{display:inline-block;background:#dc2626;color:#fff;padding:8px 16px;border-radius:8px;text-decoration:none;margin-bottom:20px;}
        .bookmark-item,.history-item{background:#1a1a1a;padding:12px;margin-bottom:10px;border-radius:8px;cursor:pointer;}
        [data-theme="light"] .bookmark-item,[data-theme="light"] .history-item{background:#f0f0f0;}
        .avatar{width:80px;height:80px;background:#dc2626;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:2.5rem;}
        .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin:20px 0;}
        .stat{text-align:center;}
        .stat-number{font-size:1.5rem;font-weight:bold;color:#dc2626;}
        .stat-label{font-size:0.7rem;color:#aaa;}
        .setting-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #222;}
        [data-theme="light"] .setting-item{border-bottom:1px solid #ddd;}
        .logout-btn{background:#6c757d;margin-top:10px;}
        .achievements-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:15px;}
        .achievement-card{background:#1a1a1a;padding:12px 15px;border-radius:12px;text-align:center;min-width:100px;}
        .achievement-card.earned{background:#dc2626;}
        .stats-summary{display:flex;justify-content:space-between;margin-bottom:15px;gap:10px;flex-wrap:wrap;}
        .stat-summary-card{background:#1a1a1a;padding:10px 15px;border-radius:8px;text-align:center;flex:1;}
        .progress-bar-container{background:#333;height:6px;border-radius:3px;margin-top:5px;overflow:hidden;}
        .progress-bar-fill{background:#dc2626;height:6px;width:0%;transition:width 0.5s;}
    </style>
</head>
<body>
<div class="header">
    <div class="header-content">
        <a href="/rasu/" class="logo">🌙 THE MOON</a>
        <button id="themeToggle" style="background:none;border:none;font-size:1.2rem;cursor:pointer;">🌙</button>
    </div>
</div>
<div class="container">
    <a href="/rasu/" class="back-btn">← Back to Home</a>
    <div id="loginSection" class="card">
        <h2>🔐 Login / Sign Up</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="login()">Login / Sign Up</button>
        <div id="loginMsg"></div>
    </div>
    <div id="profileSection" class="hide">
        <div class="card">
            <div class="avatar"><i class="fas fa-user-circle"></i></div>
            <h3 id="userName"></h3>
            <p style="color:#aaa;" id="userEmail"></p>
            <div class="stats-grid">
                <div class="stat"><div class="stat-number" id="bookmarkCount">0</div><div class="stat-label">Bookmarks</div></div>
                <div class="stat"><div class="stat-number" id="historyCount">0</div><div class="stat-label">Articles Read</div></div>
                <div class="stat"><div class="stat-number" id="readingTime">0</div><div class="stat-label">Minutes Read</div></div>
            </div>
            <button onclick="logout()" class="logout-btn">🚪 Logout</button>
        </div>
        <div class="card">
            <h2>🏆 Achievements</h2>
            <div id="achievementsStats" class="stats-summary"></div>
            <div id="achievementsList" class="achievements-grid"></div>
            <div id="nextAchievementProgress"></div>
        </div>
        <div class="nav-links">
            <div class="nav-btn active" onclick="showTab('bookmarks')">🔖 Bookmarks</div>
            <div class="nav-btn" onclick="showTab('history')">📖 History</div>
            <div class="nav-btn" onclick="showTab('settings')">⚙️ Settings</div>
        </div>
        <div id="bookmarksTab" class="card"><h3>🔖 Your Bookmarks</h3><div id="bookmarksList">Loading...</div></div>
        <div id="historyTab" class="card hide"><h3>📖 Reading History</h3><div id="historyList">Loading...</div></div>
        <div id="settingsTab" class="card hide"><h3>⚙️ Profile Settings</h3><div class="setting-item"><span>Display Name</span><input type="text" id="displayName" placeholder="Your name" style="width:auto;"></div><div class="setting-item"><span>Theme</span><select id="themeSelect"><option value="dark">Dark</option><option value="light">Light</option></select></div><button onclick="updateProfile()">Save Settings</button><div id="settingsMsg"></div></div>
    </div>
</div>
<script>
// 🔥 NAYA SUPABASE URL AUR KEY (TUNE DIYA)
const SUPABASE_URL = 'https://crmbbmwekdlfjgekjnll.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kiBIIC7EYdIOuMUe4ss1Eg_DWDuK2kG';

const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY, {
    global: { headers: { 'apikey': SUPABASE_KEY } }
});

let currentUser = null;
const achievements = [
    { id:1, name:'First Article', icon:'📖', desc:'Read first article', condition:(s)=>s.articlesRead>=1, points:10 },
    { id:2, name:'Bookmarker', icon:'🔖', desc:'Save 5 articles', condition:(s)=>s.bookmarks>=5, points:20 },
    { id:3, name:'News Junkie', icon:'📰', desc:'Read 25 articles', condition:(s)=>s.articlesRead>=25, points:50 },
    { id:4, name:'Super Reader', icon:'⭐', desc:'Read 100 articles', condition:(s)=>s.articlesRead>=100, points:100 },
    { id:5, name:'Weekly Warrior', icon:'⚡', desc:'7 day streak', condition:(s)=>s.streak>=7, points:40 },
    { id:6, name:'News Master', icon:'👑', desc:'Read 250 articles', condition:(s)=>s.articlesRead>=250, points:200 },
    { id:7, name:'Legend', icon:'🏆', desc:'Read 500 articles', condition:(s)=>s.articlesRead>=500, points:500 }
];

async function loadAchievements(){
    const {data:bookmarks}=await supabase.from('user_bookmarks').select('*').eq('user_id',currentUser.id);
    const {data:history}=await supabase.from('reading_history').select('*').eq('user_id',currentUser.id);
    const stats={articlesRead:history?.length||0, bookmarks:bookmarks?.length||0, streak:parseInt(localStorage.getItem('readingStreak')||0)};
    let totalPoints=0,earnedCount=0;
    const achievementsHtml=achievements.map(ach=>{const earned=ach.condition(stats); if(earned){earnedCount++; totalPoints+=ach.points;} return `<div class="achievement-card ${earned?'earned':''}" style="opacity:${earned?'1':'0.5'};"><div style="font-size:28px;">${ach.icon}</div><div style="font-size:13px;">${ach.name}</div>${earned?`<div style="font-size:11px;color:#ffc107;">+${ach.points} pts</div>`:'<div style="font-size:10px;">🔒 Locked</div>'}</div>`;}).join('');
    document.getElementById('achievementsStats').innerHTML = `<div class="stat-summary-card"><div style="font-size:20px;color:#dc2626;">${earnedCount}</div><div style="font-size:11px;">Achievements</div></div><div class="stat-summary-card"><div style="font-size:20px;color:#ffc107;">${totalPoints}</div><div style="font-size:11px;">Points</div></div><div class="stat-summary-card"><div style="font-size:20px;color:#28a745;">${stats.articlesRead}</div><div style="font-size:11px;">Read</div></div><div class="stat-summary-card"><div style="font-size:20px;color:#17a2b8;">${stats.streak}</div><div style="font-size:11px;">Streak</div></div>`;
    document.getElementById('achievementsList').innerHTML = achievementsHtml;
}

async function login(){
    const email=document.getElementById('loginEmail').value,password=document.getElementById('loginPassword').value,msgDiv=document.getElementById('loginMsg');
    if(!email||!password){msgDiv.innerHTML='<div class="error">Enter email and password</div>';return;}
    msgDiv.innerHTML='<div class="info">Connecting...</div>';
    let {data,error}=await supabase.auth.signInWithPassword({email,password});
    if(error&&error.message.includes('Invalid login credentials')){
        await supabase.auth.signUp({email,password});
        const {data:retryData}=await supabase.auth.signInWithPassword({email,password});
        data=retryData;
    } else if(error){msgDiv.innerHTML=`<div class="error">${error.message}</div>`;return;}
    if(data?.user){currentUser=data.user; await supabase.from('profiles').upsert({id:currentUser.id,email:currentUser.email,full_name:currentUser.email.split('@')[0],created_at:new Date()}); msgDiv.innerHTML='<div class="success">✅ Login successful!</div>'; document.getElementById('loginSection').classList.add('hide'); document.getElementById('profileSection').classList.remove('hide'); loadUserData(); loadAchievements();}
}

async function loadUserData(){
    if(!currentUser) return;
    document.getElementById('userName').innerText=localStorage.getItem('displayName')||currentUser.email.split('@')[0];
    document.getElementById('userEmail').innerText=currentUser.email;
    const {data:bookmarks}=await supabase.from('user_bookmarks').select('*, news(*)').eq('user_id',currentUser.id);
    const {data:history}=await supabase.from('reading_history').select('*, news(*)').eq('user_id',currentUser.id);
    document.getElementById('bookmarkCount').innerText=bookmarks?.length||0;
    document.getElementById('historyCount').innerText=history?.length||0;
    document.getElementById('readingTime').innerText=(history?.length||0)*3;
    document.getElementById('bookmarksList').innerHTML=(!bookmarks||bookmarks.length===0)?'<div class="info">No bookmarks yet</div>':bookmarks.map(b=>`<div class="bookmark-item" onclick="location.href='/rasu/article.html?id=${b.news.id}'">📰 ${b.news.title}<div style="font-size:12px;">${new Date(b.created_at).toLocaleDateString()}</div></div>`).join('');
    document.getElementById('historyList').innerHTML=(!history||history.length===0)?'<div class="info">No history yet</div>':history.map(h=>`<div class="history-item" onclick="location.href='/rasu/article.html?id=${h.news.id}'">📖 ${h.news.title}<div style="font-size:12px;">${new Date(h.read_at).toLocaleDateString()}</div></div>`).join('');
    document.getElementById('displayName').value=localStorage.getItem('displayName')||'';
}

function showTab(tab){
    document.getElementById('bookmarksTab').classList.add('hide'); document.getElementById('historyTab').classList.add('hide'); document.getElementById('settingsTab').classList.add('hide');
    if(tab==='bookmarks') document.getElementById('bookmarksTab').classList.remove('hide');
    if(tab==='history') document.getElementById('historyTab').classList.remove('hide');
    if(tab==='settings') document.getElementById('settingsTab').classList.remove('hide');
    document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.remove('active'));
    event.target.classList.add('active');
}

function updateProfile(){
    const name=document.getElementById('displayName').value, theme=document.getElementById('themeSelect').value;
    localStorage.setItem('displayName',name); localStorage.setItem('theme',theme);
    document.getElementById('userName').innerText=name||currentUser.email.split('@')[0];
    if(theme==='light') document.body.setAttribute('data-theme','light');
    else document.body.removeAttribute('data-theme');
    document.getElementById('settingsMsg').innerHTML='<div class="success">Settings saved!</div>';
    setTimeout(()=>document.getElementById('settingsMsg').innerHTML='',2000);
}

async function logout(){ await supabase.auth.signOut(); currentUser=null; document.getElementById('loginSection').classList.remove('hide'); document.getElementById('profileSection').classList.add('hide'); }

function toggleTheme(){ if(document.body.hasAttribute('data-theme')){ document.body.removeAttribute('data-theme'); localStorage.setItem('theme','dark'); } else { document.body.setAttribute('data-theme','light'); localStorage.setItem('theme','light'); } document.getElementById('themeToggle').innerHTML=document.body.hasAttribute('data-theme')?'🌙':'☀️'; }

document.getElementById('themeToggle').addEventListener('click',toggleTheme);
if(localStorage.getItem('theme')==='light') document.body.setAttribute('data-theme','light');

supabase.auth.getSession().then(({data})=>{ if(data.session){ currentUser=data.session.user; document.getElementById('loginSection').classList.add('hide'); document.getElementById('profileSection').classList.remove('hide'); loadUserData(); loadAchievements(); } });
</script>
</body>
</html>
