<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile 🌙 | THE MOON</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f0f0f; --card: #1a1a1a; --border: #2a2a2a;
            --text: #f8fafc; --text2: #cbd5e1; --text3: #64748b;
            --red: #dc2626; --success: #10b981;
        }
        [data-theme="light"] { --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #0f172a; --text2: #475569; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .header { background: var(--card); border-bottom: 2px solid var(--red); padding: 0.75rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.3rem; font-weight: 800; color: var(--red); text-decoration: none; }
        .container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1rem; text-align: center; }
        .avatar { width: 80px; height: 80px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 2.5rem; color: white; }
        input { width: 100%; padding: 0.75rem; margin-bottom: 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.9rem; }
        .btn { width: 100%; padding: 0.75rem; background: var(--red); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; font-family: inherit; }
        .btn:hover { opacity: 0.9; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin: 1rem 0; }
        .stat { text-align: center; }
        .stat-num { font-size: 1.5rem; font-weight: 900; color: var(--red); }
        .stat-lbl { font-size: 0.65rem; color: var(--text3); text-transform: uppercase; }
        .msg { padding: 0.75rem; border-radius: 8px; margin-top: 0.75rem; font-size: 0.85rem; }
        .msg-success { background: rgba(16,185,129,0.2); color: var(--success); }
        .msg-error { background: rgba(220,38,38,0.2); color: var(--red); }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="header">
    <a href="/rasu/" class="logo">🌙 THE MOON</a>
    <a href="/rasu/" style="color:var(--text);text-decoration:none;">← Home</a>
</div>

<div class="container">
    <!-- Login -->
    <div class="card" id="loginSection">
        <div style="font-size:3rem;margin-bottom:1rem;">🌙</div>
        <h2>Welcome Back</h2>
        <p style="color:var(--text2);margin-bottom:1rem;">Sign in to track your reading</p>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="btn" onclick="handleLogin()">Sign In / Sign Up</button>
        <div id="loginMsg"></div>
    </div>

    <!-- Profile -->
    <div class="hidden" id="profileSection">
        <div class="card">
            <div class="avatar"><i class="fas fa-user-circle"></i></div>
            <h2 id="profileName">Reader</h2>
            <p style="color:var(--text2);" id="profileEmail"></p>
            <div class="stats">
                <div class="stat"><div class="stat-num" id="statBookmarks">0</div><div class="stat-lbl">Bookmarks</div></div>
                <div class="stat"><div class="stat-num" id="statRead">0</div><div class="stat-lbl">Read</div></div>
                <div class="stat"><div class="stat-num" id="statTime">0</div><div class="stat-lbl">Min</div></div>
            </div>
            <button class="btn" onclick="handleLogout()" style="background:#6c757d;">🚪 Logout</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://crmbbmwekdlfjgekjnll.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kiBIIC7EYdIOuMUe4ss1Eg_DWDuK2kG';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let user = null;

async function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const msg = document.getElementById('loginMsg');
    if (!email || !password) { msg.innerHTML = '<div class="msg msg-error">Enter email and password</div>'; return; }

    let { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error && error.message.includes('Invalid login')) {
        await supabase.auth.signUp({ email, password });
        const retry = await supabase.auth.signInWithPassword({ email, password });
        data = retry.data;
    }
    if (data?.user) {
        user = data.user;
        msg.innerHTML = '<div class="msg msg-success">✅ Welcome!</div>';
        setTimeout(showProfile, 500);
    } else {
        msg.innerHTML = '<div class="msg msg-error">Login failed</div>';
    }
}

function showProfile() {
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('profileSection').classList.remove('hidden');
    document.getElementById('profileName').textContent = user.email?.split('@')[0] || 'Reader';
    document.getElementById('profileEmail').textContent = user.email;
    const bookmarks = JSON.parse(localStorage.getItem('moonBookmarks')) || [];
    const history = JSON.parse(localStorage.getItem('readingHistory')) || [];
    document.getElementById('statBookmarks').textContent = bookmarks.length;
    document.getElementById('statRead').textContent = history.length;
    document.getElementById('statTime').textContent = history.length * 3;
}

async function handleLogout() {
    await supabase.auth.signOut();
    user = null;
    document.getElementById('loginSection').classList.remove('hidden');
    document.getElementById('profileSection').classList.add('hidden');
}

supabase.auth.getSession().then(({ data }) => {
    if (data.session?.user) { user = data.session.user; showProfile(); }
});
</script>
</body>
</html>
