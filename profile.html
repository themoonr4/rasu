<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - My Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .profile-header {
            background: var(--card);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-radius: 12px;
        }
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .card h2 {
            color: var(--red);
            margin-bottom: 15px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
        }
        button {
            background: var(--red);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .success { background: #28a745; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; }
        .error { background: #dc3545; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; }
        .info { background: #17a2b8; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; }
        .nav-links { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { background: var(--bg); padding: 10px 20px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); }
        .nav-btn.active { background: var(--red); border-color: var(--red); }
        .hide { display: none; }
        .back-btn { display: inline-block; background: var(--red); color: white; padding: 8px 16px; border-radius: 8px; text-decoration: none; margin-bottom: 20px; }
        .bookmark-item, .history-item { background: var(--bg); padding: 12px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); }
        .avatar { width: 80px; height: 80px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 2.5rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .stat { text-align: center; }
        .stat-number { font-size: 1.5rem; font-weight: bold; color: var(--red); }
        .stat-label { font-size: 0.7rem; color: var(--text-sec); }
        .setting-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .logout-btn { background: #6c757d; margin-top: 10px; }
    </style>
</head>
<body>

<div class="profile-header">
    <div class="profile-container" style="display:flex;justify-content:space-between;align-items:center;width:100%;">
        <a href="/rasu/" class="logo">🌙 THE MOON</a>
        <button id="themeToggle" style="background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;">🌙</button>
    </div>
</div>

<div class="profile-container">
    <a href="/rasu/" class="back-btn">← Back to Home</a>
    
    <div id="loginSection" class="card">
        <h2>🔐 Login / Sign Up</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="login()">Login / Sign Up</button>
        <div id="loginMsg"></div>
    </div>
    
    <div id="profileSection" class="hide">
        <div class="card">
            <div class="avatar"><i class="fas fa-user-circle"></i></div>
            <h3 id="userName"></h3>
            <p style="color:var(--text-sec);" id="userEmail"></p>
            <div class="stats-grid">
                <div class="stat"><div class="stat-number" id="bookmarkCount">0</div><div class="stat-label">Bookmarks</div></div>
                <div class="stat"><div class="stat-number" id="historyCount">0</div><div class="stat-label">Articles Read</div></div>
                <div class="stat"><div class="stat-number" id="readingStreak">0</div><div class="stat-label">Day Streak</div></div>
            </div>
            <button onclick="logout()" class="logout-btn">🚪 Logout</button>
        </div>
        
        <div class="nav-links">
            <div class="nav-btn active" onclick="showTab('bookmarks')">🔖 Bookmarks</div>
            <div class="nav-btn" onclick="showTab('history')">📖 History</div>
            <div class="nav-btn" onclick="showTab('settings')">⚙️ Settings</div>
        </div>
        
        <div id="bookmarksTab" class="card"><h3>🔖 Your Bookmarks</h3><div id="bookmarksList">Loading...</div></div>
        <div id="historyTab" class="card hide"><h3>📖 Reading History</h3><div id="historyList">Loading...</div></div>
        <div id="settingsTab" class="card hide">
            <h3>⚙️ Profile Settings</h3>
            <div class="setting-item"><span>Display Name</span><input type="text" id="displayName" placeholder="Your name" style="width:auto;"></div>
            <div class="setting-item"><span>Theme</span><select id="themeSelect"><option value="dark">Dark</option><option value="light">Light</option></select></div>
            <button onclick="updateProfile()">Save Settings</button>
            <div id="settingsMsg"></div>
        </div>
    </div>
</div>

<script src="profile.js"></script>
</body>
</html>
