<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Webhook Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .webhook-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem 0;border-bottom:1px solid #222;}
        input,select{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-bolt"></i> Webhook Manager</h1>
        
        <div class="card">
            <h3>Add Webhook</h3>
            <input type="text" id="webhookUrl" placeholder="Webhook URL">
            <select id="webhookEvent">
                <option value="news_published">News Published</option>
                <option value="news_updated">News Updated</option>
                <option value="comment_added">Comment Added</option>
                <option value="user_registered">User Registered</option>
            </select>
            <button onclick="addWebhook()">Add Webhook</button>
        </div>
        
        <div class="card">
            <h3>Active Webhooks</h3>
            <div id="webhookList"></div>
        </div>
    </div>
    <script>
        let webhooks = JSON.parse(localStorage.getItem('webhooks') || '[]');
        
        function loadWebhooks() {
            const listDiv = document.getElementById('webhookList');
            if(webhooks.length === 0) { listDiv.innerHTML = '<p>No webhooks configured</p>'; return; }
            listDiv.innerHTML = webhooks.map((w, i) => `
                <div class="webhook-item">
                    <div><strong>${w.event}</strong><br><span style="font-size:0.7rem;">${w.url}</span></div>
                    <div><button onclick="testWebhook(${i})">Test</button><button onclick="deleteWebhook(${i})" style="background:#dc3545;">Delete</button></div>
                </div>
            `).join('');
        }
        
        function addWebhook() {
            const url = document.getElementById('webhookUrl').value;
            const event = document.getElementById('webhookEvent').value;
            if(!url) { alert('Enter webhook URL'); return; }
            webhooks.push({ url, event, date: new Date().toLocaleString() });
            localStorage.setItem('webhooks', JSON.stringify(webhooks));
            document.getElementById('webhookUrl').value = '';
            loadWebhooks();
            alert('Webhook added!');
        }
        
        async function testWebhook(index) {
            const webhook = webhooks[index];
            try {
                const response = await fetch(webhook.url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ test: true, event: webhook.event, message: 'Test webhook from THE MOON' }) });
                alert(`Test sent! Response: ${response.status}`);
            } catch(e) { alert('Webhook test failed: ' + e.message); }
        }
        
        function deleteWebhook(index) {
            webhooks.splice(index, 1);
            localStorage.setItem('webhooks', JSON.stringify(webhooks));
            loadWebhooks();
        }
        
        loadWebhooks();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
