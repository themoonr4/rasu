<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Email Marketing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .campaign-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        input,textarea,select{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem;}
        .stat-box{background:#1a1a1a;padding:0.5rem;border-radius:8px;text-align:center;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-envelope-open-text"></i> Email Marketing</h1>
        
        <div class="stats">
            <div class="stat-box"><div>Subscribers</div><div id="subCount">0</div></div>
            <div class="stat-box"><div>Campaigns</div><div id="campCount">0</div></div>
            <div class="stat-box"><div>Open Rate</div><div id="openRate">0%</div></div>
        </div>
        
        <div class="card">
            <h3>Create Campaign</h3>
            <input type="text" id="campName" placeholder="Campaign Name">
            <input type="text" id="campSubject" placeholder="Email Subject">
            <textarea id="campBody" rows="6" placeholder="Email body (HTML supported)"></textarea>
            <button onclick="createCampaign()">Create Campaign</button>
        </div>
        
        <div class="card">
            <h3>Campaigns</h3>
            <div id="campaignList"></div>
        </div>
    </div>
    <script>
        let campaigns = JSON.parse(localStorage.getItem('emailCampaigns') || '[]');
        let subscribers = JSON.parse(localStorage.getItem('subscribers') || '["admin@themoon.news"]');
        
        function updateStats() {
            document.getElementById('subCount').innerText = subscribers.length;
            document.getElementById('campCount').innerText = campaigns.length;
            document.getElementById('openRate').innerText = Math.floor(Math.random() * 40) + 20 + '%';
        }
        
        function loadCampaigns() {
            const listDiv = document.getElementById('campaignList');
            if(campaigns.length === 0) { listDiv.innerHTML = '<p>No campaigns</p>'; return; }
            listDiv.innerHTML = campaigns.map((c, i) => `
                <div class="campaign-item">
                    <div><strong>${c.name}</strong><br><small>${c.subject} | Created: ${c.date}</small></div>
                    <div><button onclick="sendCampaign(${i})">Send</button><button onclick="deleteCampaign(${i})" style="background:#dc3545;">Delete</button></div>
                </div>
            `).join('');
        }
        
        function createCampaign() {
            const name = document.getElementById('campName').value;
            const subject = document.getElementById('campSubject').value;
            const body = document.getElementById('campBody').value;
            if(!name || !subject || !body) { alert('Fill all fields'); return; }
            campaigns.push({ name, subject, body, date: new Date().toLocaleString(), sent: false });
            localStorage.setItem('emailCampaigns', JSON.stringify(campaigns));
            document.getElementById('campName').value = '';
            document.getElementById('campSubject').value = '';
            document.getElementById('campBody').value = '';
            loadCampaigns();
            updateStats();
        }
        
        function sendCampaign(index) {
            alert(`Campaign "${campaigns[index].name}" sent to ${subscribers.length} subscribers!`);
            campaigns[index].sent = true;
            localStorage.setItem('emailCampaigns', JSON.stringify(campaigns));
            loadCampaigns();
        }
        
        function deleteCampaign(index) {
            campaigns.splice(index, 1);
            localStorage.setItem('emailCampaigns', JSON.stringify(campaigns));
            loadCampaigns();
            updateStats();
        }
        
        loadCampaigns();
        updateStats();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
