<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:1200px;margin:0 auto;}
        h1{margin-bottom:2rem;color:#dc2626;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;margin-bottom:2rem;}
        .stat-card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;}
        .stat-value{font-size:2rem;font-weight:700;margin-top:0.5rem;}
        .chart-card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;}
        .bar-item{margin-bottom:1rem;}
        .bar{height:30px;background:#dc2626;border-radius:8px;transition:width 0.5s;}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:0.75rem;text-align:left;border-bottom:1px solid #222;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
        @media(max-width:768px){body{padding:1rem;}}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-chart-line"></i> Traffic Analytics</h1>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="chart-card"><h3>📈 Views by Category</h3><div id="categoryChart"></div></div>
        <div class="chart-card"><h3>🔥 Top Performing News</h3><table id="topNewsTable"><thead><tr><th>Title</th><th>Views</th><th>Date</th></tr></thead><tbody id="topNewsBody"></tbody></table></div>
    </div>
    <script>
        const SUPABASE_URL = 'https://cjyfmhsodmbudjbxjbek.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_RPIMDVsM_8kpbqSlTUmnVw_m7k7K4Cv';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        async function loadAnalytics() {
            const { data: news } = await supabase.from('news').select('*, categories(*)');
            const totalViews = news?.reduce((a,b) => a + (b.views || 0), 0) || 0;
            const categoryViews = {};
            news?.forEach(n => { const cat = n.categories?.name || 'Other'; categoryViews[cat] = (categoryViews[cat] || 0) + (n.views || 0); });
            const maxViews = Math.max(...Object.values(categoryViews), 1);
            document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><div>👁️ Total Views</div><div class="stat-value">${totalViews.toLocaleString()}</div></div><div class="stat-card"><div>📰 Total News</div><div class="stat-value">${news?.length || 0}</div></div>`;
            document.getElementById('categoryChart').innerHTML = Object.entries(categoryViews).map(([name, views]) => `<div class="bar-item"><div>${name}</div><div class="bar" style="width:${(views/maxViews)*100}%"></div><div>${views.toLocaleString()} views</div></div>`).join('');
            const topNews = [...(news || [])].sort((a,b) => (b.views || 0) - (a.views || 0)).slice(0,5);
            document.getElementById('topNewsBody').innerHTML = topNews.map(n => `<tr><td>${n.title}</td><td>${(n.views || 0).toLocaleString()}</td><td>${new Date(n.published_at).toLocaleDateString()}</td></tr>`).join('');
        }
        loadAnalytics();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
