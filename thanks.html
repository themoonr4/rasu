<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Thank You</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .thanks-card{text-align:center;background:#111;border:1px solid #222;border-radius:24px;padding:3rem;margin:2rem;max-width:500px;}
        .icon{font-size:5rem;color:#28a745;margin-bottom:1rem;}
        h1{margin-bottom:1rem;color:#28a745;}
        .home-btn{background:#dc2626;color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;margin-top:1rem;}
    </style>
</head>
<body>
    <div class="thanks-card">
        <div class="icon"><i class="fas fa-check-circle"></i></div>
        <h1>Thank You!</h1>
        <p>Your submission has been received successfully.</p>
        <p style="color:#aaa;margin-top:1rem;">We'll get back to you within 24-48 hours.</p>
        <button class="home-btn" onclick="location.href='/'">Back to Home</button>
        <div style="margin-top:1rem;font-size:0.8rem;color:#aaa;">Follow us for latest updates</div>
    </div>
    <script>
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
