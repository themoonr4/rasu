<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Admin</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: #0a0a0a;
            font-family: Arial, sans-serif;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
        }
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 25px;
        }
        h2 {
            color: #dc2626;
            text-align: center;
            margin-bottom: 20px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        button {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background: #b91c1c;
        }
        .success {
            background: #28a745;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
        }
        .error {
            background: #dc3545;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
        }
        .info {
            background: #17a2b8;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 14px;
        }
        .hide {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Card -->
        <div id="loginCard" class="card">
            <h2>🔐 THE MOON - Admin Login</h2>
            <input type="password" id="adminPass" placeholder="Enter Admin Password">
            <button onclick="verifyPassword()">Login</button>
            <div id="loginError"></div>
        </div>

        <!-- Admin Panel Card (Hidden initially) -->
        <div id="adminCard" class="card hide">
            <h2>🌙 THE MOON - Post News</h2>
            <div class="info">✅ Logged in as Administrator</div>
            
            <input type="text" id="title" placeholder="News Title">
            
            <select id="category">
                <option value="1">💻 Technology</option>
                <option value="2">🏏 Sports</option>
                <option value="3">📊 Business</option>
                <option value="4">🏛️ Politics</option>
                <option value="5">📚 Study</option>
            </select>
            
            <input type="text" id="imageUrl" placeholder="Image URL (optional)">
            
            <textarea id="content" rows="8" placeholder="Write your news content here..."></textarea>
            
            <button onclick="publishNews()">📰 PUBLISH NEWS</button>
            <button onclick="logout()" style="background:#6c757d; margin-top: 10px;">🚪 Logout</button>
            
            <div id="result"></div>
        </div>
    </div>

    <script>
        // 🔐 YOUR SECRET PASSWORD (Change this to anything you want)
        const SECRET_PASSWORD = 'TheMoon@2024';
        
        // 🔑 Supabase Configuration (Your credentials)
        const SUPABASE_URL = 'https://qrtiapjrslubbbuucpen.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Um_UlotzRIAPivm1GErr-A_S_-gJyz9';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Verify password and show admin panel
        function verifyPassword() {
            const password = document.getElementById('adminPass').value;
            const errorDiv = document.getElementById('loginError');
            
            if (password === SECRET_PASSWORD) {
                document.getElementById('loginCard').classList.add('hide');
                document.getElementById('adminCard').classList.remove('hide');
                errorDiv.innerHTML = '';
            } else {
                errorDiv.innerHTML = '<div class="error">❌ Wrong Password! Access Denied.</div>';
            }
        }

        // Logout function
        function logout() {
            document.getElementById('loginCard').classList.remove('hide');
            document.getElementById('adminCard').classList.add('hide');
            document.getElementById('adminPass').value = '';
        }

        // Publish news to Supabase
        async function publishNews() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const categoryId = document.getElementById('category').value;
            const image = document.getElementById('imageUrl').value;
            const resultDiv = document.getElementById('result');
            
            // Validation
            if (!title || !content) {
                resultDiv.innerHTML = '<div class="error">❌ Please enter Title and Content!</div>';
                return;
            }
            
            resultDiv.innerHTML = '<div class="success">⏳ Publishing...</div>';
            
            // Create URL-friendly slug
            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            
            // Insert into Supabase
            const { error } = await supabase.from('news').insert({
                title: title,
                slug: slug,
                content: content,
                category_id: parseInt(categoryId),
                featured_image: image || null,
                excerpt: content.substring(0, 150),
                status: 'published',
                published_at: new Date().toISOString()
            });
            
            if (error) {
                resultDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            } else {
                resultDiv.innerHTML = '<div class="success">✅ NEWS PUBLISHED SUCCESSFULLY! 🎉</div>';
                // Clear form
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
                document.getElementById('imageUrl').value = '';
                setTimeout(() => resultDiv.innerHTML = '', 3000);
            }
        }
    </script>
</body>
</html>
