<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #dc2626; margin-bottom: 20px; text-align: center; }
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .card h3 { margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: 500; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
        }
        button {
            background: #dc2626;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #b91c1c; }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .message.success { background: #15803d; display: block; }
        .message.error { background: #b91c1c; display: block; }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card .value { font-size: 24px; font-weight: bold; color: #dc2626; }
        .stat-card .label { font-size: 12px; color: #94a3b8; margin-top: 5px; }
        .footer { text-align: center; padding: 20px; color: #64748b; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌙 THE MOON — Admin Panel</h1>
        
        <!-- Stats Section -->
        <div class="card">
            <h3>📊 Dashboard</h3>
            <div class="stats">
                <div class="stat-card"><div class="value" id="totalNews">0</div><div class="label">Total News</div></div>
                <div class="stat-card"><div class="value" id="totalViews">0</div><div class="label">Total Views</div></div>
                <div class="stat-card"><div class="value" id="todayCount">0</div><div class="label">Published Today</div></div>
            </div>
            <div id="recentList" style="margin-top: 15px; max-height: 200px; overflow-y: auto;"></div>
        </div>
        
        <!-- Publish Section -->
        <div class="card">
            <h3>✍️ Publish News</h3>
            <form id="newsForm">
                <div class="form-group">
                    <label>📰 Title *</label>
                    <input type="text" id="title" placeholder="Breaking news title..." required>
                </div>
                <div class="form-group">
                    <label>📂 Category *</label>
                    <select id="category">
                        <option value="Technology">💻 Technology</option>
                        <option value="Sports">🏏 Sports</option>
                        <option value="Business">📊 Business</option>
                        <option value="Politics">🏛️ Politics</option>
                        <option value="Study">📚 Study</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📝 Summary (Short description)</label>
                    <textarea id="summary" rows="2" placeholder="Brief summary of the news..."></textarea>
                </div>
                <div class="form-group">
                    <label>📄 Full Content *</label>
                    <textarea id="content" rows="6" placeholder="Write your full news content here..." required></textarea>
                </div>
                <div class="form-group">
                    <label>🖼️ Image URL</label>
                    <input type="text" id="imageUrl" placeholder="https://picsum.photos/400/200">
                </div>
                <div class="form-group">
                    <label>⭐ Badge (Optional)</label>
                    <select id="badge">
                        <option value="">None</option>
                        <option value="BREAKING">🔴 BREAKING</option>
                        <option value="TRENDING">📈 TRENDING</option>
                        <option value="EXCLUSIVE">✨ EXCLUSIVE</option>
                    </select>
                </div>
                <button type="submit" id="publishBtn">🚀 PUBLISH TO WORLD</button>
                <div id="message" class="message"></div>
            </form>
        </div>
        
        <div class="footer">
            <p>© 2026 THE MOON — Admin Panel</p>
        </div>
    </div>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://zpubhlbdqwzyseditrls.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_4YiRI2c1Tij-2KvyNtJ9Sg_8-l0OFuP';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let allNews = [];
        
        // Load Dashboard
        async function loadDashboard() {
            try {
                const { data, error } = await supabase
                    .from('news')
                    .select('*')
                    .order('published_at', { ascending: false });
                
                if (error) throw error;
                
                allNews = data || [];
                
                // Update stats
                document.getElementById('totalNews').innerText = allNews.length;
                document.getElementById('totalViews').innerText = allNews.reduce((sum, n) => sum + (n.views || 0), 0);
                
                // Today's count
                const today = new Date().toDateString();
                const todayCount = allNews.filter(n => new Date(n.published_at).toDateString() === today).length;
                document.getElementById('todayCount').innerText = todayCount;
                
                // Recent news list
                const recentHtml = allNews.slice(0, 5).map(n => `
                    <div style="padding: 10px; border-bottom: 1px solid #222;">
                        <strong>${escapeHtml(n.title)}</strong><br>
                        <small>📅 ${new Date(n.published_at).toLocaleDateString()} | 👁️ ${n.views || 0} views | 🏷️ ${n.category || 'News'}</small>
                    </div>
                `).join('');
                
                document.getElementById('recentList').innerHTML = recentHtml || '<p>No news yet. Publish your first news!</p>';
                
            } catch(e) {
                console.error('Dashboard error:', e);
                document.getElementById('recentList').innerHTML = '<p>Error loading news. Check console.</p>';
            }
        }
        
        // Publish News
        async function publishNews(event) {
            event.preventDefault();
            
            const title = document.getElementById('title').value.trim();
            const category = document.getElementById('category').value;
            const summary = document.getElementById('summary').value;
            const content = document.getElementById('content').value;
            const imageUrl = document.getElementById('imageUrl').value || 'https://picsum.photos/400/200';
            const badge = document.getElementById('badge').value;
            
            if (!title || !content) {
                showMessage('Title and Content are required!', 'error');
                return;
            }
            
            const btn = document.getElementById('publishBtn');
            const originalText = btn.textContent;
            btn.textContent = '⏳ Publishing...';
            btn.disabled = true;
            
            try {
                const { error } = await supabase
                    .from('news')
                    .insert([{
                        title: title,
                        content: content,
                        summary: summary || content.substring(0, 160),
                        image_url: imageUrl,
                        category: category,
                        badge: badge,
                        published_at: new Date().toISOString(),
                        views: 0
                    }]);
                
                if (error) throw error;
                
                showMessage('✅ Published successfully! News is now live on the website!', 'success');
                
                // Clear form
                document.getElementById('title').value = '';
                document.getElementById('summary').value = '';
                document.getElementById('content').value = '';
                document.getElementById('imageUrl').value = '';
                document.getElementById('badge').value = '';
                
                // Reload dashboard
                loadDashboard();
                
            } catch(e) { 
                showMessage('Error: ' + e.message, 'error'); 
            } finally { 
                btn.textContent = originalText; 
                btn.disabled = false; 
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `message ${type}`;
            setTimeout(() => msgDiv.className = 'message', 5000);
        }
        
        // Form submit
        document.getElementById('newsForm').addEventListener('submit', publishNews);
        
        // Initial load
        loadDashboard();
    </script>
</body>
</html>
