<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
        }
        h2 {
            color: #dc2626;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #b91c1c;
        }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            text-align: center;
        }
        .error { background: #dc3545; }
        .success { background: #28a745; }
        .loading { background: #ffc107; color: #000; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🌙 THE MOON</h2>
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login / Sign Up</button>
        <div id="message"></div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // 🔐 YOUR CORRECT CREDENTIALS (ALREADY ADDED) 🔐
        const SUPABASE_URL = 'https://qrtiapjrslubbbuucpen.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Um_UlotzRIAPivm1GErr-A_S_-gJyz9';

        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');

            if (!email || !password) {
                msgDiv.innerHTML = '<div class="message error">Please enter email and password</div>';
                return;
            }

            msgDiv.innerHTML = '<div class="message loading">Connecting...</div>';

            // Sign Up and Sign In
            await supabase.auth.signUp({ email, password });
            const { error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                msgDiv.innerHTML = `<div class="message error">❌ Error: ${error.message}</div>`;
            } else {
                msgDiv.innerHTML = '<div class="message success">✅ Login Successful! Redirecting...</div>';
                // Redirect to admin dashboard or home page
                setTimeout(() => {
                    window.location.href = 'https://themoonr4.github.io/rasu/dashboard.html';
                }, 1500);
            }
        }
    </script>
</body>
</html>
