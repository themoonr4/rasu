<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE MOON - Admin</title>
    <style>
        body{background:#0a0a0a;font-family:Arial;color:#fff;padding:20px;}
        .container{max-width:600px;margin:0 auto;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:25px;margin-bottom:20px;}
        h2{color:#dc2626;text-align:center;margin-bottom:20px;}
        h3{color:#dc2626;margin-bottom:15px;font-size:18px;}
        input,textarea,select{width:100%;padding:12px;margin-bottom:15px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;}
        button{background:#dc2626;color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;width:100%;font-weight:bold;}
        button:hover{background:#b91c1c;}
        .success{background:#28a745;padding:10px;border-radius:8px;margin-top:15px;text-align:center;}
        .error{background:#dc3545;padding:10px;border-radius:8px;margin-top:15px;text-align:center;}
        .info{background:#17a2b8;padding:10px;border-radius:8px;margin-bottom:15px;text-align:center;}
        .hide{display:none;}
        .form-group{margin-bottom:15px;}
        label{display:block;margin-bottom:5px;color:#aaa;font-size:13px;}
        .btn-secondary{background:#6c757d;margin-top:10px;}
        .btn-secondary:hover{background:#5a6268;}
        .subscriber-item{display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid #222;}
        .subscriber-email{font-weight:bold;}
        .subscriber-date{font-size:11px;color:#aaa;}
        .delete-sub-btn{background:#dc3545;padding:4px 8px;width:auto;font-size:12px;}
    </style>
</head>
<body>
    <div class="container">
        <!-- Password Screen -->
        <div id="passwordScreen" class="card">
            <h2>🔐 Admin Access</h2>
            <input type="password" id="adminPass" placeholder="Enter Admin Password">
            <button onclick="checkPassword()">Enter</button>
            <div id="passMsg"></div>
        </div>

        <!-- Admin Panel -->
        <div id="adminPanel" class="hide">
            <!-- Post News Section -->
            <div class="card">
                <h2>🌙 Post News</h2>
                <div class="info">✅ Authorized Admin</div>
                
                <input type="text" id="title" placeholder="Title">
                <select id="category">
                    <option value="1">💻 Technology</option>
                    <option value="2">🏏 Sports</option>
                    <option value="3">📊 Business</option>
                    <option value="4">🏛️ Politics</option>
                    <option value="5">📚 Study</option>
                </select>
                <input type="text" id="image" placeholder="Image URL">
                <textarea id="content" rows="8" placeholder="Content..."></textarea>
                <button onclick="postNews()">📰 PUBLISH</button>
                <div id="result"></div>
            </div>

            <!-- Push Notification Section -->
            <div class="card">
                <h3><i class="fas fa-bell"></i> 🔔 Send Push Notification</h3>
                <div class="form-group">
                    <label>Notification Title</label>
                    <input type="text" id="notifyTitle" placeholder="e.g., Breaking News">
                </div>
                <div class="form-group">
                    <label>Notification Message</label>
                    <textarea id="notifyMessage" rows="3" placeholder="e.g., Click to read the full story..."></textarea>
                </div>
                <div class="form-group">
                    <label>Click URL (optional)</label>
                    <input type="text" id="notifyUrl" placeholder="/rasu/">
                </div>
                <button id="sendNotifyBtn" onclick="sendNotificationFromAdmin()">📤 Send Notification</button>
                <div id="notifyResult"></div>
            </div>

            <!-- Subscriber List Section -->
            <div class="card">
                <h3><i class="fas fa-users"></i> 📧 Newsletter Subscribers</h3>
                <div id="subscriberList" style="max-height: 300px; overflow-y: auto;">
                    <div class="info">Loading subscribers...</div>
                </div>
                <button onclick="exportSubscribers()" style="margin-top: 10px; background: #28a745;">
                    📥 Export Subscribers (CSV)
                </button>
            </div>

            <!-- Logout Button -->
            <button onclick="logout()" class="btn-secondary">🚪 Logout</button>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // 🔐 Password
        const SECRET_PASSWORD = 'TheMoon2024';

        // 🔑 Supabase (YOUR credentials)
        const SUPABASE_URL = 'https://qrtiapjrslubbbuucpen.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Um_UlotzRIAPivm1GErr-A_S_-gJyz9';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 🔔 OneSignal Configuration
        const ONESIGNAL_APP_ID = '60154f61-182d-45c0-99f1-fef13b3f9d1c';
        const ONESIGNAL_REST_API_KEY = 'YOUR_REST_API_KEY_HERE';  // 🔑 OneSignal Dashboard se copy karo

        // Check Password
        function checkPassword() {
            const pass = document.getElementById('adminPass').value;
            const msgDiv = document.getElementById('passMsg');
            
            if (pass === SECRET_PASSWORD) {
                document.getElementById('passwordScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                msgDiv.innerHTML = '';
                loadSubscribers();
            } else {
                msgDiv.innerHTML = '<div class="error">❌ Wrong Password!</div>';
            }
        }

        // Logout
        function logout() {
            document.getElementById('passwordScreen').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminPass').value = '';
        }

        // Load Subscribers
        async function loadSubscribers() {
            const { data, error } = await supabase
                .from('newsletter')
                .select('*')
                .order('subscribed_at', { ascending: false });
            
            const listDiv = document.getElementById('subscriberList');
            
            if (error || !data || data.length === 0) {
                listDiv.innerHTML = '<div class="info">No subscribers yet</div>';
                return;
            }
            
            listDiv.innerHTML = data.map(sub => `
                <div class="subscriber-item">
                    <div>
                        <div class="subscriber-email">${sub.email}</div>
                        <div class="subscriber-date">📅 ${new Date(sub.subscribed_at).toLocaleDateString()}</div>
                    </div>
                    <button class="delete-sub-btn" onclick="deleteSubscriber('${sub.id}')">Delete</button>
                </div>
            `).join('');
        }

        // Delete Subscriber
        async function deleteSubscriber(id) {
            if (confirm('Remove this subscriber?')) {
                await supabase.from('newsletter').delete().eq('id', id);
                loadSubscribers();
            }
        }

        // Export Subscribers to CSV
        async function exportSubscribers() {
            const { data } = await supabase.from('newsletter').select('*').order('subscribed_at', { ascending: false });
            
            if (!data || data.length === 0) {
                alert('No subscribers to export');
                return;
            }
            
            let csv = 'Email,Subscribed Date\n';
            data.forEach(sub => {
                csv += `"${sub.email}","${new Date(sub.subscribed_at).toLocaleString()}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `subscribers_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Post News to Supabase
        async function postNews() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const categoryId = parseInt(document.getElementById('category').value, 10);
            const image = document.getElementById('image').value;
            const resultDiv = document.getElementById('result');

            if (!title || !content) {
                resultDiv.innerHTML = '<div class="error">❌ Title and Content required</div>';
                return;
            }

            if (Number.isNaN(categoryId)) {
                resultDiv.innerHTML = '<div class="error">❌ Valid category required</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="success">⏳ Publishing...</div>';

            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/news`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        slug: slug,
                        content: content,
                        category_id: categoryId,
                        featured_image: image || null,
                        excerpt: content.substring(0, 150),
                        status: 'published',
                        published_at: new Date().toISOString()
                    })
                });

                if (response.ok) {
                    resultDiv.innerHTML = '<div class="success">✅ NEWS PUBLISHED! 🎉</div>';
                    document.getElementById('title').value = '';
                    document.getElementById('content').value = '';
                    document.getElementById('image').value = '';
                    
                    // Auto send notification after publishing news
                    const notifyTitle = document.getElementById('notifyTitle').value || title;
                    const notifyMessage = document.getElementById('notifyMessage').value || content.substring(0, 100);
                    const notifyUrl = document.getElementById('notifyUrl').value || `/rasu/`;
                    
                    await sendPushNotification(notifyTitle, notifyMessage, notifyUrl);
                    loadSubscribers();
                    
                    setTimeout(() => resultDiv.innerHTML = '', 3000);
                } else {
                    const errorText = await response.text();
                    let parsedError = null;
                    try { parsedError = JSON.parse(errorText); } catch (_) {}
                    const errorMsg = parsedError?.message || parsedError?.hint || errorText || 'Unknown error';
                    resultDiv.innerHTML = `<div class="error">❌ ${errorMsg}</div>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="error">❌ Connection error: ${err.message}</div>`;
            }
        }

        // Send Push Notification via OneSignal REST API
        async function sendPushNotification(title, message, url) {
            if (!ONESIGNAL_REST_API_KEY || ONESIGNAL_REST_API_KEY === 'YOUR_REST_API_KEY_HERE') {
                console.log('REST API key not configured');
                return false;
            }
            
            try {
                const response = await fetch('https://onesignal.com/api/v1/notifications', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Basic ${ONESIGNAL_REST_API_KEY}`
                    },
                    body: JSON.stringify({
                        app_id: ONESIGNAL_APP_ID,
                        headings: { en: title },
                        contents: { en: message },
                        url: url,
                        included_segments: ['Subscribed Users']
                    })
                });
                
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Notification error:', error);
                return { error: error.message };
            }
        }

        // Send notification from admin panel button
        async function sendNotificationFromAdmin() {
            const title = document.getElementById('notifyTitle').value;
            const message = document.getElementById('notifyMessage').value;
            const url = document.getElementById('notifyUrl').value || '/rasu/';
            const resultDiv = document.getElementById('notifyResult');
            
            if (!title || !message) {
                resultDiv.innerHTML = '<div class="error">❌ Please enter both title and message</div>';
                setTimeout(() => resultDiv.innerHTML = '', 3000);
                return;
            }
            
            resultDiv.innerHTML = '<div class="success">⏳ Sending notification...</div>';
            
            const response = await sendPushNotification(title, message, url);
            
            if (response.errors) {
                resultDiv.innerHTML = `<div class="error">❌ Failed: ${response.errors}</div>`;
            } else if (response.id) {
                resultDiv.innerHTML = `<div class="success">✅ Notification sent successfully! (ID: ${response.id})</div>`;
                document.getElementById('notifyTitle').value = '';
                document.getElementById('notifyMessage').value = '';
            } else {
                resultDiv.innerHTML = `<div class="error">❌ Error: ${JSON.stringify(response)}</div>`;
            }
            
            setTimeout(() => {
                if (resultDiv.innerHTML) resultDiv.innerHTML = '';
            }, 4000);
        }
    </script>
</body>
</html>
