<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE MOON - Admin</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body{background:#0a0a0a;font-family:Arial;color:#fff;padding:20px;}
        .container{max-width:500px;margin:50px auto;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:25px;}
        h2{color:#dc2626;text-align:center;}
        input,textarea,select{width:100%;padding:10px;margin-bottom:15px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        button{background:#dc2626;color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;width:100%;font-weight:bold;}
        .success{background:#28a745;padding:10px;border-radius:8px;margin-top:15px;text-align:center;}
        .error{background:#dc3545;padding:10px;border-radius:8px;margin-top:15px;text-align:center;}
        .hide{display:none;}
    </style>
</head>
<body>
    <div class="container">
        <div id="loginCard" class="card">
            <h2>🔐 Admin Login</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Login</button>
            <div id="loginMsg"></div>
        </div>

        <div id="adminCard" class="card hide">
            <h2>🌙 Post News</h2>
            <input type="text" id="title" placeholder="Title">
            <select id="category">
                <option value="1">Technology</option>
                <option value="2">Sports</option>
                <option value="3">Business</option>
                <option value="4">Politics</option>
                <option value="5">Study</option>
            </select>
            <input type="text" id="image" placeholder="Image URL">
            <textarea id="content" rows="6" placeholder="Content..."></textarea>
            <button onclick="publishNews()">Publish</button>
            <button onclick="logout()" style="background:#6c757d;margin-top:10px;">Logout</button>
            <div id="result"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qrtiapjrslubbbuucpen.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Um_UlotzRIAPivm1GErr-A_S_-gJyz9';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('loginMsg');
            
            if (!email || !password) {
                msgDiv.innerHTML = '<div class="error">Enter email and password</div>';
                return;
            }
            
            msgDiv.innerHTML = '<div class="success">Connecting...</div>';
            
            // Direct sign in (user already exists)
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                msgDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
            } else if (data?.user) {
                msgDiv.innerHTML = '<div class="success">✅ Login Successful!</div>';
                document.getElementById('loginCard').classList.add('hide');
                document.getElementById('adminCard').classList.remove('hide');
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            document.getElementById('loginCard').classList.remove('hide');
            document.getElementById('adminCard').classList.add('hide');
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        async function publishNews() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const catId = document.getElementById('category').value;
            const image = document.getElementById('image').value;
            const msgDiv = document.getElementById('result');
            
            if (!title || !content) {
                msgDiv.innerHTML = '<div class="error">Title and content required</div>';
                return;
            }
            
            msgDiv.innerHTML = '<div class="success">Publishing...</div>';
            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            
            const { error } = await supabase.from('news').insert({
                title, slug, content,
                category_id: parseInt(catId),
                featured_image: image || null,
                excerpt: content.substring(0,150),
                status: 'published',
                published_at: new Date().toISOString()
            });
            
            if (error) {
                msgDiv.innerHTML = `<div class="error">${error.message}</div>`;
            } else {
                msgDiv.innerHTML = '<div class="success">✅ News published!</div>';
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
                document.getElementById('image').value = '';
                setTimeout(() => msgDiv.innerHTML = '', 2000);
            }
        }
    </script>
</body>
</html>
