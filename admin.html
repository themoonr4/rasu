<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0a0a;color:#fff;font-family:'Segoe UI',Arial,sans-serif;padding:20px;}
        .container{max-width:1200px;margin:0 auto;}
        .header{background:#111;padding:15px 20px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
        .logo{font-size:24px;font-weight:bold;color:#dc2626;text-decoration:none;}
        .card{background:#111;border-radius:16px;padding:25px;margin-bottom:20px;}
        .card h2{color:#dc2626;margin-bottom:20px;}
        input,textarea,select{width:100%;padding:12px;margin-bottom:15px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        button{background:#dc2626;color:#fff;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;font-weight:bold;}
        button:hover{background:#b91c1c;}
        .news-item{background:#1a1a1a;padding:15px;margin-bottom:10px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
        .news-title{flex:1;font-weight:bold;}
        .news-actions button{margin-left:10px;padding:8px 15px;}
        .btn-danger{background:#dc3545;}
        .btn-danger:hover{background:#c82333;}
        .btn-edit{background:#ffc107;color:#000;}
        .btn-edit:hover{background:#e0a800;}
        .hide{display:none;}
        .success{background:#28a745;padding:10px;border-radius:8px;margin-top:10px;text-align:center;}
        .error{background:#dc3545;padding:10px;border-radius:8px;margin-top:10px;text-align:center;}
        .loader{text-align:center;padding:40px;}
        .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#dc2626;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;}
        @keyframes spin{to{transform:rotate(360deg);}}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #333;}
        th{color:#dc2626;}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="/rasu/" class="logo">🌙 THE MOON Admin</a>
        <a href="/rasu/" style="color:#fff;text-decoration:none;">← Back to Site</a>
    </div>

    <div id="loginSection" class="card">
        <h2>🔐 Admin Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="adminLogin()">Login</button>
        <div id="loginMsg"></div>
    </div>

    <div id="adminPanel" class="hide">
        <div class="card">
            <h2>➕ Add New Article</h2>
            <input type="text" id="newsTitle" placeholder="Title">
            <input type="text" id="newsSlug" placeholder="Slug (e.g., india-wins-world-cup)">
            <input type="text" id="newsExcerpt" placeholder="Short excerpt">
            <textarea id="newsContent" rows="5" placeholder="Full article content..."></textarea>
            <select id="newsCategory">
                <option value="">Select Category</option>
                <option value="Technology">Technology</option>
                <option value="Sports">Sports</option>
                <option value="Business">Business</option>
                <option value="Politics">Politics</option>
                <option value="Study">Study</option>
                <option value="Entertainment">Entertainment</option>
            </select>
            <input type="text" id="newsImage" placeholder="Featured image URL (optional)">
            <button onclick="addNews()">➕ Publish Article</button>
            <div id="addMsg"></div>
        </div>

        <div class="card">
            <h2>📰 All Articles</h2>
            <div id="newsList"><div class="loader"><div class="spinner"></div></div></div>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://crmbbmwekdlfjgekjnll.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kiBIIC7EYdIOuMUe4ss1Eg_DWDuK2kG';

const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY, {
    global: { headers: { 'apikey': SUPABASE_KEY } }
});

let currentUser = null;
let isAdmin = false;

async function adminLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const msgDiv = document.getElementById('loginMsg');
    
    if(!email || !password) {
        msgDiv.innerHTML = '<div class="error">Enter email and password</div>';
        return;
    }
    
    msgDiv.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    
    let { data, error } = await supabase.auth.signInWithPassword({ email, password });
    
    if(error && error.message.includes('Invalid login credentials')) {
        await supabase.auth.signUp({ email, password });
        const { data: retryData } = await supabase.auth.signInWithPassword({ email, password });
        data = retryData;
    } else if(error) {
        msgDiv.innerHTML = `<div class="error">${error.message}</div>`;
        return;
    }
    
    if(data?.user) {
        currentUser = data.user;
        
        // Check if admin (you can manually add yourself as admin)
        const { data: adminCheck } = await supabase
            .from('admin_users')
            .select('*')
            .eq('id', currentUser.id)
            .single();
        
        if(adminCheck || email === 'admin@themoon.com') {
            isAdmin = true;
            msgDiv.innerHTML = '<div class="success">✅ Admin login successful!</div>';
            document.getElementById('loginSection').classList.add('hide');
            document.getElementById('adminPanel').classList.remove('hide');
            loadAllNews();
        } else {
            msgDiv.innerHTML = '<div class="error">❌ You are not an admin. Contact site owner.</div>';
        }
    }
}

async function loadAllNews() {
    const { data, error } = await supabase
        .from('news')
        .select('*')
        .order('published_at', { ascending: false });
    
    const newsList = document.getElementById('newsList');
    if(error || !data || data.length === 0) {
        newsList.innerHTML = '<div class="loader">No articles found</div>';
        return;
    }
    
    newsList.innerHTML = `
        <table>
            <thead>
                <tr><th>ID</th><th>Title</th><th>Category</th><th>Date</th><th>Views</th><th>Actions</th></tr>
            </thead>
            <tbody>
                ${data.map(article => `
                    <tr>
                        <td>${article.id}</td>
                        <td>${escapeHtml(article.title)}</td>
                        <td>${article.category || article.category_id}</td>
                        <td>${new Date(article.published_at).toLocaleDateString()}</td>
                        <td>${article.views || 0}</td>
                        <td>
                            <button class="btn-edit" onclick="editNews(${article.id})">Edit</button>
                            <button class="btn-danger" onclick="deleteNews(${article.id})">Delete</button>
                        </td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

async function addNews() {
    const title = document.getElementById('newsTitle').value;
    const slug = document.getElementById('newsSlug').value;
    const excerpt = document.getElementById('newsExcerpt').value;
    const content = document.getElementById('newsContent').value;
    const category = document.getElementById('newsCategory').value;
    const image = document.getElementById('newsImage').value;
    const msgDiv = document.getElementById('addMsg');
    
    if(!title || !content || !category) {
        msgDiv.innerHTML = '<div class="error">Please fill title, content and category</div>';
        return;
    }
    
    msgDiv.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    
    const { error } = await supabase.from('news').insert({
        title: title,
        slug: slug || title.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
        excerpt: excerpt || title.substring(0, 120),
        content: content,
        category: category,
        category_id: await getCategoryId(category),
        featured_image: image,
        status: 'published',
        published_at: new Date(),
        views: 0
    });
    
    if(error) {
        msgDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
    } else {
        msgDiv.innerHTML = '<div class="success">✅ Article published successfully!</div>';
        document.getElementById('newsTitle').value = '';
        document.getElementById('newsSlug').value = '';
        document.getElementById('newsExcerpt').value = '';
        document.getElementById('newsContent').value = '';
        document.getElementById('newsImage').value = '';
        loadAllNews();
    }
    setTimeout(() => msgDiv.innerHTML = '', 3000);
}

async function getCategoryId(categoryName) {
    const { data } = await supabase.from('categories').select('id').eq('name', categoryName).single();
    return data?.id || 1;
}

async function editNews(id) {
    const { data } = await supabase.from('news').select('*').eq('id', id).single();
    if(data) {
        document.getElementById('newsTitle').value = data.title;
        document.getElementById('newsSlug').value = data.slug;
        document.getElementById('newsExcerpt').value = data.excerpt || '';
        document.getElementById('newsContent').value = data.content;
        document.getElementById('newsCategory').value = data.category || '';
        document.getElementById('newsImage').value = data.featured_image || '';
        
        // Scroll to form
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        // Change button to update
        const addBtn = document.querySelector('#adminPanel .card:first-child button');
        addBtn.innerHTML = '✏️ Update Article';
        addBtn.setAttribute('onclick', `updateNews(${id})`);
    }
}

async function updateNews(id) {
    const title = document.getElementById('newsTitle').value;
    const slug = document.getElementById('newsSlug').value;
    const excerpt = document.getElementById('newsExcerpt').value;
    const content = document.getElementById('newsContent').value;
    const category = document.getElementById('newsCategory').value;
    const image = document.getElementById('newsImage').value;
    const msgDiv = document.getElementById('addMsg');
    
    const { error } = await supabase
        .from('news')
        .update({
            title: title,
            slug: slug || title.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
            excerpt: excerpt || title.substring(0, 120),
            content: content,
            category: category,
            featured_image: image,
            updated_at: new Date()
        })
        .eq('id', id);
    
    if(error) {
        msgDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
    } else {
        msgDiv.innerHTML = '<div class="success">✅ Article updated successfully!</div>';
        // Reset form
        document.getElementById('newsTitle').value = '';
        document.getElementById('newsSlug').value = '';
        document.getElementById('newsExcerpt').value = '';
        document.getElementById('newsContent').value = '';
        document.getElementById('newsImage').value = '';
        const addBtn = document.querySelector('#adminPanel .card:first-child button');
        addBtn.innerHTML = '➕ Publish Article';
        addBtn.setAttribute('onclick', 'addNews()');
        loadAllNews();
    }
    setTimeout(() => msgDiv.innerHTML = '', 3000);
}

async function deleteNews(id) {
    if(confirm('Are you sure you want to delete this article?')) {
        const { error } = await supabase.from('news').delete().eq('id', id);
        if(error) {
            alert('Error deleting: ' + error.message);
        } else {
            loadAllNews();
        }
    }
}

function escapeHtml(text) {
    if(!text) return '';
    return text.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}
</script>
</body>
</html>
