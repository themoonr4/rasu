<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #dc2626; text-align: center; margin-bottom: 20px; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; }
        button { background: #dc2626; color: #fff; padding: 12px; border: none; cursor: pointer; width: 100%; border-radius: 8px; font-size: 16px; }
        button:hover { background: #b91c1c; }
        .success { background: #15803d; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
        .error { background: #b91c1c; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
        .stats { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-box { background: #1a1a1a; padding: 15px; border-radius: 12px; flex: 1; text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; color: #dc2626; }
        .nav-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { background: #1a1a1a; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; color: #fff; width: auto; }
        .nav-btn.active { background: #dc2626; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌙 THE MOON — Admin Panel</h1>
        
        <!-- Navigation Buttons -->
        <div class="nav-buttons">
            <button class="nav-btn active" id="btnDashboard">📊 Dashboard</button>
            <button class="nav-btn" id="btnPublish">✍️ Publish</button>
            <button class="nav-btn" id="btnStats">📈 Stats</button>
        </div>
        
        <!-- Dashboard Section -->
        <div id="dashboardSection">
            <div class="stats">
                <div class="stat-box"><div class="stat-number" id="totalNews">0</div><div>Total News</div></div>
                <div class="stat-box"><div class="stat-number" id="totalViews">0</div><div>Total Views</div></div>
            </div>
            <div class="card">
                <h3>📰 Recent News</h3>
                <div id="recentList">Loading...</div>
            </div>
        </div>
        
        <!-- Publish Section -->
        <div id="publishSection" class="hidden">
            <div class="card">
                <h3>✍️ Create News</h3>
                <input type="text" id="title" placeholder="Title">
                <select id="category">
                    <option>Technology</option><option>Sports</option><option>Business</option>
                    <option>Politics</option><option>Study</option>
                </select>
                <textarea id="summary" rows="2" placeholder="Short summary"></textarea>
                <textarea id="content" rows="5" placeholder="Full content"></textarea>
                <input type="text" id="imageUrl" placeholder="Image URL (optional)">
                <button id="publishBtn">🚀 PUBLISH</button>
                <div id="msg"></div>
            </div>
        </div>
        
        <!-- Stats Section -->
        <div id="statsSection" class="hidden">
            <div class="card">
                <h3>📊 Traffic Sources</h3>
                <p>🌐 Google: 45%</p>
                <p>📱 WhatsApp: 30%</p>
                <p>🔗 Direct: 15%</p>
                <p>📢 Telegram: 10%</p>
            </div>
        </div>
    </div>

    <script>
        // Supabase Config
        const SUPABASE_URL = 'https://zpubhlbdqwzyseditrls.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_4YiRI2c1Tij-2KvyNtJ9Sg_8-l0OFuP';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Navigation
        document.getElementById('btnDashboard').onclick = () => { show('dashboard'); };
        document.getElementById('btnPublish').onclick = () => { show('publish'); };
        document.getElementById('btnStats').onclick = () => { show('stats'); };
        
        function show(section) {
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('publishSection').classList.add('hidden');
            document.getElementById('statsSection').classList.add('hidden');
            document.getElementById(`${section}Section`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if (section === 'dashboard') document.getElementById('btnDashboard').classList.add('active');
            if (section === 'publish') document.getElementById('btnPublish').classList.add('active');
            if (section === 'stats') document.getElementById('btnStats').classList.add('active');
            
            if (section === 'dashboard') loadDashboard();
        }
        
        // Load Dashboard
        async function loadDashboard() {
            try {
                const { data, error } = await supabase.from('news').select('*').order('published_at', { ascending: false });
                if (error) throw error;
                document.getElementById('totalNews').innerText = data?.length || 0;
                document.getElementById('totalViews').innerText = data?.reduce((s, n) => s + (n.views || 0), 0) || 0;
                const html = data?.slice(0, 5).map(n => `<div style="padding:10px; border-bottom:1px solid #222;">📰 ${n.title} (${n.views || 0} views)</div>`).join('');
                document.getElementById('recentList').innerHTML = html || 'No news yet';
            } catch(e) { document.getElementById('recentList').innerHTML = 'Error loading news'; }
        }
        
        // Publish News
        document.getElementById('publishBtn').onclick = async () => {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            if (!title || !content) { showMsg('Title and Content required!', 'error'); return; }
            
            const btn = document.getElementById('publishBtn');
            btn.innerText = 'Publishing...';
            btn.disabled = true;
            
            try {
                const { error } = await supabase.from('news').insert([{
                    title: title,
                    content: content,
                    summary: document.getElementById('summary').value,
                    category: document.getElementById('category').value,
                    image_url: document.getElementById('imageUrl').value,
                    published_at: new Date().toISOString(),
                    views: 0
                }]);
                if (error) throw error;
                showMsg('✅ Published successfully!', 'success');
                document.getElementById('title').value = '';
                document.getElementById('summary').value = '';
                document.getElementById('content').value = '';
                document.getElementById('imageUrl').value = '';
                loadDashboard();
            } catch(e) { showMsg('Error: ' + e.message, 'error'); }
            finally { btn.innerText = '🚀 PUBLISH'; btn.disabled = false; }
        };
        
        function showMsg(msg, type) {
            const div = document.getElementById('msg');
            div.innerText = msg;
            div.className = type;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 5000);
        }
        
        loadDashboard();
    </script>
</body>
</html>
