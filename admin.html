<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Admin Panel</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body{font-family:Arial;background:#0a0a0a;color:#fff;padding:1rem;}
        .box{max-width:500px;margin:2rem auto;background:#111;padding:2rem;border-radius:16px;}
        input,textarea,select{width:100%;padding:0.5rem;margin-bottom:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        button{background:#dc2626;color:#fff;border:none;padding:0.5rem;border-radius:8px;cursor:pointer;}
        .success{background:#28a745;padding:0.5rem;border-radius:8px;margin-top:0.5rem;}
        .error{background:#dc3545;padding:0.5rem;border-radius:8px;margin-top:0.5rem;}
        .nav{display:flex;gap:0.5rem;margin-bottom:1rem;}
        .nav-btn{background:#1a1a1a;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .nav-btn.active{background:#dc2626;}
        .hide{display:none;}
    </style>
</head>
<body>
    <div id="loginBox" class="box">
        <h2>🌙 THE MOON - Admin Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login / Sign Up</button>
        <div id="loginMsg"></div>
    </div>

    <div id="dashboardBox" class="box hide">
        <h2>🌙 Admin Dashboard</h2>
        <div class="nav">
            <div class="nav-btn active" onclick="showTab('create')">➕ Create</div>
            <div class="nav-btn" onclick="showTab('list')">📰 News</div>
        </div>
        
        <div id="createTab">
            <input type="text" id="title" placeholder="Title">
            <select id="category">
                <option value="1">💻 Technology</option>
                <option value="2">🏏 Sports</option>
                <option value="3">📊 Business</option>
                <option value="4">🏛️ Politics</option>
                <option value="5">📚 Study</option>
            </select>
            <input type="text" id="image" placeholder="Image URL (optional)">
            <textarea id="content" rows="5" placeholder="Content..."></textarea>
            <button onclick="publish()">📰 Publish News</button>
            <div id="publishMsg"></div>
        </div>
        
        <div id="listTab" class="hide">
            <div id="newsList"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qrtiapjrslubbbuucpen.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Um_UlotzRIAPivm1GErr-A_S_-gJyz9';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('loginMsg');
            
            if (!email || !password) {
                msgDiv.innerHTML = '<div class="error">Enter email and password</div>';
                return;
            }
            
            msgDiv.innerHTML = '<div>Please wait...</div>';
            
            await supabase.auth.signUp({ email, password });
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                msgDiv.innerHTML = `<div class="error">${error.message}</div>`;
            } else {
                msgDiv.innerHTML = '<div class="success">✅ Login Successful!</div>';
                document.getElementById('loginBox').classList.add('hide');
                document.getElementById('dashboardBox').classList.remove('hide');
                loadNewsList();
            }
        }

        async function publish() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const category_id = document.getElementById('category').value;
            const image = document.getElementById('image').value;
            const msgDiv = document.getElementById('publishMsg');
            
            if (!title || !content) {
                msgDiv.innerHTML = '<div class="error">Title and content required</div>';
                return;
            }
            
            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            
            const { error } = await supabase.from('news').insert({
                title: title,
                slug: slug,
                content: content,
                category_id: parseInt(category_id),
                featured_image: image || null,
                excerpt: content.substring(0, 150),
                status: 'published',
                published_at: new Date()
            });
            
            if (error) {
                msgDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
            } else {
                msgDiv.innerHTML = '<div class="success">✅ News Published!</div>';
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
                document.getElementById('image').value = '';
                loadNewsList();
                setTimeout(() => msgDiv.innerHTML = '', 3000);
            }
        }

        async function loadNewsList() {
            const { data } = await supabase.from('news').select('*').order('created_at', { ascending: false });
            const listDiv = document.getElementById('newsList');
            if (!data || data.length === 0) {
                listDiv.innerHTML = '<div>No news yet. Create your first news!</div>';
                return;
            }
            listDiv.innerHTML = data.map(n => `<div style="background:#1a1a1a;padding:0.5rem;margin-bottom:0.5rem;border-radius:8px;"><strong>📰 ${n.title}</strong><br><small>${n.excerpt?.substring(0,100)}...</small></div>`).join('');
        }

        function showTab(tab) {
            document.getElementById('createTab').classList.toggle('hide', tab !== 'create');
            document.getElementById('listTab').classList.toggle('hide', tab !== 'list');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'list') loadNewsList();
        }
    </script>
</body>
</html>
