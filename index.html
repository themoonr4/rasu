<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - News</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial,sans-serif;background:#0a0a0a;color:#fff;}
        .container{max-width:1200px;margin:0 auto;padding:20px;}
        .header{background:#111;padding:15px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
        .logo{font-size:24px;font-weight:bold;color:#dc2626;text-decoration:none;}
        .nav a{color:#fff;text-decoration:none;margin:0 15px;cursor:pointer;}
        .hero{background:linear-gradient(135deg,#dc2626,#991b1b);padding:40px;border-radius:16px;text-align:center;margin-bottom:30px;}
        .category-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:15px;margin-bottom:30px;}
        .category-card{background:#1a1a1a;padding:15px;border-radius:12px;text-align:center;cursor:pointer;}
        .news-grid{display:grid;gap:20px;margin-bottom:80px;}
        @media(min-width:768px){.news-grid{grid-template-columns:repeat(2,1fr);}}
        .news-card{background:#1a1a1a;padding:20px;border-radius:12px;cursor:pointer;}
        .news-card:hover{background:#222;}
        .news-category{background:#dc2626;display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;margin-bottom:10px;}
        .news-title{font-size:18px;margin-bottom:8px;}
        .news-excerpt{color:#aaa;font-size:14px;}
        .news-meta{display:flex;gap:15px;font-size:12px;color:#666;margin-top:10px;}
        .loader{text-align:center;padding:40px;}
        .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#dc2626;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .footer{background:#111;padding:30px;text-align:center;margin-top:40px;}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;display:flex;justify-content:space-around;padding:10px;z-index:99;}
        @media(min-width:768px){.bottom-nav{display:none;}}
        .sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:#111;z-index:1000;transition:left 0.3s;padding:20px;}
        .sidebar.open{left:0;}
        .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999;display:none;}
        .overlay.active{display:block;}
        .menu-btn{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;}
        .widget{background:#1a1a1a;padding:20px;border-radius:12px;margin-bottom:20px;}
        .trending-item{padding:8px 0;border-bottom:1px solid #333;cursor:pointer;}
    </style>
</head>
<body>

<div class="header">
    <button class="menu-btn" id="menuBtn">☰</button>
    <a href="/rasu/" class="logo">🌙 THE MOON</a>
    <div class="nav">
        <a data-cat="all" class="active">All</a>
        <a data-cat="tech">Tech</a>
        <a data-cat="sports">Sports</a>
        <a data-cat="business">Business</a>
        <a data-cat="politics">Politics</a>
        <a data-cat="study">Study</a>
    </div>
    <a href="/rasu/profile.html">👤</a>
</div>

<div class="sidebar" id="sidebar">
    <div style="display:flex;justify-content:space-between;margin-bottom:20px;"><span class="logo">🌙 THE MOON</span><button id="closeSidebar" style="background:none;border:none;color:#fff;font-size:20px;">✕</button></div>
    <a data-cat="all" style="display:block;padding:10px 0;">🏠 Home</a>
    <a data-cat="tech" style="display:block;padding:10px 0;">💻 Tech</a>
    <a data-cat="sports" style="display:block;padding:10px 0;">🏏 Sports</a>
    <a data-cat="business" style="display:block;padding:10px 0;">📊 Business</a>
    <a data-cat="politics" style="display:block;padding:10px 0;">🏛️ Politics</a>
    <a data-cat="study" style="display:block;padding:10px 0;">📚 Study</a>
    <a href="/rasu/profile.html" style="display:block;padding:10px 0;">👤 Profile</a>
</div>
<div class="overlay" id="overlay"></div>

<div class="bottom-nav">
    <a data-cat="all">Home</a>
    <a data-cat="tech">Tech</a>
    <a data-cat="sports">Sports</a>
    <a href="/rasu/profile.html">Profile</a>
</div>

<div class="container">
    <div class="hero"><h1>Welcome to THE MOON</h1><p>World's Most Advanced News Platform</p></div>
    <div class="category-grid" id="categoryGrid"><div class="loader"><div class="spinner"></div></div></div>
    <div class="news-grid" id="newsGrid"><div class="loader"><div class="spinner"></div></div></div>
    <div class="widget"><h3>🔥 Trending Now</h3><div id="trendingList">Loading...</div></div>
</div>

<footer class="footer"><p>© 2026 THE MOON</p></footer>

<script>
// ✅ FIX: API key properly added in headers
const SUPABASE_URL = 'https://qrtiapjrslubbbuucpen.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Um_UlotzRIAPivm1GErr-A_S_-gJyz9';

const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true },
    global: { headers: { 'apikey': SUPABASE_KEY } }
});

let currentCat = 'all';
let categoriesData = [];
let allNews = [];

async function loadData() {
    document.getElementById('categoryGrid').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    document.getElementById('newsGrid').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    
    try {
        // Load categories
        const { data: cats, error: catError } = await supabase.from('categories').select('*');
        if(catError) throw catError;
        categoriesData = cats || [];
        
        // Render categories
        if(categoriesData.length > 0) {
            document.getElementById('categoryGrid').innerHTML = categoriesData.map(cat => `
                <div class="category-card" data-cat="${cat.slug}">
                    <i>📰</i>
                    <div>${cat.name}</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.category-card').forEach(el => {
                el.onclick = () => {
                    currentCat = el.getAttribute('data-cat');
                    loadData();
                    document.querySelectorAll('.nav a, .bottom-nav a, .sidebar a').forEach(n => n.classList.remove('active'));
                };
            });
        } else {
            document.getElementById('categoryGrid').innerHTML = '<div style="text-align:center;padding:20px;">No categories</div>';
        }
        
        // Load news
        let query = supabase.from('news').select('*').eq('status', 'published');
        if(currentCat !== 'all') {
            const cat = categoriesData.find(c => c.slug === currentCat);
            if(cat) query = supabase.from('news').select('*').eq('status', 'published').eq('category_id', cat.id);
        }
        
        const { data: news, error: newsError } = await query;
        if(newsError) throw newsError;
        allNews = news || [];
        
        // Render news
        if(allNews.length === 0) {
            document.getElementById('newsGrid').innerHTML = '<div style="text-align:center;padding:20px;">📭 No news yet</div>';
        } else {
            document.getElementById('newsGrid').innerHTML = allNews.map(article => {
                const cat = categoriesData.find(c => c.id === article.category_id);
                return `
                    <div class="news-card" onclick="location.href='/rasu/article.html?id=${article.id}'">
                        <span class="news-category">${cat?.name || 'News'}</span>
                        <h3 class="news-title">${escapeHtml(article.title)}</h3>
                        <p class="news-excerpt">${escapeHtml((article.excerpt || article.content || '').substring(0,120))}...</p>
                        <div class="news-meta">
                            <span>📅 ${new Date(article.published_at || article.created_at).toLocaleDateString()}</span>
                            <span>👁️ ${article.views || 0} views</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Trending
        const trending = [...allNews].sort((a,b) => (b.views||0) - (a.views||0)).slice(0,5);
        document.getElementById('trendingList').innerHTML = trending.map((item,i) => `
            <div class="trending-item" onclick="location.href='/rasu/article.html?id=${item.id}'">
                <div style="color:#dc2626;">#${i+1}</div>
                <div>${escapeHtml(item.title)}</div>
                <div style="font-size:11px;">👁️ ${item.views || 0} views</div>
            </div>
        `).join('');
        
    } catch(e) {
        console.error(e);
        document.getElementById('newsGrid').innerHTML = '<div style="text-align:center;padding:20px;">❌ Error: ' + e.message + '</div>';
    }
}

function escapeHtml(text) {
    if(!text) return '';
    return text.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

// Weather
document.getElementById('weatherTemp')?.remove();
document.querySelector('.widget:last-child').innerHTML += '<div style="text-align:center;margin-top:10px;"><span style="font-size:32px;">28°C</span><br>📍 New Delhi, IN</div>';

// Sidebar
document.getElementById('menuBtn').onclick = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('active'); };
document.getElementById('closeSidebar').onclick = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); };
document.getElementById('overlay').onclick = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); };

// Nav clicks
document.querySelectorAll('.nav a, .bottom-nav a, .sidebar a').forEach(el => {
    if(el.getAttribute('data-cat')) {
        el.onclick = (e) => {
            e.preventDefault();
            currentCat = el.getAttribute('data-cat');
            loadData();
            document.querySelectorAll('.nav a, .bottom-nav a, .sidebar a').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        };
    }
});

loadData();
</script>
</body>
</html>
