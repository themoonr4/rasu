<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Content Rewriter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        select{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .result-box{background:#1a1a1a;padding:1rem;border-radius:8px;margin-top:1rem;white-space:pre-wrap;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-edit"></i> Content Rewriter Tool</h1>
        
        <div class="card">
            <h3>Original Content</h3>
            <textarea id="originalText" rows="6" placeholder="Paste your content here to rewrite..."></textarea>
            <select id="rewriteStyle">
                <option value="standard">Standard Rewrite</option>
                <option value="formal">Formal Style</option>
                <option value="simple">Simple Language</option>
                <option value="creative">Creative Style</option>
            </select>
            <button onclick="rewriteContent()">Rewrite Content</button>
            <div id="rewrittenResult" class="result-box" style="display:none;"></div>
        </div>
    </div>
    <script>
        function rewriteContent() {
            const text = document.getElementById('originalText').value;
            const style = document.getElementById('rewriteStyle').value;
            if(!text) { alert('Enter content to rewrite'); return; }
            const resultDiv = document.getElementById('rewrittenResult');
            
            let rewritten = '';
            if(style === 'standard') {
                rewritten = text.replace(/is/g, 'is currently').replace(/are/g, 'are currently').replace(/and/g, '&');
            } else if(style === 'formal') {
                rewritten = text.replace(/I think/g, 'It is believed that').replace(/maybe/g, 'possibly').replace(/but/g, 'however');
            } else if(style === 'simple') {
                rewritten = text.replace(/utilize/g, 'use').replace(/purchase/g, 'buy').replace(/assist/g, 'help');
            } else {
                rewritten = text.split('.').map(s => s.trim()).filter(s => s).map(s => s.charAt(0).toUpperCase() + s.slice(1)).join('.\n✨ ');
            }
            resultDiv.innerHTML = `<strong>Rewritten Content (${style} style):</strong><br>${rewritten}<br><br><button onclick="copyToClipboard('${rewritten.replace(/'/g, "\\'")}')">Copy to Clipboard</button>`;
            resultDiv.style.display = 'block';
        }
        
        function copyToClipboard(text) { navigator.clipboard.writeText(text); alert('Copied!'); }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
