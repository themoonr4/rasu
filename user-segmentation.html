<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - User Segmentation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .segment-card{background:#1a1a1a;border-radius:12px;padding:1rem;margin-bottom:1rem;}
        .segment-header{display:flex;justify-content:space-between;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-users"></i> User Segmentation Tool</h1>
        
        <div class="card">
            <h3>Create Segment</h3>
            <select id="segmentCondition">
                <option value="views>100">Views > 100</option>
                <option value="active_30d">Active in last 30 days</option>
                <option value="subscribed">Subscribed users</option>
                <option value="new_users">New users (7 days)</option>
            </select>
            <button onclick="createSegment()">Create Segment</button>
        </div>
        
        <div class="card">
            <h3>User Segments</h3>
            <div id="segmentsList"></div>
        </div>
        
        <div class="card">
            <h3>Segment Analytics</h3>
            <div id="segmentAnalytics"></div>
        </div>
    </div>
    <script>
        let segments = JSON.parse(localStorage.getItem('userSegments') || '[]');
        
        function loadSegments() {
            const listDiv = document.getElementById('segmentsList');
            if(segments.length === 0) { listDiv.innerHTML = '<p>No segments created</p>'; return; }
            listDiv.innerHTML = segments.map((s, i) => `
                <div class="segment-card">
                    <div class="segment-header"><strong>${s.name}</strong> <button onclick="deleteSegment(${i})">Delete</button></div>
                    <div>Users: ${Math.floor(Math.random() * 5000) + 100}</div>
                    <div>Engagement Rate: ${Math.floor(Math.random() * 40) + 30}%</div>
                </div>
            `).join('');
            
            const analyticsDiv = document.getElementById('segmentAnalytics');
            analyticsDiv.innerHTML = `<div class="segment-card"><strong>Top Segment</strong><br>Tech readers: 2,345 users<br>Conversion: 12.4%</div>`;
        }
        
        function createSegment() {
            const condition = document.getElementById('segmentCondition').value;
            const name = condition.replace(/_/g, ' ').replace(/>/g, ' greater than ');
            segments.push({ name, condition, created: new Date().toLocaleDateString() });
            localStorage.setItem('userSegments', JSON.stringify(segments));
            loadSegments();
        }
        
        function deleteSegment(index) {
            segments.splice(index, 1);
            localStorage.setItem('userSegments', JSON.stringify(segments));
            loadSegments();
        }
        
        loadSegments();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
