<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 QUANTUM COMMAND | Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--bg:#000510;--card:#0a0f1e;--border:#1a2040;--accent:#00d4ff;--text:#e8e8f0;--text2:#8899bb;--success:#00ff88;--red:#ff3366}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .bar{position:sticky;top:0;z-index:100;background:rgba(10,15,30,0.95);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0.5rem 1.5rem;height:56px}
        .layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 56px)}
        .sidebar{background:rgba(10,15,30,0.8);border-right:1px solid var(--border);padding:1rem 0}
        .side-sec{padding:0.75rem 1rem;font-size:0.6rem;letter-spacing:2px;color:var(--text2);text-transform:uppercase}
        .side-item{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 1rem;margin:0.15rem 0.5rem;border-radius:8px;cursor:pointer;font-size:0.82rem;color:var(--text2);border:1px solid transparent}
        .side-item:hover,.side-item.active{background:rgba(0,212,255,0.1);border-color:var(--accent);color:var(--accent)}
        .main{padding:1.5rem;overflow-y:auto;max-height:calc(100vh - 56px)}
        .panel{display:none}.panel.active{display:block}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
        .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
        .stat-val{font-size:1.8rem;font-weight:900;color:var(--accent)}.stat-lbl{font-size:0.7rem;color:var(--text2)}
        .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
        input,textarea,select{width:100%;padding:0.7rem;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;color:var(--text);margin-bottom:0.75rem;font-family:inherit}
        textarea{min-height:100px;resize:vertical}
        .btn{padding:0.7rem 1.5rem;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-family:inherit}
        .btn-p{background:var(--accent);color:#000}.btn-s{background:var(--success);color:#000}.btn-d{background:var(--red);color:#fff}.btn-o{background:transparent;border:1px solid var(--border);color:var(--text)}
        .row{display:flex;align-items:center;gap:1rem;padding:0.75rem;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:8px;margin-bottom:0.5rem}
        .toast-feed{position:fixed;top:70px;right:20px;z-index:10000}
        .toast{padding:1rem 1.5rem;border-radius:8px;margin-bottom:0.5rem}
        .toast-s{background:rgba(0,255,136,0.2);border:1px solid var(--success);color:var(--success)}
        .toast-e{background:rgba(255,51,102,0.2);border:1px solid var(--red);color:var(--red)}
        @media(max-width:768px){.layout{grid-template-columns:1fr}.sidebar{display:none}}
    </style>
</head>
<body>

<div class="bar">
    <div style="display:flex;align-items:center;gap:0.5rem;"><span style="font-size:1.5rem;">🌙</span><span style="font-weight:900;color:var(--accent);">QUANTUM COMMAND</span></div>
    <div style="display:flex;gap:1rem;align-items:center;"><span style="font-size:0.7rem;color:var(--success);">🟢 SUPABASE</span><button class="btn btn-o" onclick="window.open('/rasu/')">🌍 VIEW SITE</button></div>
</div>

<div class="layout">
    <aside class="sidebar">
        <div class="side-sec">📡 MAIN</div>
        <div class="side-item active" onclick="switchPanel('dash',this)">📊 Dashboard</div>
        <div class="side-item" onclick="switchPanel('compose',this)">✍️ Compose</div>
        <div class="side-item" onclick="switchPanel('list',this)">📰 Articles</div>
        <div class="side-sec">⚙️ SYSTEM</div>
        <div class="side-item" onclick="syncAll()">🔄 Sync Now</div>
    </aside>
    
    <main class="main">
        <div class="panel active" id="panel-dash">
            <h2 style="margin-bottom:1.5rem;">📊 DASHBOARD</h2>
            <div class="stats">
                <div class="stat-card"><div class="stat-val" id="dashTotal">0</div><div class="stat-lbl">Total Articles</div></div>
                <div class="stat-card"><div class="stat-val" id="dashTrend">0</div><div class="stat-lbl">Trending</div></div>
                <div class="stat-card"><div class="stat-val" id="dashBreak">0</div><div class="stat-lbl">Breaking</div></div>
                <div class="stat-card"><div class="stat-val" id="dashViews">0</div><div class="stat-lbl">Total Views</div></div>
            </div>
        </div>
        
        <div class="panel" id="panel-compose">
            <h2 style="margin-bottom:1rem;">✍️ COMPOSE</h2>
            <div class="card">
                <input type="text" id="t" placeholder="Headline *">
                <select id="c"><option value="">Category *</option><option value="tech">Tech</option><option value="sports">Sports</option><option value="business">Business</option><option value="politics">Politics</option><option value="science">Science</option><option value="world">World</option></select>
                <input type="text" id="e" placeholder="Emoji" value="📰" style="width:80px;">
                <textarea id="s" placeholder="Summary *" rows="2"></textarea>
                <textarea id="fc" placeholder="Full Content" rows="4"></textarea>
                <label style="display:inline-flex;align-items:center;gap:0.5rem;margin-right:1rem;cursor:pointer;"><input type="checkbox" id="tr"> 🔥 Trending</label>
                <label style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer;"><input type="checkbox" id="br"> ⚡ Breaking</label>
                <div style="margin-top:1rem;"><button class="btn btn-p" onclick="publish()">🚀 PUBLISH</button><button class="btn btn-o" onclick="clearF()" style="margin-left:0.5rem;">🗑️ Clear</button></div>
            </div>
        </div>
        
        <div class="panel" id="panel-list">
            <h2 style="margin-bottom:1rem;">📰 ALL ARTICLES</h2>
            <div id="list">Loading...</div>
        </div>
    </main>
</div>

<div class="toast-feed" id="toastFeed"></div>

<script>
var SUPABASE_URL='https://crmbbmwekdlfjgekjnll.supabase.co';
var SUPABASE_KEY='sb_publishable_kiBIIC7EYdIOuMUe4ss1Eg_DWDuK2kG';
var sb=null;
try{if(window.supabase&&typeof window.supabase.createClient==='function'){sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);console.log('✅ Supabase connected');}}catch(e){console.warn(e);}
var articles=[];

async function init(){if(sb){await syncAll();}else{loadLocal();}updateDash();}

async function syncAll(){
    if(!sb){loadLocal();return;}
    try{var r=await sb.from('news_articles').select('*').order('published_at',{ascending:false});if(r.data){articles=r.data;localStorage.setItem('qa',JSON.stringify(r.data));console.log('✅ Synced '+articles.length);}}catch(e){console.warn(e);loadLocal();}
    updateDash();loadList();
}

function loadLocal(){articles=JSON.parse(localStorage.getItem('qa'))||[];updateDash();loadList();}

async function publish(){
    if(!sb){toast('❌ Supabase not connected!','e');return;}
    var title=document.getElementById('t').value.trim();
    var cat=document.getElementById('c').value;
    var summary=document.getElementById('s').value.trim();
    var content=document.getElementById('fc').value.trim();
    var emoji=document.getElementById('e').value||'📰';
    var trending=document.getElementById('tr').checked;
    var breaking=document.getElementById('br').checked;
    if(!title||!cat||!summary){toast('⚠️ Title, Category, Summary required!','e');return;}
    var r=await sb.from('news_articles').insert({title:title,category:cat,summary:summary,full_content:content||summary,image_emoji:emoji,trending:trending,breaking:breaking,views:0});
    if(r.error){toast('❌ '+r.error.message,'e');}else{toast('🚀 Published! LIVE!','s');clearF();syncAll();}
}

function loadList(){
    var el=document.getElementById('list');
    if(!articles.length){el.innerHTML='<p style="text-align:center;padding:2rem;">No articles yet.</p>';return;}
    el.innerHTML=articles.slice(0,20).map(function(a){return '<div class="row"><div style="font-size:1.5rem;">'+(a.image_emoji||'📰')+'</div><div style="flex:1;"><strong>'+a.title+'</strong><div style="font-size:0.7rem;color:var(--text2);">'+a.category+' • '+new Date(a.published_at).toLocaleString()+' '+(a.trending?'🔥':'')+'</div></div><button class="btn btn-d" onclick="del('+a.id+')">🗑️</button></div>';}).join('');
}

async function del(id){if(!sb||!confirm('Delete?'))return;await sb.from('news_articles').delete().eq('id',id);toast('🗑️ Deleted!','e');syncAll();}

function updateDash(){
    document.getElementById('dashTotal').textContent=articles.length;
    document.getElementById('dashTrend').textContent=articles.filter(function(a){return a.trending;}).length;
    document.getElementById('dashBreak').textContent=articles.filter(function(a){return a.breaking;}).length;
    document.getElementById('dashViews').textContent=articles.reduce(function(s,a){return s+(a.views||0);},0).toLocaleString();
}

function switchPanel(p,el){
    document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('active');});
    document.getElementById('panel-'+p).classList.add('active');
    document.querySelectorAll('.side-item').forEach(function(x){x.classList.remove('active');});
    if(el)el.classList.add('active');
    if(p==='list')loadList();if(p==='dash')updateDash();
}

function clearF(){['t','c','s','fc'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('e').value='📰';document.getElementById('tr').checked=false;document.getElementById('br').checked=false;}

function toast(m,t){
    var f=document.getElementById('toastFeed');var d=document.createElement('div');
    d.className='toast toast-'+(t==='e'?'e':'s');d.textContent=m;f.appendChild(d);
    setTimeout(function(){d.remove();},4000);
}

init();
</script>
</body>
</html>
