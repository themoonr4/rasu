<!DOCTYPE html>
<html>
<head><title>Simple Test</title></head>
<body>
    <h1>Simple Test</h1>
    <button onclick="test()">Click Me</button>
    <p id="result"></p>

    <script>
        async function test() {
            document.getElementById('result').innerHTML = 'Connecting...';
            
            const SUPABASE_URL = 'https://zpubhlbdqwzyseditrls.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_4YiRI2c1Tij-2KvyNtJ9Sg_8-l0OFuP';
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/news?select=title&limit=1`, {
                    headers: { 'apikey': SUPABASE_KEY }
                });
                const data = await response.json();
                document.getElementById('result').innerHTML = '✅ Success! News: ' + data[0].title;
            } catch(err) {
                document.getElementById('result').innerHTML = '❌ Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
