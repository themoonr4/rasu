<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Affiliate Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .affiliate-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        input,textarea{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem;}
        .stat-box{background:#1a1a1a;padding:0.5rem;border-radius:8px;text-align:center;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-link"></i> Affiliate Manager</h1>
        
        <div class="stats-grid">
            <div class="stat-box"><div>Total Clicks</div><div id="totalClicks">0</div></div>
            <div class="stat-box"><div>Conversions</div><div id="totalConversions">0</div></div>
            <div class="stat-box"><div>Earnings</div><div id="totalEarnings">₹0</div></div>
        </div>
        
        <div class="card">
            <h3>Add Affiliate Link</h3>
            <input type="text" id="affName" placeholder="Product/Service Name">
            <input type="text" id="affLink" placeholder="Affiliate URL">
            <input type="text" id="affCommission" placeholder="Commission (e.g., 10%)">
            <button onclick="addAffiliate()">Add Link</button>
        </div>
        
        <div class="card">
            <h3>Affiliate Links</h3>
            <div id="affiliateList"></div>
        </div>
    </div>
    <script>
        let affiliates = JSON.parse(localStorage.getItem('affiliates') || '[]');
        let clicks = JSON.parse(localStorage.getItem('affiliateClicks') || '{}');
        
        function updateStats() {
            let totalClicks = 0, totalConv = 0, totalEarn = 0;
            affiliates.forEach(a => {
                totalClicks += clicks[a.id] || 0;
                totalConv += a.conversions || 0;
                totalEarn += (a.conversions || 0) * (parseFloat(a.commission) || 0);
            });
            document.getElementById('totalClicks').innerText = totalClicks;
            document.getElementById('totalConversions').innerText = totalConv;
            document.getElementById('totalEarnings').innerText = `₹${totalEarn}`;
        }
        
        function loadAffiliates() {
            const listDiv = document.getElementById('affiliateList');
            if(affiliates.length === 0) { listDiv.innerHTML = '<p>No affiliate links</p>'; return; }
            listDiv.innerHTML = affiliates.map((a, i) => `
                <div class="affiliate-item">
                    <div><strong>${a.name}</strong><br><small>${a.link.substring(0,50)}...</small><br>Commission: ${a.commission} | Clicks: ${clicks[a.id] || 0}</div>
                    <div><button onclick="recordClick(${i})">Record Click</button><button onclick="deleteAffiliate(${i})" style="background:#dc3545;">Delete</button></div>
                </div>
            `).join('');
            updateStats();
        }
        
        function addAffiliate() {
            const name = document.getElementById('affName').value;
            const link = document.getElementById('affLink').value;
            const commission = document.getElementById('affCommission').value;
            if(!name || !link) { alert('Enter name and link'); return; }
            const id = Date.now();
            affiliates.push({ id, name, link, commission, createdAt: new Date().toISOString() });
            localStorage.setItem('affiliates', JSON.stringify(affiliates));
            document.getElementById('affName').value = '';
            document.getElementById('affLink').value = '';
            document.getElementById('affCommission').value = '';
            loadAffiliates();
        }
        
        function recordClick(index) {
            const id = affiliates[index].id;
            clicks[id] = (clicks[id] || 0) + 1;
            localStorage.setItem('affiliateClicks', JSON.stringify(clicks));
            loadAffiliates();
        }
        
        function deleteAffiliate(index) {
            affiliates.splice(index, 1);
            localStorage.setItem('affiliates', JSON.stringify(affiliates));
            loadAffiliates();
        }
        
        loadAffiliates();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
