<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Link Checker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:1rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .link-item{padding:0.5rem;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center;}
        .valid{color:#28a745;}
        .invalid{color:#dc3545;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-link"></i> Link Checker</h1>
        
        <div class="card">
            <h3>Enter URLs to Check</h3>
            <textarea id="urlList" rows="5" placeholder="Enter URLs (one per line)&#10;https://example.com&#10;https://google.com"></textarea>
            <button onclick="checkLinks()">Check Links</button>
            <div id="results" style="margin-top:1rem;"></div>
        </div>
    </div>
    <script>
        async function checkLinks() {
            const urls = document.getElementById('urlList').value.split('\n').filter(u => u.trim());
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div>Checking links...</div>';
            
            for(let url of urls) {
                try {
                    const response = await fetch(url, { method: 'HEAD', mode: 'no-cors' });
                    resultsDiv.innerHTML += `<div class="link-item"><span>${url}</span><span class="valid">✅ Accessible</span></div>`;
                } catch(e) {
                    resultsDiv.innerHTML += `<div class="link-item"><span>${url}</span><span class="invalid">❌ Failed to load</span></div>`;
                }
            }
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
