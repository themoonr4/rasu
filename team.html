<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Our Team</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:1000px;margin:0 auto;}
        h1{margin-bottom:2rem;color:#dc2626;}
        .team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2rem;}
        .member{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;text-align:center;}
        .avatar{width:100px;height:100px;background:#dc2626;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:3rem;}
        .role{color:#aaa;margin:0.5rem 0;}
        .social{display:flex;justify-content:center;gap:1rem;margin-top:1rem;}
        .social a{color:#aaa;text-decoration:none;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-users"></i> Our Team</h1>
        <div class="team-grid">
            <div class="member"><div class="avatar"><i class="fas fa-user-circle"></i></div><h3>Founder & CEO</h3><div class="role">Visionary behind THE MOON</div><div class="social"><a href="#"><i class="fab fa-twitter"></i></a><a href="#"><i class="fab fa-linkedin"></i></a></div></div>
            <div class="member"><div class="avatar"><i class="fas fa-code"></i></div><h3>Tech Lead</h3><div class="role">Full-stack developer</div><div class="social"><a href="#"><i class="fab fa-github"></i></a><a href="#"><i class="fab fa-twitter"></i></a></div></div>
            <div class="member"><div class="avatar"><i class="fas fa-pen-fancy"></i></div><h3>Content Editor</h3><div class="role">News curation & quality</div><div class="social"><a href="#"><i class="fab fa-twitter"></i></a><a href="#"><i class="fab fa-linkedin"></i></a></div></div>
            <div class="member"><div class="avatar"><i class="fas fa-paintbrush"></i></div><h3>UI/UX Designer</h3><div class="role">Beautiful interfaces</div><div class="social"><a href="#"><i class="fab fa-dribbble"></i></a><a href="#"><i class="fab fa-behance"></i></a></div></div>
        </div>
    </div>
    <script>
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
