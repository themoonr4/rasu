<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Accessibility Checker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;min-height:200px;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;margin-right:0.5rem;}
        .result-item{padding:0.5rem;margin:0.25rem 0;border-radius:8px;}
        .violation{background:#dc354520;border-left:3px solid #dc3545;}
        .warning{background:#ffc10720;border-left:3px solid #ffc107;}
        .pass{background:#28a74520;border-left:3px solid #28a745;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-universal-access"></i> Accessibility Checker</h1>
        
        <div class="card">
            <h3>Enter HTML Code to Check</h3>
            <textarea id="htmlInput" placeholder='<img src="image.jpg"><button>Click</button>'></textarea>
            <button onclick="checkAccessibility()">Check Accessibility</button>
            <button onclick="clearAccessibility()">Clear</button>
            <div id="accessibilityResults"></div>
        </div>
        
        <div class="card">
            <h3>WCAG Guidelines</h3>
            <div id="wcagInfo"></div>
        </div>
    </div>
    <script>
        function checkAccessibility() {
            const html = document.getElementById('htmlInput').value;
            const resultsDiv = document.getElementById('accessibilityResults');
            let results = [];
            
            if(!html) { resultsDiv.innerHTML = '<p>Enter HTML to check</p>'; return; }
            
            if(!html.includes('alt=') && (html.includes('<img') || html.includes('img'))) {
                results.push({ type: 'violation', message: 'Images missing alt attribute. Add alt text for screen readers.' });
            }
            if(html.includes('<button') && !html.includes('aria-label') && !html.includes('aria-labelledby')) {
                results.push({ type: 'warning', message: 'Buttons should have accessible labels or aria-label.' });
            }
            if(!html.includes('<label') && (html.includes('input') || html.includes('select'))) {
                results.push({ type: 'warning', message: 'Form inputs should have associated labels.' });
            }
            if(html.includes('<h1') && html.match(/<h1/g)?.length > 1) {
                results.push({ type: 'violation', message: 'Multiple H1 tags found. Use only one H1 per page.' });
            }
            if(html.includes('color') && !html.includes('contrast')) {
                results.push({ type: 'warning', message: 'Check color contrast for text readability.' });
            }
            if(html.includes('<a') && !html.includes('href')) {
                results.push({ type: 'violation', message: 'Links must have valid href attributes.' });
            }
            
            if(results.length === 0) {
                results.push({ type: 'pass', message: 'No major accessibility issues detected.' });
            }
            
            resultsDiv.innerHTML = results.map(r => `<div class="result-item ${r.type}">${r.type === 'violation' ? '❌' : r.type === 'warning' ? '⚠️' : '✅'} ${r.message}</div>`).join('');
        }
        
        function clearAccessibility() {
            document.getElementById('htmlInput').value = '';
            document.getElementById('accessibilityResults').innerHTML = '';
        }
        
        document.getElementById('wcagInfo').innerHTML = `
            <div class="result-item pass">✅ WCAG 2.1 Level AA compliant sites ensure accessibility for all users</div>
            <div class="result-item warning">⚠️ Include alt text for all images</div>
            <div class="result-item warning">⚠️ Ensure sufficient color contrast (4.5:1 for normal text)</div>
            <div class="result-item warning">⚠️ Use proper heading hierarchy (H1, H2, H3)</div>
        `;
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
