<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Rate Limiting</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .setting-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem 0;border-bottom:1px solid #222;}
        input{width:120px;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        .stat-value{font-size:1.5rem;font-weight:700;color:#dc2626;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-tachometer-alt"></i> Rate Limiting Configuration</h1>
        
        <div class="card">
            <h3>Current Limits</h3>
            <div class="setting-item"><span>Requests per minute (API)</span><input type="number" id="apiLimit" value="60"></div>
            <div class="setting-item"><span>Requests per hour (Anonymous)</span><input type="number" id="anonLimit" value="500"></div>
            <div class="setting-item"><span>Requests per hour (Authenticated)</span><input type="number" id="authLimit" value="5000"></div>
            <button onclick="saveLimits()">Save Limits</button>
        </div>
        
        <div class="card">
            <h3>Current Usage Statistics</h3>
            <div class="setting-item"><span>API Calls Today</span><span class="stat-value" id="apiCalls">0</span></div>
            <div class="setting-item"><span>Rate Limit Hits</span><span class="stat-value" id="rateHits">0</span></div>
            <div class="setting-item"><span>Reset Time</span><span id="resetTime">-</span></div>
            <button onclick="resetCounters()">Reset Counters</button>
        </div>
    </div>
    <script>
        let apiCalls = parseInt(localStorage.getItem('apiCalls') || '0');
        let rateHits = parseInt(localStorage.getItem('rateHits') || '0');
        
        document.getElementById('apiCalls').innerHTML = apiCalls;
        document.getElementById('rateHits').innerHTML = rateHits;
        document.getElementById('resetTime').innerHTML = new Date(new Date().setHours(24,0,0,0)).toLocaleTimeString();
        
        function saveLimits() {
            const apiLimit = document.getElementById('apiLimit').value;
            const anonLimit = document.getElementById('anonLimit').value;
            const authLimit = document.getElementById('authLimit').value;
            localStorage.setItem('rateLimits', JSON.stringify({ apiLimit, anonLimit, authLimit }));
            alert('Rate limits saved!');
        }
        
        function resetCounters() {
            localStorage.setItem('apiCalls', '0');
            localStorage.setItem('rateHits', '0');
            location.reload();
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
