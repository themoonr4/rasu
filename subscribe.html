<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Subscribe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .subscribe-card{background:#111;border:1px solid #222;border-radius:24px;padding:3rem;text-align:center;max-width:500px;margin:2rem;}
        h1{color:#dc2626;margin-bottom:1rem;}
        .input-group{display:flex;margin:2rem 0;gap:0.5rem;}
        input{flex:1;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;}
        button{background:#dc2626;color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-top:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="subscribe-card">
        <h1><i class="fas fa-envelope-open-text"></i> Subscribe to Newsletter</h1>
        <p>Get daily news digest delivered to your inbox</p>
        <div class="input-group">
            <input type="email" id="subEmail" placeholder="Your email address">
            <button onclick="subscribe()">Subscribe</button>
        </div>
        <div id="subMsg"></div>
        <div class="back-btn" onclick="location.href='/'"><i class="fas fa-arrow-left"></i> Back to Home</div>
    </div>
    <script>
        function subscribe() {
            const email = document.getElementById('subEmail').value;
            const msgDiv = document.getElementById('subMsg');
            if(!email) { msgDiv.innerHTML = '<div style="color:#dc3545;">Enter email</div>'; return; }
            let subscribers = JSON.parse(localStorage.getItem('subscribers') || '[]');
            if(subscribers.includes(email)) { msgDiv.innerHTML = '<div style="color:#ffc107;">Already subscribed</div>'; return; }
            subscribers.push(email);
            localStorage.setItem('subscribers', JSON.stringify(subscribers));
            msgDiv.innerHTML = '<div style="color:#28a745;">✅ Subscribed successfully!</div>';
            document.getElementById('subEmail').value = '';
            setTimeout(() => msgDiv.innerHTML = '', 3000);
        }
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
