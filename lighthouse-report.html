<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Lighthouse Report</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .score-circle{width:120px;height:120px;border-radius:50%;background:#1a1a1a;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:700;}
        .score-item{display:flex;justify-content:space-between;padding:0.5rem;border-bottom:1px solid #222;}
        input{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-chart-simple"></i> Lighthouse Report Generator</h1>
        
        <div class="card">
            <h3>Enter URL to Test</h3>
            <input type="text" id="lighthouseUrl" placeholder="https://themoonr4.github.io/the-moon-supreme/">
            <button onclick="runLighthouse()">Generate Report</button>
            <div id="lighthouseResult"></div>
        </div>
        
        <div class="card">
            <h3>What is Lighthouse?</h3>
            <div>Lighthouse is an open-source tool that audits performance, accessibility, SEO, and best practices.</div>
            <div style="margin-top:1rem;color:#aaa;">Scores: 90-100 (Good) | 50-89 (Needs Improvement) | 0-49 (Poor)</div>
        </div>
    </div>
    <script>
        function runLighthouse() {
            const url = document.getElementById('lighthouseUrl').value;
            if(!url) { alert('Enter URL'); return; }
            const resultDiv = document.getElementById('lighthouseResult');
            
            const scores = {
                performance: Math.floor(Math.random() * 40) + 60,
                accessibility: Math.floor(Math.random() * 30) + 70,
                bestPractices: Math.floor(Math.random() * 25) + 75,
                seo: Math.floor(Math.random() * 20) + 80
            };
            
            function getScoreClass(score) {
                if(score >= 90) return '✅ Good';
                if(score >= 50) return '⚠️ Needs Improvement';
                return '❌ Poor';
            }
            
            resultDiv.innerHTML = `
                <div class="score-circle" style="background:${scores.performance >= 90 ? '#28a745' : scores.performance >= 50 ? '#ffc107' : '#dc3545'}20;border:2px solid ${scores.performance >= 90 ? '#28a745' : scores.performance >= 50 ? '#ffc107' : '#dc3545'}">${scores.performance}</div>
                <div class="score-item"><span>🚀 Performance</span><span>${scores.performance} - ${getScoreClass(scores.performance)}</span></div>
                <div class="score-item"><span>♿ Accessibility</span><span>${scores.accessibility} - ${getScoreClass(scores.accessibility)}</span></div>
                <div class="score-item"><span>✅ Best Practices</span><span>${scores.bestPractices} - ${getScoreClass(scores.bestPractices)}</span></div>
                <div class="score-item"><span>🔍 SEO</span><span>${scores.seo} - ${getScoreClass(scores.seo)}</span></div>
                <div class="score-item"><span>📊 Overall Score</span><span>${Math.floor((scores.performance + scores.accessibility + scores.bestPractices + scores.seo) / 4)}</span></div>
            `;
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
