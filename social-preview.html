<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Social Preview</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:600px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        input,textarea{width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .preview-card{background:#f0f2f5;color:#000;border-radius:12px;overflow:hidden;margin-top:1rem;}
        .preview-header{background:#4267b2;padding:0.5rem;color:white;}
        .preview-title{font-weight:bold;margin:0.5rem;}
        .preview-desc{margin:0.5rem;font-size:0.8rem;color:#666;}
        .preview-url{margin:0.5rem;font-size:0.7rem;color:#999;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-share-alt"></i> Social Media Preview Tool</h1>
        
        <div class="card">
            <h3>Content Preview</h3>
            <input type="text" id="previewTitle" placeholder="Title (60-70 chars)">
            <textarea id="previewDesc" rows="3" placeholder="Description (150-160 chars)"></textarea>
            <input type="text" id="previewUrl" placeholder="URL">
            <button onclick="updatePreview()">Update Preview</button>
            
            <div class="preview-card" id="previewCard">
                <div class="preview-header">Social Media Preview</div>
                <div class="preview-title" id="previewTitleDisplay">Your Title Here</div>
                <div class="preview-desc" id="previewDescDisplay">Your description will appear here. Make it compelling!</div>
                <div class="preview-url" id="previewUrlDisplay">themoon.news</div>
            </div>
            
            <div style="margin-top:1rem;">
                <button onclick="copyMetaTags()">Copy Meta Tags</button>
            </div>
        </div>
    </div>
    <script>
        function updatePreview() {
            let title = document.getElementById('previewTitle').value;
            let desc = document.getElementById('previewDesc').value;
            let url = document.getElementById('previewUrl').value;
            
            document.getElementById('previewTitleDisplay').innerText = title || 'Your Title Here';
            document.getElementById('previewDescDisplay').innerText = desc || 'Your description will appear here. Make it compelling!';
            document.getElementById('previewUrlDisplay').innerText = url?.replace('https://','') || 'themoon.news';
        }
        
        function copyMetaTags() {
            const title = document.getElementById('previewTitle').value;
            const desc = document.getElementById('previewDesc').value;
            const url = document.getElementById('previewUrl').value;
            const metaTags = `<meta property="og:title" content="${title}">\n<meta property="og:description" content="${desc}">\n<meta property="og:url" content="${url}">`;
            navigator.clipboard.writeText(metaTags);
            alert('Meta tags copied!');
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
