<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Role Permissions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:800px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .role-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #222;}
        .permission-group{margin:1rem 0;}
        .permission-group label{margin-right:1rem;}
        input[type="checkbox"]{margin-right:0.25rem;}
        select,button{padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;cursor:pointer;}
        button{background:#dc2626;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-user-shield"></i> Role & Permissions Manager</h1>
        
        <div class="card">
            <h3>Add New Role</h3>
            <input type="text" id="newRole" placeholder="Role Name" style="width:70%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;">
            <button onclick="addRole()">Add Role</button>
        </div>
        
        <div class="card">
            <h3>Roles & Permissions</h3>
            <div id="rolesList"></div>
        </div>
    </div>
    <script>
        let roles = JSON.parse(localStorage.getItem('userRoles') || '[{"name":"Admin","permissions":{"create":true,"edit":true,"delete":true,"manage_users":true}},{"name":"Editor","permissions":{"create":true,"edit":true,"delete":false,"manage_users":false}},{"name":"Viewer","permissions":{"create":false,"edit":false,"delete":false,"manage_users":false}}]');
        
        function loadRoles() {
            const listDiv = document.getElementById('rolesList');
            listDiv.innerHTML = roles.map((role, i) => `
                <div class="role-item">
                    <div><strong>${role.name}</strong></div>
                    <div>
                        <label><input type="checkbox" ${role.permissions.create ? 'checked' : ''} onchange="updatePermission(${i}, 'create', this.checked)"> Create</label>
                        <label><input type="checkbox" ${role.permissions.edit ? 'checked' : ''} onchange="updatePermission(${i}, 'edit', this.checked)"> Edit</label>
                        <label><input type="checkbox" ${role.permissions.delete ? 'checked' : ''} onchange="updatePermission(${i}, 'delete', this.checked)"> Delete</label>
                        <label><input type="checkbox" ${role.permissions.manage_users ? 'checked' : ''} onchange="updatePermission(${i}, 'manage_users', this.checked)"> Manage Users</label>
                        <button onclick="deleteRole(${i})" style="margin-left:0.5rem;">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function addRole() {
            const name = document.getElementById('newRole').value;
            if(!name) { alert('Enter role name'); return; }
            roles.push({ name, permissions: { create: false, edit: false, delete: false, manage_users: false } });
            localStorage.setItem('userRoles', JSON.stringify(roles));
            document.getElementById('newRole').value = '';
            loadRoles();
        }
        
        function updatePermission(index, perm, value) {
            roles[index].permissions[perm] = value;
            localStorage.setItem('userRoles', JSON.stringify(roles));
        }
        
        function deleteRole(index) {
            if(roles[index].name === 'Admin') { alert('Cannot delete Admin role'); return; }
            roles.splice(index, 1);
            localStorage.setItem('userRoles', JSON.stringify(roles));
            loadRoles();
        }
        
        loadRoles();
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
