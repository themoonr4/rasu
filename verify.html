<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Verify Email</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .verify-card{text-align:center;background:#111;border:1px solid #222;border-radius:24px;padding:3rem;margin:2rem;max-width:450px;}
        .icon{font-size:5rem;color:#ffc107;margin-bottom:1rem;}
        h1{margin-bottom:1rem;}
        .resend-btn{background:#dc2626;color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;margin-top:1rem;}
        .home-link{color:#aaa;margin-top:1rem;display:block;}
    </style>
</head>
<body>
    <div class="verify-card">
        <div class="icon"><i class="fas fa-envelope"></i></div>
        <h1>Verify Your Email</h1>
        <p>We've sent a verification link to your email address.</p>
        <p style="color:#aaa;margin-top:0.5rem;">Please check your inbox and click the link to verify.</p>
        <button class="resend-btn" onclick="resendEmail()">Resend Email</button>
        <a href="/" class="home-link">Back to Home</a>
        <div id="msg"></div>
    </div>
    <script>
        function resendEmail() {
            const msgDiv = document.getElementById('msg');
            msgDiv.innerHTML = '<div style="color:#28a745;margin-top:0.5rem;">✅ Verification email sent!</div>';
            setTimeout(() => msgDiv.innerHTML = '', 3000);
        }
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
