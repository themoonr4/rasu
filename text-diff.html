<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Text Diff Checker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .diff-container{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
        textarea{width:100%;padding:0.75rem;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-family:monospace;min-height:200px;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;}
        .diff-result{background:#1a1a1a;padding:0.75rem;border-radius:8px;margin-top:1rem;font-family:monospace;font-size:0.7rem;}
        .added{background:#28a74540;color:#28a745;}
        .removed{background:#dc354540;color:#dc3545;text-decoration:line-through;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-code-branch"></i> Text Difference Checker</h1>
        
        <div class="card">
            <div class="diff-container">
                <div><h3>Original Text</h3><textarea id="originalText" placeholder="Original version..."></textarea></div>
                <div><h3>Modified Text</h3><textarea id="modifiedText" placeholder="Modified version..."></textarea></div>
            </div>
            <button onclick="compareText()">Compare Texts</button>
            <div id="diffResult" class="diff-result"></div>
        </div>
        
        <div class="card">
            <h3>Quick Samples</h3>
            <button onclick="loadSample('simple')">Simple Diff</button>
            <button onclick="loadSample('paragraph')">Paragraph Diff</button>
        </div>
    </div>
    <script>
        function compareText() {
            const original = document.getElementById('originalText').value;
            const modified = document.getElementById('modifiedText').value;
            const resultDiv = document.getElementById('diffResult');
            
            if(!original && !modified) { resultDiv.innerHTML = 'Enter text to compare'; return; }
            
            const originalWords = original.split(/\s+/);
            const modifiedWords = modified.split(/\s+/);
            
            let result = '';
            let i = 0, j = 0;
            while(i < originalWords.length || j < modifiedWords.length) {
                if(i < originalWords.length && j < modifiedWords.length && originalWords[i] === modifiedWords[j]) {
                    result += originalWords[i] + ' ';
                    i++; j++;
                } else if(j < modifiedWords.length && (i >= originalWords.length || modifiedWords[j] !== originalWords[i])) {
                    result += `<span class="added">${modifiedWords[j]}</span> `;
                    j++;
                } else if(i < originalWords.length) {
                    result += `<span class="removed">${originalWords[i]}</span> `;
                    i++;
                }
            }
            
            resultDiv.innerHTML = `<strong>Differences:</strong><br>${result || 'No differences found'}`;
        }
        
        function loadSample(type) {
            if(type === 'simple') {
                document.getElementById('originalText').value = 'The quick brown fox jumps over the lazy dog';
                document.getElementById('modifiedText').value = 'The quick brown fox jumps over the sleepy dog';
            } else {
                document.getElementById('originalText').value = 'This is the first version of the content. It contains some text.';
                document.getElementById('modifiedText').value = 'This is the updated version of the content. It has been changed.';
            }
            compareText();
        }
        
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
