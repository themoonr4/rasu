<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MOON - Brand Assets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        [data-theme="light"]{background:#f5f5f5;color:#1a1a1a;}
        .container{max-width:900px;margin:0 auto;}
        h1{margin-bottom:1rem;color:#dc2626;}
        .card{background:#111;border:1px solid #222;border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
        .asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;}
        .asset-card{background:#1a1a1a;border-radius:12px;padding:1rem;text-align:center;}
        .logo-preview{font-size:3rem;margin-bottom:0.5rem;}
        button{background:#dc2626;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;margin-right:0.5rem;}
        .back-btn{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;margin-bottom:1rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="back-btn" onclick="location.href='/admin.html'"><i class="fas fa-arrow-left"></i> Back</div>
        <h1><i class="fas fa-palette"></i> Brand Assets Manager</h1>
        
        <div class="card">
            <h3>Logo Assets</h3>
            <div class="asset-grid">
                <div class="asset-card"><div class="logo-preview">🌙</div><div>Logo (Light)</div><button onclick="downloadLogo('light')">Download SVG</button></div>
                <div class="asset-card"><div class="logo-preview" style="color:#0a0a0a;">🌙</div><div>Logo (Dark)</div><button onclick="downloadLogo('dark')">Download SVG</button></div>
                <div class="asset-card"><div class="logo-preview">TM</div><div>Icon (16x16)</div><button onclick="downloadIcon()">Download ICO</button></div>
            </div>
        </div>
        
        <div class="card">
            <h3>Brand Colors</h3>
            <div class="asset-grid">
                <div class="asset-card" style="background:#dc2626;"><div>Primary Red</div><div>#dc2626</div><button onclick="copyColor('#dc2626')">Copy</button></div>
                <div class="asset-card" style="background:#0a0a0a;"><div>Dark Background</div><div>#0a0a0a</div><button onclick="copyColor('#0a0a0a')">Copy</button></div>
                <div class="asset-card" style="background:#ffffff;color:#000;"><div>Light Background</div><div>#ffffff</div><button onclick="copyColor('#ffffff')">Copy</button></div>
            </div>
        </div>
        
        <div class="card">
            <h3>Typography</h3>
            <div class="asset-card">Primary Font: Inter<br>Secondary Font: Georgia<br><button onclick="copyFontCSS()">Copy CSS</button></div>
        </div>
    </div>
    <script>
        function downloadLogo(type) { alert(`Downloading ${type} logo`); }
        function downloadIcon() { alert('Downloading favicon'); }
        function copyColor(color) { navigator.clipboard.writeText(color); alert(`Copied ${color}`); }
        function copyFontCSS() { navigator.clipboard.writeText("font-family: 'Inter', sans-serif;"); alert('Font CSS copied!'); }
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
